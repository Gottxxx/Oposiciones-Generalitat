<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tema 6 · Test 3 · Oposición Generalitat</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f7f4;--surface:#fff;--surface2:#f1f0ed;--border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.2);--text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;--ok:#1a7a4a;--ok-bg:#eaf5ee;--ok-border:rgba(26,122,74,.25);--err:#c0392b;--err-bg:#fdf0ee;--err-border:rgba(192,57,43,.25);--accent:#1a1a18;--r:10px;--rs:6px}
@media(prefers-color-scheme:dark){:root{--bg:#18181a;--surface:#222224;--surface2:#2a2a2c;--border:rgba(255,255,255,.1);--border-strong:rgba(255,255,255,.2);--text:#f0efec;--text2:#a0a09a;--text3:#606060;--ok:#4caf7a;--ok-bg:rgba(76,175,122,.12);--ok-border:rgba(76,175,122,.3);--err:#e57373;--err-bg:rgba(229,115,115,.12);--err-border:rgba(229,115,115,.3);--accent:#f0efec}}
html{font-size:16px}body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem}
#app{width:100%;max-width:680px}
#hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:2rem}
#hdr h1{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px;letter-spacing:-.01em}#hdr p{font-size:13px;color:var(--text3)}
#pill{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid var(--border-strong);color:var(--text2);background:var(--surface2);white-space:nowrap;flex-shrink:0}
#pw{margin-bottom:1.25rem}#pr{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:7px}#pr span:last-child{font-weight:500;color:var(--text2)}
#track{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden}#fill{height:3px;background:var(--accent);border-radius:3px;transition:width .4s ease;width:0%}
#stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.st{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px}
.st .lb{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.st .vl{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-.02em}
#sc-ok .vl{color:var(--ok)}#sc-er .vl{color:var(--err)}
#qc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem}
#qm{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em}
#qm .d{width:3px;height:3px;border-radius:50%;background:var(--border-strong);display:inline-block}
#qt{font-size:16px;color:var(--text);line-height:1.65}
#opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.opt{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:13px 16px;font-size:14px;color:var(--text);cursor:pointer;text-align:left;line-height:1.55;transition:border-color .15s,background .15s,transform .1s;width:100%}
.opt:hover:not(.dis){border-color:var(--border-strong);background:var(--surface2);transform:translateY(-1px)}
.lt{min-width:24px;height:24px;border-radius:50%;border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0;margin-top:1px;transition:background .15s,color .15s,border-color .15s}
.opt.ok{border-color:var(--ok-border);background:var(--ok-bg)}.opt.ok .lt{background:var(--ok);border-color:var(--ok);color:#fff}
.opt.er{border-color:var(--err-border);background:var(--err-bg)}.opt.er .lt{background:var(--err);border-color:var(--err);color:#fff}
.opt.dis{cursor:default;pointer-events:none}
#fb{display:none;border-radius:var(--rs);padding:13px 16px;margin-bottom:1rem;border:1px solid;font-size:13px;line-height:1.65}
#fb.show{display:block}#fb.ok{background:var(--ok-bg);border-color:var(--ok-border)}#fb.er{background:var(--err-bg);border-color:var(--err-border)}
#fb .fh{font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
#fb.ok .fh{color:var(--ok)}#fb.er .fh{color:var(--err)}#fb .fd{color:var(--text2)}
#br{display:flex;justify-content:flex-end}
#bn{display:none;font-size:13px;font-weight:500;padding:10px 20px;border-radius:var(--rs);background:var(--accent);color:var(--bg);border:none;cursor:pointer;transition:opacity .15s}#bn:hover{opacity:.85}
#res{display:none;padding:1rem 0}
#rh{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:2rem}
#rp{font-size:64px;font-weight:700;color:var(--text);letter-spacing:-.04em;line-height:1;flex-shrink:0}
#ri h2{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}#ri p{font-size:13px;color:var(--text2);line-height:1.6}
#rbt{display:flex;gap:8px;margin-bottom:2rem;flex-wrap:wrap}
.bs{font-size:13px;font-weight:500;padding:10px 18px;border-radius:var(--rs);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);cursor:pointer;transition:background .15s}.bs:hover{background:var(--surface2)}
.bp{background:var(--accent);color:var(--bg);border-color:transparent}.bp:hover{opacity:.85;background:var(--accent)}
#fs{border-top:1px solid var(--border);padding-top:1.5rem}
#fs h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.04em}
.fi{padding:1rem 0;border-bottom:1px solid var(--border)}.fi:last-child{border-bottom:none}
.fq{font-size:14px;color:var(--text);margin-bottom:8px;line-height:1.5;font-weight:500}
.fb2{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.bg{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid}
.bg.er{background:var(--err-bg);border-color:var(--err-border);color:var(--err)}.bg.ok{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok)}
.fe{font-size:12px;color:var(--text3);line-height:1.6}
@media(max-width:500px){body{padding:1rem .75rem 3rem}#rh{flex-direction:column;gap:1rem;align-items:flex-start}#rp{font-size:48px}#hdr{flex-direction:column;gap:.75rem}}
</style>
</head>
<body>
<div id="app">
  <div id="hdr"><div><h1>Tema 6 · Test 3 · Oposición Generalitat</h1><p>53 preguntas · Simulacro final con preguntas de tipo examen real</p></div><div id="pill"></div></div>
  <div id="pw"><div id="pr"><span>Progreso</span><span id="pn">1 / 53</span></div><div id="track"><div id="fill"></div></div></div>
  <div id="stats">
    <div class="st" id="sc-ok"><div class="lb">Correctas</div><div class="vl" id="vok">0</div></div>
    <div class="st" id="sc-er"><div class="lb">Errores</div><div class="vl" id="ver">0</div></div>
    <div class="st"><div class="lb">Pendientes</div><div class="vl" id="vpe">53</div></div>
  </div>
  <div id="qc"><div id="qm"><span id="qnl"></span><span class="d"></span><span id="qbl"></span></div><div id="qt"></div></div>
  <div id="opts"></div><div id="fb"></div>
  <div id="br"><button id="bn" onclick="nxt()">Siguiente →</button></div>
  <div id="res">
    <div id="rh"><div id="rp"></div><div id="ri"><h2 id="rt"></h2><p id="rs2"></p></div></div>
    <div id="rbt"><button class="bs bp" onclick="rst()">Repetir completo</button><button class="bs" id="bfl" onclick="sfl()">Solo falladas →</button></div>
    <div id="fs" style="display:none"><h3 id="fst"></h3><div id="fl"></div></div>
  </div>
</div>
<script>
const Q=[
  {b:"A. Simulacro — iniciación",q:"Un ciudadano presenta un escrito en el registro de un ayuntamiento para una gestión ante la Generalitat. El ayuntamiento debe:",opts:["Devolver el escrito porque es incompetente","Registrarlo y remitirlo al órgano competente de la Generalitat","Solo registrarlo pero no remitirlo","Exigir que se presente en la sede electrónica de la Generalitat"],c:1,f:"El sistema de registros interoperables permite presentar documentación ante cualquier Administración Pública. El ayuntamiento debe registrar el escrito y remitirlo al órgano competente. No puede devolvérselo al ciudadano."},
  {b:"A. Simulacro — iniciación",q:"Un órgano instructor recibe una denuncia sobre una infracción ambiental ocurrida hace 4 años. El denunciante solicita ser considerado interesado. El órgano debe:",opts:["Reconocerle la condición de interesado automáticamente por haber denunciado","Verificar si tiene afectación específica en sus derechos antes de reconocerle esa condición, y verificar si la infracción no ha prescrito","Iniciar el procedimiento sin valorar la prescripción","Archivar directamente porque el denunciante no es interesado automático"],c:1,f:"Doble verificación: la denuncia no confiere automáticamente la condición de interesado (necesita afectación específica) y el órgano debe verificar si la infracción ha prescrito antes de iniciar. Si ha prescrito, debe archivar aunque el denunciante tenga afectación."},
  {b:"A. Simulacro — iniciación",q:"Se presentan 200 solicitudes idénticas de una ayuda pública el mismo día. La Administración puede:",opts:["Tramitar solo las primeras 50 y archivar el resto","Tratar cada solicitud como procedimiento individual sin posibilidad de acumulación","Acumular los procedimientos si las pretensiones son idénticas y es el mismo órgano competente","Pedir que se presente una sola solicitud por todos los solicitantes"],c:2,f:"200 solicitudes idénticas ante el mismo órgano = caso típico de acumulación. Las pretensiones son idénticas o muy similares y el mismo órgano es competente para todas. La acumulación evita duplicidades y es la solución más eficiente."},
  {b:"B. Simulacro — ordenación",q:"Un expediente se forma en papel por error en vez de electrónicamente. ¿Qué ocurre?",opts:["El expediente es nulo de pleno derecho","Es un defecto de forma subsanable que no produce nulidad automática, aunque incumple la regla general del expediente electrónico","Es válido porque la ley permite ambos formatos sin distinción","El interesado puede pedir la anulación del procedimiento por ese defecto"],c:1,f:"El expediente en papel es un incumplimiento de la regla general (electrónico), pero es un defecto de forma que no produce nulidad automática. Los actos sustantivos del procedimiento mantienen su validez. El defecto formal puede subsanarse."},
  {b:"B. Simulacro — ordenación",q:"El instructor detecta que se pueden tramitar simultáneamente el período de prueba y la solicitud de un informe preceptivo. Debe:",opts:["Esperar a que acabe el período de prueba para pedir el informe","Tramitarlos simultáneamente para ganar tiempo","Pedir el informe solo si las pruebas resultan insuficientes","Consultar al superior jerárquico antes de actuar en paralelo"],c:1,f:"Principio de celeridad y actos simultáneos: los trámites que no dependan entre sí (prueba e informes son independientes) deben tramitarse simultáneamente. Es una obligación del instructor, no una opción."},
  {b:"C. Simulacro — prueba",q:"El interesado propone como prueba una pericial costosa. El órgano puede:",opts:["Rechazarla siempre porque las pruebas periciales son de oficio","Admitirla pero hacer que el coste lo asuma el interesado si la considera pertinente","Admitirla y asumir el coste automáticamente","Solo admitirla si el superior jerárquico lo autoriza"],c:1,f:"Las pruebas propuestas por el interesado que sean pertinentes pueden admitirse, pero el coste corre a cargo del interesado salvo que el órgano las considere indispensables para resolver. No son gratuitas automáticamente solo por ser admitidas."},
  {b:"C. Simulacro — prueba",q:"El período de prueba dura 25 días. ¿Es correcto?",opts:["No: el máximo son 20 días","Sí: está dentro del rango legal de 10 a 30 días","No: el mínimo son 30 días","No: solo puede durar exactamente 10 o 30 días"],c:1,f:"25 días está dentro del rango legal del período de prueba: mínimo 10 días, máximo 30 días. El órgano puede fijar cualquier duración dentro de ese rango según la complejidad de los hechos a probar."},
  {b:"C. Simulacro — prueba",q:"El órgano rechaza una prueba propuesta por el interesado sin motivar el rechazo. ¿Qué ocurre?",opts:["El rechazo es válido porque el órgano tiene libertad en la admisión de pruebas","El rechazo sin motivación es un defecto que puede generar indefensión y ser causa de anulabilidad de la resolución","El rechazo sin motivar equivale a admitir la prueba tácitamente","Solo es un defecto si el interesado lo recurre expresamente antes de la resolución"],c:1,f:"El rechazo de pruebas debe ser motivado. Un rechazo sin motivar puede generar indefensión al interesado y ser causa de anulabilidad de la resolución final si el interesado no pudo probar hechos relevantes para su defensa."},
  {b:"D. Simulacro — informes",q:"Un informe preceptivo llega al instructor 5 días después del plazo legal. El procedimiento no ha concluido. El instructor debe:",opts:["Ignorar el informe porque llegó fuera de plazo","Incorporarlo al expediente y tenerlo en cuenta para la resolución","Devolvérselo al órgano emisor sin incorporarlo","Iniciar un expediente disciplinario antes de incorporarlo"],c:1,f:"El informe extemporáneo puede incorporarse al expediente si el procedimiento no ha concluido. El instructor debe incorporarlo — la extemporaneidad genera responsabilidad para el órgano emisor, pero no invalida el informe ni impide su uso."},
  {b:"D. Simulacro — informes",q:"El órgano instructor recibe un informe no vinculante que recomienda desestimar la solicitud. El órgano está convencido de que debe estimarla. Puede:",opts:["Seguir el informe obligatoriamente aunque no esté convencido","Apartarse del informe motivando su decisión en la resolución","Solo apartarse del informe si pide otro informe que lo contradiga","Solo apartarse si el superior jerárquico lo autoriza"],c:1,f:"Informe no vinculante: el órgano puede separarse de sus conclusiones, pero debe motivar por qué no lo sigue en la resolución. La motivación es la garantía de que el apartamiento no es arbitrario."},
  {b:"D. Simulacro — informes",q:"¿Cuántos días tiene el órgano consultado para emitir un informe si la norma no establece plazo?",opts:["5 días hábiles","10 días hábiles","15 días hábiles","30 días naturales"],c:1,f:"Plazo general de informes: 10 días hábiles. Es el plazo supletorio cuando la norma específica no establece otro. El examen cambia el número y la naturaleza (hábiles/naturales) para crear trampas."},
  {b:"E. Simulacro — audiencia",q:"El instructor va a usar en la resolución un informe técnico que el interesado no conoce. ¿Puede omitir la audiencia?",opts:["Sí, si el informe es preceptivo y vinculante","No: si hay hechos o pruebas que el interesado desconoce y se usarán en la resolución, la audiencia es obligatoria","Sí, si el procedimiento es de tramitación simplificada","Solo debe notificarle el informe, sin necesidad de abrir audiencia"],c:1,f:"La audiencia es obligatoria cuando hay hechos, alegaciones o pruebas que el interesado no conoce y que se van a tener en cuenta en la resolución. El informe técnico desconocido para el interesado activa la obligación de audiencia."},
  {b:"E. Simulacro — audiencia",q:"El interesado solicita una prórroga del plazo de audiencia de 10 días. ¿Puede concederse?",opts:["No: el plazo de audiencia es rígido y no admite prórroga","Sí, si el órgano lo considera justificado y no supera el máximo de 15 días","Sí, hasta un máximo de 30 días adicionales","Solo si lo autoriza el superior jerárquico"],c:1,f:"El plazo de audiencia puede ampliarse potestativamente si el instructor lo considera justificado, pero sin superar el máximo de 15 días total. No puede ampliarse más allá del límite legal."},
  {b:"E. Simulacro — audiencia",q:"El interesado formula alegaciones en la audiencia que contradicen los hechos del expediente. El órgano:",opts:["Debe aceptar las alegaciones del interesado siempre","Debe valorarlas en la propuesta de resolución, pero puede mantener su criterio si las considera no acreditadas","Puede ignorarlas si ya tiene la resolución redactada mentalmente","Debe abrir un nuevo período de prueba obligatoriamente para verificarlas"],c:1,f:"Las alegaciones de la audiencia deben ser valoradas en la propuesta de resolución. El órgano puede mantener su criterio si las considera insuficientemente acreditadas, pero debe dar respuesta motivada a las alegaciones del interesado."},
  {b:"F. Simulacro — información pública",q:"La información pública se abre en un procedimiento urbanístico. Una asociación ecologista sin ser interesada formal presenta alegaciones. ¿Qué ocurre?",opts:["Las alegaciones se rechazan porque la asociación no es interesada","Las alegaciones se incorporan al expediente pero la asociación no adquiere por ello condición de interesada","La asociación adquiere automáticamente condición de interesada por participar","Las alegaciones solo se incorporan si el órgano las considera relevantes"],c:1,f:"Información pública: cualquier persona puede participar, incluyendo asociaciones sin la condición de interesadas. Sus alegaciones deben tenerse en cuenta, pero la participación no les convierte automáticamente en interesadas con derechos de recurso."},
  {b:"F. Simulacro — información pública",q:"¿Cuánto debe durar mínimo la información pública en un procedimiento de ordenación del territorio?",opts:["10 días","15 días","20 días","No tiene plazo mínimo legal"],c:2,f:"Plazo mínimo de información pública: 20 días. Es el mínimo legal con carácter general. Las normas sectoriales (como la legislación urbanística) pueden establecer plazos mayores, pero nunca menores."},
  {b:"G. Simulacro — tramitación simplificada",q:"Un interesado pide que su procedimiento se tramite de forma simplificada. El instructor considera que el asunto es complejo. Debe:",opts:["Aceptar la solicitud porque es un derecho del interesado","Rechazar la solicitud motivando que el asunto no carece de complejidad","Aceptar la solicitud pero ampliar el plazo de resolución a 60 días","Consultar al superior jerárquico antes de decidir"],c:1,f:"El órgano puede rechazar la solicitud de tramitación simplificada si aprecia que el asunto tiene complejidad que lo desaconseja. El rechazo debe motivarse. No es un derecho incondicionado del interesado."},
  {b:"G. Simulacro — tramitación simplificada",q:"Un procedimiento simplificado se inicia y a los 15 días el instructor aprecia que es más complejo de lo previsto. Puede:",opts:["No puede cambiar: el simplificado es irreversible una vez iniciado","Continuar el simplificado añadiendo trámites de oficio","Acordar la continuación por el procedimiento ordinario si el asunto resulta ser más complejo","Solo puede prorrogar el plazo de 30 días hasta 60 días"],c:2,f:"El procedimiento simplificado puede transformarse en ordinario si el órgano aprecia que el asunto es más complejo de lo previsto. El cambio debe acordarse y notificarse al interesado. No es irreversible."},
  {b:"H. Simulacro — medidas provisionales",q:"El inspector de trabajo detecta una situación de peligro inminente para los trabajadores. Puede adoptar medidas provisionales:",opts:["Solo después de iniciar formalmente el procedimiento sancionador","Antes de iniciar el procedimiento, por su urgencia, siempre que se confirmen en el acuerdo de inicio en 15 días","Solo con autorización judicial previa","Solo si el empresario no corrige la situación en 24 horas"],c:1,f:"Las medidas provisionales urgentes pueden adoptarse antes del inicio formal del procedimiento cuando la situación lo exija (peligro inminente). Deben confirmarse, modificarse o levantarse en el acuerdo de iniciación que debe adoptarse en los 15 días siguientes."},
  {b:"H. Simulacro — medidas provisionales",q:"Una medida provisional impide al interesado ejercer su actividad económica durante 6 meses. ¿Puede ser proporcional?",opts:["No: las medidas provisionales no pueden durar más de 3 meses","Depende: debe valorarse si la duración es necesaria y proporcional al fin perseguido","Sí: no hay límite temporal para las medidas provisionales","No: causan perjuicio grave y siempre son improcedentes"],c:1,f:"La proporcionalidad de una medida provisional no depende solo del tiempo sino del equilibrio entre el fin perseguido y el perjuicio causado. Una medida puede ser proporcionada aunque dure 6 meses si el riesgo que previene lo justifica. El límite es que no cause perjuicios de imposible reparación."},
  {b:"I. Trampas numéricas del T6",q:"¿Cuál de estas combinaciones de plazos del T6 es completamente correcta?",opts:["Prueba: 10-20 días / Audiencia: 10-15 días / Información pública: 15 días mínimo / Informes: 10 días","Prueba: 10-30 días / Audiencia: 10-15 días / Información pública: 20 días mínimo / Informes: 10 días hábiles","Prueba: 5-30 días / Audiencia: 10-20 días / Información pública: 20 días / Informes: 15 días hábiles","Prueba: 10-30 días / Audiencia: 15-20 días / Información pública: 15 días / Informes: 10 días"],c:1,f:"Tabla correcta completa del T6: prueba 10-30 días / audiencia 10-15 días / información pública mínimo 20 días / informes 10 días hábiles. Cualquier combinación que cambie uno de estos cuatro datos es incorrecta."},
  {b:"I. Trampas numéricas del T6",q:"La tramitación simplificada resuelve en 30 días. La tramitación de urgencia reduce los plazos a la mitad. Si el plazo ordinario de resolución es 3 meses (90 días), la urgencia resuelve en:",opts:["30 días","45 días","60 días","15 días"],c:1,f:"Tramitación de urgencia: plazos a la mitad. 3 meses = 90 días → urgencia = 45 días. No confundir con el simplificado que siempre son 30 días fijos. Son tres tipos distintos con plazos distintos."},
  {b:"I. Trampas numéricas del T6",q:"El registro electrónico presenta un escrito el 31 de diciembre a las 23:30. A efectos de plazos se considera presentado:",opts:["El 31 de diciembre a las 23:30","El 1 de enero (si es inhábil), se traslada al 2 de enero o primer día hábil de enero","El 30 de diciembre","El 2 de enero en todo caso"],c:1,f:"El registro electrónico acepta la presentación el 31 de diciembre, pero si el 1 de enero es inhábil (festivo nacional), a efectos de cómputo se entiende presentado el 2 de enero o el primer día hábil siguiente. La cadena de inhábiles consecutivos desplaza el cómputo al primer hábil."},
  {b:"J. Preguntas de 'cuál es INCORRECTA'",q:"¿Cuál de estas afirmaciones sobre las actuaciones previas es INCORRECTA?",opts:["Pueden existir antes del inicio formal del procedimiento","Sirven para aclarar circunstancias antes de decidir si se inicia","Equivalen jurídicamente al inicio formal del procedimiento","No generan por sí solas la obligación de resolver en plazo"],c:2,f:"La afirmación incorrecta es la C. Las actuaciones previas NO equivalen al inicio formal — es la trampa definitoria del T6. Solo el inicio formal hace nacer la obligación plena de tramitar y resolver."},
  {b:"J. Preguntas de 'cuál es INCORRECTA'",q:"¿Cuál de estas afirmaciones sobre la denuncia es INCORRECTA?",opts:["Puede dar lugar al inicio de un procedimiento de oficio","El denunciante que participó en la infracción puede obtener reducción de sanción si cumple los requisitos","Confiere automáticamente la condición de interesado al denunciante","Debe incluir la identidad del denunciante"],c:2,f:"La afirmación incorrecta es la C. La denuncia NO confiere automáticamente la condición de interesado. Es el dato más preguntado del bloque de inicio de oficio en el T6."},
  {b:"J. Preguntas de 'cuál es INCORRECTA'",q:"¿Cuál de estas afirmaciones sobre los informes es INCORRECTA?",opts:["Los informes pueden ser preceptivos o facultativos","Todo informe preceptivo es vinculante automáticamente","El plazo general para emitir informes es de 10 días hábiles","Un informe emitido fuera de plazo puede incorporarse si el procedimiento no ha concluido"],c:1,f:"La afirmación incorrecta es la B. Preceptivo y vinculante son categorías independientes. Un informe preceptivo (obligatorio emitirlo) puede perfectamente no ser vinculante (el órgano no está obligado a seguirlo). El examen los confunde sistemáticamente."},
  {b:"J. Preguntas de 'cuál es INCORRECTA'",q:"¿Cuál de estas afirmaciones sobre la audiencia es INCORRECTA?",opts:["Tiene lugar antes de redactar la propuesta de resolución","Puede omitirse cuando no hay hechos distintos de los del interesado que se vayan a usar","Su plazo mínimo es de 10 días y máximo de 15 días","La audiencia es siempre obligatoria en todos los procedimientos sin ninguna excepción"],c:3,f:"La afirmación incorrecta es la D. La audiencia puede omitirse en el supuesto concreto previsto por la ley: cuando no haya hechos, alegaciones ni pruebas distintos de los del interesado que se vayan a tener en cuenta en la resolución."},
  {b:"J. Preguntas de 'cuál es INCORRECTA'",q:"¿Cuál de estas afirmaciones sobre la información pública es INCORRECTA?",opts:["Puede participar cualquier persona aunque no sea interesada","Su plazo mínimo es de 20 días","Quien participa adquiere automáticamente la condición de interesado","Debe anunciarse en el Boletín Oficial correspondiente y en la sede electrónica"],c:2,f:"La afirmación incorrecta es la C. La participación en la información pública NO convierte automáticamente en interesado. Es la trampa más repetida de este trámite en todos los tests del T6."},
  {b:"K. Preguntas mixtas T5-T6",q:"El silencio administrativo pertenece principalmente al:",opts:["T6, porque aparece en la fase de terminación del procedimiento","T5, porque regula los efectos de la falta de resolución en plazo como concepto general","T6, porque la resolución es la última fase del procedimiento","T5 y T6 por igual, ya que ambos regulan el procedimiento"],c:1,f:"El silencio administrativo pertenece al T5 (bloque de actos administrativos y eficacia). El T6 termina en la instrucción — la resolución y sus efectos (silencio, recursos) son materia del T5."},
  {b:"K. Preguntas mixtas T5-T6",q:"El plazo de subsanación de solicitudes de 10 días aparece en:",opts:["Solo en el T5","Solo en el T6","En el T5 como plazo general y en el T6 como aplicación concreta al inicio por solicitud","Solo en la normativa catalana especial"],c:2,f:"El plazo de subsanación de 10 días es un dato que aparece en el T5 (como plazo general del procedimiento) y en el T6 (como aplicación concreta al inicio a solicitud del interesado). Los dos temas lo comparten."},
  {b:"K. Preguntas mixtas T5-T6",q:"La caducidad por inactividad del interesado en un procedimiento iniciado a su solicitud se produce si paraliza el procedimiento durante más de:",opts:["1 mes","2 meses","3 meses","6 meses"],c:2,f:"Caducidad por inactividad del interesado: si el interesado paraliza el procedimiento iniciado a su solicitud durante más de 3 meses, la Administración puede advertirle y, si persiste la paralización, declarar la caducidad y archivar el expediente."},
  {b:"L. Preguntas de normativa",q:"La Ley que regula las fases del procedimiento que estudia el T6 es:",opts:["Ley 40/2015, de Régimen Jurídico del Sector Público","Ley 39/2015, del Procedimiento Administrativo Común","Ley 26/2010, de régimen jurídico catalán","Real Decreto Legislativo 5/2015, del Estatuto Básico del Empleado Público"],c:1,f:"Las fases del procedimiento administrativo (iniciación, ordenación, instrucción) se regulan en la Ley 39/2015 (LPACAP). La Ley 40/2015 regula el régimen jurídico del sector público (organización). La Ley 26/2010 es la catalana de procedimiento (complementaria)."},
  {b:"L. Preguntas de normativa",q:"La Llei 26/2010 de règim jurídic i procediment de les Administracions Públiques de Catalunya:",opts:["Deroga totalmente la Ley 39/2015 en Cataluña","Complementa la Ley 39/2015 y puede establecer especialidades del procedimiento administrativo catalán","Es equivalente a la Ley 40/2015 pero de ámbito catalán","Regula exclusivamente el procedimiento sancionador de la Generalitat"],c:1,f:"La Llei 26/2010 complementa la normativa estatal (Ley 39/2015) y puede establecer especialidades del procedimiento en el ámbito de la Generalitat. No la deroga — el procedimiento administrativo común del Estado es la base; la ley catalana añade especialidades."},
  {b:"M. Preguntas de síntesis final",q:"Un procedimiento de oficio sancionador se inicia, se instruye y lleva 5 meses sin resolverse. El interesado puede:",opts:["Solo esperar a la resolución porque es un procedimiento de oficio","Alegar la caducidad por incumplimiento del plazo máximo de resolución","Interponer directamente recurso contencioso-administrativo sin más","Pedir que se archive el expediente por prescripción de la infracción"],c:1,f:"En procedimientos sancionadores iniciados de oficio, si la Administración no resuelve en el plazo máximo (normalmente 1 año para los sancionadores), el interesado puede alegar la caducidad. La caducidad produce el archivo del expediente pero no extingue la infracción si no ha prescrito."},
  {b:"M. Preguntas de síntesis final",q:"¿Cuál es la diferencia esencial entre el inicio de oficio y el inicio a solicitud en cuanto a quién impulsa el procedimiento?",opts:["No hay diferencia: en ambos casos la Administración controla el impulso","En el inicio de oficio la Administración lo inicia por sí misma o por comunicación externa; en el inicio a solicitud, el interesado activa el procedimiento con su petición","En el inicio a solicitud la Administración actúa sola; en el de oficio el interesado impulsa","Son idénticos una vez iniciados: solo se diferencian en el momento de inicio"],c:1,f:"La diferencia está en quién activa el procedimiento: inicio de oficio = la Administración actúa por iniciativa propia o por comunicación externa (orden, petición razonada, denuncia). Inicio a solicitud = el interesado activa el procedimiento con su petición."},
  {b:"M. Preguntas de síntesis final",q:"¿Cuál es la garantía procesal más importante que protege al interesado en la fase de instrucción?",opts:["El período de prueba","El trámite de audiencia, porque es la última oportunidad para pronunciarse antes de la resolución","Los informes preceptivos","La información pública"],c:1,f:"La audiencia es la garantía procesal más importante de la instrucción porque es la última oportunidad del interesado para pronunciarse antes de que se dicte la resolución. Su omisión cuando es obligatoria es causa de anulabilidad de la resolución."},
  {b:"M. Preguntas de síntesis final",q:"En el T6 se estudian tres fases: iniciación, ordenación e instrucción. ¿Cuál de los siguientes trámites pertenece a las tres fases simultáneamente?",opts:["El trámite de audiencia","El control de plazos","La denuncia","La terminación convencional"],c:1,f:"El control de plazos es transversal a las tres fases: en la iniciación (plazo de subsanación, plazo para adoptar el acuerdo de inicio), en la ordenación (control del impulso de oficio) y en la instrucción (plazos de prueba, informes y audiencia). Es el elemento transversal que conecta las tres fases."},
  {b:"N. Preguntas de detalle final",q:"¿Puede acordarse la acumulación de procedimientos sin audiencia previa a los interesados?",opts:["No: la audiencia previa es siempre obligatoria antes de acumular","Sí: es un acto de ordenación que puede adoptarse sin audiencia previa, y contra el que no procede recurso","Solo si todos los interesados están de acuerdo","Solo en procedimientos de oficio"],c:1,f:"La acumulación es un acto de ordenación que puede adoptarse sin audiencia previa a los interesados. La ley establece expresamente que contra el acuerdo de acumulación no procede recurso. Es una decisión de gestión procedimental, no un acto que afecte al fondo."},
  {b:"N. Preguntas de detalle final",q:"¿Puede el órgano instructor cambiar durante la instrucción del procedimiento?",opts:["No: el órgano instructor es invariable una vez designado","Sí, por razones organizativas, pero el nuevo instructor asume el expediente en el estado en que se encuentre","Solo si el interesado lo consiente","Solo en procedimientos de más de 6 meses de duración"],c:1,f:"El instructor puede cambiar durante el procedimiento por razones organizativas (bajas, comisión de servicio, etc.). El nuevo instructor asume el expediente en el estado en que esté y continúa la tramitación sin necesidad de repetir trámites ya realizados."},
  {b:"N. Preguntas de detalle final",q:"¿Cuándo puede el órgano acordar la tramitación de urgencia?",opts:["Siempre que el interesado lo solicite","Solo en procedimientos sancionadores","Cuando razones de interés público lo aconsejen, reduciendo los plazos a la mitad salvo los de audiencia y recursos","Solo cuando el asunto sea de poca complejidad"],c:2,f:"Tramitación de urgencia: procede cuando razones de interés público lo aconsejen. El órgano la acuerda de oficio — el interesado no tiene derecho a exigirla. Reduce plazos a la mitad excepto los de presentación de solicitudes, recursos, audiencia y alegaciones."},
  {b:"N. Preguntas de detalle final",q:"La petición de información pública que realiza un ciudadano que no es interesado produce como efecto principal:",opts:["La adquisición de la condición de interesado","La obligación de la Administración de notificarle la resolución final","La posibilidad de formular alegaciones que deben tenerse en cuenta, sin adquirir la condición de interesado","La suspensión del procedimiento hasta que se resuelvan sus alegaciones"],c:2,f:"La participación en la información pública da derecho a formular alegaciones que el órgano debe tener en cuenta, pero no convierte al participante en interesado ni le da derecho a ser notificado de la resolución final ni a recurrir."},
  {b:"N. Preguntas de detalle final",q:"¿Puede la Administración adoptar medidas provisionales que impliquen la suspensión definitiva de una actividad?",opts:["Sí, si el peligro es grave","No: las medidas provisionales son por definición temporales y no pueden anticipar la resolución final","Solo si el interesado consiente","Solo si el TC lo autoriza previamente"],c:1,f:"Las medidas provisionales son temporales por definición — no pueden anticipar la resolución definitiva. Si la suspensión tiene vocación de permanencia, debe tramitarse como resolución del procedimiento, no como medida provisional."},
  {b:"O. Tabla final de datos literales",q:"¿Cuál de estos datos es CORRECTO según la normativa del T6?",opts:["El período de prueba dura entre 5 y 20 días","La audiencia dura entre 10 y 15 días","La información pública tiene plazo máximo de 20 días","Los informes deben emitirse en 15 días hábiles"],c:1,f:"Solo la B es correcta: audiencia entre 10 y 15 días. El período de prueba es 10-30 (no 5-20). La información pública tiene mínimo 20 días pero no tiene máximo fijo en la ley general. Los informes son 10 días hábiles, no 15."},
  {b:"O. Tabla final de datos literales",q:"¿Cuál de estos datos sobre el registro electrónico es CORRECTO?",opts:["Funciona de 8h a 22h en días hábiles","Funciona 24 horas todos los días del año pero el día inhábil cuenta el siguiente hábil","Funciona 24 horas pero solo en días hábiles","Solo acepta documentación hasta las 14h en días hábiles"],c:1,f:"El registro electrónico funciona 24/7 (las 24 horas, los 365 días). Si la presentación es en día inhábil, a efectos del cómputo de plazos se entiende realizada el primer día hábil siguiente."},
  {b:"O. Tabla final de datos literales",q:"¿Cuál de estos plazos del T6 es INCORRECTO?",opts:["Tramitación simplificada: resolución en 30 días","Período de prueba: entre 10 y 30 días","Audiencia: entre 10 y 15 días","Informes: entre 10 y 20 días hábiles según complejidad"],c:3,f:"El dato incorrecto es el D. Los informes tienen un plazo único de 10 días hábiles (salvo norma específica), no un rango de 10 a 20. El examen introduce rangos falsos para los informes para confundir con el período de prueba o la audiencia."},
  {b:"P. Pregunta final de consolidación",q:"Si tuvieras que resumir el T6 en una sola regla para el examen, ¿cuál sería?",opts:["Las actuaciones previas equivalen al inicio formal y generan obligación de resolver","Las cuatro vías de oficio son iniciativa, orden, petición razonada y denuncia; la denuncia no confiere la condición de interesado; la audiencia puede omitirse solo en un caso concreto; la información pública está abierta a todos pero no convierte en interesado","El trámite de audiencia siempre es obligatorio y dura 20 días","Los informes preceptivos son siempre vinculantes y paralizan el procedimiento si no llegan en plazo"],c:1,f:"La regla síntesis del T6: cuatro vías de oficio (iniciativa, orden, petición razonada, denuncia) / denuncia no confiere condición de interesado / audiencia omisible solo cuando no hay nada nuevo que el interesado desconozca / información pública abierta a todos pero sin convertir en interesado. Esos cuatro ejes resumen las trampas principales del tema."}
];

let pool=[...Q],idx=0,nOk=0,nEr=0,fl=[],ans=false;
function render(){
  if(idx>=pool.length){showRes();return;}
  const q=pool[idx],tot=pool.length;
  document.getElementById('fill').style.width=Math.round(idx/tot*100)+'%';
  document.getElementById('pn').textContent=(idx+1)+' / '+tot;
  document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;
  document.getElementById('vpe').textContent=tot-idx;
  document.getElementById('pill').textContent=q.b;
  document.getElementById('qnl').textContent='Pregunta '+(idx+1);
  document.getElementById('qbl').textContent=q.b;
  document.getElementById('qt').textContent=q.q;
  const o=document.getElementById('opts');o.innerHTML='';
  ['A','B','C','D'].forEach((l,i)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML='<span class="lt">'+l+'</span><span>'+q.opts[i]+'</span>';
    b.onclick=()=>sel(i,b);o.appendChild(b);
  });
  const f=document.getElementById('fb');f.className='';f.innerHTML='';
  document.getElementById('bn').style.display='none';ans=false;
}
function sel(i,btn){
  if(ans)return;ans=true;
  const q=pool[idx];
  document.querySelectorAll('.opt').forEach(b=>b.classList.add('dis'));
  const f=document.getElementById('fb');
  if(i===q.c){btn.classList.add('ok');nOk++;f.className='show ok';f.innerHTML='<div class="fh">Correcto</div><div class="fd">'+q.f+'</div>';}
  else{btn.classList.add('er');document.querySelectorAll('.opt')[q.c].classList.add('ok');nEr++;fl.push({q:q.q,co:q.opts[q.c],tu:q.opts[i],f:q.f});f.className='show er';f.innerHTML='<div class="fh">Incorrecto — correcta: '+['A','B','C','D'][q.c]+'</div><div class="fd">'+q.f+'</div>';}
  document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;
  document.getElementById('bn').style.display='inline-block';
}
function nxt(){idx++;render();}
function showRes(){
  ['hdr','pw','stats','qc','opts','fb','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  const tot=pool.length,pct=Math.round(nOk/tot*100);
  document.getElementById('rp').textContent=pct+'%';
  document.getElementById('rt').textContent=pct>=80?'T6 dominado — a por el T3':pct>=60?'Nivel sólido — repasa los fallos':'Refuerza los plazos y las trampas';
  document.getElementById('rs2').textContent=nOk+' correctas de '+tot+'.'+(fl.length>0?' '+fl.length+' para repasar.':' Sin errores.');
  if(!fl.length)document.getElementById('bfl').style.display='none';
  if(fl.length){document.getElementById('fs').style.display='block';document.getElementById('fst').textContent='Preguntas falladas ('+fl.length+')';const fll=document.getElementById('fl');fll.innerHTML='';fl.forEach(f=>{const d=document.createElement('div');d.className='fi';d.innerHTML='<div class="fq">'+f.q+'</div><div class="fb2"><span class="bg er">Tu respuesta: '+f.tu+'</span><span class="bg ok">Correcta: '+f.co+'</span></div><div class="fe">'+f.f+'</div>';fll.appendChild(d);});}
  document.getElementById('res').style.display='block';
}
function rst(){pool=[...Q];idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
function sfl(){if(!fl.length)return;pool=fl.map(f=>Q.find(q=>q.q===f.q)).filter(Boolean);idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
render();
</script>
