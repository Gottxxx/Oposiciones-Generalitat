<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tema 2 · Test 1 · Oposición Generalitat</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f7f4;--surface:#fff;--surface2:#f1f0ed;--border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.2);--text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;--ok:#1a7a4a;--ok-bg:#eaf5ee;--ok-border:rgba(26,122,74,.25);--err:#c0392b;--err-bg:#fdf0ee;--err-border:rgba(192,57,43,.25);--accent:#1a1a18;--r:10px;--rs:6px}
@media(prefers-color-scheme:dark){:root{--bg:#18181a;--surface:#222224;--surface2:#2a2a2c;--border:rgba(255,255,255,.1);--border-strong:rgba(255,255,255,.2);--text:#f0efec;--text2:#a0a09a;--text3:#606060;--ok:#4caf7a;--ok-bg:rgba(76,175,122,.12);--ok-border:rgba(76,175,122,.3);--err:#e57373;--err-bg:rgba(229,115,115,.12);--err-border:rgba(229,115,115,.3);--accent:#f0efec}}
html{font-size:16px}body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem}
#app{width:100%;max-width:680px}
#hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:2rem}
#hdr h1{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px;letter-spacing:-.01em}#hdr p{font-size:13px;color:var(--text3)}
#pill{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid var(--border-strong);color:var(--text2);background:var(--surface2);white-space:nowrap;flex-shrink:0}
#pw{margin-bottom:1.25rem}#pr{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:7px}#pr span:last-child{font-weight:500;color:var(--text2)}
#track{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden}#fill{height:3px;background:var(--accent);border-radius:3px;transition:width .4s ease;width:0%}
#stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.st{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px}
.st .lb{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.st .vl{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-.02em}
#sc-ok .vl{color:var(--ok)}#sc-er .vl{color:var(--err)}
#qc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem}
#qm{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em}
#qm .d{width:3px;height:3px;border-radius:50%;background:var(--border-strong);display:inline-block}
#qt{font-size:16px;color:var(--text);line-height:1.65}
#opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.opt{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:13px 16px;font-size:14px;color:var(--text);cursor:pointer;text-align:left;line-height:1.55;transition:border-color .15s,background .15s,transform .1s;width:100%}
.opt:hover:not(.dis){border-color:var(--border-strong);background:var(--surface2);transform:translateY(-1px)}
.lt{min-width:24px;height:24px;border-radius:50%;border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0;margin-top:1px;transition:background .15s,color .15s,border-color .15s}
.opt.ok{border-color:var(--ok-border);background:var(--ok-bg)}.opt.ok .lt{background:var(--ok);border-color:var(--ok);color:#fff}
.opt.er{border-color:var(--err-border);background:var(--err-bg)}.opt.er .lt{background:var(--err);border-color:var(--err);color:#fff}
.opt.dis{cursor:default;pointer-events:none}
#fb{display:none;border-radius:var(--rs);padding:13px 16px;margin-bottom:1rem;border:1px solid;font-size:13px;line-height:1.65}
#fb.show{display:block}#fb.ok{background:var(--ok-bg);border-color:var(--ok-border)}#fb.er{background:var(--err-bg);border-color:var(--err-border)}
#fb .fh{font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
#fb.ok .fh{color:var(--ok)}#fb.er .fh{color:var(--err)}#fb .fd{color:var(--text2)}
#br{display:flex;justify-content:flex-end}
#bn{display:none;font-size:13px;font-weight:500;padding:10px 20px;border-radius:var(--rs);background:var(--accent);color:var(--bg);border:none;cursor:pointer;transition:opacity .15s}#bn:hover{opacity:.85}
#res{display:none;padding:1rem 0}
#rh{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:2rem}
#rp{font-size:64px;font-weight:700;color:var(--text);letter-spacing:-.04em;line-height:1;flex-shrink:0}
#ri h2{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}#ri p{font-size:13px;color:var(--text2);line-height:1.6}
#rbt{display:flex;gap:8px;margin-bottom:2rem;flex-wrap:wrap}
.bs{font-size:13px;font-weight:500;padding:10px 18px;border-radius:var(--rs);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);cursor:pointer;transition:background .15s}.bs:hover{background:var(--surface2)}
.bp{background:var(--accent);color:var(--bg);border-color:transparent}.bp:hover{opacity:.85;background:var(--accent)}
#fs{border-top:1px solid var(--border);padding-top:1.5rem}
#fs h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.04em}
.fi{padding:1rem 0;border-bottom:1px solid var(--border)}.fi:last-child{border-bottom:none}
.fq{font-size:14px;color:var(--text);margin-bottom:8px;line-height:1.5;font-weight:500}
.fb2{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.bg{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid}
.bg.er{background:var(--err-bg);border-color:var(--err-border);color:var(--err)}.bg.ok{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok)}
.fe{font-size:12px;color:var(--text3);line-height:1.6}
@media(max-width:500px){body{padding:1rem .75rem 3rem}#rh{flex-direction:column;gap:1rem;align-items:flex-start}#rp{font-size:48px}#hdr{flex-direction:column;gap:.75rem}}
</style>
</head>
<body>
<div id="app">
  <div id="hdr"><div><h1>Tema 2 · Test 1 · Oposición Generalitat</h1><p>55 preguntas · Concepto, personalidad jurídica, marco normativo y principios</p></div><div id="pill"></div></div>
  <div id="pw"><div id="pr"><span>Progreso</span><span id="pn">1 / 55</span></div><div id="track"><div id="fill"></div></div></div>
  <div id="stats">
    <div class="st" id="sc-ok"><div class="lb">Correctas</div><div class="vl" id="vok">0</div></div>
    <div class="st" id="sc-er"><div class="lb">Errores</div><div class="vl" id="ver">0</div></div>
    <div class="st"><div class="lb">Pendientes</div><div class="vl" id="vpe">55</div></div>
  </div>
  <div id="qc"><div id="qm"><span id="qnl"></span><span class="d"></span><span id="qbl"></span></div><div id="qt"></div></div>
  <div id="opts"></div><div id="fb"></div>
  <div id="br"><button id="bn" onclick="nxt()">Siguiente →</button></div>
  <div id="res">
    <div id="rh"><div id="rp"></div><div id="ri"><h2 id="rt"></h2><p id="rs2"></p></div></div>
    <div id="rbt"><button class="bs bp" onclick="rst()">Repetir completo</button><button class="bs" id="bfl" onclick="sfl()">Solo falladas →</button></div>
    <div id="fs" style="display:none"><h3 id="fst"></h3><div id="fl"></div></div>
  </div>
</div>
<script>
const Q=[
  {b:"A. Qué es la Administración pública",q:"La Administración pública se define como una organización:",opts:["Puramente privada orientada al lucro","De carácter público con personalidad jurídica, que persigue intereses generales y actúa sometida a la ley y al Derecho","Judicial creada para resolver conflictos entre particulares","Política sin personalidad jurídica propia"],c:1,f:"Definición-base del T2: organización pública + personalidad jurídica + intereses generales + sometimiento a la ley y al Derecho. Cuatro elementos imprescindibles. Es la mini-respuesta de examen del tema."},
  {b:"A. Qué es la Administración pública",q:"La Administración pública actúa con pleno sometimiento:",opts:["A las instrucciones del partido gobernante","A la ley y al Derecho","Solo a la costumbre administrativa","Al criterio discrecional del órgano superior"],c:1,f:"Fórmula literal: 'pleno sometimiento a la ley y al Derecho'. No al partido, no a la costumbre, no a la discreción. Es la base del Estado de Derecho aplicado a la actuación administrativa."},
  {b:"A. Qué es la Administración pública",q:"Administrar consiste en orientar recursos materiales, humanos, financieros y técnicos:",opts:["A la expansión territorial del Estado","Al cumplimiento de objetivos institucionales","Al control judicial de los reglamentos","A la aprobación de leyes"],c:1,f:"Administrar = orientar recursos al cumplimiento de objetivos institucionales. Es la definición funcional de la actividad administrativa, distinta de legislar (Parlament) o juzgar (tribunales)."},
  {b:"A. Qué es la Administración pública",q:"Cuando la gestión se refiere al grupo y al bien público, adquiere carácter:",opts:["Privado","Político","Público","Jurisdiccional"],c:2,f:"Cuando la gestión va al grupo y al bien público = carácter PÚBLICO. Es la frontera entre administración privada (gestionar lo propio) y administración pública (gestionar lo común)."},
  {b:"A. Qué es la Administración pública",q:"En la división de poderes, el Parlament ejerce el poder:",opts:["Ejecutivo","Legislativo","Judicial","Consultivo"],c:1,f:"Parlament = poder LEGISLATIVO (aprueba leyes y controla al Govern). Govern + Administració = ejecutivo. Jutjats i Tribunals = judicial. Tres poderes, tres funciones."},
  {b:"A. Qué es la Administración pública",q:"El Govern y la Administració pública se encuadran en el poder:",opts:["Legislativo","Judicial","Ejecutivo","Constituyente"],c:2,f:"Govern + Administració pública = poder EJECUTIVO. Idea clave del T2: el ejecutivo no es solo el Govern — incluye también la Administración pública. Trampa de examen."},
  {b:"A. Qué es la Administración pública",q:"Jutjats i Tribunals se corresponden con el poder:",opts:["Ejecutivo","Legislativo","Judicial","Reglamentario"],c:2,f:"Jutjats i Tribunals = poder JUDICIAL. Función: juzgar y hacer ejecutar lo juzgado. Es la tercera pata de la división de poderes junto con el legislativo y el ejecutivo."},
  {b:"A. Qué es la Administración pública",q:"Antes de la separación de poderes, función, órgano y poder tendían a concentrarse:",opts:["En una sola mano","En varios niveles territoriales","Solo en el poder judicial","En corporaciones profesionales"],c:0,f:"Antes de Locke/Montesquieu: concentración en una sola mano (monarquía absoluta). La separación de poderes moderna nace para distribuir esa concentración entre órganos independientes pero equilibrados."},
  {b:"A. Qué es la Administración pública",q:"La separación de poderes aparece cuando las funciones:",opts:["Se subordinan al ejecutivo","Se dotan de organizaciones propias","Pasan a ser solo reglamentarias","Quedan absorbidas por el Parlamento"],c:1,f:"Distinción histórica del T2: la división de FUNCIONES existía siempre. La separación de PODERES aparece cuando esas funciones se dotan de organizaciones propias e independientes. Es un avance organizativo, no funcional."},
  {b:"A. Qué es la Administración pública",q:"Una trampa típica de examen es confundir Administración pública con:",opts:["Organización jurídica al servicio del interés general","Solo oficina o burocracia","Ejecutivo en sentido amplio","Estructura sometida al Derecho"],c:1,f:"Trampa marcada del T2: Administración pública NO es solo oficina o burocracia. Es una organización jurídica al servicio del interés general. Reducirla a 'burocracia' es un error conceptual grave."},
  {b:"A. Qué es la Administración pública",q:"El Ejecutivo no es solo el Govern, sino también:",opts:["Las Cortes Generales","El Tribunal Constitucional","La Administració pública","Los órganos consultivos"],c:2,f:"Ejecutivo = Govern + Administració pública. Esta dualidad es una de las ideas que 'suelen caer'. La Administración no es solo herramienta del Govern — forma parte del propio poder ejecutivo."},
  {b:"B. Personalidad jurídica",q:"La personalidad civil de las personas naturales se adquiere con:",opts:["La mayoría de edad","El nacimiento","La inscripción registral","El reconocimiento judicial"],c:1,f:"Personalidad civil de personas naturales: se adquiere con el NACIMIENTO. Conecta con el Código Civil — base general del derecho. Distinto de la capacidad de obrar plena (mayoría de edad)."},
  {b:"B. Personalidad jurídica",q:"La personalidad civil se extingue:",opts:["Con la incapacidad","Con la jubilación","Con la muerte","Con la pérdida de capacidad de obrar"],c:2,f:"Personalidad civil: se extingue con la MUERTE. La incapacidad o pérdida de capacidad de obrar afectan al ejercicio, no a la titularidad. Solo la muerte extingue la personalidad jurídica de las personas naturales."},
  {b:"B. Personalidad jurídica",q:"La capacidad jurídica es la aptitud para ser titular de:",opts:["Reglamentos y resoluciones","Derechos y obligaciones","Potestades públicas","Cargos y funciones"],c:1,f:"Capacidad jurídica = aptitud para ser titular de derechos y obligaciones. Definición literal del resumen. Distinta de la capacidad de obrar (aptitud para ejercerlos)."},
  {b:"B. Personalidad jurídica",q:"La capacidad de obrar plena se alcanza, en general, con:",opts:["La nacionalidad","La mayoría de edad si no hay incapacidad","El nacimiento","La inscripción padronal"],c:1,f:"Capacidad de obrar plena: mayoría de edad + ausencia de incapacidad. Las dos condiciones a la vez. Ser mayor de edad pero tener una incapacidad declarada limita la capacidad de obrar."},
  {b:"B. Personalidad jurídica",q:"Son personas jurídicas públicas:",opts:["Solo las asociaciones","Corporaciones, asociaciones y fundaciones públicas que persiguen intereses generales","Únicamente el Estado y las comunidades autónomas","Las sociedades mercantiles privadas"],c:1,f:"Personas jurídicas públicas: corporaciones + asociaciones públicas + fundaciones públicas. El criterio es: persiguen INTERESES GENERALES. No son solo Estado y CCAA — incluye también colegios profesionales, fundaciones públicas, etc."},
  {b:"B. Personalidad jurídica",q:"Las asociaciones y fundaciones de interés particular son personas jurídicas:",opts:["Públicas","Institucionales","Privadas","Territoriales"],c:2,f:"Asociaciones y fundaciones de interés particular = PRIVADAS. El criterio diferenciador es el interés perseguido: general (público) vs particular (privado). Es la línea divisoria fundamental."},
  {b:"B. Personalidad jurídica",q:"La personalidad jurídica permite actuar como:",opts:["Norma jurídica","Sujeto de derecho","Reglamento ejecutivo","Órgano judicial"],c:1,f:"Personalidad jurídica = capacidad para actuar como SUJETO de derecho. Es la idea-clave: solo quien tiene personalidad jurídica puede ser parte en relaciones jurídicas (titular de derechos, obligaciones, contratos, recursos)."},
  {b:"C. Tipología de la Administración",q:"La Administración pública puede clasificarse sobre todo en:",opts:["Legislativa y judicial","Territorial e institucional/instrumental","Central y periférica exclusivamente","Política y sancionadora"],c:1,f:"Clasificación principal del T2: TERRITORIAL + INSTITUCIONAL/INSTRUMENTAL. El bloque azul del resumen lo formula así. El tema añade además referencia a la Administración corporativa como tercera categoría."},
  {b:"C. Tipología de la Administración",q:"El tema añade además una referencia a la Administración:",opts:["Constituyente","Corporativa","Fiscal","Procesal"],c:1,f:"Tercera categoría: Administración CORPORATIVA. Junto a la territorial y la institucional/instrumental. Son colegios profesionales, cámaras, cofradías y otras entidades con base asociativa o profesional."},
  {b:"C. Tipología de la Administración",q:"La Administración territorial se asienta sobre:",opts:["Un fin concreto sin base espacial","Un territorio","Una base asociativa profesional","Una delegación temporal"],c:1,f:"Territorial = TERRITORIO. Ejerce potestades sobre la generalidad de personas y situaciones de ese ámbito espacial. Tiene 'mayor universalidad competencial' que las institucionales o corporativas."},
  {b:"C. Tipología de la Administración",q:"¿Qué tipo de Administración pública es el Estado?",opts:["Territorial","Institucional","Corporativa","Solo política"],c:0,f:"Estado = Administración TERRITORIAL. Junto con las comunidades autónomas y las entidades locales. Las tres son territoriales porque se asientan sobre un territorio y ejercen competencias generales sobre él."},
  {b:"C. Tipología de la Administración",q:"La Administración institucional se caracteriza por:",opts:["Tener mayor universalidad competencial","Crearse para fines concretos como instrumento de una Administración territorial","Tener base asociativa o profesional","Ejercer potestades constituyentes"],c:1,f:"Institucional = entidades creadas para FINES CONCRETOS. Funcionan como instrumentos de una Administración territorial. Por eso también se llaman 'instrumentales': son herramientas para fines específicos."},
  {b:"C. Tipología de la Administración",q:"La Administración corporativa se caracteriza por:",opts:["Asentarse sobre un territorio amplio","Tener base asociativa o profesional","Ser una herramienta del Estado","Ser de creación judicial"],c:1,f:"Corporativa = base asociativa o profesional. Ejemplos: colegios profesionales, cámaras de comercio, cofradías de pescadores. No tienen la universalidad competencial de las territoriales."},
  {b:"C. Tipología de la Administración",q:"¿Qué tipo de Administración son los colegios profesionales?",opts:["Territorial","Institucional","Corporativa","Solo política"],c:2,f:"Colegios profesionales = ejemplo típico de Administración CORPORATIVA. Se basan en la profesión común de sus miembros y ejercen funciones públicas (control deontológico, formación, registro)."},
  {b:"C. Tipología de la Administración",q:"El truco mnemotécnico del T2 para distinguir tipos de Administración es:",opts:["Territorial = territorio + fines generales; Institucional = instrumento para fin concreto; Corporativa = base asociativa/profesional","Territorial = institucional; Corporativa = territorial","Todas las administraciones son corporativas","La distinción no es relevante en derecho administrativo"],c:0,f:"Truco mnemotécnico: TERRITORIAL = territorio + fines generales. INSTITUCIONAL = instrumento para fin concreto. CORPORATIVA = base asociativa/profesional. Memoriza esta tríada — es el dato más preguntado del bloque."},
  {b:"D. Marco constitucional",q:"El art. 103.1 CE establece que la Administración sirve con objetividad:",opts:["A los partidos políticos","Los intereses generales y actúa con eficacia, jerarquía, descentralización, desconcentración y coordinación","Solo al Govern de turno","A los intereses de cada Conseller"],c:1,f:"Art. 103.1 CE = pilar constitucional del T2. La Administración sirve con OBJETIVIDAD a los intereses generales y actúa con eficacia, jerarquía, descentralización, desconcentración y coordinación. Memorizarlo literal."},
  {b:"D. Marco constitucional",q:"¿Cuáles son los principios que cita el art. 103.1 CE?",opts:["Eficacia, jerarquía, descentralización, desconcentración y coordinación","Solo eficacia y jerarquía","Solo descentralización y coordinación","Eficacia, igualdad y proporcionalidad"],c:0,f:"Cinco principios del art. 103.1 CE: EFICACIA + JERARQUÍA + DESCENTRALIZACIÓN + DESCONCENTRACIÓN + COORDINACIÓN. Memoriza los cinco — el examen suele eliminar uno o cambiarlo por otro como trampa."},
  {b:"D. Marco constitucional",q:"El art. 106 CE se refiere a:",opts:["La organización del Govern","El control jurisdiccional de la potestad reglamentaria y de la legalidad de la actuación administrativa","La aprobación del presupuesto","La política exterior"],c:1,f:"Art. 106 CE: los tribunales controlan la potestad reglamentaria y la legalidad de la actuación administrativa. Es la base del control jurisdiccional de la Administración (jurisdicción contencioso-administrativa)."},
  {b:"D. Marco constitucional",q:"El art. 9.3 CE establece, entre otros, el principio de:",opts:["Eficacia administrativa","Interdicción de la arbitrariedad de los poderes públicos","Servicio al ciudadano","Coordinación interadministrativa"],c:1,f:"Art. 9.3 CE: legalidad + jerarquía normativa + publicidad + irretroactividad + seguridad jurídica + responsabilidad + INTERDICCIÓN DE LA ARBITRARIEDAD. Conecta con el T1 — los principios del 9.3 son transversales."},
  {b:"D. Marco constitucional",q:"El Estatut establece que la Generalitat actúa con:",opts:["Solo eficacia","Legalidad, objetividad, transparencia, coordinación y servicio a la ciudadanía","Solo descentralización","Solo jerarquía"],c:1,f:"Síntesis estatutaria: legalidad + objetividad + transparencia + coordinación + servicio a la ciudadanía. Cinco principios catalanes. Algunos coinciden con los del 103.1 CE, otros añaden especificidades catalanas (transparencia, servicio)."},
  {b:"E. Marco legislativo",q:"La Llei 40/2015 regula:",opts:["El procedimiento administrativo común","El régimen jurídico del sector público","Las relaciones laborales del personal","La política lingüística"],c:1,f:"Llei 40/2015 = régimen jurídico del sector público (LRJSP). Regula organización, órganos, competencias, relaciones interadministrativas, convenios. Distinta de la Llei 39/2015 (procedimiento). El examen las confunde sistemáticamente."},
  {b:"E. Marco legislativo",q:"La Llei 39/2015 regula:",opts:["El régimen jurídico del sector público","El procedimiento administrativo común para todas las Administraciones Públicas","La organización interna del Govern","La transparencia y bon govern"],c:1,f:"Llei 39/2015 = procedimiento administrativo común (LPACAP). Aplica a todas las AAPP. Junto con la Llei 40/2015 forma el bloque dual estatal. Conecta con T5 y T6."},
  {b:"E. Marco legislativo",q:"La Llei 26/2010 catalana se asocia a:",opts:["Política lingüística","Régimen jurídico y procedimiento de las administraciones catalanas","Solo organización del Parlament","Transparencia estatal"],c:1,f:"Llei 26/2010 = catalana de régimen jurídico y procedimiento. Complementa la Llei 39/2015 estatal con especialidades del ámbito catalán. Conecta con el T3 (drets davant l'Administració)."},
  {b:"E. Marco legislativo",q:"¿Cuál de estas combinaciones ley-materia es CORRECTA?",opts:["Llei 40/2015 — procedimiento común","Llei 39/2015 — régimen jurídico del sector público","Llei 39/2015 — procedimiento administrativo común; Llei 40/2015 — régimen jurídico del sector público","Ambas leyes regulan exactamente la misma materia"],c:2,f:"Combinación correcta: Llei 39/2015 = procedimiento; Llei 40/2015 = régimen jurídico. Es la trampa más explotada del T2 — el examen las invierte sistemáticamente."},
  {b:"F. Principios generales — clasificación",q:"Los principios constitucionales del 103.1 CE pueden agruparse en cuatro grupos según el resumen:",opts:["Solo dos: eficacia y jerarquía","Estructura del poder, ciudadanía, gestión interna y relación entre administraciones","Solo principios económicos","Solo principios sancionadores"],c:1,f:"Cuatro grupos del T2: estructura del poder + ciudadanía + gestión interna + relación entre administraciones. El propio resumen propone esta agrupación pedagógica para retener mejor los principios."},
  {b:"F. Principios generales — clasificación",q:"El principio de eficacia se encuadra en el grupo de:",opts:["Estructura del poder","Ciudadanía","Gestión interna","Relación entre administraciones"],c:2,f:"Eficacia = principio de gestión interna. Va junto con la economía y la eficiencia. La gestión interna también incluye la jerarquía y la organización en general. Es uno de los cuatro grupos del T2."},
  {b:"F. Principios generales — clasificación",q:"El principio de coordinación se encuadra en el grupo de:",opts:["Solo gestión interna","Relación entre administraciones","Solo estructura del poder","Solo ciudadanía"],c:1,f:"Coordinación = principio de relación entre administraciones. Junto con cooperación y colaboración. Estos tres conceptos forman el bloque de relaciones interadministrativas — uno de los más preguntados del T2."},
  {b:"F. Principios generales — clasificación",q:"La descentralización y la desconcentración se encuadran en:",opts:["Estructura del poder y organización territorial","Solo ciudadanía","Solo gestión interna","No se encuadran en ningún grupo"],c:0,f:"Descentralización + desconcentración = principios de estructura del poder y organización territorial. Son las dos formas básicas de distribuir competencias dentro de la Administración. No confundir entre sí."},
  {b:"F. Principios generales — clasificación",q:"El servicio a la ciudadanía es un principio que se encuadra en:",opts:["Solo estructura del poder","Ciudadanía","Solo gestión interna","Solo control jurisdiccional"],c:1,f:"Servicio a la ciudadanía = grupo de principios orientados al ciudadano. Junto con la objetividad, transparencia y proximidad. Es uno de los cuatro grupos del T2 propuestos en el resumen."},
  {b:"G. Actuación administrativa — intervención",q:"La intervención administrativa puede manifestarse en formas:",opts:["Solo sancionadoras","Reglamentación, autorización, control, inspección, sanción y servicio público","Solo de servicio público","Solo de control judicial"],c:1,f:"Formas típicas de intervención administrativa: REGLAMENTACIÓN + AUTORIZACIÓN + CONTROL + INSPECCIÓN + SANCIÓN + SERVICIO PÚBLICO. Seis tipos de actuación que el T2 menciona como instrumentos del poder público."},
  {b:"G. Actuación administrativa — intervención",q:"Una autorización administrativa es:",opts:["Una sanción","Un acto que permite el ejercicio de un derecho previo verificando que se cumplen los requisitos legales","Una norma reglamentaria","Una resolución judicial"],c:1,f:"Autorización = acto que permite ejercer un derecho previo (que ya tienes) verificando que cumples los requisitos legales. Es la forma más común de intervención administrativa preventiva."},
  {b:"G. Actuación administrativa — intervención",q:"El servicio público implica:",opts:["Solo el control de los servicios privados","Una actividad de prestación que la Administración asume para satisfacer una necesidad colectiva","Solo la sanción de incumplimientos","Solo la regulación normativa"],c:1,f:"Servicio público = actividad de prestación. La Administración asume la satisfacción de una necesidad colectiva (sanidad, educación, transporte, etc.). Es una de las formas más visibles de intervención pública."},
  {b:"H. Medios electrónicos e igualdad",q:"Los medios electrónicos en la actuación administrativa exigen:",opts:["Solo cumplir con la legislación de protección de datos","Garantizar accesibilidad, neutralidad tecnológica, interoperabilidad y seguridad","Solo formato PDF","Solo presencia en redes sociales"],c:1,f:"Principios de los medios electrónicos: ACCESIBILIDAD + NEUTRALIDAD TECNOLÓGICA + INTEROPERABILIDAD + SEGURIDAD. Cuatro principios técnicos vinculados a la administración digital. Conecta con T10."},
  {b:"H. Medios electrónicos e igualdad",q:"La igualdad en la actuación administrativa implica:",opts:["Tratar de forma idéntica a todos los ciudadanos sin matices","Tratar de forma igual a quienes están en la misma situación, y de forma desigual a quienes están en situaciones diferentes","Solo aplicar la ley sin más","Conceder ventajas discrecionales a colectivos vulnerables"],c:1,f:"Igualdad material: igual a iguales, desigual a desiguales (proporcionalmente). No es un trato idéntico mecánico — es un trato adecuado a la situación. Es la base de las acciones positivas y de la igualdad efectiva."},
  {b:"H. Medios electrónicos e igualdad",q:"La proximidad como principio de la Administración catalana implica:",opts:["Solo cercanía geográfica de las oficinas","Acercar los servicios al ciudadano, tanto físicamente como en accesibilidad y comprensibilidad","Solo servicios on-line","Solo servicios telefónicos"],c:1,f:"Proximidad = acercar los servicios al ciudadano. Tiene dimensión física (oficinas cercanas), accesible (universal), comprensible (lenguaje claro). Es uno de los principios catalanes específicos del T2."},
  {b:"H. Medios electrónicos e igualdad",q:"Confundir 'igualdad' con 'igualitarismo' es:",opts:["Correcto: son sinónimos en derecho administrativo","Incorrecto: la igualdad implica trato adecuado a la situación, el igualitarismo, trato idéntico ignorando diferencias","Solo es relevante en derecho civil","No tiene relevancia jurídica"],c:1,f:"Trampa clásica: igualdad ≠ igualitarismo. Igualdad = trato adecuado a la situación (igual a iguales, desigual a desiguales). Igualitarismo = trato idéntico ignorando diferencias. La Administración debe la primera, no el segundo."},
  {b:"I. Trampas y síntesis",q:"¿Cuál es la trampa más explotada del T2 respecto a las leyes 39/2015 y 40/2015?",opts:["Que ambas son catalanas","Invertir sus contenidos: Llei 39/2015 = procedimiento, Llei 40/2015 = régimen jurídico","Que ambas regulan la misma materia","Que la Llei 26/2010 las deroga"],c:1,f:"Trampa más frecuente: invertir Llei 39/2015 (procedimiento) con Llei 40/2015 (régimen jurídico). Son los números casi consecutivos pero las materias son distintas. Memoriza: 39 = procedimiento, 40 = régimen jurídico."},
  {b:"I. Trampas y síntesis",q:"¿Cuál es la trampa más explotada respecto a la división de poderes?",opts:["Confundir Parlament con Govern","Pensar que el ejecutivo es solo el Govern, olvidando que también incluye la Administración pública","Pensar que el judicial aprueba leyes","Que solo hay dos poderes"],c:1,f:"Trampa explícita del T2: el ejecutivo NO es solo el Govern. Incluye también la Administració pública. El examen suele dar opciones donde 'ejecutivo = Govern' como trampa."},
  {b:"I. Trampas y síntesis",q:"¿Qué afirmación sobre la Administración pública es CORRECTA?",opts:["Es solo una oficina o burocracia","Es una organización jurídica al servicio del interés general, con personalidad propia, sometida a la ley y al Derecho","Solo aplica al Govern, no a las CCAA","No tiene control judicial"],c:1,f:"Afirmación correcta = mini-respuesta de examen del T2. Cuatro elementos: organización jurídica + servicio al interés general + personalidad propia + sometimiento al Derecho. Si dominas esta frase, dominas el bloque conceptual del tema."},
  {b:"J. Síntesis bloque 1 del T2",q:"¿Cuántos bloques principales tiene el T2 según el mapa del resumen?",opts:["3 bloques","2 bloques: qué es la Administración pública y cómo se organiza la Generalitat","5 bloques","No tiene bloques diferenciados"],c:1,f:"El T2 tiene 2 grandes bloques: 1) qué es la Administración pública y qué principios la rigen + 2) cómo se organiza la Generalitat y qué órganos/unidades tiene. Memoriza esta dualidad para orientar las preguntas."},
  {b:"J. Síntesis bloque 1 del T2",q:"El gancho mental del T2 es:",opts:["Solo memorizar órganos","La cadena: interés general → principios → organización → órganos → funciones","Solo memorizar leyes","Solo memorizar normativa europea"],c:1,f:"Gancho mental del T2 (cadena lógica): interés general (porqué) → principios (cómo) → organización (estructura) → órganos (quién) → funciones (qué hacen). Cinco eslabones que conectan todo el tema."},
  {b:"J. Síntesis bloque 1 del T2",q:"¿Cuáles son las 6 palabras ancla recomendadas si vas justo de energía mental?",opts:["Solo eficacia y jerarquía","Interés general, legalidad, eficacia, descentralización, coordinación, departamentos","Solo Govern y Parlament","Solo Llei 39/2015 y Llei 40/2015"],c:1,f:"Seis palabras ancla del T2 (estrategia TDAH del resumen): interés general + legalidad + eficacia + descentralización + coordinación + departamentos. Si solo te queda energía para 6 palabras, son estas."},
  {b:"K. Detalle final bloque 1",q:"¿Qué tipo de Administración es Telecomunicaciones Generalitat de Cataluña?",opts:["Territorial","Institucional / instrumental","Corporativa","No es Administración pública"],c:1,f:"Telecomunicaciones Generalitat = empresa pública = Administración INSTITUCIONAL/INSTRUMENTAL. Es una entidad creada para fines concretos como instrumento de la Generalitat (Administración territorial). Patrón típico de organismo instrumental."},
  {b:"K. Detalle final bloque 1",q:"¿Qué principio del 103.1 CE NO aparece expresamente?",opts:["Eficacia","Coordinación","Jerarquía","Imparcialidad"],c:3,f:"La imparcialidad NO está expresamente en el 103.1 CE. El 103.1 cita: eficacia + jerarquía + descentralización + desconcentración + coordinación. La imparcialidad sí aparece en otros artículos (103.3 CE), pero no en el 103.1."},
  {b:"K. Detalle final bloque 1",q:"¿Por qué se distingue 'Administración pública' del 'Govern' aunque ambos sean ejecutivo?",opts:["No se distinguen: son lo mismo","Porque tienen funciones distintas: el Govern tiene función política y de dirección; la Administración, función ejecutiva técnica","Porque solo el Govern es ejecutivo","Porque la Administración es legislativa"],c:1,f:"Distinción funcional: Govern = función política y de dirección (decisiones de gobierno). Administración pública = función ejecutiva técnica (aplicación, gestión, prestación). Ambos en el ejecutivo pero con roles distintos — clave del T2."}
];

let pool=[...Q],idx=0,nOk=0,nEr=0,fl=[],ans=false;
function render(){
  if(idx>=pool.length){showRes();return;}
  const q=pool[idx],tot=pool.length;
  document.getElementById('fill').style.width=Math.round(idx/tot*100)+'%';
  document.getElementById('pn').textContent=(idx+1)+' / '+tot;
  document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;
  document.getElementById('vpe').textContent=tot-idx;
  document.getElementById('pill').textContent=q.b;
  document.getElementById('qnl').textContent='Pregunta '+(idx+1);
  document.getElementById('qbl').textContent=q.b;
  document.getElementById('qt').textContent=q.q;
  const o=document.getElementById('opts');o.innerHTML='';
  ['A','B','C','D'].forEach((l,i)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML='<span class="lt">'+l+'</span><span>'+q.opts[i]+'</span>';
    b.onclick=()=>sel(i,b);o.appendChild(b);
  });
  const f=document.getElementById('fb');f.className='';f.innerHTML='';
  document.getElementById('bn').style.display='none';ans=false;
}
function sel(i,btn){
  if(ans)return;ans=true;
  const q=pool[idx];
  document.querySelectorAll('.opt').forEach(b=>b.classList.add('dis'));
  const f=document.getElementById('fb');
  if(i===q.c){btn.classList.add('ok');nOk++;f.className='show ok';f.innerHTML='<div class="fh">Correcto</div><div class="fd">'+q.f+'</div>';}
  else{btn.classList.add('er');document.querySelectorAll('.opt')[q.c].classList.add('ok');nEr++;fl.push({q:q.q,co:q.opts[q.c],tu:q.opts[i],f:q.f});f.className='show er';f.innerHTML='<div class="fh">Incorrecto — correcta: '+['A','B','C','D'][q.c]+'</div><div class="fd">'+q.f+'</div>';}
  document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;
  document.getElementById('bn').style.display='inline-block';
}
function nxt(){idx++;render();}
function showRes(){
  ['hdr','pw','stats','qc','opts','fb','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  const tot=pool.length,pct=Math.round(nOk/tot*100);
  document.getElementById('rp').textContent=pct+'%';
  document.getElementById('rt').textContent=pct>=80?'Buen nivel en T2':pct>=60?'Nivel medio — repasa los fallos':'Refuerza concepto y leyes';
  document.getElementById('rs2').textContent=nOk+' correctas de '+tot+'.'+(fl.length>0?' '+fl.length+' para repasar.':' Sin errores.');
  if(!fl.length)document.getElementById('bfl').style.display='none';
  if(fl.length){document.getElementById('fs').style.display='block';document.getElementById('fst').textContent='Preguntas falladas ('+fl.length+')';const fll=document.getElementById('fl');fll.innerHTML='';fl.forEach(f=>{const d=document.createElement('div');d.className='fi';d.innerHTML='<div class="fq">'+f.q+'</div><div class="fb2"><span class="bg er">Tu respuesta: '+f.tu+'</span><span class="bg ok">Correcta: '+f.co+'</span></div><div class="fe">'+f.f+'</div>';fll.appendChild(d);});}
  document.getElementById('res').style.display='block';
}
function rst(){pool=[...Q];idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
function sfl(){if(!fl.length)return;pool=fl.map(f=>Q.find(q=>q.q===f.q)).filter(Boolean);idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
render();
</script>
