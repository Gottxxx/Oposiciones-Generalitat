<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tema 6 · Test 1 · Oposición Generalitat</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f7f4;--surface:#fff;--surface2:#f1f0ed;--border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.2);--text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;--ok:#1a7a4a;--ok-bg:#eaf5ee;--ok-border:rgba(26,122,74,.25);--err:#c0392b;--err-bg:#fdf0ee;--err-border:rgba(192,57,43,.25);--accent:#1a1a18;--r:10px;--rs:6px}
@media(prefers-color-scheme:dark){:root{--bg:#18181a;--surface:#222224;--surface2:#2a2a2c;--border:rgba(255,255,255,.1);--border-strong:rgba(255,255,255,.2);--text:#f0efec;--text2:#a0a09a;--text3:#606060;--ok:#4caf7a;--ok-bg:rgba(76,175,122,.12);--ok-border:rgba(76,175,122,.3);--err:#e57373;--err-bg:rgba(229,115,115,.12);--err-border:rgba(229,115,115,.3);--accent:#f0efec}}
html{font-size:16px}body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem}
#app{width:100%;max-width:680px}
#hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:2rem}
#hdr h1{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px;letter-spacing:-.01em}
#hdr p{font-size:13px;color:var(--text3)}
#pill{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid var(--border-strong);color:var(--text2);background:var(--surface2);white-space:nowrap;flex-shrink:0}
#pw{margin-bottom:1.25rem}
#pr{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:7px}
#pr span:last-child{font-weight:500;color:var(--text2)}
#track{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden}
#fill{height:3px;background:var(--accent);border-radius:3px;transition:width .4s ease;width:0%}
#stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.st{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px}
.st .lb{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.st .vl{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-.02em}
#sc-ok .vl{color:var(--ok)}#sc-er .vl{color:var(--err)}
#qc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem}
#qm{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em}
#qm .d{width:3px;height:3px;border-radius:50%;background:var(--border-strong);display:inline-block}
#qt{font-size:16px;color:var(--text);line-height:1.65}
#opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.opt{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:13px 16px;font-size:14px;color:var(--text);cursor:pointer;text-align:left;line-height:1.55;transition:border-color .15s,background .15s,transform .1s;width:100%}
.opt:hover:not(.dis){border-color:var(--border-strong);background:var(--surface2);transform:translateY(-1px)}
.lt{min-width:24px;height:24px;border-radius:50%;border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0;margin-top:1px;transition:background .15s,color .15s,border-color .15s}
.opt.ok{border-color:var(--ok-border);background:var(--ok-bg)}.opt.ok .lt{background:var(--ok);border-color:var(--ok);color:#fff}
.opt.er{border-color:var(--err-border);background:var(--err-bg)}.opt.er .lt{background:var(--err);border-color:var(--err);color:#fff}
.opt.dis{cursor:default;pointer-events:none}
#fb{display:none;border-radius:var(--rs);padding:13px 16px;margin-bottom:1rem;border:1px solid;font-size:13px;line-height:1.65}
#fb.show{display:block}#fb.ok{background:var(--ok-bg);border-color:var(--ok-border)}#fb.er{background:var(--err-bg);border-color:var(--err-border)}
#fb .fh{font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
#fb.ok .fh{color:var(--ok)}#fb.er .fh{color:var(--err)}
#fb .fd{color:var(--text2)}
#br{display:flex;justify-content:flex-end}
#bn{display:none;font-size:13px;font-weight:500;padding:10px 20px;border-radius:var(--rs);background:var(--accent);color:var(--bg);border:none;cursor:pointer;transition:opacity .15s}
#bn:hover{opacity:.85}
#res{display:none;padding:1rem 0}
#rh{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:2rem}
#rp{font-size:64px;font-weight:700;color:var(--text);letter-spacing:-.04em;line-height:1;flex-shrink:0}
#ri h2{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}
#ri p{font-size:13px;color:var(--text2);line-height:1.6}
#rbt{display:flex;gap:8px;margin-bottom:2rem;flex-wrap:wrap}
.bs{font-size:13px;font-weight:500;padding:10px 18px;border-radius:var(--rs);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);cursor:pointer;transition:background .15s}
.bs:hover{background:var(--surface2)}.bp{background:var(--accent);color:var(--bg);border-color:transparent}.bp:hover{opacity:.85;background:var(--accent)}
#fs{border-top:1px solid var(--border);padding-top:1.5rem}
#fs h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.04em}
.fi{padding:1rem 0;border-bottom:1px solid var(--border)}.fi:last-child{border-bottom:none}
.fq{font-size:14px;color:var(--text);margin-bottom:8px;line-height:1.5;font-weight:500}
.fb2{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.bg{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid}
.bg.er{background:var(--err-bg);border-color:var(--err-border);color:var(--err)}
.bg.ok{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok)}
.fe{font-size:12px;color:var(--text3);line-height:1.6}
@media(max-width:500px){body{padding:1rem .75rem 3rem}#rh{flex-direction:column;gap:1rem;align-items:flex-start}#rp{font-size:48px}#hdr{flex-direction:column;gap:.75rem}}
</style>
</head>
<body>
<div id="app">
  <div id="hdr"><div><h1>Tema 6 · Test 1 · Oposición Generalitat</h1><p>55 preguntas · Iniciación, ordenación e instrucción del procedimiento</p></div><div id="pill"></div></div>
  <div id="pw"><div id="pr"><span>Progreso</span><span id="pn">1 / 55</span></div><div id="track"><div id="fill"></div></div></div>
  <div id="stats">
    <div class="st" id="sc-ok"><div class="lb">Correctas</div><div class="vl" id="vok">0</div></div>
    <div class="st" id="sc-er"><div class="lb">Errores</div><div class="vl" id="ver">0</div></div>
    <div class="st"><div class="lb">Pendientes</div><div class="vl" id="vpe">55</div></div>
  </div>
  <div id="qc"><div id="qm"><span id="qnl"></span><span class="d"></span><span id="qbl"></span></div><div id="qt"></div></div>
  <div id="opts"></div><div id="fb"></div>
  <div id="br"><button id="bn" onclick="nxt()">Siguiente →</button></div>
  <div id="res">
    <div id="rh"><div id="rp"></div><div id="ri"><h2 id="rt"></h2><p id="rs2"></p></div></div>
    <div id="rbt"><button class="bs bp" onclick="rst()">Repetir completo</button><button class="bs" id="bfl" onclick="sfl()">Solo falladas →</button></div>
    <div id="fs" style="display:none"><h3 id="fst"></h3><div id="fl"></div></div>
  </div>
</div>
<script>
const Q=[
  {b:"A. Iniciación general",q:"¿De qué dos formas puede iniciarse con carácter general un procedimiento administrativo?",opts:["De oficio o a solicitud de la persona interesada","Solo de oficio o por denuncia","Solo a solicitud del interesado o por orden judicial","De oficio o por delegación interadministrativa"],c:0,f:"Regla base literal: de oficio o a solicitud de la persona interesada. Las otras formas (denuncia, petición razonada) son modalidades del inicio de oficio, no formas autónomas."},
  {b:"A. Iniciación general",q:"Las actuaciones previas al inicio formal del procedimiento sirven para:",opts:["Resolver definitivamente sin acuerdo de inicio","Aclarar circunstancias del caso antes de la iniciación formal","Sustituir la instrucción cuando el asunto sea simple","Abrir automáticamente un expediente sancionador"],c:1,f:"Actuaciones previas = preparatorias, para conocer circunstancias y decidir si conviene iniciar. No son el inicio formal ni obligan a iniciar. Trampa frecuente: confundirlas con el inicio."},
  {b:"A. Iniciación general",q:"La acumulación de procedimientos puede acordarse cuando:",opts:["Hay pluralidad de interesados aunque los hechos no guarden relación","Existe identidad sustancial o íntima conexión entre ellos y el mismo órgano es competente","Un plazo de resolución es el mismo, sin más requisitos","Lo solicita cualquier persona afectada"],c:1,f:"Acumulación: dos requisitos acumulativos — identidad sustancial o íntima conexión entre los asuntos + mismo órgano competente para tramitar y resolver ambos."},
  {b:"A. Iniciación general",q:"Contra el acuerdo de acumulación:",opts:["Procede recurso de alzada","Procede recurso potestativo de reposición","No procede recurso","Procede recurso solo si hay varios interesados"],c:2,f:"Dato literal del resumen: contra el acuerdo de acumulación no procede recurso alguno. Es un acto de trámite sin efectos directos sobre el fondo."},
  {b:"A. Iniciación general",q:"El inicio formal del procedimiento marca:",opts:["La conversión automática en tramitación simplificada","La obligación real de tramitar y resolver","La imposibilidad de adoptar medidas provisionales","La pérdida del derecho a presentar alegaciones"],c:1,f:"El inicio formal es el momento desde el que nace la obligación jurídica plena de tramitar y resolver. Las actuaciones previas no generan esa obligación."},
  {b:"B. Inicio de oficio",q:"Las cuatro vías de inicio de oficio son:",opts:["Iniciativa propia, orden superior, petición razonada y denuncia","Orden judicial, denuncia anónima, informe preceptivo y recurso de alzada","Petición razonada, recurso de alzada, caducidad y silencio","Denuncia, silencio administrativo, acumulación y resolución previa"],c:0,f:"Las cuatro vías de inicio de oficio: 1) iniciativa propia, 2) orden superior, 3) petición razonada de otro órgano, 4) denuncia. Memorizar este cuadro — el examen usa combinaciones falsas."},
  {b:"B. Inicio de oficio",q:"La petición razonada de otro órgano para iniciar un procedimiento:",opts:["Vincula al órgano competente a iniciar el procedimiento","No vincula al órgano competente, pero si decide no iniciar debe comunicarlo al órgano que la formuló","Equivale a una orden superior","Solo procede en procedimientos sancionadores"],c:1,f:"Trampa clásica del T6: la petición razonada NO vincula. El órgano puede decidir no iniciar, pero debe comunicarlo al órgano que formuló la petición. La orden superior sí obliga — no confundir."},
  {b:"B. Inicio de oficio",q:"La presentación de una denuncia confiere al denunciante:",opts:["La condición de interesado automáticamente","La condición de testigo en el procedimiento","No confiere por sí sola la condición de interesado","La condición de parte en el procedimiento sancionador"],c:2,f:"Dato literal marcado en el resumen: la denuncia NO confiere por sí sola la condición de interesado. El denunciante puede llegar a tenerla si resulta afectado por la resolución, pero no de forma automática por el mero hecho de denunciar."},
  {b:"B. Inicio de oficio",q:"Un denunciante que participó en la infracción puede quedar exento o ver reducida la sanción si:",opts:["Solo lo solicita expresamente antes de la resolución","Aporta primero prueba útil, cesa en la conducta y repara el daño","Denuncia a un mínimo de tres copartícipes","Renuncia a la condición de interesado en el procedimiento"],c:1,f:"El programa de clemencia en el procedimiento administrativo: el denunciante-partícipe puede beneficiarse si aporta prueba útil primero, cesa en la conducta infractora y repara el daño causado. Los tres requisitos son acumulativos."},
  {b:"B. Inicio de oficio",q:"Si la denuncia se refiere a un daño al patrimonio público y el órgano decide no iniciar el procedimiento:",opts:["No tiene obligación de comunicarlo al denunciante","Debe archivar sin más trámite","Debe motivar la decisión y notificarla a quienes denunciaron","Puede iniciar de oficio sin notificar al denunciante"],c:2,f:"Cuando la denuncia se refiere a daños al patrimonio público y el órgano decide no iniciar, debe motivar esa decisión y notificarla a los denunciantes. No es una decisión libre y silenciosa."},
  {b:"C. Inicio a solicitud",q:"Los requisitos mínimos de la solicitud de inicio son:",opts:["Solo la firma y el órgano destinatario","Identidad del interesado y representante, medio de notificación, hechos y petición, lugar y fecha, firma y órgano destinatario","Solo la petición concreta y la firma","El NIF, el domicilio y la petición"],c:1,f:"Seis elementos mínimos de la solicitud: identidad del interesado (y representante si hay), medio de notificación preferido, hechos + razones + petición, lugar y fecha, firma o acreditación de autenticidad, y órgano al que se dirige."},
  {b:"C. Inicio a solicitud",q:"Si varias personas tienen pretensiones idénticas o muy similares:",opts:["Deben presentar solicitudes individuales siempre","Puede presentarse una sola solicitud conjunta salvo norma específica en contra","La Administración acumula automáticamente todas las solicitudes","Solo puede haber una solicitud si hay más de 10 personas"],c:1,f:"Solicitud conjunta: posible cuando varias personas tienen pretensiones idénticas o muy similares, salvo que una norma específica lo prohíba. Reduce cargas y duplicidades."},
  {b:"C. Inicio a solicitud",q:"Los modelos normalizados de solicitud establecidos por la Administración:",opts:["Son siempre voluntarios para el interesado","Son siempre obligatorios para el interesado","Son voluntarios por defecto, pero pueden ser obligatorios si así se dispone expresamente","Solo existen para procedimientos sancionadores"],c:2,f:"Modelos normalizados: voluntarios como regla general, pero pueden declararse obligatorios cuando la norma lo establezca expresamente. El uso de modelos puede incorporar comprobaciones automáticas y campos pre-rellenados."},
  {b:"C. Inicio a solicitud",q:"Si faltan requisitos o documentos preceptivos en la solicitud, la Administración debe:",opts:["Denegar directamente por defecto formal","Requerir al interesado para que subsane en 10 días, ampliables hasta 5 más en casos especiales","Tramitar igualmente sin avisar","Archivar el expediente sin posibilidad de subsanación"],c:1,f:"Subsanación: la Administración debe requerir subsanación en 10 días. Ese plazo puede ampliarse prudencialmente hasta 5 días más cuando haya dificultades especiales y no sea procedimiento selectivo o competitivo. No puede denegar directamente por defecto formal."},
  {b:"C. Inicio a solicitud",q:"Si el interesado no subsana los defectos requeridos:",opts:["La Administración puede resolver directamente desestimando","Se tiene al interesado por desistido y se archivan las actuaciones, previa resolución","El procedimiento continúa de oficio automáticamente","Se prorrroga el plazo de subsanación indefinidamente"],c:1,f:"Falta de subsanación: se tiene al interesado por desistido de su solicitud y se archivan las actuaciones mediante resolución que debe ser dictada y notificada. No es un archivo automático sin resolución."},
  {b:"D. Registros y presentación",q:"El registro electrónico de la Administración funciona:",opts:["Solo en horario de oficina de 9h a 14h","24 horas al día, todos los días del año","Solo en días hábiles en horario de 8h a 20h","Solo para personas jurídicas obligadas a relacionarse electrónicamente"],c:1,f:"El registro electrónico funciona las 24 horas del día, los 365 días del año. Pero si la presentación se hace en día inhábil, se entiende realizada el primer día hábil siguiente a efectos de cómputo de plazos."},
  {b:"D. Registros y presentación",q:"Si se presenta un escrito en el registro electrónico en día inhábil:",opts:["Se tiene por presentado ese mismo día a todos los efectos","Se tiene por presentado el primer día hábil siguiente a efectos de cómputo","Se rechaza automáticamente y debe volver a presentarse","Se registra pero genera automáticamente un plazo extra de 48 horas"],c:1,f:"Trampa clásica del T6: el registro electrónico acepta la presentación en día inhábil, pero a efectos del cómputo de plazos se entiende realizada el primer día hábil siguiente. No se rechaza — se registra con esa fecha efectiva."},
  {b:"D. Registros y presentación",q:"Los registros en los que puede presentarse documentación incluyen:",opts:["Solo los registros de la Administración General del Estado","Los registros de cualquier Administración Pública (AGE, CC.AA., entidades locales) y oficinas de correos con requisitos","Solo el registro electrónico de la sede de la Administración destinataria","Solo presencialmente en la Administración competente"],c:1,f:"La Ley 39/2015 permite presentar documentación en los registros de cualquier Administración (AGE, autonómica, local), en oficinas de correos con el sobre abierto para sellado, y en las representaciones diplomáticas en el exterior."},
  {b:"E. Ordenación del procedimiento",q:"La ordenación del procedimiento se rige por el impulso:",opts:["A instancia de parte siempre","De oficio en todos sus trámites","Solo por el órgano instructor","Por parte del superior jerárquico exclusivamente"],c:1,f:"La ordenación se rige por el principio de impulso de oficio: la Administración impulsa el procedimiento en todos sus trámites sin necesidad de que el interesado lo pida en cada paso."},
  {b:"E. Ordenación del procedimiento",q:"El expediente administrativo debe formarse en:",opts:["Papel siempre, salvo autorización expresa","Formato electrónico como regla general","Papel o electrónico a elección del instructor","Solo electrónico si hay más de 10 documentos"],c:1,f:"La Ley 39/2015 establece que el expediente administrativo debe formarse en formato electrónico como regla general. El expediente en papel es la excepción, no la norma."},
  {b:"E. Ordenación del procedimiento",q:"Los actos de instrucción que no dependan entre sí pueden realizarse:",opts:["Solo secuencialmente en el orden establecido","Simultáneamente para reducir tiempos","Solo con autorización del superior jerárquico","Nunca: todo el procedimiento es secuencial"],c:1,f:"Actos simultáneos: los trámites que no sean dependientes entre sí pueden realizarse de forma simultánea, reduciendo así la duración del procedimiento. Es una manifestación del principio de eficacia."},
  {b:"E. Ordenación del procedimiento",q:"El control de plazos en la ordenación del procedimiento corresponde:",opts:["Solo al interesado, que debe reclamar si se incumplen","Al órgano instructor, que debe vigilar el cumplimiento de los plazos","Al órgano superior jerárquico exclusivamente","Al Defensor del Pueblo cuando el plazo supere 6 meses"],c:1,f:"El órgano instructor es responsable del control de los plazos y del impulso del procedimiento. El incumplimiento de plazos puede generar responsabilidad disciplinaria del funcionario responsable."},
  {b:"F. Instrucción — alegaciones",q:"El trámite de alegaciones permite al interesado:",opts:["Solo presentar documentos, no argumentos jurídicos","Aducir alegaciones y aportar documentos en cualquier momento del procedimiento anterior al trámite de audiencia","Impugnar directamente la resolución antes de que se dicte","Solo alegar durante la fase de prueba"],c:1,f:"El interesado puede presentar alegaciones y aportar documentos en cualquier momento del procedimiento anterior al trámite de audiencia. Después de abierto el trámite de audiencia, la fase de instrucción está cerrada para nuevas alegaciones."},
  {b:"F. Instrucción — alegaciones",q:"Las alegaciones presentadas durante la instrucción deben:",opts:["Ser ignoradas si llegan fuera del plazo de audiencia","Ser tenidas en cuenta por el órgano al redactar la propuesta de resolución","Solo valorarse si las pide el órgano instructor expresamente","Ser trasladadas siempre al Consejo de Estado"],c:1,f:"Las alegaciones presentadas durante la instrucción deben ser tenidas en cuenta por el órgano al redactar la propuesta de resolución. No son optativas — forman parte del expediente y condicionan la resolución."},
  {b:"F. Instrucción — prueba",q:"El período de prueba en la instrucción:",opts:["Es siempre obligatorio en todos los procedimientos","Es potestativo y puede abrirse si el órgano lo considera necesario o si el interesado lo solicita","Solo existe en procedimientos sancionadores","Tiene una duración fija de 30 días naturales"],c:1,f:"El período de prueba es potestativo: el órgano instructor puede acordarlo de oficio o a petición del interesado cuando lo considere necesario para esclarecer los hechos. No es obligatorio en todos los procedimientos."},
  {b:"F. Instrucción — prueba",q:"El plazo del período de prueba es de:",opts:["Mínimo 5 días y máximo 10 días","Mínimo 10 días y máximo 30 días","Mínimo 15 días y máximo 20 días","Siempre 30 días naturales sin posibilidad de reducción"],c:1,f:"Período de prueba: no inferior a 10 días ni superior a 30 días. Memorizar el rango: 10-30. El examen usa 5-10, 15-20 o 30 fijo como opciones trampa."},
  {b:"F. Instrucción — prueba",q:"Pueden rechazarse motivadamente las pruebas propuestas cuando:",opts:["El órgano instructor las considere innecesarias o inconducentes","El interesado no las paga","El expediente tiene más de 100 folios","El plazo de prueba ya ha vencido y el instructor lo decide"],c:0,f:"El órgano instructor puede rechazar motivadamente las pruebas propuestas cuando las considere manifiestamente improcedentes, innecesarias o inconducentes. El rechazo debe estar motivado — no es un poder discrecional libre."},
  {b:"G. Instrucción — informes",q:"Los informes en la instrucción pueden ser:",opts:["Solo preceptivos y vinculantes","Preceptivos o facultativos, y vinculantes o no vinculantes","Solo facultativos y siempre vinculantes","Solo preceptivos y nunca vinculantes"],c:1,f:"Doble clasificación de informes: por su exigibilidad (preceptivos = obligatorios por ley / facultativos = potestativos) y por su efecto (vinculantes / no vinculantes). Las cuatro combinaciones son posibles."},
  {b:"G. Instrucción — informes",q:"El plazo para emitir un informe, salvo que la norma establezca otro, es de:",opts:["10 días hábiles","15 días hábiles","20 días hábiles","30 días naturales"],c:1,f:"Plazo general para emitir informes: 10 días hábiles salvo que la norma establezca un plazo distinto. Dato literal que cae en test — no confundir con el plazo de audiencia (10-15 días) ni con el de prueba (10-30 días)."},
  {b:"G. Instrucción — informes",q:"Si el informe preceptivo no se emite en plazo:",opts:["Se paraliza el procedimiento indefinidamente hasta recibirlo","El procedimiento puede continuar, salvo que el informe sea determinante, en cuyo caso se responsabiliza al órgano que debía emitirlo","El procedimiento caduca automáticamente","El interesado puede presentar el informe por su cuenta"],c:1,f:"Informe preceptivo no emitido en plazo: el procedimiento puede continuar (no se paraliza indefinidamente), pero el responsable del retraso puede incurrir en responsabilidad disciplinaria. Si el informe es determinante y no llega, el órgano instructor puede solicitar responsabilidad al órgano incumplidor."},
  {b:"G. Instrucción — informes",q:"Un informe vinculante obliga al órgano que resuelve a:",opts:["Publicarlo en el Boletín Oficial","Seguir su contenido al resolver, sin poder apartarse de él","Solo tenerlo en cuenta pero puede apartarse motivadamente","Solicitar un segundo informe si discrepa"],c:1,f:"Informe vinculante = el órgano que resuelve queda obligado por su contenido. No puede apartarse de él, a diferencia del informe no vinculante que solo debe tener en cuenta pero del que puede separarse motivadamente."},
  {b:"H. Instrucción — audiencia",q:"El trámite de audiencia debe ponerse de manifiesto al interesado:",opts:["En cualquier momento del procedimiento","Una vez instruido el procedimiento y antes de redactar la propuesta de resolución","Solo en procedimientos sancionadores","Solo si el interesado lo solicita expresamente"],c:1,f:"La audiencia tiene un momento preciso: una vez instruido el procedimiento y antes de redactar la propuesta de resolución. Es el último trámite de instrucción antes de que el expediente pase a resolución."},
  {b:"H. Instrucción — audiencia",q:"El plazo del trámite de audiencia es de:",opts:["Mínimo 5 días y máximo 10 días","Mínimo 10 días y máximo 15 días","Mínimo 15 días y máximo 20 días","Siempre 15 días naturales"],c:1,f:"Audiencia: no inferior a 10 días ni superior a 15 días. Rango 10-15. Mismo rango que en el T5 — dato que el examen usa para confundir con el período de prueba (10-30)."},
  {b:"H. Instrucción — audiencia",q:"Durante el trámite de audiencia, el interesado puede:",opts:["Solo ver el expediente sin tomar notas","Examinar el expediente, obtener copias y formular alegaciones y presentar documentos","Solo formular alegaciones orales","Solo pedir que se amplíe el plazo de prueba"],c:1,f:"Durante la audiencia el interesado tiene derecho a: examinar el expediente, obtener copias de los documentos que lo integran, y formular alegaciones y aportar documentos. Los tres derechos son simultáneos."},
  {b:"H. Instrucción — audiencia",q:"El trámite de audiencia puede omitirse cuando:",opts:["El órgano instructor lo decide libremente","No figuren en el procedimiento ni se vayan a tener en cuenta en la resolución otros hechos ni otras alegaciones y pruebas que las aducidas por el interesado","El expediente tiene menos de 10 folios","El procedimiento es de tramitación simplificada en todo caso"],c:1,f:"La audiencia puede omitirse solo cuando no hay hechos, alegaciones ni pruebas distintos de los aportados por el interesado que se vayan a usar en la resolución. Si el órgano va a usar algo que el interesado no conoce, la audiencia es obligatoria."},
  {b:"I. Instrucción — información pública",q:"La información pública es un trámite que permite:",opts:["Solo a los interesados formales del procedimiento formular alegaciones","A cualquier persona, aunque no sea interesada, formular alegaciones sobre el objeto del procedimiento","Solo a las Administraciones Públicas participar en el procedimiento","Solo a los afectados directos presentar documentación"],c:1,f:"La información pública abre el procedimiento a cualquier persona — no solo a los interesados formales — para que formulen alegaciones. Es más amplia que la audiencia, que solo afecta a los interesados."},
  {b:"I. Instrucción — información pública",q:"Quien participa en el trámite de información pública sin ser interesado formal:",opts:["Adquiere automáticamente la condición de interesado","No adquiere por ese solo hecho la condición de interesado","Puede recurrir la resolución final directamente","Debe ser notificado de la resolución igual que los interesados"],c:1,f:"Participar en la información pública NO convierte automáticamente en interesado. La persona puede formular alegaciones, pero si no tiene afectación específica en sus derechos o intereses, no adquiere la condición de parte en el procedimiento."},
  {b:"I. Instrucción — información pública",q:"El plazo mínimo de la información pública es de:",opts:["10 días","15 días","20 días","30 días"],c:2,f:"Plazo mínimo de información pública: 20 días. Dato específico que el examen diferencia del plazo de audiencia (10-15 días) y del de prueba (10-30 días). El 20 es el mínimo — puede ser mayor."},
  {b:"J. Tramitación simplificada",q:"La tramitación simplificada puede acordarse cuando:",opts:["El interesado así lo solicite siempre","Razones de interés público o la falta de complejidad del asunto lo aconsejen","El expediente tiene menos de 5 documentos","El órgano superior lo ordena en todos los casos"],c:1,f:"Tramitación simplificada: procede cuando el asunto carece de especial complejidad o cuando hay razones de interés público que lo justifiquen. No es una opción libre del interesado ni del órgano superior."},
  {b:"J. Tramitación simplificada",q:"El plazo de resolución en tramitación simplificada es de:",opts:["15 días","30 días","2 meses","6 meses"],c:1,f:"Tramitación simplificada: plazo de resolución de 30 días. Dato literal que el examen combina con el plazo ordinario (3 meses) y la tramitación de urgencia (plazos reducidos a la mitad)."},
  {b:"J. Tramitación simplificada",q:"La tramitación simplificada reduce los trámites pero:",opts:["Elimina el trámite de audiencia siempre","Mantiene el trámite de audiencia si hay hechos o alegaciones que el interesado desconoce","Elimina todo tipo de informes","Elimina el período de prueba en todos los casos"],c:1,f:"La tramitación simplificada reduce trámites pero no puede eliminar la audiencia cuando sea necesaria para garantizar la defensa del interesado. Las garantías esenciales se mantienen aunque el procedimiento sea más ágil."},
  {b:"K. Medidas provisionales",q:"Las medidas provisionales pueden adoptarse:",opts:["Solo tras la resolución definitiva","Antes o después de la iniciación del procedimiento, para asegurar la eficacia de la resolución","Solo durante la fase de instrucción","Solo en procedimientos sancionadores con más de 3 meses de duración"],c:1,f:"Las medidas provisionales pueden adoptarse tanto antes como después de la iniciación del procedimiento, cuando sean necesarias para asegurar la eficacia de la resolución que pudiera recaer. Las previas al inicio son excepcionales."},
  {b:"K. Medidas provisionales",q:"Las medidas provisionales deben ser:",opts:["Definitivas una vez adoptadas","Proporcionales, provisionales y modificables o levantadas si desaparecen las circunstancias que las justificaron","Irreversibles para garantizar su efectividad","Idénticas a la resolución final del procedimiento"],c:1,f:"Medidas provisionales: deben ser proporcionales al fin que persiguen, tienen carácter provisional (no definitivo) y pueden modificarse o levantarse si las circunstancias que las justificaron desaparecen o cambian."},
  {b:"K. Medidas provisionales",q:"Las medidas provisionales NO pueden:",opts:["Adoptarse antes de iniciado el procedimiento en casos urgentes","Modificarse o levantarse durante el procedimiento","Causar perjuicios de difícil o imposible reparación a los interesados, ni implicar violación de derechos amparados por las leyes","Acordarse de oficio por el órgano instructor"],c:2,f:"Límite expreso de las medidas provisionales: no pueden causar perjuicios de difícil o imposible reparación a los interesados ni implicar violación de derechos amparados por las leyes. Son el límite material a su contenido."},
  {b:"L. Terminación del procedimiento",q:"Las formas de terminación del procedimiento son:",opts:["Solo la resolución expresa","Resolución, desistimiento, renuncia, caducidad y terminación convencional","Solo resolución y caducidad","Resolución, silencio positivo y archivo"],c:1,f:"Cinco formas de terminación: resolución expresa + desistimiento (abandona el procedimiento) + renuncia (abandona el derecho) + caducidad (inactividad) + terminación convencional (acuerdo). El silencio no es forma de terminación sino ficción legal."},
  {b:"L. Terminación del procedimiento",q:"La terminación convencional significa que:",opts:["El interesado y la Administración acuerdan resolver el procedimiento mediante pacto o convenio","La Administración resuelve unilateralmente tras acuerdo informal","Solo procede en materia de contratación pública","El TC aprueba el acuerdo entre las partes"],c:0,f:"Terminación convencional: el procedimiento puede finalizar mediante acuerdos, pactos o convenios entre la Administración y el interesado, siempre que no sean contrarios al ordenamiento ni supongan alteración de las competencias atribuidas a los órganos administrativos."},
  {b:"L. Terminación del procedimiento",q:"La caducidad del procedimiento se produce cuando:",opts:["El interesado no paga las tasas correspondientes","La Administración no resuelve en el plazo máximo en procedimientos de oficio desfavorables, o el interesado paraliza el procedimiento en los iniciados a su solicitud","El expediente tiene más de 500 folios","El órgano instructor cambia durante la tramitación"],c:1,f:"Caducidad: en procedimientos de oficio desfavorables — por inactividad de la Administración — o en procedimientos a solicitud del interesado — por paralización imputable al interesado durante más de 3 meses. Son dos causas distintas."},
  {b:"M. Trampas cruzadas T6",q:"La trampa más frecuente del T6 es confundir actuaciones previas con inicio formal. La diferencia clave es:",opts:["Son lo mismo con distinto nombre según el órgano","Las actuaciones previas aclaran antes de iniciar; el inicio formal hace nacer la obligación de tramitar y resolver","El inicio formal puede ser anterior a las actuaciones previas","Las actuaciones previas obligan a resolver en 3 meses"],c:1,f:"La diferencia estructural del T6: actuaciones previas = preparatorias, no generan obligación de resolver. Inicio formal = nace la obligación plena de tramitar y resolver. El examen las mezcla en todas las combinaciones posibles."},
  {b:"M. Trampas cruzadas T6",q:"La petición razonada y la orden superior se diferencian en que:",opts:["Son lo mismo: ambas vinculan al órgano competente","La orden superior vincula; la petición razonada no vincula pero debe comunicarse la decisión de no iniciar","La petición razonada vincula; la orden superior no","Ambas son facultativas para el órgano competente"],c:1,f:"Orden superior = vincula al órgano subordinado, que debe iniciar. Petición razonada = no vincula, el órgano puede decidir no iniciar pero debe comunicarlo. Esta distinción es la trampa más fina del bloque de inicio de oficio."},
  {b:"M. Trampas cruzadas T6",q:"La audiencia y la información pública se diferencian en que:",opts:["Son idénticas: ambas permiten a cualquier persona alegar","La audiencia es para los interesados del procedimiento; la información pública está abierta a cualquier persona","La información pública solo permite a los interesados alegar; la audiencia está abierta a todos","La audiencia tiene plazo de 20 días; la información pública de 10-15 días"],c:1,f:"Audiencia = trámite reservado a los interesados formales del procedimiento. Información pública = abierta a cualquier persona aunque no sea interesada. Además, los plazos son distintos: audiencia 10-15 días, información pública mínimo 20 días."},
  {b:"M. Trampas cruzadas T6",q:"Informe preceptivo e informe vinculante son categorías:",opts:["Equivalentes: si es preceptivo, siempre es vinculante","Independientes: un informe puede ser preceptivo y no vinculante, o facultativo y vinculante","Opuestas: lo preceptivo excluye lo vinculante","Solo aplicables en procedimientos sancionadores"],c:1,f:"Son dos clasificaciones independientes y cruzables: preceptivo/facultativo (por su exigibilidad) y vinculante/no vinculante (por su efecto). Un informe puede ser preceptivo y no vinculante (el más común), o facultativo y vinculante (menos frecuente)."},
  {b:"M. Trampas cruzadas T6",q:"El plazo de prueba (10-30 días) y el plazo de audiencia (10-15 días) se confunden porque:",opts:["Tienen el mismo límite inferior pero distinto superior","Son exactamente iguales en todos los procedimientos","El de prueba es siempre mayor que el de audiencia","El de audiencia no tiene límite superior"],c:0,f:"El límite inferior coincide (10 días mínimo en ambos), pero el superior es distinto: prueba hasta 30 días, audiencia hasta 15 días. El examen cambia solo el límite superior para ver si lo tienes memorizado."},
  {b:"N. Preguntas de detalle",q:"La tramitación de urgencia reduce los plazos del procedimiento:",opts:["A un tercio","A la mitad, salvo los de presentación de solicitudes, recursos, audiencia y alegaciones","Elimina todos los plazos salvo el de resolución final","Solo reduce el plazo de resolución"],c:1,f:"Tramitación de urgencia: reduce a la mitad todos los plazos, excepto los relativos a la presentación de solicitudes y recursos y los de audiencia y alegaciones. Las garantías de defensa no se reducen."},
  {b:"N. Preguntas de detalle",q:"El expediente electrónico debe incluir:",opts:["Solo los documentos en formato PDF","Los documentos electrónicos, el índice de documentos, la firma electrónica y los metadatos asociados","Solo los actos de trámite y la resolución final","Solo los documentos aportados por el interesado"],c:1,f:"El expediente electrónico debe contener: los documentos electrónicos correspondientes + el índice numerado de los documentos + la firma electrónica del índice + los metadatos de los documentos. Es un expediente completo e íntegro en formato digital."},
  {b:"N. Preguntas de detalle",q:"Las medidas provisionales adoptadas antes del inicio del procedimiento:",opts:["Son definitivas si el procedimiento no se inicia en 24 horas","Deben confirmarse, modificarse o levantarse en el acuerdo de iniciación del procedimiento, que deberá adoptarse en los 15 días siguientes","Son válidas indefinidamente aunque el procedimiento no se inicie","Requieren autorización judicial previa en todo caso"],c:1,f:"Medidas provisionales previas al inicio: deben confirmarse, modificarse o levantarse en el acuerdo de iniciación, que debe adoptarse en los 15 días siguientes a su adopción. Si no se inicia el procedimiento en ese plazo, las medidas quedan sin efecto."},
  {b:"N. Preguntas de detalle",q:"La información pública debe anunciarse en:",opts:["Solo la sede electrónica del órgano","El Boletín Oficial que corresponda y en la sede electrónica del órgano","Solo el tablón de anuncios del órgano","Solo en el BOE con independencia de cuál sea la Administración"],c:1,f:"La información pública debe anunciarse en el Boletín Oficial que corresponda (BOE, DOGC, BOP según el ámbito) y en la sede electrónica del órgano. La doble publicidad garantiza su conocimiento general."},
  {b:"N. Preguntas de detalle",q:"El desistimiento abandona el procedimiento pero no el derecho. La renuncia:",opts:["También abandona solo el procedimiento","Extingue el propio derecho, que no puede volver a ejercerse","Puede ejercerse solo en procedimientos de oficio","Requiere autorización del órgano superior para ser válida"],c:1,f:"Distinción fundamental: desistimiento = el interesado abandona el procedimiento concreto pero conserva el derecho para ejercerlo en otro momento. Renuncia = el interesado extingue el propio derecho, que no puede volver a ejercer. Son figuras con consecuencias jurídicas muy distintas."}
];

let pool=[...Q],idx=0,nOk=0,nEr=0,fl=[],ans=false;
function render(){
  if(idx>=pool.length){showRes();return;}
  const q=pool[idx],tot=pool.length;
  document.getElementById('fill').style.width=Math.round(idx/tot*100)+'%';
  document.getElementById('pn').textContent=(idx+1)+' / '+tot;
  document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;
  document.getElementById('vpe').textContent=tot-idx;
  document.getElementById('pill').textContent=q.b;
  document.getElementById('qnl').textContent='Pregunta '+(idx+1);
  document.getElementById('qbl').textContent=q.b;
  document.getElementById('qt').textContent=q.q;
  const o=document.getElementById('opts');o.innerHTML='';
  ['A','B','C','D'].forEach((l,i)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML='<span class="lt">'+l+'</span><span>'+q.opts[i]+'</span>';
    b.onclick=()=>sel(i,b);o.appendChild(b);
  });
  const f=document.getElementById('fb');f.className='';f.innerHTML='';
  document.getElementById('bn').style.display='none';ans=false;
}
function sel(i,btn){
  if(ans)return;ans=true;
  const q=pool[idx];
  document.querySelectorAll('.opt').forEach(b=>b.classList.add('dis'));
  const f=document.getElementById('fb');
  if(i===q.c){btn.classList.add('ok');nOk++;f.className='show ok';f.innerHTML='<div class="fh">Correcto</div><div class="fd">'+q.f+'</div>';}
  else{btn.classList.add('er');document.querySelectorAll('.opt')[q.c].classList.add('ok');nEr++;fl.push({q:q.q,co:q.opts[q.c],tu:q.opts[i],f:q.f});f.className='show er';f.innerHTML='<div class="fh">Incorrecto — correcta: '+['A','B','C','D'][q.c]+'</div><div class="fd">'+q.f+'</div>';}
  document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;
  document.getElementById('bn').style.display='inline-block';
}
function nxt(){idx++;render();}
function showRes(){
  ['hdr','pw','stats','qc','opts','fb','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  const tot=pool.length,pct=Math.round(nOk/tot*100);
  document.getElementById('rp').textContent=pct+'%';
  document.getElementById('rt').textContent=pct>=80?'Buen nivel en T6':pct>=60?'Nivel medio — repasa los fallos':'Refuerza iniciación e instrucción';
  document.getElementById('rs2').textContent=nOk+' correctas de '+tot+'.'+(fl.length>0?' '+fl.length+' para repasar.':' Sin errores.');
  if(!fl.length)document.getElementById('bfl').style.display='none';
  if(fl.length){document.getElementById('fs').style.display='block';document.getElementById('fst').textContent='Preguntas falladas ('+fl.length+')';const fll=document.getElementById('fl');fll.innerHTML='';fl.forEach(f=>{const d=document.createElement('div');d.className='fi';d.innerHTML='<div class="fq">'+f.q+'</div><div class="fb2"><span class="bg er">Tu respuesta: '+f.tu+'</span><span class="bg ok">Correcta: '+f.co+'</span></div><div class="fe">'+f.f+'</div>';fll.appendChild(d);});}
  document.getElementById('res').style.display='block';
}
function rst(){pool=[...Q];idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
function sfl(){if(!fl.length)return;pool=fl.map(f=>Q.find(q=>q.q===f.q)).filter(Boolean);idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
render();
</script>
