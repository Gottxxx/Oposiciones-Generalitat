<head>

<title>Tema 8 · Test 1 · Oposición Generalitat</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f7f4;--surface:#fff;--surface2:#f1f0ed;--border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.2);--text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;--ok:#1a7a4a;--ok-bg:#eaf5ee;--ok-border:rgba(26,122,74,.25);--err:#c0392b;--err-bg:#fdf0ee;--err-border:rgba(192,57,43,.25);--accent:#1a1a18;--r:10px;--rs:6px}
@media(prefers-color-scheme:dark){:root{--bg:#18181a;--surface:#222224;--surface2:#2a2a2c;--border:rgba(255,255,255,.1);--border-strong:rgba(255,255,255,.2);--text:#f0efec;--text2:#a0a09a;--text3:#606060;--ok:#4caf7a;--ok-bg:rgba(76,175,122,.12);--ok-border:rgba(76,175,122,.3);--err:#e57373;--err-bg:rgba(229,115,115,.12);--err-border:rgba(229,115,115,.3);--accent:#f0efec}}
html{font-size:16px}body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem}
#app{width:100%;max-width:680px}
#hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:2rem}#hdr h1{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px}#hdr p{font-size:13px;color:var(--text3)}
#pill{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid var(--border-strong);color:var(--text2);background:var(--surface2);white-space:nowrap;flex-shrink:0}
#pw{margin-bottom:1.25rem}#pr{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:7px}#pr span:last-child{font-weight:500;color:var(--text2)}
#track{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden}#fill{height:3px;background:var(--accent);border-radius:3px;transition:width .4s;width:0%}
#stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}.st{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px}.st .lb{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}.st .vl{font-size:24px;font-weight:600;color:var(--text)}#sc-ok .vl{color:var(--ok)}#sc-er .vl{color:var(--err)}
#qc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem}#qm{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em}#qm .d{width:3px;height:3px;border-radius:50%;background:var(--border-strong);display:inline-block}#qt{font-size:16px;color:var(--text);line-height:1.65}
#opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}.opt{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:13px 16px;font-size:14px;color:var(--text);cursor:pointer;text-align:left;line-height:1.55;transition:border-color .15s,background .15s,transform .1s;width:100%}.opt:hover:not(.dis){border-color:var(--border-strong);background:var(--surface2);transform:translateY(-1px)}.lt{min-width:24px;height:24px;border-radius:50%;border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0;margin-top:1px}.opt.ok{border-color:var(--ok-border);background:var(--ok-bg)}.opt.ok .lt{background:var(--ok);border-color:var(--ok);color:#fff}.opt.er{border-color:var(--err-border);background:var(--err-bg)}.opt.er .lt{background:var(--err);border-color:var(--err);color:#fff}.opt.dis{cursor:default;pointer-events:none}
#fb{display:none;border-radius:var(--rs);padding:13px 16px;margin-bottom:1rem;border:1px solid;font-size:13px;line-height:1.65}#fb.show{display:block}#fb.ok{background:var(--ok-bg);border-color:var(--ok-border)}#fb.er{background:var(--err-bg);border-color:var(--err-border)}#fb .fh{font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}#fb.ok .fh{color:var(--ok)}#fb.er .fh{color:var(--err)}#fb .fd{color:var(--text2)}
#br{display:flex;justify-content:flex-end}#bn{display:none;font-size:13px;font-weight:500;padding:10px 20px;border-radius:var(--rs);background:var(--accent);color:var(--bg);border:none;cursor:pointer}#bn:hover{opacity:.85}
#res{display:none;padding:1rem 0}#rh{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:2rem}#rp{font-size:64px;font-weight:700;color:var(--text);letter-spacing:-.04em;line-height:1;flex-shrink:0}#ri h2{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}#ri p{font-size:13px;color:var(--text2);line-height:1.6}
#rbt{display:flex;gap:8px;margin-bottom:2rem;flex-wrap:wrap}.bs{font-size:13px;font-weight:500;padding:10px 18px;border-radius:var(--rs);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);cursor:pointer}.bs:hover{background:var(--surface2)}.bp{background:var(--accent);color:var(--bg);border-color:transparent}.bp:hover{opacity:.85;background:var(--accent)}
#fs{border-top:1px solid var(--border);padding-top:1.5rem}#fs h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.04em}.fi{padding:1rem 0;border-bottom:1px solid var(--border)}.fi:last-child{border-bottom:none}.fq{font-size:14px;color:var(--text);margin-bottom:8px;line-height:1.5;font-weight:500}.fb2{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}.bg{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid}.bg.er{background:var(--err-bg);border-color:var(--err-border);color:var(--err)}.bg.ok{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok)}.fe{font-size:12px;color:var(--text3);line-height:1.6}
@media(max-width:500px){body{padding:1rem .75rem 3rem}#rh{flex-direction:column;gap:1rem;align-items:flex-start}#rp{font-size:48px}#hdr{flex-direction:column;gap:.75rem}}
</style>
</head>
<body>
<div id="app">
  <div id="hdr"><div><h1>Tema 8 · Test 1 · Oposición Generalitat</h1><p>60 preguntas · Marco, clases de personal, grupos, acceso y adquisición/pérdida</p></div><div id="pill"></div></div>
  <div id="pw"><div id="pr"><span>Progreso</span><span id="pn">1 / 60</span></div><div id="track"><div id="fill"></div></div></div>
  <div id="stats"><div class="st" id="sc-ok"><div class="lb">Correctas</div><div class="vl" id="vok">0</div></div><div class="st" id="sc-er"><div class="lb">Errores</div><div class="vl" id="ver">0</div></div><div class="st"><div class="lb">Pendientes</div><div class="vl" id="vpe">60</div></div></div>
  <div id="qc"><div id="qm"><span id="qnl"></span><span class="d"></span><span id="qbl"></span></div><div id="qt"></div></div>
  <div id="opts"></div><div id="fb"></div>
  <div id="br"><button id="bn" onclick="nxt()">Siguiente →</button></div>
  <div id="res"><div id="rh"><div id="rp"></div><div id="ri"><h2 id="rt"></h2><p id="rs2"></p></div></div><div id="rbt"><button class="bs bp" onclick="rst()">Repetir completo</button><button class="bs" id="bfl" onclick="sfl()">Solo falladas →</button></div><div id="fs" style="display:none"><h3 id="fst"></h3><div id="fl"></div></div></div>
</div>
<script>
const Q=[
  {b:"1. Marco y clases",q:"El Tema 8 gira alrededor de cuatro bloques. ¿Cuál NO forma parte?",opts:["Clases de personal","Acceso","Régimen presupuestario","Límites e incompatibilidades"],c:2,f:"Los 4 bloques son: clases de personal + acceso + carrera administrativa + límites/incompatibilidades. El régimen presupuestario pertenece al T7, no al T8."},
  {b:"1. Marco y clases",q:"¿Qué norma fija las bases del régimen estatutario del empleo público?",opts:["Ley 39/2015","TREBEP","Ley de Presupuestos","Ley 40/2015"],c:1,f:"TREBEP (Texto Refundido del Estatuto Básico del Empleado Público) = bases del régimen estatutario. Ley básica estatal que las CCAA desarrollan. Es la columna vertebral del T8."},
  {b:"1. Marco y clases",q:"La normativa catalana de función pública tiene como función principal:",opts:["Sustituir por completo al TREBEP","Desarrollar la función pública propia de la Generalitat y completar el marco básico","Regular solo al personal laboral privado","Eliminar la clasificación por grupos"],c:1,f:"Fórmula del T8: Estado pone las bases (TREBEP); Cataluña desarrolla su función pública propia. No sustituye al TREBEP — lo complementa y desarrolla en el ámbito autonómico."},
  {b:"1. Marco y clases",q:"¿Cuál de estas figuras mantiene una relación estatutaria permanente?",opts:["Funcionario interino","Personal eventual","Funcionario de carrera","Personal directivo profesional"],c:2,f:"Funcionario de CARRERA = relación estatutaria PERMANENTE. Ocupa plaza tras superar proceso selectivo. Es la figura más estable del empleo público."},
  {b:"1. Marco y clases",q:"El funcionario interino se caracteriza por:",opts:["Tener relación estatutaria permanente","Desempeñar tareas de asesoramiento político","Ser nombrado temporalmente por necesidad","Acceder solo por libre designación"],c:2,f:"Interino = temporal + por necesidad administrativa. No es permanente (eso es carrera) ni es asesoramiento político (eso es eventual). El interino cubre una necesidad administrativa concreta hasta que se resuelve."},
  {b:"1. Marco y clases",q:"El mero paso del tiempo permite al funcionario interino:",opts:["Consolidar automáticamente la plaza","Acceder a la condición de eventual","No consolidar la plaza por sí solo","Transformarse en laboral fijo"],c:2,f:"Dato literal del resumen: el interino NO consolida la plaza por el mero paso del tiempo. Es una de las trampas más explotadas del T8. Por mucho tiempo que pase, necesita superar proceso selectivo para ser carrera."},
  {b:"1. Marco y clases",q:"¿Qué tipo de vínculo tiene el personal laboral?",opts:["Estatutario","Contractual","Electivo","Representativo"],c:1,f:"Personal laboral = vínculo CONTRACTUAL. Se rige por contrato de trabajo + convenio colectivo + reglas públicas aplicables. Distinto del vínculo estatutario del funcionario (carrera o interino)."},
  {b:"1. Marco y clases",q:"¿Qué figura se vincula a tareas de confianza o asesoramiento especial?",opts:["Funcionario de carrera","Funcionario interino","Personal eventual","Personal laboral fijo"],c:2,f:"Personal EVENTUAL = confianza o asesoramiento especial. No cubre necesidades estructurales ordinarias — su lógica es política/de confianza. Cesa cuando cesa la autoridad que lo nombró."},
  {b:"1. Marco y clases",q:"El personal eventual cesa:",opts:["Solo por expediente disciplinario","Cuando cesa la autoridad que lo nombró","Al cumplir tres años","Solo por renuncia propia"],c:1,f:"Cese del eventual: ligado al cese de la autoridad que lo nombró. Es cese libre — no necesita causa ni expediente. Es la consecuencia directa de su naturaleza de confianza."},
  {b:"1. Marco y clases",q:"¿Cuál de estas afirmaciones sobre el personal eventual es CORRECTA?",opts:["Cubre necesidades estructurales ordinarias","Tiene una lógica de confianza política o asesoramiento","Consolida la plaza con antigüedad","Se clasifica siempre en el subgrupo A1"],c:1,f:"El eventual NO atiende necesidades estructurales ordinarias. Su lógica es de confianza política o asesoramiento. No consolida plaza ni está ligado a un subgrupo específico."},
  {b:"1. Marco y clases",q:"El personal directivo profesional se asocia principalmente a:",opts:["Tareas de fe pública","Relación estatutaria permanente idéntica a la del funcionario de carrera","Funciones directivas valoradas por idoneidad, responsabilidad y objetivos","Cobertura temporal de vacantes administrativas"],c:2,f:"Directivo profesional = funciones DIRECTIVAS + valoración por idoneidad + responsabilidad + evaluación por objetivos. Es la figura más reciente del TREBEP y la menos consolidada en la práctica."},
  {b:"1. Marco y clases",q:"Interino y eventual se diferencian principalmente porque:",opts:["El interino es fijo y el eventual temporal","El interino cubre necesidad administrativa temporal y el eventual tareas de confianza/asesoramiento","El eventual siempre accede por oposición","El interino se rige solo por convenio"],c:1,f:"Trampa clásica del T8: INTERINO = necesidad administrativa temporal. EVENTUAL = confianza/asesoramiento. Los dos son temporales pero por razones completamente distintas."},
  {b:"1. Marco y clases",q:"¿Cuál de estas afirmaciones es FALSA?",opts:["El laboral no tiene relación estatutaria","El eventual se vincula a confianza o asesoramiento","El interino consolida siempre la plaza si permanece suficiente tiempo","El directivo profesional se valora por idoneidad"],c:2,f:"FALSA: el interino NO consolida la plaza por el mero paso del tiempo. Es la afirmación inversa al dato literal del resumen y la trampa más recurrente del bloque de clases de personal."},
  {b:"1. Marco y clases",q:"Para diferenciar figuras de empleo público, el resumen recomienda atender a:",opts:["Edad, titulación y salario","Tipo de vínculo, duración y función desempeñada","Órgano de adscripción, jornada y retribución","Territorio, destino y antigüedad"],c:1,f:"Tres ejes para diferenciar figuras: VÍNCULO (estatutario vs contractual) + DURACIÓN (permanente vs temporal) + FUNCIÓN (estructural vs confianza vs directiva). Con estos tres ejes clasificas cualquier pregunta."},
  {b:"1. Marco y clases",q:"¿Cuál de estas figuras puede ser fija, indefinida o temporal?",opts:["Funcionario de carrera","Personal laboral","Personal eventual","Funcionario interino"],c:1,f:"Personal LABORAL puede ser fijo + indefinido + temporal según el régimen aplicable. Es la única figura del T8 con estas tres modalidades, porque se rige por derecho laboral (no estatutario)."},
  {b:"2. Grupos de clasificación",q:"El subgrupo A1 se asocia a:",opts:["Mayor nivel de responsabilidad","Funciones de gestión de apoyo","Auxiliar y apoyo básico","Técnico medio"],c:0,f:"A1 = grado universitario + MAYOR nivel de responsabilidad. Es el subgrupo superior de la clasificación. Funciones técnicas o directivas de alta cualificación."},
  {b:"2. Grupos de clasificación",q:"El subgrupo A2 se asocia a:",opts:["Auxiliar y apoyo básico","Funciones de gestión/ejecución con menor nivel que A1","Mayor nivel de responsabilidad","Técnico superior intermedio"],c:1,f:"A2 = grado universitario + funciones de gestión/ejecución con MENOR nivel que A1. Es el segundo escalón del grupo A. Funciones técnicas pero de menor responsabilidad."},
  {b:"2. Grupos de clasificación",q:"¿Existe el grupo B en el TREBEP?",opts:["No, solo existen A1, A2, C1 y C2","Sí, el grupo B existe en el TREBEP y se asocia a técnico superior","Solo existe como categoría transitoria","Fue suprimido en la reforma de 2015"],c:1,f:"Trampa del T8: el grupo B SÍ existe en el TREBEP, aunque en la práctica muchas convocatorias giran alrededor de A1/A2/C1/C2. Se asocia a técnico superior (titulación de técnico superior de FP)."},
  {b:"2. Grupos de clasificación",q:"El subgrupo C1 se asocia a:",opts:["Grado universitario","Bachiller o técnico","ESO","Sin titulación requerida"],c:1,f:"C1 = Bachiller o técnico + funciones de administrativo / gestión de apoyo. Es el nivel intermedio-bajo. No requiere grado universitario pero sí bachillerato o equivalente."},
  {b:"2. Grupos de clasificación",q:"El subgrupo C2 se asocia a:",opts:["Grado universitario","Bachiller","ESO","Técnico superior"],c:2,f:"C2 = ESO + funciones de auxiliar y apoyo básico. Es el nivel más bajo de la clasificación. Funciones administrativas de apoyo y atención al público."},
  {b:"2. Grupos de clasificación",q:"El orden correcto de los grupos/subgrupos de mayor a menor es:",opts:["A1, A2, B, C1, C2","C2, C1, B, A2, A1","A1, C1, A2, C2, B","B, A1, A2, C1, C2"],c:0,f:"Orden correcto de mayor a menor: A1 → A2 → B → C1 → C2. Es la escala jerárquica de clasificación del TREBEP. Memorízalo en orden — el examen cambia las posiciones."},
  {b:"2. Grupos de clasificación",q:"¿Qué titulación se exige para los subgrupos A1 y A2?",opts:["ESO","Bachiller","Grado universitario","FP de grado medio"],c:2,f:"A1 y A2 = grado universitario (la diferencia es el nivel de responsabilidad, no la titulación). El grado universitario es el denominador común del grupo A entero."},
  {b:"2. Grupos de clasificación",q:"¿Qué palabra clave define a C1?",opts:["Mayor nivel de responsabilidad","Auxiliar y apoyo básico","Administrativo / gestión de apoyo","Dirección profesional"],c:2,f:"C1 = administrativo / gestión de apoyo. C2 = auxiliar y apoyo básico. La diferencia está en la complejidad: C1 gestiona, C2 auxilia. Ambos son grupo C pero con funciones distintas."},
  {b:"3. Acceso",q:"La fórmula canónica de los principios de acceso a la función pública es:",opts:["Jerarquía + mérito + confianza","Igualdad + mérito + capacidad + publicidad","Solo mérito y capacidad","Solo igualdad y transparencia"],c:1,f:"Fórmula canónica: IGUALDAD + MÉRITO + CAPACIDAD + PUBLICIDAD. Cuatro principios constitucionales del acceso (art. 103.3 CE). El examen suele eliminar uno o cambiarlo por otro."},
  {b:"3. Acceso",q:"Además de la fórmula canónica, el acceso añade:",opts:["Solo requisitos económicos","Imparcialidad, profesionalidad de los órganos de selección y agilidad sin perder objetividad","Solo transparencia","Solo descentralización"],c:1,f:"Principios complementarios del acceso: imparcialidad de los órganos de selección + profesionalidad + agilidad sin perder objetividad. Refuerzan la fórmula canónica con garantías institucionales."},
  {b:"3. Acceso",q:"¿Qué sistema selectivo se basa exclusivamente en pruebas/exámenes?",opts:["Concurso","Concurso-oposición","Oposición","Libre designación"],c:2,f:"OPOSICIÓN = pruebas/exámenes. Sistema clásico y más objetivo. No valora méritos previos — solo el resultado de las pruebas. Es el sistema ordinario de acceso."},
  {b:"3. Acceso",q:"El concurso-oposición combina:",opts:["Solo méritos","Solo pruebas","Pruebas + méritos","Entrevista + informes"],c:2,f:"CONCURSO-OPOSICIÓN = pruebas (fase oposición) + méritos (fase concurso). Combina examen y experiencia/formación. Es el sistema intermedio entre oposición pura y concurso puro."},
  {b:"3. Acceso",q:"El concurso puro como sistema selectivo es:",opts:["El sistema ordinario de acceso","El más frecuente en la práctica","Excepcional y no debe tratarse como regla general","Obligatorio en todos los procesos selectivos"],c:2,f:"Concurso puro = EXCEPCIONAL. Solo valora méritos, sin pruebas. El resumen advierte: no convertirlo en sistema ordinario. En test, suele ser la opción-trampa que parece correcta pero no lo es."},
  {b:"3. Acceso",q:"¿Cuál de estos NO es un requisito general de acceso?",opts:["Nacionalidad en los términos permitidos por la ley","Capacidad funcional para el desempeño de las tareas","Poseer la titulación exigida","Experiencia previa mínima de 5 años en el puesto"],c:3,f:"La experiencia previa de 5 años NO es requisito general de acceso. Los requisitos son: nacionalidad + capacidad funcional + edad + no separación/inhabilitación + titulación. La experiencia previa no está entre ellos."},
  {b:"3. Acceso",q:"No haber sido separado del servicio ni hallarse inhabilitado es:",opts:["Un requisito de mérito","Un requisito general de acceso","Un principio de provisión de puestos","Un requisito solo para interinos"],c:1,f:"No separación/inhabilitación = requisito general de acceso. Es condición previa obligatoria para participar en cualquier proceso selectivo. Quien fue separado del servicio no puede volver a acceder."},
  {b:"3. Acceso",q:"¿Cuál de estas afirmaciones sobre la oposición es CORRECTA?",opts:["Solo valora méritos previos","Es el sistema más objetivo y clásico basado en pruebas","Combina siempre pruebas y méritos","Es excepcional y no debe tratarse como regla general"],c:1,f:"Oposición = sistema más objetivo + clásico + basado en pruebas. No valora méritos previos (eso es el concurso-oposición). No es excepcional (eso es el concurso puro). Es la regla general ordinaria."},
  {b:"3. Acceso",q:"La comisión de servicios es:",opts:["Un sistema de acceso a la función pública","Una forma de cobertura temporal dentro de la provisión de puestos, no un sistema de acceso","Un tipo de concurso-oposición","Un requisito general de acceso"],c:1,f:"Trampa del T8: la comisión de servicios NO es un sistema de acceso. Es una forma de provisión temporal de puestos para funcionarios que ya están dentro. No confundir acceso (entrar) con provisión (moverse dentro)."},
  {b:"4. Adquisición",q:"La secuencia correcta para adquirir la condición de funcionario de carrera es:",opts:["Nombramiento → toma de posesión → juramento/promesa","Superación del proceso selectivo → nombramiento → acto de acatamiento (juramento/promesa) → toma de posesión","Solicitud → entrevista → nombramiento","Nombramiento → juramento → prueba final"],c:1,f:"Secuencia de adquisición: proceso selectivo → nombramiento → juramento/promesa → toma de posesión. Cuatro pasos en orden. El examen los desordena para ver si los tienes fijados."},
  {b:"4. Adquisición",q:"El nombramiento se publica en:",opts:["Solo en la sede electrónica del departament","El Boletín Oficial correspondiente (DOGC en Catalunya)","Solo en el tablón de anuncios del centro","Solo por correo certificado al aspirante"],c:1,f:"El nombramiento se publica en el Boletín Oficial (DOGC en Cataluña). Es un acto formal con publicidad — no vale solo una comunicación interna. La publicación garantiza que todo el mundo conoce la incorporación."},
  {b:"4. Adquisición",q:"El juramento o promesa de acatamiento se refiere a:",opts:["Solo al Estatut d'Autonomia","A la Constitución y, en su caso, al Estatut d'Autonomia","Solo a la normativa interna del departament","Solo al código ético del TREBEP"],c:1,f:"Juramento/promesa: acatamiento de la Constitución y, en su caso, del Estatut d'Autonomia. El doble acatamiento (CE + EAC) es la fórmula estándar en el ámbito catalán. Conecta con el T1."},
  {b:"4. Adquisición",q:"La toma de posesión debe producirse en un plazo determinado. Si no se toma posesión en plazo:",opts:["Se prorroga automáticamente 6 meses","Se pierde la condición de funcionario adquirida","Solo se produce un apercibimiento","No tiene consecuencias jurídicas"],c:1,f:"Falta de toma de posesión en plazo = pérdida de la condición adquirida. Es una causa de pérdida de la condición de funcionario. El plazo debe cumplirse — no se prorroga automáticamente."},
  {b:"4. Pérdida",q:"¿Cuáles son las causas de pérdida de la condición de funcionario?",opts:["Solo la jubilación","Renuncia, pérdida de nacionalidad, jubilación, sanción disciplinaria de separación del servicio, inhabilitación absoluta o especial","Solo la separación del servicio","Solo la renuncia y la jubilación"],c:1,f:"Causas de pérdida: RENUNCIA + PÉRDIDA DE NACIONALIDAD + JUBILACIÓN + SEPARACIÓN DEL SERVICIO (sanción disciplinaria) + INHABILITACIÓN ABSOLUTA O ESPECIAL (penal). Cinco causas tasadas que el examen combina."},
  {b:"4. Pérdida",q:"La renuncia como causa de pérdida de la condición de funcionario:",opts:["Es automática con la solicitud","Debe ser aceptada expresamente por la Administración y no inhabilita para nuevo ingreso","No está permitida en ningún caso","Solo procede tras 30 años de servicio"],c:1,f:"Renuncia: debe ser aceptada expresamente por la Administración (no es automática). No inhabilita para volver a acceder — el ex-funcionario puede presentarse a un nuevo proceso selectivo."},
  {b:"4. Pérdida",q:"La separación del servicio como sanción disciplinaria produce:",opts:["Solo suspensión temporal","Pérdida definitiva de la condición de funcionario","Solo traslado forzoso","Solo reducción de retribuciones durante 3 años"],c:1,f:"Separación del servicio = pérdida DEFINITIVA de la condición de funcionario. Es la sanción disciplinaria más grave del régimen estatutario. Solo se impone por faltas muy graves y con expediente disciplinario completo."},
  {b:"4. Pérdida",q:"La jubilación puede ser:",opts:["Solo forzosa por edad","Forzosa (por edad) o voluntaria (a solicitud del funcionario)","Solo voluntaria","Solo por incapacidad permanente"],c:1,f:"Jubilación: FORZOSA (al cumplir la edad legalmente establecida) o VOLUNTARIA (a solicitud del funcionario si cumple los requisitos de edad y tiempo de servicio). También puede ser por incapacidad permanente."},
  {b:"4. Pérdida",q:"La inhabilitación absoluta o especial firme como causa de pérdida:",opts:["Solo aplica a personal laboral","Es una causa penal que produce pérdida de la condición de funcionario","Solo afecta al personal eventual","No existe en el TREBEP"],c:1,f:"Inhabilitación absoluta o especial firme (sentencia penal) = pérdida de la condición de funcionario. Conecta el derecho penal con el administrativo — la condena penal produce efectos en la relación de servicio."},
  {b:"4. Pérdida",q:"La pérdida de nacionalidad como causa de pérdida de la condición de funcionario aplica:",opts:["Solo a extranjeros que adquirieron la española","Cuando la nacionalidad era requisito de acceso y se pierde posteriormente","Solo a funcionarios interinos","No es causa real de pérdida"],c:1,f:"Si la nacionalidad española (o la admitida) era requisito para acceder y se pierde posteriormente, se pierde la condición de funcionario. Es una causa lógica: si desaparece un requisito esencial del acceso, desaparece la condición."},
  {b:"5. Situaciones administrativas",q:"El servicio activo es la situación en que el funcionario:",opts:["No presta servicios pero mantiene la plaza","Desempeña efectivamente las funciones de su puesto o uno asignado","Está suspendido de empleo","Ha sido excedentado"],c:1,f:"Servicio ACTIVO = situación normal: el funcionario desempeña efectivamente las funciones de su puesto o del que le haya sido asignado. Es la situación por defecto de todo funcionario en ejercicio."},
  {b:"5. Situaciones administrativas",q:"Los servicios especiales aplican cuando el funcionario:",opts:["Solo se jubila","Es designado para cargos de responsabilidad política o institucional, u obtiene representación sindical, entre otros","Solo está de baja médica","Solo realiza funciones de asesoramiento eventual"],c:1,f:"Servicios ESPECIALES = cargos de responsabilidad política o institucional + representación sindical + organismos internacionales + misiones en el extranjero. Se conserva la plaza y se computa antigüedad. No es excedencia."},
  {b:"5. Situaciones administrativas",q:"En servicios especiales, el funcionario:",opts:["Pierde la plaza definitivamente","Conserva la plaza de origen y se le computa el tiempo como servicio activo","No puede volver a su plaza anterior","Pierde la antigüedad acumulada"],c:1,f:"Servicios especiales: conserva la plaza + se le computa antigüedad como servicio activo + cuando cesa en el cargo, tiene derecho a reincorporarse. Es la situación más protegida para el funcionario."},
  {b:"5. Situaciones administrativas",q:"La excedencia voluntaria por interés particular:",opts:["Conserva la plaza y la antigüedad","No conserva la plaza ni se computa antigüedad, y requiere un tiempo mínimo previo de servicio","Se concede automáticamente sin requisitos","Solo aplica a personal laboral"],c:1,f:"Excedencia voluntaria por interés particular: NO conserva plaza + NO computa antigüedad + requiere tiempo mínimo de servicio previo. Es la excedencia más desprotegida — el funcionario la elige libremente pero asume las consecuencias."},
  {b:"5. Situaciones administrativas",q:"La excedencia por cuidado de familiares:",opts:["No conserva la plaza en ningún caso","Conserva la plaza durante un período determinado y computa antigüedad","Solo aplica a personal eventual","No tiene límite temporal"],c:1,f:"Excedencia por cuidado de familiares: conserva la plaza durante un período determinado + computa antigüedad. Es una excedencia protegida por razones de conciliación familiar. Más favorable que la voluntaria por interés particular."},
  {b:"5. Situaciones administrativas",q:"La excedencia por razón de violencia de género:",opts:["No tiene protección especial","Conserva la plaza, computa antigüedad y tiene reserva de puesto","Solo aplica durante el primer año","Requiere autorización judicial para solicitarla"],c:1,f:"Excedencia por violencia de género: protección reforzada. Conserva plaza + computa antigüedad + reserva de puesto. Es la excedencia con más garantías del TREBEP, por la protección especial que la ley otorga a las víctimas."},
  {b:"5. Situaciones administrativas",q:"La suspensión de funciones puede ser:",opts:["Solo provisional","Solo firme","Provisional (cautelar, durante procedimiento) o firme (como sanción)","Solo administrativa, nunca judicial"],c:2,f:"Suspensión: PROVISIONAL (cautelar, durante procedimiento disciplinario o penal — es temporal y no es sanción) o FIRME (como sanción disciplinaria o penal — ya hay resolución definitiva). Trampa: confundir provisional con firme."},
  {b:"5. Situaciones administrativas",q:"La suspensión provisional NO puede exceder de:",opts:["3 meses","6 meses","12 meses","No tiene límite"],c:1,f:"Suspensión provisional: máximo 6 meses, salvo que se acuerde la prórroga por existir causa penal. Es una medida cautelar — no es sanción. Si se levanta, se reincorpora y se le abonan las retribuciones dejadas de percibir."},
  {b:"5. Situaciones administrativas",q:"¿Cuál de estas NO es una situación administrativa según el TREBEP?",opts:["Servicio activo","Servicios especiales","Excedencia voluntaria por interés particular","Comisión de servicios"],c:3,f:"Comisión de servicios NO es una situación administrativa — es una forma de provisión temporal de puestos. Las situaciones del TREBEP son: servicio activo, servicios especiales, servicio en otras AAPP, excedencias y suspensión."},
  {b:"5. Situaciones administrativas",q:"Un funcionario es elegido diputado del Parlament. Pasa a la situación de:",opts:["Servicio activo","Servicios especiales","Excedencia voluntaria","Suspensión de funciones"],c:1,f:"Cargo de responsabilidad política (diputado) = servicios especiales. Conserva la plaza + computa antigüedad + tiene derecho a reincorporarse al cesar. Es el caso típico de servicios especiales."},
  {b:"6. Provisión de puestos",q:"Los dos sistemas ordinarios de provisión de puestos son:",opts:["Oposición y concurso","Concurso de méritos y libre designación","Solo libre designación","Solo comisión de servicios"],c:1,f:"Provisión de puestos (no confundir con acceso): CONCURSO DE MÉRITOS (ordinario, objetivo) + LIBRE DESIGNACIÓN (excepcional, para puestos de especial responsabilidad o confianza). Dos sistemas, uno ordinario y otro excepcional."},
  {b:"6. Provisión de puestos",q:"El concurso de méritos como sistema de provisión:",opts:["Permite elegir libremente al candidato","Es el sistema normal y objetivo de provisión, basado en méritos y capacidades","Es excepcional y solo para altos cargos","No existe en la función pública catalana"],c:1,f:"Concurso de méritos = sistema NORMAL y OBJETIVO de provisión. Se basa en la valoración de méritos y capacidades con baremo público. Es la regla general para cubrir puestos de trabajo."},
  {b:"6. Provisión de puestos",q:"La libre designación como sistema de provisión:",opts:["Es el sistema normal de provisión","Es excepcional y se reserva para puestos de especial responsabilidad o confianza","Es obligatoria para todos los puestos de nivel C2","Solo se usa para personal laboral"],c:1,f:"Libre designación = EXCEPCIONAL. Se reserva para puestos de especial responsabilidad, confianza o libre designación expresamente previstos en la RPT. No es la regla general — es la excepción al concurso."},
  {b:"6. Provisión de puestos",q:"La comisión de servicios es:",opts:["Un sistema de acceso","Una forma de provisión temporal de un puesto por un funcionario de otro destino","Una sanción disciplinaria","Un sistema de selección"],c:1,f:"Comisión de servicios = provisión TEMPORAL. Un funcionario de otro destino ocupa temporalmente un puesto que necesita cobertura urgente. No es sistema de acceso ni de provisión definitiva — es solución puente."},
  {b:"6. Provisión de puestos",q:"Confundir provisión de puestos con selección de personal es:",opts:["Correcto: son lo mismo","Incorrecto: la selección es para entrar (acceso) y la provisión es para moverse dentro (puestos)","Solo un error terminológico sin consecuencias","Correcto en derecho catalán"],c:1,f:"Trampa del T8: SELECCIÓN = acceso (entrar en la función pública). PROVISIÓN = moverse dentro (cambiar de puesto ya siendo funcionario). Son figuras completamente distintas con reglas distintas."},
  {b:"6. Provisión de puestos",q:"La movilidad funcional permite al funcionario:",opts:["Solo cambiar de Administración","Desempeñar funciones que no corresponden exactamente a su puesto, dentro de los límites legales","Acceder directamente a un puesto superior sin concurso","Ser despedido libremente"],c:1,f:"Movilidad funcional = desempeñar funciones distintas a las de su puesto concreto, dentro de los límites legales (mismo grupo, misma área funcional). Es flexibilidad organizativa, no cambio de puesto."},
  {b:"7. Incompatibilidades",q:"El régimen de incompatibilidades del personal al servicio de las Administraciones Públicas:",opts:["Solo aplica a altos cargos","Prohíbe con carácter general el desempeño de un segundo puesto o actividad pública o privada, salvo excepciones","Solo prohíbe actividades privadas","No existe en la normativa española"],c:1,f:"Incompatibilidades: prohibición GENERAL de segundo puesto o actividad (pública o privada) + EXCEPCIONES tasadas. La regla es la incompatibilidad; la compatibilidad es la excepción que debe autorizarse expresamente."},
  {b:"7. Incompatibilidades",q:"¿Cuándo puede autorizarse la compatibilidad con una actividad privada?",opts:["Siempre que el funcionario lo solicite","Solo cuando no comprometa la imparcialidad ni entre en conflicto con las funciones públicas y se obtenga autorización expresa","Nunca: toda actividad privada es incompatible","Solo para personal eventual"],c:1,f:"Compatibilidad con actividad privada: posible si no compromete la imparcialidad + no conflicto con funciones públicas + autorización EXPRESA de la Administración. Los tres requisitos son acumulativos."},
  {b:"7. Incompatibilidades",q:"La regla general del régimen de incompatibilidades es:",opts:["Compatibilidad total sin restricciones","Un puesto de trabajo, una retribución, salvo excepciones autorizadas","Dos puestos públicos siempre permitidos","Compatibilidad automática con actividad privada"],c:1,f:"Regla de oro: UN puesto + UNA retribución. Es la base de todo el régimen de incompatibilidades. Las excepciones existen pero deben ser autorizadas caso por caso y cumplir los requisitos legales."},
  {b:"8. Trampas globales",q:"¿Cuál de estas confusiones es la más frecuente en test sobre el T8?",opts:["Confundir carrera con interino","Confundir interino con eventual","Confundir laboral con eventual","Confundir carrera con directivo"],c:1,f:"Trampa más frecuente del T8: confundir INTERINO (necesidad administrativa temporal) con EVENTUAL (confianza/asesoramiento). Los dos son temporales pero por razones opuestas. El examen explota esta confusión en todas las combinaciones."},
  {b:"8. Trampas globales",q:"La cadena final del T8 es:",opts:["Solo acceso → jubilación","CLASES → ACCESO → CONDICIÓN → SITUACIONES → PUESTOS → LÍMITES","Solo clases → incompatibilidades","Solo acceso → provisión"],c:1,f:"Cadena completa del T8: CLASES (quién) → ACCESO (cómo se entra) → CONDICIÓN (cómo se adquiere/pierde) → SITUACIONES (qué le puede pasar) → PUESTOS (cómo se mueve) → LÍMITES (qué no puede hacer). Seis eslabones en orden."},
  {b:"8. Trampas globales",q:"¿Cuál de estas afirmaciones es CORRECTA?",opts:["El concurso puro es el sistema ordinario de acceso","La comisión de servicios es un sistema de acceso","La libre designación es excepcional en la provisión de puestos","El interino consolida la plaza con antigüedad suficiente"],c:2,f:"La única correcta es la C: libre designación = excepcional en provisión. El concurso puro es excepcional (no ordinario). La comisión de servicios es provisión (no acceso). El interino no consolida por tiempo."}
];

let pool=[...Q],idx=0,nOk=0,nEr=0,fl=[],ans=false;
function render(){if(idx>=pool.length){showRes();return;}const q=pool[idx],tot=pool.length;document.getElementById('fill').style.width=Math.round(idx/tot*100)+'%';document.getElementById('pn').textContent=(idx+1)+' / '+tot;document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;document.getElementById('vpe').textContent=tot-idx;document.getElementById('pill').textContent=q.b;document.getElementById('qnl').textContent='Pregunta '+(idx+1);document.getElementById('qbl').textContent=q.b;document.getElementById('qt').textContent=q.q;const o=document.getElementById('opts');o.innerHTML='';['A','B','C','D'].forEach((l,i)=>{const b=document.createElement('button');b.className='opt';b.innerHTML='<span class="lt">'+l+'</span><span>'+q.opts[i]+'</span>';b.onclick=()=>sel(i,b);o.appendChild(b);});const f=document.getElementById('fb');f.className='';f.innerHTML='';document.getElementById('bn').style.display='none';ans=false;}
function sel(i,btn){if(ans)return;ans=true;const q=pool[idx];document.querySelectorAll('.opt').forEach(b=>b.classList.add('dis'));const f=document.getElementById('fb');if(i===q.c){btn.classList.add('ok');nOk++;f.className='show ok';f.innerHTML='<div class="fh">Correcto</div><div class="fd">'+q.f+'</div>';}else{btn.classList.add('er');document.querySelectorAll('.opt')[q.c].classList.add('ok');nEr++;fl.push({q:q.q,co:q.opts[q.c],tu:q.opts[i],f:q.f});f.className='show er';f.innerHTML='<div class="fh">Incorrecto — correcta: '+['A','B','C','D'][q.c]+'</div><div class="fd">'+q.f+'</div>';}document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;document.getElementById('bn').style.display='inline-block';}
function nxt(){idx++;render();}
function showRes(){['hdr','pw','stats','qc','opts','fb','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});const tot=pool.length,pct=Math.round(nOk/tot*100);document.getElementById('rp').textContent=pct+'%';document.getElementById('rt').textContent=pct>=80?'Buen nivel en T8':pct>=60?'Nivel medio — repasa los fallos':'Refuerza clases, acceso y situaciones';document.getElementById('rs2').textContent=nOk+' correctas de '+tot+'.'+(fl.length>0?' '+fl.length+' para repasar.':' Sin errores.');if(!fl.length)document.getElementById('bfl').style.display='none';if(fl.length){document.getElementById('fs').style.display='block';document.getElementById('fst').textContent='Preguntas falladas ('+fl.length+')';const fll=document.getElementById('fl');fll.innerHTML='';fl.forEach(f=>{const d=document.createElement('div');d.className='fi';d.innerHTML='<div class="fq">'+f.q+'</div><div class="fb2"><span class="bg er">Tu respuesta: '+f.tu+'</span><span class="bg ok">Correcta: '+f.co+'</span></div><div class="fe">'+f.f+'</div>';fll.appendChild(d);});}document.getElementById('res').style.display='block';}
function rst(){pool=[...Q];idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
function sfl(){if(!fl.length)return;pool=fl.map(f=>Q.find(q=>q.q===f.q)).filter(Boolean);idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
render();
</script>
