<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tema 3 · Test 1 · Oposición Generalitat</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f7f4;--surface:#fff;--surface2:#f1f0ed;--border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.2);--text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;--ok:#1a7a4a;--ok-bg:#eaf5ee;--ok-border:rgba(26,122,74,.25);--err:#c0392b;--err-bg:#fdf0ee;--err-border:rgba(192,57,43,.25);--accent:#1a1a18;--r:10px;--rs:6px}
@media(prefers-color-scheme:dark){:root{--bg:#18181a;--surface:#222224;--surface2:#2a2a2c;--border:rgba(255,255,255,.1);--border-strong:rgba(255,255,255,.2);--text:#f0efec;--text2:#a0a09a;--text3:#606060;--ok:#4caf7a;--ok-bg:rgba(76,175,122,.12);--ok-border:rgba(76,175,122,.3);--err:#e57373;--err-bg:rgba(229,115,115,.12);--err-border:rgba(229,115,115,.3);--accent:#f0efec}}
html{font-size:16px}body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem}
#app{width:100%;max-width:680px}
#hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:2rem}
#hdr h1{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px;letter-spacing:-.01em}#hdr p{font-size:13px;color:var(--text3)}
#pill{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid var(--border-strong);color:var(--text2);background:var(--surface2);white-space:nowrap;flex-shrink:0}
#pw{margin-bottom:1.25rem}#pr{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:7px}#pr span:last-child{font-weight:500;color:var(--text2)}
#track{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden}#fill{height:3px;background:var(--accent);border-radius:3px;transition:width .4s ease;width:0%}
#stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.st{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px}
.st .lb{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.st .vl{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-.02em}
#sc-ok .vl{color:var(--ok)}#sc-er .vl{color:var(--err)}
#qc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem}
#qm{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em}
#qm .d{width:3px;height:3px;border-radius:50%;background:var(--border-strong);display:inline-block}
#qt{font-size:16px;color:var(--text);line-height:1.65}
#opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.opt{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:13px 16px;font-size:14px;color:var(--text);cursor:pointer;text-align:left;line-height:1.55;transition:border-color .15s,background .15s,transform .1s;width:100%}
.opt:hover:not(.dis){border-color:var(--border-strong);background:var(--surface2);transform:translateY(-1px)}
.lt{min-width:24px;height:24px;border-radius:50%;border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0;margin-top:1px;transition:background .15s,color .15s,border-color .15s}
.opt.ok{border-color:var(--ok-border);background:var(--ok-bg)}.opt.ok .lt{background:var(--ok);border-color:var(--ok);color:#fff}
.opt.er{border-color:var(--err-border);background:var(--err-bg)}.opt.er .lt{background:var(--err);border-color:var(--err);color:#fff}
.opt.dis{cursor:default;pointer-events:none}
#fb{display:none;border-radius:var(--rs);padding:13px 16px;margin-bottom:1rem;border:1px solid;font-size:13px;line-height:1.65}
#fb.show{display:block}#fb.ok{background:var(--ok-bg);border-color:var(--ok-border)}#fb.er{background:var(--err-bg);border-color:var(--err-border)}
#fb .fh{font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
#fb.ok .fh{color:var(--ok)}#fb.er .fh{color:var(--err)}#fb .fd{color:var(--text2)}
#br{display:flex;justify-content:flex-end}
#bn{display:none;font-size:13px;font-weight:500;padding:10px 20px;border-radius:var(--rs);background:var(--accent);color:var(--bg);border:none;cursor:pointer;transition:opacity .15s}#bn:hover{opacity:.85}
#res{display:none;padding:1rem 0}
#rh{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:2rem}
#rp{font-size:64px;font-weight:700;color:var(--text);letter-spacing:-.04em;line-height:1;flex-shrink:0}
#ri h2{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}#ri p{font-size:13px;color:var(--text2);line-height:1.6}
#rbt{display:flex;gap:8px;margin-bottom:2rem;flex-wrap:wrap}
.bs{font-size:13px;font-weight:500;padding:10px 18px;border-radius:var(--rs);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);cursor:pointer;transition:background .15s}.bs:hover{background:var(--surface2)}
.bp{background:var(--accent);color:var(--bg);border-color:transparent}.bp:hover{opacity:.85;background:var(--accent)}
#fs{border-top:1px solid var(--border);padding-top:1.5rem}
#fs h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.04em}
.fi{padding:1rem 0;border-bottom:1px solid var(--border)}.fi:last-child{border-bottom:none}
.fq{font-size:14px;color:var(--text);margin-bottom:8px;line-height:1.5;font-weight:500}
.fb2{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.bg{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid}
.bg.er{background:var(--err-bg);border-color:var(--err-border);color:var(--err)}.bg.ok{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok)}
.fe{font-size:12px;color:var(--text3);line-height:1.6}
@media(max-width:500px){body{padding:1rem .75rem 3rem}#rh{flex-direction:column;gap:1rem;align-items:flex-start}#rp{font-size:48px}#hdr{flex-direction:column;gap:.75rem}}
</style>
</head>
<body>
<div id="app">
  <div id="hdr"><div><h1>Tema 3 · Test 1 · Oposición Generalitat</h1><p>50 preguntas · Leyes, bon govern y transparencia</p></div><div id="pill"></div></div>
  <div id="pw"><div id="pr"><span>Progreso</span><span id="pn">1 / 50</span></div><div id="track"><div id="fill"></div></div></div>
  <div id="stats">
    <div class="st" id="sc-ok"><div class="lb">Correctas</div><div class="vl" id="vok">0</div></div>
    <div class="st" id="sc-er"><div class="lb">Errores</div><div class="vl" id="ver">0</div></div>
    <div class="st"><div class="lb">Pendientes</div><div class="vl" id="vpe">50</div></div>
  </div>
  <div id="qc"><div id="qm"><span id="qnl"></span><span class="d"></span><span id="qbl"></span></div><div id="qt"></div></div>
  <div id="opts"></div><div id="fb"></div>
  <div id="br"><button id="bn" onclick="nxt()">Siguiente →</button></div>
  <div id="res">
    <div id="rh"><div id="rp"></div><div id="ri"><h2 id="rt"></h2><p id="rs2"></p></div></div>
    <div id="rbt"><button class="bs bp" onclick="rst()">Repetir completo</button><button class="bs" id="bfl" onclick="sfl()">Solo falladas →</button></div>
    <div id="fs" style="display:none"><h3 id="fst"></h3><div id="fl"></div></div>
  </div>
</div>
<script>
const Q=[
  {b:"A. Leyes y mapa del tema",q:"¿Qué ley catalana se asocia específicamente a transparencia, acceso a la información pública y bon govern?",opts:["Llei 39/2015","Llei 19/2014","Llei 1/1998","Llei 26/2010"],c:1,f:"Llei 19/2014 = norma catalana de transparencia, acceso a la información pública y bon govern. Es la cabeza del Tema 3 — memorízala como referencia principal."},
  {b:"A. Leyes y mapa del tema",q:"¿Qué norma constituye el marco estatal de transparencia, acceso y buen gobierno?",opts:["Llei 19/2013","Llei 19/2014","Llei 39/2015","Llei 1/1998"],c:0,f:"Llei 19/2013 = marco ESTATAL. Llei 19/2014 = catalana. Trampa clásica del T3: el examen invierte los números (13 vs 14) para confundir."},
  {b:"A. Leyes y mapa del tema",q:"¿Qué ley catalana regula el régimen jurídico, el procedimiento y los derechos y deberes de la ciudadanía ante la Administración catalana?",opts:["Llei 26/2010","Llei 39/2015","Llei 1/1998","Llei 19/2014"],c:0,f:"Llei 26/2010 = norma catalana de régimen jurídico y procedimiento. Es complementaria de la Llei 39/2015 estatal y añade especialidades del ámbito catalán."},
  {b:"A. Leyes y mapa del tema",q:"¿Qué ley regula el procedimiento administrativo común para todas las Administraciones Públicas?",opts:["Llei 26/2010","Llei 19/2013","Llei 39/2015","Llei 1/1998"],c:2,f:"Llei 39/2015 = procedimiento administrativo común estatal. Aplica a todas las AAPP. La Llei 26/2010 añade especialidades catalanas pero no la deroga."},
  {b:"A. Leyes y mapa del tema",q:"¿Qué ley se asocia a la política lingüística en Cataluña?",opts:["Llei 19/2014","Llei 1/1998","Llei 39/2015","Llei 26/2010"],c:1,f:"Llei 1/1998 = política lingüística en Cataluña. Es la quinta y última ley del mapa del T3, y la única referida a derechos lingüísticos."},
  {b:"A. Leyes y mapa del tema",q:"¿Qué pareja de leyes conviene NO confundir cuando el examen mezcla transparencia autonómica y estatal?",opts:["Llei 1/1998 y Llei 39/2015","Llei 19/2014 y Llei 19/2013","Llei 26/2010 y Llei 1/1998","Llei 39/2015 y Llei 19/2014"],c:1,f:"Las dos transparencias: Llei 19/2014 (catalana) vs Llei 19/2013 (estatal). El examen suele cambiar el último dígito para crear trampa. Memoriza: 14 = catalana, 13 = estatal."},
  {b:"A. Leyes y mapa del tema",q:"¿Cuál de estas asociaciones ley-materia es CORRECTA?",opts:["Llei 19/2014 – política lingüística","Llei 1/1998 – transparencia","Llei 39/2015 – procedimiento administrativo común","Llei 26/2010 – transparencia estatal"],c:2,f:"La única asociación correcta es la C: Llei 39/2015 = procedimiento común. Todas las demás están invertidas — es el formato típico de las preguntas de leyes en el T3."},
  {b:"A. Leyes y mapa del tema",q:"Cuando una pregunta menciona 'el interessat' en el procedimiento, debes pensar en:",opts:["Llei 26/2010","Llei 19/2014","Llei 39/2015","Llei 1/1998"],c:2,f:"Si aparece 'interessat' en el procedimiento, la referencia general es la Llei 39/2015 (procedimiento administrativo común). La Llei 26/2010 catalana añade especialidades pero la base es la 39/2015."},
  {b:"A. Leyes y mapa del tema",q:"¿Qué secuencia mental propone el resumen para ordenar el T3?",opts:["Ley, órgano, recurso, sanción, silencio","Bon govern, transparència, drets davant l'Administració, informació pública, drets lingüístics","Procedimiento, contratación, patrimonio, subvenciones, recursos","Constitución, Estatut, departaments, Govern, lengua"],c:1,f:"Secuencia ordenadora del T3: bon govern → transparència → drets davant l'Administració → informació pública → drets lingüístics. Memoriza este orden para no perderte en el tema."},
  {b:"A. Leyes y mapa del tema",q:"¿Qué bloque del T3 responde a la pregunta 'cómo debe actuar el poder'?",opts:["Transparència","Bon govern","Dret a la informació pública","Drets lingüístics"],c:1,f:"Bon govern = cómo debe actuar el poder. Transparència = qué debe enseñar. Drets davant l'Administració = qué puede pedir el ciudadano. Tres preguntas clave para identificar bloques rápido en examen."},
  {b:"A. Leyes y mapa del tema",q:"¿Qué bloque del T3 responde a la pregunta 'qué debe enseñar la Administración'?",opts:["Bon govern","Drets lingüístics","Transparència","Procedimiento común"],c:2,f:"Transparència = qué debe enseñar la Administración (publicidad activa + acceso). Bon govern = cómo debe actuar. Drets lingüístics = en qué lengua. Tres anclas mentales para clasificar la pregunta antes de responder."},
  {b:"A. Leyes y mapa del tema",q:"¿Qué bloque del T3 responde a la pregunta 'en qué lengua puede relacionarse el ciudadano'?",opts:["Dret a la informació pública","Drets lingüístics","Bon govern","Mitjans electrònics"],c:1,f:"Drets lingüístics = en qué lengua puede relacionarse el ciudadano. Va asociado a la Llei 1/1998 de política lingüística. Si la pregunta menciona lengua, aranés o castellano, va a este bloque."},
  {b:"B. Bon govern — concepto",q:"La idea central del bon govern, según el resumen, combina:",opts:["Ética pública, calidad, transparencia y rendición de cuentas","Solo atención al ciudadano y cortesía","Jerarquía, sanción y disciplina","Únicamente responsabilidad presupuestaria"],c:0,f:"Las cuatro patas del bon govern: ética pública + transparencia + buena gestión + rendición de cuentas. Mini-mnemo del resumen — si ves 'bon govern', piensa en estos cuatro pilares."},
  {b:"B. Bon govern — concepto",q:"¿Qué es el bon govern según la definición del resumen?",opts:["Un sistema judicial de control de la Administración","Un conjunto de principios, obligaciones y reglas sobre calidad de servicios y funcionamiento de la Administración","Solo el régimen disciplinario de los altos cargos","Únicamente la atención al ciudadano"],c:1,f:"Bon govern = conjunto de principios, obligaciones y reglas sobre calidad de servicios y funcionamiento. No es solo cortesía ni régimen disciplinario — es un marco completo de actuación pública."},
  {b:"B. Bon govern — concepto",q:"El bon govern incluye principios éticos y buenas prácticas para:",opts:["Solo altos cargos de la Generalitat","Solo personal funcionario","Altos cargos, cargos directivos y personal al servicio de la Administración","Solo cargos electos del Parlament"],c:2,f:"El bon govern aplica a tres grupos: altos cargos + cargos directivos + personal al servicio de la Administración. No es solo para los cargos políticos — afecta a toda la cadena."},
  {b:"B. Bon govern — concepto",q:"¿Cuál NO es una finalidad del bon govern según el resumen?",opts:["Máxima transparencia","Calidad y equidad","Rendición de cuentas (retiment de comptes)","Privatización de servicios públicos"],c:3,f:"La privatización NO es una finalidad del bon govern. Las finalidades son: máxima transparencia + calidad + equidad + rendición de cuentas. Trampa de examen: introducir un concepto opuesto al espíritu del bloque."},
  {b:"B. Bon govern — concepto",q:"El error típico al responder sobre bon govern es:",opts:["Asociarlo a las cuatro patas (ética, transparencia, gestión, rendición)","Confundirlo con solo cortesía o atención al ciudadano","Vincularlo a la Llei 19/2014","Aplicarlo a todos los servidores públicos"],c:1,f:"Error típico marcado en rojo en el resumen: confundir bon govern con solo atención al ciudadano. Es mucho más amplio: incluye ética, control, incompatibilidades y responsabilidad."},
  {b:"C. Bon govern — principios",q:"¿Cuál NO es un principio general de bon govern según el listado base?",opts:["Transparencia en la gestión de asuntos públicos","Eficacia, economía y eficiencia","Silencio administrativo positivo","Imparcialidad e independencia frente a intereses particulares"],c:2,f:"El silencio administrativo NO es un principio de bon govern — pertenece al T5 (efectos del procedimiento). Los principios de bon govern son: transparencia, eficacia, dedicación, imparcialidad, igualdad, diligencia, responsabilidad."},
  {b:"C. Bon govern — principios",q:"¿Qué principio prohíbe usar el cargo para obtener ventajas personales o materiales?",opts:["Transparencia","Eficacia","Integridad / no usar el cargo para obtener ventajas","Diligencia"],c:2,f:"Principio explícito del bon govern: no usar el cargo para obtener ventajas personales o materiales. Es la base ética que conecta con incompatibilidades, conflictos de interés y rechazo de regalos."},
  {b:"C. Bon govern — principios",q:"¿Qué principio NO aparece en la lista base de bon govern?",opts:["Igualdad y no discriminación","Diligencia y calidad en la prestación de servicios","Responsabilidad por las actuaciones","Inmunidad de jurisdicción del cargo"],c:3,f:"La inmunidad de jurisdicción NO es un principio de bon govern. Lo contrario: el bon govern exige responsabilidad por las actuaciones. La inmunidad solo afecta a determinados cargos institucionales y no es un principio del T3."},
  {b:"D. Bon govern — altos cargos",q:"¿Qué obligación específica se añade para altos cargos en materia de regalos?",opts:["Aceptar regalos solo si son de valor inferior a 100€","Rechazar regalos o favores fuera de los usos sociales","Declararlos al Tribunal de Cuentas en 24 horas","Ningún régimen específico de regalos"],c:1,f:"Altos cargos: rechazo de regalos o favores fuera de los usos sociales. La regla es la abstención, no la valoración económica. Los regalos protocolarios o de cortesía social están permitidos; los demás no."},
  {b:"D. Bon govern — altos cargos",q:"Los altos cargos deben abstenerse cuando:",opts:["Solo cuando el asunto afecte directamente a familiares","Existan conflictos de interés que afecten a su imparcialidad","Solo cuando lo ordene el órgano superior","Solo cuando el conflicto sea económico y superior a 1000€"],c:1,f:"Abstención por conflictos de interés: obligación general cuando exista cualquier circunstancia que pueda afectar a la imparcialidad. No depende de límites económicos ni del tipo de relación familiar."},
  {b:"D. Bon govern — altos cargos",q:"Los altos cargos están sometidos al régimen de:",opts:["Solo declaración pública de bienes","Publicidad de actividades, bienes e intereses y respeto del régimen de incompatibilidades","Solo control del Tribunal de Cuentas","Solo control disciplinario interno"],c:1,f:"Régimen completo de altos cargos: publicidad de actividades, bienes e intereses + respeto del régimen de incompatibilidades. Las dos obligaciones van unidas y son exigibles desde el momento del nombramiento."},
  {b:"D. Bon govern — altos cargos",q:"Los altos cargos deben guardar:",opts:["Confidencialidad solo de información clasificada","Secreto y confidencialidad respecto de los hechos conocidos por razón del cargo","Solo silencio en procedimientos sancionadores","Confidencialidad solo durante el ejercicio del cargo, no después"],c:1,f:"Secreto y confidencialidad sobre los hechos conocidos por razón del cargo. La obligación es amplia (no solo información clasificada) y persiste también tras el cese, no solo durante el cargo."},
  {b:"D. Bon govern — altos cargos",q:"¿Qué afirmación sobre los altos cargos es CORRECTA según el resumen?",opts:["Solo deben respetar el ordenamiento jurídico, no la Constitución específicamente","Deben respetar la Constitución, el ordenamiento jurídico y los derechos fundamentales","Solo deben respetar el Estatut d'Autonomia","No tienen obligaciones específicas de respeto normativo"],c:1,f:"Los altos cargos deben respetar la Constitución + el ordenamiento jurídico + los derechos fundamentales. Es el primer principio específico de altos cargos del T3 y conecta directamente con el T1 (CE)."},
  {b:"D. Bon govern — altos cargos",q:"¿Cuál de estos elementos NO pertenece al régimen específico de los altos cargos?",opts:["Abstención ante conflictos de interés","Rechazo de regalos fuera de usos sociales","Publicidad de bienes e intereses","Inmunidad parlamentaria automática"],c:3,f:"La inmunidad parlamentaria es propia de diputados y senadores, no de los altos cargos administrativos. Confundirlas es trampa clásica del T3 — son figuras distintas con regímenes distintos."},
  {b:"E. Transparència — concepto",q:"La transparencia exige que la información pública se difunda:",opts:["Solo cuando el ciudadano la solicite","De oficio de forma veraz, objetiva, clara, accesible y actualizada","Solo en procedimientos sancionadores","Solo en formato papel para garantizar autenticidad"],c:1,f:"La transparencia activa exige difusión de oficio (no solo a petición) y con cinco notas: veraz + objetiva + clara + accesible + actualizada. La difusión de oficio es la diferencia clave con el derecho de acceso."},
  {b:"E. Transparència — concepto",q:"La transparencia debe permitir:",opts:["Solo cumplir con obligaciones formales","Conocer cómo funciona la Administración y facilitar el control ciudadano","Solo el control interno de la Generalitat","Solo proteger datos de carácter personal"],c:1,f:"Finalidad funcional de la transparencia: conocer cómo funciona la Administración y facilitar el control ciudadano. Es una herramienta de empoderamiento ciudadano, no solo un trámite formal."},
  {b:"E. Transparència — concepto",q:"Además de difundir información, la transparencia exige:",opts:["Solo publicar PDFs no editables","Reutilización de la información y formatos comprensibles","Solo publicación en el BOE","Solo difusión en redes sociales oficiales"],c:1,f:"Transparencia moderna: reutilización + formatos comprensibles. No basta con publicar — la información debe poder ser usada y entendida por la ciudadanía. Conecta con el concepto de open data."},
  {b:"E. Transparència — portales",q:"¿Qué portal proporciona datos específicos de la Administración de la Generalitat?",opts:["Transparència gencat","Transparència Catalunya","Transparència Espanya","Portal del BOE"],c:0,f:"Transparència gencat = datos específicos de la Administración de la Generalitat. Transparència Catalunya = espacio general más amplio que incluye sector público catalán y otros sujetos obligados."},
  {b:"E. Transparència — portales",q:"¿Qué portal recoge información del sector público catalán y de otros sujetos obligados?",opts:["Transparència gencat","Transparència Catalunya","Portal del BOE","Portal de la Moncloa"],c:1,f:"Transparència Catalunya = portal general del sector público catalán + otros sujetos obligados. Más amplio que Transparència gencat (solo Generalitat). El examen los confunde sistemáticamente."},
  {b:"E. Transparència — sujetos obligados",q:"¿Qué sujetos están obligados a publicidad activa según la Llei 19/2014?",opts:["Solo la Administración General del Estado","Administraciones públicas (Generalitat, entes locales y sector público vinculado o dependiente)","Solo entidades privadas","Solo el Govern y los departaments"],c:1,f:"Obligados principales: AAPP catalanas (Generalitat + entes locales + sector público vinculado o dependiente). Es el bloque base de obligados. Otros niveles se añaden con condiciones específicas."},
  {b:"E. Transparència — sujetos obligados",q:"¿Cuándo pueden quedar afectados los sujetos privados por las obligaciones de transparencia?",opts:["Nunca: solo aplica a entes públicos","Cuando ejerzan funciones públicas o gestionen servicios o recursos públicos","Solo si tienen más de 100 empleados","Solo si reciben subvenciones superiores a 1 millón de euros"],c:1,f:"Sujetos privados afectados: cuando ejerzan funciones públicas o gestionen servicios/recursos públicos. La condición es funcional (qué hacen), no formal (qué tipo de entidad son)."},
  {b:"E. Transparència — sujetos obligados",q:"¿Qué tipo de entidades están también incluidas como obligadas?",opts:["Solo organismos autónomos del Govern","Universidades, corporaciones y otras entidades con funciones públicas","Solo asociaciones culturales con subvención","Solo ayuntamientos de más de 50.000 habitantes"],c:1,f:"Otras entidades públicas obligadas: universidades + corporaciones de derecho público + entidades con funciones públicas. Es un grupo amplio que va más allá de la Administración en sentido estricto."},
  {b:"F. Publicitat activa — bloques",q:"La publicidad activa supone que la Administración publica información:",opts:["Solo cuando se la pide un ciudadano","De oficio sin necesidad de solicitud previa","Solo bajo orden judicial","Solo en procedimientos sancionadores"],c:1,f:"Publicidad ACTIVA = de oficio. Publicidad PASIVA / derecho de acceso = a solicitud. La diferencia entre activa y pasiva es la trampa más explotada en este bloque del T3."},
  {b:"F. Publicitat activa — bloques",q:"¿Cuál de estos bloques pertenece a la publicidad activa según el cuadro del resumen?",opts:["Información institucional, organizativa y de planificación","Solo información sobre procedimientos sancionadores","Información de contratos personales privados","Solo datos económicos cerrados anuales"],c:0,f:"Bloque 1 de publicidad activa: información institucional + organizativa + de planificación (estructura, organigrama, planes, programas). Es la cabecera de los bloques de publicidad activa."},
  {b:"F. Publicitat activa — bloques",q:"Información sobre relaciones con la ciudadanía, gestión administrativa y servicios pertenece a:",opts:["Bloque 2 de publicidad activa","Bloque 1 de publicidad activa","Bloque sobre límites de acceso","Bloque exclusivo del derecho de acceso"],c:0,f:"Bloque 2 de publicidad activa: relaciones con la ciudadanía + gestión administrativa + servicios. Es el bloque más operativo de los cinco — afecta directamente a cómo el ciudadano se relaciona con la Administración."},
  {b:"F. Publicitat activa — bloques",q:"Información económica, presupuestaria y patrimonial pertenece a:",opts:["Bloque 1 de publicidad activa","Bloque 3 de publicidad activa","Bloque exclusivo del derecho de acceso","Información clasificada del Govern"],c:1,f:"Bloque 3 de publicidad activa: información económica + presupuestaria + patrimonial. Aquí entran presupuestos, ejecución, contratos públicos, subvenciones, sueldos de altos cargos."},
  {b:"F. Publicitat activa — bloques",q:"La información sobre decisiones y actuaciones jurídicamente relevantes pertenece a:",opts:["Bloque 4 de publicidad activa","Bloque exclusivo de bon govern","Bloque solo del Parlament","Bloque cerrado a la ciudadanía"],c:0,f:"Bloque 4 de publicidad activa: decisiones y actuaciones jurídicamente relevantes (resoluciones, normas, convenios, dictámenes). Es la información sustantiva de la actuación administrativa."},
  {b:"F. Publicitat activa — bloques",q:"¿Cuál es la trampa clásica del bloque de publicidad activa?",opts:["Confundir publicidad activa con derecho de acceso a la información pública","Confundir Generalitat con Estado","Confundir sujetos públicos con sujetos privados","Confundir transparencia con bon govern"],c:0,f:"Trampa clásica: confundir publicidad activa (de oficio) con derecho de acceso (a petición). Son figuras complementarias pero distintas. La activa publica sin que nadie pida; el acceso responde a una solicitud."},
  {b:"G. Dret a la informació pública",q:"El derecho de acceso a la información pública permite:",opts:["A cualquier persona solicitar información que obre en poder de la Administración","Solo a interesados formales solicitar información del expediente","Solo a periodistas acreditados","Solo a partidos políticos con representación parlamentaria"],c:0,f:"Derecho de acceso = cualquier persona puede solicitar información pública. No hay que ser interesado formal ni acreditar nada especial. Es un derecho universal con los límites que prevé la ley."},
  {b:"G. Dret a la informació pública",q:"¿Quién puede ejercer el derecho de acceso a la información pública?",opts:["Solo ciudadanos españoles mayores de edad","Solo personas con interés legítimo acreditado","Cualquier persona, sin necesidad de motivar la petición ni acreditar interés","Solo profesionales con habilitación"],c:2,f:"El derecho de acceso es universal y no requiere motivación ni acreditación de interés. La motivación es voluntaria — si el solicitante la aporta, se valora; si no, no puede ser causa de denegación."},
  {b:"G. Dret a la informació pública",q:"¿Cuál es la condición para ejercer el derecho de acceso?",opts:["Tener interés legítimo y acreditarlo","No es necesario motivar ni acreditar interés","Ser parte de un procedimiento administrativo","Tener la condición de funcionario público"],c:1,f:"No es necesario motivar la petición ni acreditar interés legítimo. La regla general del derecho de acceso es la libertad — cualquier persona puede pedir información pública sin justificarse."},
  {b:"G. Dret a la informació pública",q:"El derecho de acceso a la información pública tiene como límites:",opts:["Solo el secreto de Estado","Determinados límites tasados por la ley (seguridad, datos personales, secretos comerciales, etc.) que deben aplicarse de forma restrictiva y motivada","Cualquier excusa que la Administración considere oportuna","Ningún límite: la transparencia es absoluta"],c:1,f:"Los límites al derecho de acceso son tasados por ley (seguridad nacional, datos personales, secretos comerciales, propiedad intelectual, etc.) y deben aplicarse de forma restrictiva y motivada. La regla es el acceso; los límites son la excepción."},
  {b:"G. Dret a la informació pública",q:"Si la Administración deniega el acceso, debe:",opts:["No es necesario motivar la denegación","Motivar la denegación y notificarla con los recursos procedentes","Solo notificar verbalmente al solicitante","Comunicar la denegación al Tribunal Constitucional"],c:1,f:"Toda denegación debe ser motivada (causa legal específica que la justifica) y notificada con los recursos procedentes (especialmente la reclamación ante la GAIP en Cataluña)."},
  {b:"H. Trampas del T3",q:"¿Qué afirmación sobre la transparencia es INCORRECTA?",opts:["Es un eje de toda acción pública","Refuerza el control ciudadano y la legitimidad democrática","La transparencia y el secreto son sinónimos en derecho administrativo","Conecta directamente con el bon govern"],c:2,f:"Trampa explícita: transparencia y secreto son OPUESTOS, no sinónimos. La transparencia exige difusión; el secreto, ocultación. El examen suele introducir esta opción para ver si el alumno está atento."},
  {b:"H. Trampas del T3",q:"¿Cuál de estas afirmaciones sobre el bon govern es CORRECTA?",opts:["Bon govern equivale solo a 'administrar bien'","Bon govern incluye ética, control, incompatibilidades y responsabilidad","Bon govern es solo cortesía y atención al ciudadano","Bon govern aplica solo a cargos electos"],c:1,f:"La afirmación correcta es la B. Bon govern es un concepto amplio: ética + control + incompatibilidades + responsabilidad. No es solo administrar bien ni solo cortesía. Aplica a altos cargos, directivos y personal."},
  {b:"H. Trampas del T3",q:"¿Cuál es el error más frecuente al estudiar las leyes del T3?",opts:["Confundir Llei 19/2014 (catalana) con Llei 19/2013 (estatal)","Olvidar la Llei 1/1998","Confundir Llei 39/2015 con Llei 40/2015","Pensar que la Llei 26/2010 deroga la 39/2015"],c:0,f:"Error más frecuente del T3: confundir 19/2013 (estatal) con 19/2014 (catalana). Solo cambia un dígito. Memoriza: 14 = catalana (la 'principal' del T3), 13 = estatal (la 'general')."},
  {b:"I. Síntesis del T3",q:"Si una pregunta del T3 mezcla bon govern, transparencia y procedimiento, ¿cuál es el primer filtro mental?",opts:["Pensar en el órgano competente","Buscar siempre la ley estatal","Separar primero el bloque material al que pertenece","Aplicar directamente la Llei 39/2015"],c:2,f:"Filtro mental clave del T3: identificar primero a qué bloque material pertenece la pregunta (transparencia, procedimiento, lengua, bon govern). Cada bloque tiene su ley propia y sus reglas específicas."},
  {b:"I. Síntesis del T3",q:"¿Qué orden recomienda el resumen para estudiar el T3 cuando hay poca energía mental?",opts:["Plazos, límites y excepciones primero","Listas largas de principios primero","Leyes y luego bloques","Recursos administrativos primero"],c:2,f:"Estrategia TDAH del T3: empieza por las leyes (mapa rápido), luego los bloques (concepto), después las listas, y al final los plazos y excepciones. De lo general a lo específico, de lo simple a lo complejo."}
];

let pool=[...Q],idx=0,nOk=0,nEr=0,fl=[],ans=false;
function render(){
  if(idx>=pool.length){showRes();return;}
  const q=pool[idx],tot=pool.length;
  document.getElementById('fill').style.width=Math.round(idx/tot*100)+'%';
  document.getElementById('pn').textContent=(idx+1)+' / '+tot;
  document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;
  document.getElementById('vpe').textContent=tot-idx;
  document.getElementById('pill').textContent=q.b;
  document.getElementById('qnl').textContent='Pregunta '+(idx+1);
  document.getElementById('qbl').textContent=q.b;
  document.getElementById('qt').textContent=q.q;
  const o=document.getElementById('opts');o.innerHTML='';
  ['A','B','C','D'].forEach((l,i)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML='<span class="lt">'+l+'</span><span>'+q.opts[i]+'</span>';
    b.onclick=()=>sel(i,b);o.appendChild(b);
  });
  const f=document.getElementById('fb');f.className='';f.innerHTML='';
  document.getElementById('bn').style.display='none';ans=false;
}
function sel(i,btn){
  if(ans)return;ans=true;
  const q=pool[idx];
  document.querySelectorAll('.opt').forEach(b=>b.classList.add('dis'));
  const f=document.getElementById('fb');
  if(i===q.c){btn.classList.add('ok');nOk++;f.className='show ok';f.innerHTML='<div class="fh">Correcto</div><div class="fd">'+q.f+'</div>';}
  else{btn.classList.add('er');document.querySelectorAll('.opt')[q.c].classList.add('ok');nEr++;fl.push({q:q.q,co:q.opts[q.c],tu:q.opts[i],f:q.f});f.className='show er';f.innerHTML='<div class="fh">Incorrecto — correcta: '+['A','B','C','D'][q.c]+'</div><div class="fd">'+q.f+'</div>';}
  document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;
  document.getElementById('bn').style.display='inline-block';
}
function nxt(){idx++;render();}
function showRes(){
  ['hdr','pw','stats','qc','opts','fb','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  const tot=pool.length,pct=Math.round(nOk/tot*100);
  document.getElementById('rp').textContent=pct+'%';
  document.getElementById('rt').textContent=pct>=80?'Buen nivel en T3':pct>=60?'Nivel medio — repasa los fallos':'Refuerza leyes y bloques';
  document.getElementById('rs2').textContent=nOk+' correctas de '+tot+'.'+(fl.length>0?' '+fl.length+' para repasar.':' Sin errores.');
  if(!fl.length)document.getElementById('bfl').style.display='none';
  if(fl.length){document.getElementById('fs').style.display='block';document.getElementById('fst').textContent='Preguntas falladas ('+fl.length+')';const fll=document.getElementById('fl');fll.innerHTML='';fl.forEach(f=>{const d=document.createElement('div');d.className='fi';d.innerHTML='<div class="fq">'+f.q+'</div><div class="fb2"><span class="bg er">Tu respuesta: '+f.tu+'</span><span class="bg ok">Correcta: '+f.co+'</span></div><div class="fe">'+f.f+'</div>';fll.appendChild(d);});}
  document.getElementById('res').style.display='block';
}
function rst(){pool=[...Q];idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
function sfl(){if(!fl.length)return;pool=fl.map(f=>Q.find(q=>q.q===f.q)).filter(Boolean);idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
render();
</script>
