<style>

-text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}.st .vl{font-size:24px;font-weight:600;color:var(--text)}#sc-ok .vl{color:var(--ok)}#sc-er .vl{color:var(--err)}#qc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem}#qm{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em}#qm .d{width:3px;height:3px;border-radius:50%;background:var(--border-strong);display:inline-block}#qt{font-size:16px;color:var(--text);line-height:1.65}#opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}.opt{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:13px 16px;font-size:14px;color:var(--text);cursor:pointer;text-align:left;line-height:1.55;transition:border-color .15s,background .15s,transform .1s;width:100%}.opt:hover:not(.dis){border-color:var(--border-strong);background:var(--surface2);transform:translateY(-1px)}.lt{min-width:24px;height:24px;border-radius:50%;border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0;margin-top:1px}.opt.ok{border-color:var(--ok-border);background:var(--ok-bg)}.opt.ok .lt{background:var(--ok);border-color:var(--ok);color:#fff}.opt.er{border-color:var(--err-border);background:var(--err-bg)}.opt.er .lt{background:var(--err);border-color:var(--err);color:#fff}.opt.dis{cursor:default;pointer-events:none}#fb{display:none;border-radius:var(--rs);padding:13px 16px;margin-bottom:1rem;border:1px solid;font-size:13px;line-height:1.65}#fb.show{display:block}#fb.ok{background:var(--ok-bg);border-color:var(--ok-border)}#fb.er{background:var(--err-bg);border-color:var(--err-border)}#fb .fh{font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}#fb.ok .fh{color:var(--ok)}#fb.er .fh{color:var(--err)}#fb .fd{color:var(--text2)}#br{display:flex;justify-content:flex-end}#bn{display:none;font-size:13px;font-weight:500;padding:10px 20px;border-radius:var(--rs);background:var(--accent);color:var(--bg);border:none;cursor:pointer}#bn:hover{opacity:.85}#res{display:none;padding:1rem 0}#rh{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:2rem}#rp{font-size:64px;font-weight:700;color:var(--text);letter-spacing:-.04em;line-height:1;flex-shrink:0}#ri h2{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}#ri p{font-size:13px;color:var(--text2);line-height:1.6}#rbt{display:flex;gap:8px;margin-bottom:2rem;flex-wrap:wrap}.bs{font-size:13px;font-weight:500;padding:10px 18px;border-radius:var(--rs);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);cursor:pointer}.bs:hover{background:var(--surface2)}.bp{background:var(--accent);color:var(--bg);border-color:transparent}.bp:hover{opacity:.85;background:var(--accent)}#fs{border-top:1px solid var(--border);padding-top:1.5rem}#fs h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.04em}.fi{padding:1rem 0;border-bottom:1px solid var(--border)}.fi:last-child{border-bottom:none}.fq{font-size:14px;color:var(--text);margin-bottom:8px;line-height:1.5;font-weight:500}.fb2{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}.bg{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid}.bg.er{background:var(--err-bg);border-color:var(--err-border);color:var(--err)}.bg.ok{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok)}.fe{font-size:12px;color:var(--text3);line-height:1.6}@media(max-width:500px){body{padding:1rem .75rem 3rem}#rh{flex-direction:column;gap:1rem;align-items:flex-start}#rp{font-size:48px}#hdr{flex-direction:column;gap:.75rem}}

<body>
<div id="app">
  <div id="hdr"><div><h1>Tema 8 · Test 3 · Oposición Generalitat</h1><p>55 preguntas · Simulacro final con casos prácticos integrados</p></div><div id="pill"></div></div>
  <div id="pw"><div id="pr"><span>Progreso</span><span id="pn">1 / 55</span></div><div id="track"><div id="fill"></div></div></div>
  <div id="stats"><div class="st" id="sc-ok"><div class="lb">Correctas</div><div class="vl" id="vok">0</div></div><div class="st" id="sc-er"><div class="lb">Errores</div><div class="vl" id="ver">0</div></div><div class="st"><div class="lb">Pendientes</div><div class="vl" id="vpe">55</div></div></div>
  <div id="qc"><div id="qm"><span id="qnl"></span><span class="d"></span><span id="qbl"></span></div><div id="qt"></div></div>

<script>
const Q=[
  {b:"A. Caso — clases de personal",q:"María supera una oposición libre, es nombrada funcionaria y toma posesión. Su vínculo con la Administración es:",opts:["Contractual laboral","Estatutario permanente (funcionaria de carrera)","Temporal por necesidad","De confianza política"],c:1,f:"Superación de oposición + nombramiento + toma de posesión = funcionaria de CARRERA. Vínculo estatutario permanente. Es la secuencia completa de adquisición de la condición."},
  {b:"A. Caso — clases de personal",q:"Pedro es nombrado para cubrir una vacante mientras se convoca la plaza. No ha superado oposición. Pedro es:",opts:["Funcionario de carrera","Funcionario interino","Personal eventual","Personal directivo"],c:1,f:"Cobertura de vacante temporal + sin oposición = funcionario INTERINO. Nombrado por necesidad administrativa. No consolida la plaza aunque permanezca años — necesita superar proceso selectivo."},
  {b:"A. Caso — clases de personal",q:"Ana es nombrada asesora del Conseller de Educación. Su cese depende del cese del Conseller. Ana es:",opts:["Funcionaria de carrera","Funcionaria interina","Personal eventual","Personal laboral fijo"],c:2,f:"Asesora del Conseller + cese ligado al cese de la autoridad = personal EVENTUAL. Lógica de confianza política, no de necesidad administrativa estructural."},
  {b:"A. Caso — clases de personal",q:"Jordi firma un contrato laboral indefinido con la Generalitat para tareas de mantenimiento. Jordi es:",opts:["Funcionario de carrera","Funcionario interino","Personal laboral","Personal eventual"],c:2,f:"Contrato laboral + indefinido + tareas de mantenimiento = personal LABORAL. Vínculo contractual, no estatutario. Se rige por contrato + convenio + reglas públicas aplicables."},
  {b:"A. Caso — clases de personal",q:"Laura es directora de un organismo autónomo, seleccionada por su trayectoria y evaluada por resultados. Laura es:",opts:["Funcionaria de carrera","Personal eventual","Personal directivo profesional","Funcionaria interina"],c:2,f:"Funciones directivas + selección por trayectoria + evaluación por resultados = personal DIRECTIVO PROFESIONAL. Es la figura más reciente del TREBEP."},
  {b:"B. Caso — acceso",q:"En una convocatoria de oposición, un candidato alega 10 años de experiencia profesional como mérito. El tribunal debe:",opts:["Valorar la experiencia junto con las pruebas","No valorar la experiencia: en la oposición pura solo cuentan las pruebas/exámenes","Dar preferencia automática al candidato con más experiencia","Eliminar al candidato por intentar influir en el proceso"],c:1,f:"Oposición pura = SOLO pruebas. La experiencia profesional se valora en el concurso-oposición (fase concurso), no en la oposición pura. Trampa: confundir los sistemas selectivos."},
  {b:"B. Caso — acceso",q:"Una convocatoria exige titulación de grado universitario y nivel C1 de catalán. Un candidato con diplomatura y nivel B2 de catalán se presenta. ¿Puede participar?",opts:["Sí, siempre que tenga experiencia suficiente","No: no cumple los requisitos de titulación ni de lengua exigidos en la convocatoria","Sí, si paga la tasa correspondiente","Solo si el tribunal lo decide discrecionalmente"],c:1,f:"Los requisitos de la convocatoria son condiciones de participación: quien no los cumple NO puede participar. La titulación y el nivel de lengua son requisitos objetivos e inderogables por discrecionalidad del tribunal."},
  {b:"B. Caso — acceso",q:"Un candidato con discapacidad solicita adaptación de tiempo en las pruebas selectivas. La Administración debe:",opts:["Denegarla siempre: las pruebas son iguales para todos","Conceder las adaptaciones razonables que permitan la participación en igualdad de condiciones","Solo conceder adaptaciones si el candidato tiene más del 65% de discapacidad","Derivar al candidato a un proceso selectivo especial"],c:1,f:"Adaptaciones razonables: OBLIGACIÓN de la Administración. Permiten la participación en igualdad de condiciones real. No dependen del porcentaje de discapacidad para ser solicitadas."},
  {b:"B. Caso — acceso",q:"Un proceso selectivo valora en la fase de concurso: antigüedad, formación y grado personal. ¿Qué sistema selectivo es?",opts:["Oposición pura","Concurso-oposición","Concurso puro","Libre designación"],c:1,f:"Fase de pruebas + fase de valoración de méritos (antigüedad, formación, grado) = CONCURSO-OPOSICIÓN. Si solo hubiera pruebas sería oposición; si solo méritos sería concurso puro."},
  {b:"B. Caso — acceso",q:"Se convoca un puesto con valoración exclusiva de méritos, sin pruebas. El sistema es:",opts:["Oposición","Concurso-oposición","Concurso puro (excepcional)","Libre designación"],c:2,f:"Solo méritos sin pruebas = CONCURSO PURO. Es excepcional — solo para supuestos específicos previstos por la ley. El examen lo presenta como si fuera ordinario para ver si caes."},
  {b:"C. Caso — adquisición y pérdida",q:"Un aspirante aprueba la oposición pero no toma posesión en el plazo establecido sin causa justificada. ¿Qué ocurre?",opts:["Se prorroga el plazo automáticamente","Pierde todos los derechos derivados del proceso selectivo","Puede tomar posesión cuando quiera","Se le nombra igualmente pero sin retribuciones"],c:1,f:"Falta de toma de posesión en plazo sin causa justificada = pérdida de los derechos derivados del proceso selectivo. El nombramiento sin toma de posesión no consolida la condición de funcionario."},
  {b:"C. Caso — adquisición y pérdida",q:"Una funcionaria de carrera renuncia voluntariamente a su condición. ¿Puede presentarse a una nueva oposición?",opts:["No: la renuncia inhabilita definitivamente","Sí: la renuncia aceptada no inhabilita para nuevo acceso","Solo tras 5 años de espera","Solo si el Govern lo autoriza expresamente"],c:1,f:"Renuncia aceptada NO inhabilita para nuevo acceso. La funcionaria puede volver a presentarse a cualquier proceso selectivo. Distinto de la separación del servicio (que sí inhabilita)."},
  {b:"C. Caso — adquisición y pérdida",q:"Un funcionario es condenado penalmente a inhabilitación especial para empleo público durante 3 años. ¿Qué efecto tiene?",opts:["Solo suspensión provisional","Pérdida de la condición de funcionario durante la inhabilitación","Solo apercibimiento disciplinario","Ningún efecto en la relación funcionarial"],c:1,f:"Inhabilitación especial firme = pérdida de la condición de funcionario. La sentencia penal produce efecto directo en la relación estatutaria. Es una de las cinco causas de pérdida del TREBEP."},
  {b:"C. Caso — adquisición y pérdida",q:"Un funcionario pierde la nacionalidad española que era requisito de acceso. ¿Qué ocurre?",opts:["Nada: la nacionalidad solo se exige al acceder","Pierde la condición de funcionario porque ha desaparecido un requisito esencial del acceso","Pasa automáticamente a excedencia","Se convierte en personal laboral"],c:1,f:"Pérdida de nacionalidad = pérdida de condición si era requisito de acceso. Es lógica: si desaparece un requisito que era necesario para entrar, desaparece la condición. No hay conversión automática a otra figura."},
  {b:"D. Caso — situaciones",q:"Una funcionaria es elegida alcaldesa de su municipio. Pasa a la situación de:",opts:["Excedencia voluntaria","Servicios especiales","Servicio activo","Suspensión de funciones"],c:1,f:"Cargo político electo (alcaldesa) = SERVICIOS ESPECIALES. Conserva plaza + computa antigüedad + derecho a reincorporarse al cesar. Es el caso típico junto con diputado, senador, conseller."},
  {b:"D. Caso — situaciones",q:"Un funcionario solicita excedencia voluntaria por interés particular para montar un negocio. Tras 4 años quiere volver. ¿Qué ocurre?",opts:["Se reincorpora automáticamente al mismo puesto","Su reincorporación está condicionada a que haya puesto vacante dotado presupuestariamente","Debe superar nueva oposición","Ha perdido definitivamente la condición de funcionario"],c:1,f:"Reincorporación desde excedencia voluntaria por interés particular: condicionada a VACANTE DOTADA. No es automática ni garantiza el mismo puesto. Es la excedencia menos protegida — el funcionario asume el riesgo."},
  {b:"D. Caso — situaciones",q:"Una funcionaria solicita excedencia por cuidado de su hijo recién nacido. Durante la excedencia:",opts:["Pierde la plaza inmediatamente","Conserva la plaza durante un período, computa antigüedad y tiene reserva de puesto","No computa antigüedad","Pasa automáticamente a excedencia voluntaria por interés particular"],c:1,f:"Excedencia por cuidado de hijo: conserva plaza durante un período + computa antigüedad + reserva de puesto. Protección reforzada por conciliación familiar. Hasta 3 años desde nacimiento o resolución de adopción/acogimiento."},
  {b:"D. Caso — situaciones",q:"Un funcionario está siendo investigado por presuntas irregularidades. El instructor del expediente acuerda su suspensión provisional. Esto significa que:",opts:["Ha sido sancionado definitivamente","Es una medida cautelar temporal mientras dura la investigación, no una sanción","Ha perdido la condición de funcionario","Pasa automáticamente a excedencia"],c:1,f:"Suspensión provisional = medida CAUTELAR. No es sanción — es temporal y dura mientras se investiga. Si el expediente se archiva sin sanción, se reincorpora y cobra las retribuciones dejadas de percibir. Máximo 6 meses."},
  {b:"D. Caso — situaciones",q:"Tras el expediente disciplinario, se impone suspensión firme de 2 años. Esto es:",opts:["Una medida cautelar","Una sanción definitiva que implica la pérdida temporal de funciones y retribuciones durante 2 años","La separación del servicio","Una excedencia forzosa"],c:1,f:"Suspensión firme = SANCIÓN definitiva. El funcionario pierde funciones y retribuciones durante el tiempo fijado (aquí 2 años). Cuando finaliza, se reincorpora. No es separación (que sería pérdida definitiva)."},
  {b:"D. Caso — situaciones",q:"Un funcionario de la Generalitat obtiene destino en el Ayuntamiento de Barcelona por transferencia. Su situación en la Generalitat es:",opts:["Excedencia voluntaria","Servicio en otras Administraciones Públicas","Servicios especiales","Suspensión de funciones"],c:1,f:"Destino en OTRA Administración por transferencia = servicio en otras AAPP. No es excedencia ni servicios especiales. Conserva derechos en la Administración de origen."},
  {b:"E. Caso — provisión",q:"Se publica una convocatoria de concurso de méritos para cubrir 5 puestos de administrativo (C1). Los criterios de valoración son antigüedad, formación y grado. ¿Qué tipo de provisión es?",opts:["Libre designación","Concurso de méritos (sistema ordinario de provisión)","Oposición libre","Comisión de servicios"],c:1,f:"Concurso de méritos con baremo público (antigüedad, formación, grado) = provisión ORDINARIA. Es el sistema normal para cubrir puestos de trabajo entre funcionarios que ya están dentro."},
  {b:"E. Caso — provisión",q:"Un puesto de secretario general de departament se cubre por libre designación. El Conseller cesa al titular 6 meses después. ¿Es correcto?",opts:["No: el cese requiere expediente disciplinario","Sí: la libre designación permite el cese discrecional, con destino al puesto de origen o similar","Solo si hay infracción grave","Solo si lo autoriza el Govern en pleno"],c:1,f:"Libre designación = cese DISCRECIONAL. El Conseller puede cesar libremente al titular con destino al puesto de origen o uno similar. No necesita causa ni expediente. Es la consecuencia de la discrecionalidad del nombramiento."},
  {b:"E. Caso — provisión",q:"Una vacante urgente de jefe de servicio se cubre temporalmente por comisión de servicios. ¿Cuánto puede durar?",opts:["Indefinidamente","Máximo 2 años, prorrogables excepcionalmente","Solo 3 meses","Solo 1 año sin prórroga"],c:1,f:"Comisión de servicios: máximo 2 AÑOS, prorrogable excepcionalmente. Durante ese período debe convocarse el puesto para provisión definitiva (concurso o libre designación)."},
  {b:"E. Caso — provisión",q:"Dos funcionarios del mismo grupo y nivel quieren intercambiar puestos. ¿Es posible?",opts:["Nunca: los puestos no son intercambiables","Sí, mediante permuta si cumplen requisitos y la Administración autoriza","Solo si ambos lo piden el mismo día","Solo entre departaments distintos"],c:1,f:"Permuta: posible si ambos cumplen requisitos de los respectivos puestos + autorización administrativa. No es automática — la Administración puede denegarla por razones de servicio."},
  {b:"E. Caso — provisión",q:"Una funcionaria víctima de violencia de género solicita traslado a otra localidad. La Administración debe:",opts:["Tramitar su solicitud como una más","Darle traslado preferente con reserva del puesto anterior","Solo conceder excedencia","Exigir sentencia firme antes de actuar"],c:1,f:"Movilidad por violencia de género: traslado PREFERENTE + reserva del puesto anterior. No requiere sentencia firme — basta acreditación de la situación. Es una medida de protección reforzada del TREBEP."},
  {b:"F. Caso — incompatibilidades",q:"Un funcionario del Departament d'Economia quiere ser asesor fiscal privado por las tardes. ¿Es compatible?",opts:["Sí, si los horarios no coinciden","No: actividad directamente relacionada con las funciones del puesto público, incompatibilidad absoluta","Sí, con autorización del Conseller","Solo si los clientes no son empresas públicas"],c:1,f:"Funcionario de Economía + asesoría fiscal privada = actividad DIRECTAMENTE RELACIONADA con funciones públicas. Incompatibilidad absoluta que no admite autorización. Conflicto de interés directo e insalvable."},
  {b:"F. Caso — incompatibilidades",q:"Una funcionaria del Departament de Cultura quiere dar clases de yoga por las tardes. ¿Necesita autorización?",opts:["No: el yoga no tiene nada que ver con su puesto","Sí: toda actividad privada remunerada requiere autorización expresa de compatibilidad","Solo si cobra más de 500€/mes","Solo si las clases son en horario laboral"],c:1,f:"TODA actividad privada remunerada requiere autorización expresa, aunque no tenga relación con el puesto. La no relación con las funciones facilita la autorización, pero no exime de pedirla. La regla es la incompatibilidad; la autorización es la excepción."},
  {b:"F. Caso — incompatibilidades",q:"Un funcionario publica un libro de poesía en su tiempo libre. ¿Necesita autorización?",opts:["Sí, toda publicación requiere autorización","No: las actividades literarias son generalmente compatibles sin autorización especial","Solo si el libro es sobre derecho administrativo","Solo si los ingresos superan el salario público"],c:1,f:"Actividades literarias, artísticas e intelectuales: generalmente compatibles SIN autorización especial. Excepción amplia del régimen. Solo se limitan si se usa información reservada del puesto o si comprometen la imparcialidad."},
  {b:"F. Caso — incompatibilidades",q:"Un funcionario del subgrupo C2 quiere trabajar como camarero los fines de semana. ¿Es compatible?",opts:["Sí automáticamente por ser C2","Necesita autorización expresa: la compatibilidad no depende del grupo sino de los requisitos generales","No: ningún funcionario puede tener segundo empleo","Solo si trabaja menos de 10 horas semanales"],c:1,f:"Autorización EXPRESA necesaria independientemente del grupo/subgrupo. La compatibilidad no depende del nivel del puesto sino de los requisitos generales: no afectar a la imparcialidad, no relación directa con funciones, no perjuicio al servicio."},
  {b:"G. Caso — integración de bloques",q:"Un funcionario interino lleva 8 años en el mismo puesto. Un compañero le dice que ya ha 'consolidado la plaza'. ¿Es correcto?",opts:["Sí: 8 años consolidan cualquier plaza","No: el interino no consolida la plaza por el mero paso del tiempo, por muchos años que lleve","Sí, si no se ha convocado la plaza en ese período","Solo si tiene evaluación positiva anual"],c:1,f:"Dato literal más importante del T8: el interino NO consolida por tiempo. 8 años, 15 años o 20 años — sin superar proceso selectivo no hay consolidación. Es la trampa que más personas fallan en examen."},
  {b:"G. Caso — integración de bloques",q:"Un personal eventual ejerce funciones de tramitación administrativa ordinaria (registro, notificaciones, expedientes). ¿Es correcto?",opts:["Sí: el eventual puede hacer cualquier función","No: el eventual solo puede realizar funciones de confianza o asesoramiento, no funciones estructurales ordinarias","Sí, si el Conseller lo autoriza","Solo temporalmente durante vacaciones del titular"],c:1,f:"El eventual NO puede ejercer funciones estructurales ordinarias. Sus funciones son exclusivamente de confianza o asesoramiento especial. Usar eventual para cubrir funciones de trámite es irregularidad administrativa."},
  {b:"G. Caso — integración de bloques",q:"Un funcionario de carrera del subgrupo C1 quiere promocionar al A2. ¿Qué necesita?",opts:["Solo antigüedad de 10 años","Cumplir requisitos de titulación (grado universitario) + superar proceso selectivo de promoción interna","Solo solicitud al Conseller","Solo curso de formación de 100 horas"],c:1,f:"Promoción interna C1 → A2: titulación de GRADO UNIVERSITARIO (requisito del grupo A) + superar proceso selectivo de promoción interna. No basta antigüedad ni formación — requiere título + pruebas."},
  {b:"G. Caso — integración de bloques",q:"Un funcionario en servicios especiales (es diputado) quiere participar en un concurso de provisión de puestos en la Generalitat. ¿Puede?",opts:["No: en servicios especiales no puede participar en nada","Sí: conserva todos los derechos como si estuviera en servicio activo, incluyendo la posibilidad de participar en concursos","Solo si renuncia a su cargo político","Solo con autorización del Parlament"],c:1,f:"Servicios especiales: el funcionario conserva TODOS los derechos como si estuviera en servicio activo. Puede participar en concursos de provisión — sus derechos de carrera no se suspenden por el cargo político."},
  {b:"H. Cuál es INCORRECTA — ronda final",q:"¿Cuál de estas afirmaciones sobre el acceso es INCORRECTA?",opts:["La oposición es el sistema más objetivo","El concurso-oposición combina pruebas y méritos","El concurso puro es el sistema ordinario de acceso","La publicidad y la igualdad son principios del acceso"],c:2,f:"INCORRECTA: el concurso puro NO es el sistema ordinario — es EXCEPCIONAL. El sistema ordinario es la oposición o el concurso-oposición. El concurso puro solo procede en supuestos específicos previstos por la ley."},
  {b:"H. Cuál es INCORRECTA — ronda final",q:"¿Cuál de estas afirmaciones sobre la provisión es INCORRECTA?",opts:["El concurso de méritos es el sistema ordinario de provisión","La libre designación es excepcional","La comisión de servicios consolida derecho definitivo al puesto","La permuta requiere autorización"],c:2,f:"INCORRECTA: la comisión de servicios NO consolida derecho definitivo al puesto. Es temporal (máximo 2 años) y no genera expectativa de permanencia. El puesto debe convocarse para provisión definitiva."},
  {b:"H. Cuál es INCORRECTA — ronda final",q:"¿Cuál de estas afirmaciones sobre las incompatibilidades es INCORRECTA?",opts:["La regla general es un puesto, una retribución","Las actividades literarias son generalmente compatibles","Un funcionario puede ejercer actividad privada relacionada con su puesto si pide autorización","La docencia universitaria puede ser compatible con autorización"],c:2,f:"INCORRECTA: actividad privada DIRECTAMENTE RELACIONADA con las funciones del puesto = incompatibilidad ABSOLUTA. No admite autorización. El conflicto de interés directo es la línea roja que no se puede cruzar."},
  {b:"H. Cuál es INCORRECTA — ronda final",q:"¿Cuál de estas afirmaciones sobre la pérdida de la condición de funcionario es INCORRECTA?",opts:["La renuncia aceptada es causa de pérdida","La jubilación es causa de pérdida","La suspensión provisional es causa de pérdida definitiva","La inhabilitación absoluta firme es causa de pérdida"],c:2,f:"INCORRECTA: la suspensión PROVISIONAL no es causa de pérdida definitiva — es medida cautelar temporal. Las causas de pérdida definitiva son: renuncia, pérdida de nacionalidad, jubilación, separación del servicio e inhabilitación firme."},
  {b:"H. Cuál es INCORRECTA — ronda final",q:"¿Cuál de estas afirmaciones sobre las excedencias es INCORRECTA?",opts:["La excedencia por violencia de género tiene reserva total de puesto","La excedencia voluntaria por interés particular no conserva plaza","La excedencia por cuidado de hijos dura hasta 3 años","Todas las excedencias computan antigüedad por igual"],c:3,f:"INCORRECTA: NO todas las excedencias computan antigüedad igual. La voluntaria por interés particular NO computa. La de cuidado de hijos y la de violencia de género SÍ computan. Niveles de protección distintos."},
  {b:"I. Caso — integración avanzada",q:"Una funcionaria interina solicita excedencia por cuidado de hijo. ¿Tiene derecho?",opts:["No: los interinos no tienen ningún derecho","Depende de la normativa aplicable, pero en general los interinos tienen derechos comparables a los de carrera en materia de conciliación","Sí, exactamente igual que un funcionario de carrera en todo caso","Solo si lleva más de 2 años"],c:1,f:"Los interinos tienen derechos COMPARABLES (no idénticos) en materia de conciliación familiar. La jurisprudencia y la normativa han ido equiparando derechos, pero pueden existir diferencias puntuales según el supuesto."},
  {b:"I. Caso — integración avanzada",q:"Un personal laboral fijo del Departament de Justícia quiere participar en un concurso de provisión de puestos reservados a funcionarios. ¿Puede?",opts:["Sí: laboral y funcionario son intercambiables","No: los concursos de provisión de puestos funcionariales están reservados a funcionarios, no a personal laboral","Solo si tiene antigüedad de 5 años","Solo con autorización del Conseller"],c:1,f:"Los concursos de provisión de puestos funcionariales son para FUNCIONARIOS. El personal laboral tiene sus propias vías de movilidad (reguladas por convenio colectivo y normativa laboral). No son intercambiables."},
  {b:"I. Caso — integración avanzada",q:"Un funcionario en excedencia voluntaria por interés particular solicita reincorporación. Hay vacante pero no está dotada presupuestariamente. ¿Se reincorpora?",opts:["Sí: la existencia de vacante basta","No: la vacante debe estar dotada presupuestariamente para que pueda reincorporarse","Sí, si lo solicita antes de 6 meses","Solo con autorización del Parlament"],c:1,f:"Reincorporación desde excedencia voluntaria por interés particular: vacante + DOTACIÓN PRESUPUESTARIA. Las dos condiciones juntas. Una vacante sin dotación no habilita la reincorporación."},
  {b:"I. Caso — integración avanzada",q:"Un funcionario en suspensión firme de 1 año termina el período. ¿Qué ocurre?",opts:["Se le da de baja definitiva","Se reincorpora al servicio activo en las condiciones que determine la resolución","Debe superar nueva oposición","Pasa automáticamente a excedencia voluntaria"],c:1,f:"Finalización de suspensión firme: reincorporación al servicio activo en las condiciones que determine la resolución. No es baja definitiva (eso sería separación) ni requiere nueva oposición."},
  {b:"J. Caso — provisión avanzada",q:"La RPT (Relación de Puestos de Trabajo) de un departament indica que un puesto es 'de libre designación'. ¿Qué implica para la provisión?",opts:["Se provee por concurso ordinario","Se provee por el sistema de libre designación con convocatoria pública","No se puede proveer hasta que cambie la RPT","Se provee por oposición libre"],c:1,f:"La RPT determina el sistema de provisión de cada puesto. Si indica 'libre designación', ese puesto se cubre por ese sistema con convocatoria pública. La RPT es el instrumento que clasifica los puestos y sus características."},
  {b:"J. Caso — provisión avanzada",q:"Un funcionario obtiene puesto por concurso de méritos. ¿Puede ser removido del puesto?",opts:["No: el concurso otorga inamovilidad absoluta","Sí, pero solo por causas tasadas: supresión del puesto, remoción motivada por falta de capacidad o por necesidades del servicio","Sí, libremente como en la libre designación","Solo por jubilación"],c:1,f:"Concurso de méritos: otorga estabilidad en el puesto pero NO inamovilidad absoluta. Causas de remoción: supresión del puesto + remoción motivada por falta de capacidad sobrevenida + necesidades del servicio debidamente acreditadas."},
  {b:"J. Caso — provisión avanzada",q:"La diferencia entre movilidad funcional y movilidad geográfica es:",opts:["Son lo mismo","Funcional = cambio de funciones dentro del mismo puesto o área. Geográfica = cambio de localidad","Funcional = cambio de localidad. Geográfica = cambio de funciones","No existen estos conceptos en la función pública"],c:1,f:"Movilidad FUNCIONAL = cambio de funciones (horizontal). Movilidad GEOGRÁFICA = cambio de localidad (territorial). Son dos dimensiones distintas de la movilidad: una afecta al contenido del trabajo, la otra al lugar."},
  {b:"K. Incompatibilidades — casos avanzados",q:"Un funcionario del Departament de Territori es propietario de una empresa constructora. ¿Es compatible?",opts:["Sí, si no trabaja en la empresa él mismo","No: la participación significativa en empresas relacionadas con las funciones del puesto es incompatible","Solo si la empresa factura menos de 100.000€","Solo si no contrata con la Generalitat"],c:1,f:"Participación en empresa relacionada con funciones del puesto = INCOMPATIBILIDAD. No basta con no trabajar personalmente — la propiedad genera conflicto de interés. Es una extensión del principio de imparcialidad."},
  {b:"K. Incompatibilidades — casos avanzados",q:"Un funcionario quiere ser concejal de su ayuntamiento sin dejar su puesto en la Generalitat. ¿Es posible?",opts:["Nunca: ser concejal es siempre incompatible","Puede ser compatible si el cargo de concejal no tiene dedicación exclusiva y se obtiene autorización","Solo en municipios de menos de 5.000 habitantes","Solo si renuncia al sueldo de concejal"],c:1,f:"Concejal sin dedicación exclusiva: puede ser compatible con el puesto público si se obtiene autorización y no hay conflicto de funciones. Es uno de los supuestos de posible compatibilidad con segundo puesto público."},
  {b:"K. Incompatibilidades — casos avanzados",q:"La Administración descubre que un funcionario ejerce actividad privada sin autorización. ¿Qué puede hacer?",opts:["Solo advertirle verbalmente","Requerirle para que cese o solicite autorización, e iniciar expediente disciplinario si procede","Nada: sin denuncia no puede actuar","Solo reducir su salario"],c:1,f:"La Administración puede: requerir cese o solicitud de autorización + iniciar expediente disciplinario. El incumplimiento de incompatibilidades es falta disciplinaria que puede llegar a ser muy grave según la gravedad y reiteración."},
  {b:"L. Preguntas de detalle final",q:"El grado personal del funcionario:",opts:["Se pierde al cambiar de puesto","Es un derecho consolidado que refleja la progresión en la carrera y no se pierde por cambio de puesto","Solo aplica a personal laboral","Se obtiene automáticamente al tomar posesión"],c:1,f:"Grado personal = derecho CONSOLIDADO. Refleja la progresión profesional del funcionario. No se pierde por cambio de puesto — se mantiene como garantía de nivel mínimo de retribuciones y funciones."},
  {b:"L. Preguntas de detalle final",q:"La carrera horizontal permite al funcionario:",opts:["Ascender de grupo sin proceso selectivo","Progresar en grado, categoría o retribuciones sin necesidad de cambiar de puesto de trabajo","Solo cambiar de localidad","Solo acceder a libre designación"],c:1,f:"Carrera horizontal = progresar sin cambiar de puesto. Se progresa en grado, categoría o retribuciones mediante evaluación del desempeño, formación y antigüedad. Es complementaria de la carrera vertical (ascenso con cambio de puesto)."},
  {b:"L. Preguntas de detalle final",q:"La evaluación del desempeño según el TREBEP:",opts:["No existe en la función pública española","Es un instrumento para medir y valorar la conducta profesional, rendimiento y logro de resultados","Solo aplica al personal directivo","Solo sirve para sancionar"],c:1,f:"Evaluación del desempeño: instrumento para medir conducta profesional + rendimiento + logro de resultados. No es solo para sancionar — también afecta a la carrera, retribuciones complementarias y formación. El TREBEP la establece como obligatoria."},
  {b:"M. Síntesis final del T8",q:"Si en una pregunta del T8 aparece 'temporalidad + necesidad administrativa', piensa en:",opts:["Personal eventual","Funcionario interino","Funcionario de carrera","Personal directivo"],c:1,f:"Temporalidad + necesidad administrativa = INTERINO. Temporalidad + confianza = eventual. Permanencia + oposición = carrera. Funciones directivas + evaluación = directivo. Cuatro combinaciones, cuatro figuras."},
  {b:"M. Síntesis final del T8",q:"Si en una pregunta del T8 aparece 'confianza + cese libre + asesoramiento', piensa en:",opts:["Funcionario de carrera","Funcionario interino","Personal eventual","Personal laboral fijo"],c:2,f:"Confianza + cese libre + asesoramiento = EVENTUAL. Es la combinación inconfundible del personal eventual. Si ves estos tres elementos juntos, la respuesta es siempre eventual."},
  {b:"M. Síntesis final del T8",q:"Si en una pregunta del T8 aparece 'baremo + antigüedad + grado + formación', piensa en:",opts:["Oposición libre","Concurso de méritos (provisión)","Libre designación","Comisión de servicios"],c:1,f:"Baremo + antigüedad + grado + formación = CONCURSO DE MÉRITOS (provisión). Es el sistema ordinario de provisión de puestos. No confundir con la oposición (acceso) que valora pruebas, no méritos."},
  {b:"M. Síntesis final del T8",q:"Si en una pregunta del T8 aparece 'puesto de especial responsabilidad + convocatoria pública + cese discrecional', piensa en:",opts:["Concurso de méritos","Oposición","Libre designación (provisión)","Comisión de servicios"],c:2,f:"Especial responsabilidad + convocatoria pública + cese discrecional = LIBRE DESIGNACIÓN. Es la combinación definitoria del sistema excepcional de provisión. Si ves los tres elementos, es libre designación."},
  {b:"N. Cierre absoluto del T8",q:"¿Cuántas causas de pérdida de la condición de funcionario hay?",opts:["3","4","5","7"],c:2,f:"CINCO causas: renuncia + pérdida de nacionalidad + jubilación + separación del servicio + inhabilitación absoluta o especial firme. Memoriza el número 5 y las cinco causas en orden."},
  {b:"N. Cierre absoluto del T8",q:"¿Cuántos sistemas de acceso existen?",opts:["1","2","3","5"],c:2,f:"TRES sistemas de acceso: oposición + concurso-oposición + concurso puro. Los tres con sus características: oposición (pruebas), concurso-oposición (pruebas + méritos), concurso (solo méritos, excepcional)."},
  {b:"N. Cierre absoluto del T8",q:"¿Cuántos sistemas ordinarios de provisión de puestos hay?",opts:["1","2","3","4"],c:1,f:"DOS sistemas de provisión: concurso de méritos (ordinario) + libre designación (excepcional). La comisión de servicios es provisional, no sistema de provisión definitiva. La permuta es residual."},
  {b:"N. Cierre absoluto del T8",q:"El T8 es el tema más denso de la oposición porque:",opts:["Tiene muchas leyes","Cruza conceptos de clases, acceso, situaciones, provisión e incompatibilidades, con trampas en todas las intersecciones","Solo tiene plazos difíciles","Es un tema solo de memorización"],c:1,f:"El T8 es denso porque CRUZA conceptos: clases con acceso, acceso con provisión, situaciones con excedencias, provisión con incompatibilidades. Las trampas están en las INTERSECCIONES entre bloques, no dentro de cada uno."}
];

let pool=[...Q],idx=0,nOk=0,nEr=0,fl=[],ans=false;
function render(){if(idx>=pool.length){showRes();return;}const q=pool[idx],tot=pool.length;document.getElementById('fill').style.width=Math.round(idx/tot*100)+'%';document.getElementById('pn').textContent=(idx+1)+' / '+tot;document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;document.getElementById('vpe').textContent=tot-idx;document.getElementById('pill').textContent=q.b;document.getElementById('qnl').textContent='Pregunta '+(idx+1);document.getElementById('qbl').textContent=q.b;document.getElementById('qt').textContent=q.q;const o=document.getElementById('opts');o.innerHTML='';['A','B','C','D'].forEach((l,i)=>{const b=document.createElement('button');b.className='opt';b.innerHTML='<span class="lt">'+l+'</span><span>'+q.opts[i]+'</span>';b.onclick=()=>sel(i,b);o.appendChild(b);});const f=document.getElementById('fb');f.className='';f.innerHTML='';document.getElementById('bn').style.display='none';ans=false;}
function sel(i,btn){if(ans)return;ans=true;const q=pool[idx];document.querySelectorAll('.opt').forEach(b=>b.classList.add('dis'));const f=document.getElementById('fb');if(i===q.c){btn.classList.add('ok');nOk++;f.className='show ok';f.innerHTML='<div class="fh">Correcto</div><div class="fd">'+q.f+'</div>';}else{btn.classList.add('er');document.querySelectorAll('.opt')[q.c].classList.add('ok');nEr++;fl.push({q:q.q,co:q.opts[q.c],tu:q.opts[i],f:q.f});f.className='show er';f.innerHTML='<div class="fh">Incorrecto — correcta: '+['A','B','C','D'][q.c]+'</div><div class="fd">'+q.f+'</div>';}document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;document.getElementById('bn').style.display='inline-block';}
function nxt(){idx++;render();}
function showRes(){['hdr','pw','stats','qc','opts','fb','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});const tot=pool.length,pct=Math.round(nOk/tot*100);document.getElementById('rp').textContent=pct+'%';document.getElementById('rt').textContent=pct>=80?'T8 dominado — tema cerrado':pct>=60?'Nivel sólido — repasa los fallos':'Refuerza casos prácticos e integración';document.getElementById('rs2').textContent=nOk+' correctas de '+tot+'.'+(fl.length>0?' '+fl.length+' para repasar.':' Sin errores.');if(!fl.length)document.getElementById('bfl').style.display='none';if(fl.length){document.getElementById('fs').style.display='block';document.getElementById('fst').textContent='Preguntas falladas ('+fl.length+')';const fll=document.getElementById('fl');fll.innerHTML='';fl.forEach(f=>{const d=document.createElement('div');d.className='fi';d.innerHTML='<div class="fq">'+f.q+'</div><div class="fb2"><span class="bg er">Tu respuesta: '+f.tu+'</span><span class="bg ok">Correcta: '+f.co+'</span></div><div class="fe">'+f.f+'</div>';fll.appendChild(d);});}document.getElementById('res').style.display='block';}
function rst(){pool=[...Q];idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
function sfl(){if(!fl.length)return;pool=fl.map(f=>Q.find(q=>q.q===f.q)).filter(Boolean);idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
render();
</script>
