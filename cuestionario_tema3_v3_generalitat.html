<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tema 3 · Test 3 · Oposición Generalitat</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f7f4;--surface:#fff;--surface2:#f1f0ed;--border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.2);--text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;--ok:#1a7a4a;--ok-bg:#eaf5ee;--ok-border:rgba(26,122,74,.25);--err:#c0392b;--err-bg:#fdf0ee;--err-border:rgba(192,57,43,.25);--accent:#1a1a18;--r:10px;--rs:6px}
@media(prefers-color-scheme:dark){:root{--bg:#18181a;--surface:#222224;--surface2:#2a2a2c;--border:rgba(255,255,255,.1);--border-strong:rgba(255,255,255,.2);--text:#f0efec;--text2:#a0a09a;--text3:#606060;--ok:#4caf7a;--ok-bg:rgba(76,175,122,.12);--ok-border:rgba(76,175,122,.3);--err:#e57373;--err-bg:rgba(229,115,115,.12);--err-border:rgba(229,115,115,.3);--accent:#f0efec}}
html{font-size:16px}body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem}
#app{width:100%;max-width:680px}
#hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:2rem}
#hdr h1{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px;letter-spacing:-.01em}#hdr p{font-size:13px;color:var(--text3)}
#pill{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid var(--border-strong);color:var(--text2);background:var(--surface2);white-space:nowrap;flex-shrink:0}
#pw{margin-bottom:1.25rem}#pr{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:7px}#pr span:last-child{font-weight:500;color:var(--text2)}
#track{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden}#fill{height:3px;background:var(--accent);border-radius:3px;transition:width .4s ease;width:0%}
#stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.st{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px}
.st .lb{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.st .vl{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-.02em}
#sc-ok .vl{color:var(--ok)}#sc-er .vl{color:var(--err)}
#qc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem}
#qm{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em}
#qm .d{width:3px;height:3px;border-radius:50%;background:var(--border-strong);display:inline-block}
#qt{font-size:16px;color:var(--text);line-height:1.65}
#opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.opt{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:13px 16px;font-size:14px;color:var(--text);cursor:pointer;text-align:left;line-height:1.55;transition:border-color .15s,background .15s,transform .1s;width:100%}
.opt:hover:not(.dis){border-color:var(--border-strong);background:var(--surface2);transform:translateY(-1px)}
.lt{min-width:24px;height:24px;border-radius:50%;border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0;margin-top:1px;transition:background .15s,color .15s,border-color .15s}
.opt.ok{border-color:var(--ok-border);background:var(--ok-bg)}.opt.ok .lt{background:var(--ok);border-color:var(--ok);color:#fff}
.opt.er{border-color:var(--err-border);background:var(--err-bg)}.opt.er .lt{background:var(--err);border-color:var(--err);color:#fff}
.opt.dis{cursor:default;pointer-events:none}
#fb{display:none;border-radius:var(--rs);padding:13px 16px;margin-bottom:1rem;border:1px solid;font-size:13px;line-height:1.65}
#fb.show{display:block}#fb.ok{background:var(--ok-bg);border-color:var(--ok-border)}#fb.er{background:var(--err-bg);border-color:var(--err-border)}
#fb .fh{font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
#fb.ok .fh{color:var(--ok)}#fb.er .fh{color:var(--err)}#fb .fd{color:var(--text2)}
#br{display:flex;justify-content:flex-end}
#bn{display:none;font-size:13px;font-weight:500;padding:10px 20px;border-radius:var(--rs);background:var(--accent);color:var(--bg);border:none;cursor:pointer;transition:opacity .15s}#bn:hover{opacity:.85}
#res{display:none;padding:1rem 0}
#rh{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:2rem}
#rp{font-size:64px;font-weight:700;color:var(--text);letter-spacing:-.04em;line-height:1;flex-shrink:0}
#ri h2{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}#ri p{font-size:13px;color:var(--text2);line-height:1.6}
#rbt{display:flex;gap:8px;margin-bottom:2rem;flex-wrap:wrap}
.bs{font-size:13px;font-weight:500;padding:10px 18px;border-radius:var(--rs);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);cursor:pointer;transition:background .15s}.bs:hover{background:var(--surface2)}
.bp{background:var(--accent);color:var(--bg);border-color:transparent}.bp:hover{opacity:.85;background:var(--accent)}
#fs{border-top:1px solid var(--border);padding-top:1.5rem}
#fs h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.04em}
.fi{padding:1rem 0;border-bottom:1px solid var(--border)}.fi:last-child{border-bottom:none}
.fq{font-size:14px;color:var(--text);margin-bottom:8px;line-height:1.5;font-weight:500}
.fb2{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.bg{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid}
.bg.er{background:var(--err-bg);border-color:var(--err-border);color:var(--err)}.bg.ok{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok)}
.fe{font-size:12px;color:var(--text3);line-height:1.6}
@media(max-width:500px){body{padding:1rem .75rem 3rem}#rh{flex-direction:column;gap:1rem;align-items:flex-start}#rp{font-size:48px}#hdr{flex-direction:column;gap:.75rem}}
</style>
</head>
<body>
<div id="app">
  <div id="hdr"><div><h1>Tema 3 · Test 3 · Oposición Generalitat</h1><p>60 preguntas · Simulacro final con casos prácticos</p></div><div id="pill"></div></div>
  <div id="pw"><div id="pr"><span>Progreso</span><span id="pn">1 / 60</span></div><div id="track"><div id="fill"></div></div></div>
  <div id="stats">
    <div class="st" id="sc-ok"><div class="lb">Correctas</div><div class="vl" id="vok">0</div></div>
    <div class="st" id="sc-er"><div class="lb">Errores</div><div class="vl" id="ver">0</div></div>
    <div class="st"><div class="lb">Pendientes</div><div class="vl" id="vpe">60</div></div>
  </div>
  <div id="qc"><div id="qm"><span id="qnl"></span><span class="d"></span><span id="qbl"></span></div><div id="qt"></div></div>
  <div id="opts"></div><div id="fb"></div>
  <div id="br"><button id="bn" onclick="nxt()">Siguiente →</button></div>
  <div id="res">
    <div id="rh"><div id="rp"></div><div id="ri"><h2 id="rt"></h2><p id="rs2"></p></div></div>
    <div id="rbt"><button class="bs bp" onclick="rst()">Repetir completo</button><button class="bs" id="bfl" onclick="sfl()">Solo falladas →</button></div>
    <div id="fs" style="display:none"><h3 id="fst"></h3><div id="fl"></div></div>
  </div>
</div>
<script>
const Q=[
  {b:"A. Casos — bon govern",q:"Un Conseller participa en una decisión sobre subvenciones a una empresa de la que es accionista. ¿Qué principio de bon govern incumple?",opts:["Solo el principio de eficacia","Abstención ante conflictos de interés y no usar el cargo para obtener ventajas","Solo el principio de transparencia","Solo el principio de igualdad y no discriminación"],c:1,f:"Caso textbook de conflicto de interés: el Conseller debe abstenerse. Incumplimiento doble: principio de abstención + principio de no usar el cargo para ventajas personales. Es uno de los supuestos más graves de mal gobierno."},
  {b:"A. Casos — bon govern",q:"Un alto cargo de la Generalitat acepta un reloj de lujo de un proveedor habitual. Esto:",opts:["Es válido si el reloj es una muestra de cortesía","Vulnera el principio de rechazo de regalos fuera de los usos sociales","Solo es problemático si el valor supera 200€","Es válido si lo declara después al órgano superior"],c:1,f:"Un reloj de lujo de un proveedor habitual NO entra en los 'usos sociales' (regalos protocolarios o de cortesía menor). Es vulneración directa del principio de rechazo de regalos. La declaración posterior no convalida la conducta."},
  {b:"A. Casos — bon govern",q:"Una funcionaria filtra a un periodista información reservada del expediente que tramita. ¿Qué deber incumple?",opts:["Solo el deber de eficacia","Secreto y confidencialidad respecto de los hechos conocidos por razón del cargo","Solo el deber de igualdad","Ningún deber concreto: la transparencia lo permite"],c:1,f:"Filtrar información reservada vulnera el deber de secreto y confidencialidad. La transparencia tiene cauces legales (publicidad activa, derecho de acceso, GAIP) — la filtración periodística no es uno de ellos."},
  {b:"A. Casos — bon govern",q:"Un Conseller publica voluntariamente sus bienes e intereses sin estar obligado por norma. Esto:",opts:["Es ilegal porque se anticipa a la norma","Es coherente con el principio de publicidad de bienes e intereses, aunque no sea estrictamente obligatorio","Solo procede si el Parlament lo autoriza","Es una conducta neutra sin valoración"],c:1,f:"La publicidad voluntaria de bienes e intereses por un Conseller refuerza el principio de transparencia y publicidad. Es una conducta proactiva alineada con el bon govern, no contraria a él."},
  {b:"B. Casos — transparencia",q:"Un ayuntamiento publica el listado de contratos celebrados durante el año. Esto es:",opts:["Derecho de acceso a la información pública","Publicidad activa (información económica, presupuestaria y patrimonial)","Una obligación solo de la Generalitat","Voluntario y no exigible"],c:1,f:"Listado de contratos = publicidad ACTIVA dentro del bloque de información económica, presupuestaria y patrimonial. Debe publicarse de oficio, sin necesidad de solicitud, en el portal de transparencia del ayuntamiento."},
  {b:"B. Casos — transparencia",q:"Un ciudadano solicita al Departament de Salut las actas de una reunión interna sobre licitación de un contrato. La Administración:",opts:["Debe denegar siempre por ser información interna","Debe valorar si aplica algún límite legal (proceso de toma de decisiones, intereses económicos), motivar la denegación si procede o entregar la información","Debe entregar siempre toda la información","Debe consultar al solicitante para que justifique el interés"],c:1,f:"Solicitud de información: la Administración debe valorar si aplica algún límite legal tasado (proceso interno de decisión, intereses comerciales, etc.). No puede denegar sin más ni exigir motivación al solicitante. Si deniega, debe motivarlo expresamente."},
  {b:"B. Casos — transparencia",q:"Una universidad pública catalana se considera obligada por la Llei 19/2014 de transparencia. Esto es:",opts:["Incorrecto: las universidades son privadas","Correcto: las universidades están entre las 'otras entidades públicas' obligadas","Solo correcto si reciben más del 50% de financiación pública","Solo correcto para las universidades de Barcelona"],c:1,f:"Las universidades públicas son entidades del sector público con funciones públicas y están entre los sujetos obligados de la Llei 19/2014 (otras entidades públicas, junto a corporaciones de derecho público). Es la regla general."},
  {b:"B. Casos — transparencia",q:"Un partido político recibe subvenciones públicas. ¿Está obligado por las normas de transparencia?",opts:["No: los partidos son entidades privadas","Sí: como sujeto privado que gestiona recursos públicos, queda obligado en lo relativo a esos recursos","Solo si tiene representación parlamentaria","Solo el partido más votado"],c:1,f:"Sujetos privados que gestionan recursos públicos quedan afectados por las obligaciones de transparencia respecto a esos recursos. Los partidos políticos con financiación pública entran en esa categoría — no pueden escudarse en su carácter privado."},
  {b:"C. Casos — derecho de acceso",q:"Un periodista solicita información sobre una sanción disciplinaria a un funcionario concreto. La Administración:",opts:["Debe entregar toda la información sin filtros","Debe entregar la información necesaria para el control público pero protegiendo los datos personales del funcionario","Debe denegar siempre por afectar a datos personales","Solo debe entregar información si lo pide el sancionado"],c:1,f:"Caso de tensión entre derecho de acceso y protección de datos personales. La regla: entregar la información de relevancia pública (existencia de sanción, motivo general) anonimizando o protegiendo los datos personales del funcionario. La protección de datos no es excusa para denegar todo."},
  {b:"C. Casos — derecho de acceso",q:"Un ciudadano pide la lista de subvenciones concedidas por la Generalitat a una asociación cultural. La Administración:",opts:["Debe denegar por ser información financiera de la asociación","Debe entregar la información: las subvenciones públicas son información obligada por publicidad activa y derecho de acceso","Solo si el ciudadano demuestra interés legítimo","Solo si la asociación da su consentimiento"],c:1,f:"Subvenciones públicas = información de obligada publicidad. No requieren motivación ni consentimiento de la entidad subvencionada. La transparencia financiera del gasto público es uno de los pilares del T3."},
  {b:"C. Casos — derecho de acceso",q:"La Generalitat tarda 2 meses en contestar una solicitud de acceso a la información pública. ¿Qué efecto tiene?",opts:["Caducidad automática del derecho","Silencio positivo: la solicitud se entiende estimada salvo que la información esté afectada por límites legales","Silencio negativo automático","El ciudadano debe presentar nueva solicitud"],c:1,f:"En la Llei 19/2014 catalana el silencio del derecho de acceso es POSITIVO. Si la Administración no resuelve en plazo, se entiende estimada la solicitud (con la excepción de los casos en que la información esté afectada por límites tasados). Es una garantía reforzada del derecho de acceso."},
  {b:"C. Casos — derecho de acceso",q:"La Administración deniega un derecho de acceso. El ciudadano puede:",opts:["Solo acudir a los tribunales","Reclamar ante la GAIP, que es un órgano específico de garantía","Recurrir solo ante el Conseller competente","No tiene mecanismo de recurso específico"],c:1,f:"GAIP = Comissió de Garantia del Dret d'Accés a la Informació Pública. Órgano específico que resuelve reclamaciones del derecho de acceso en Cataluña. Es una vía especializada antes de acudir al contencioso, sin necesidad de pasar por recurso de alzada."},
  {b:"D. Casos — drets davant l'Administració",q:"Un ciudadano pide hablar con el responsable de su expediente. La Administración:",opts:["Puede negarse alegando confidencialidad","Debe facilitar la identidad del personal responsable como derecho del ciudadano","Solo si lo solicita por escrito","Solo en el trámite de audiencia"],c:1,f:"Derecho a conocer al personal responsable: derecho activo del ciudadano. La Administración debe facilitar esa identidad — no puede escudarse en la confidencialidad del personal funcionario salvo casos excepcionales (protección de personas)."},
  {b:"D. Casos — drets davant l'Administració",q:"La Administración pide al ciudadano un certificado de empadronamiento que ya consta en el sistema interadministrativo. ¿Es correcto?",opts:["Sí: cada Administración debe pedir su propia documentación","No: el ciudadano tiene derecho a no aportar documentos que ya estén en poder de cualquier Administración","Solo si el ciudadano lo pidió por sí mismo en otra Administración","Solo si han pasado más de 5 años desde que se aportó"],c:1,f:"Derecho a no repetir aportaciones: aplica a documentos que ya estén en poder de cualquier Administración Pública (no solo la receptora). La interconexión administrativa debe funcionar — el ciudadano no debe repetir."},
  {b:"D. Casos — drets davant l'Administració",q:"Un ciudadano presenta una queja sobre la lentitud de un servicio. La Administración:",opts:["Puede archivarla sin más","Debe analizarla, valorar las disfunciones señaladas y dar respuesta motivada","Solo debe contestar si la queja es individualizada","Solo si la queja es presentada por más de 10 ciudadanos"],c:1,f:"Quejas y sugerencias = derecho del ciudadano + obligación de la Administración de analizar y responder motivadamente. No es trámite de archivo automático — conecta con el bon govern y la mejora del servicio."},
  {b:"D. Casos — drets davant l'Administració",q:"Una persona con discapacidad visual no puede usar la sede electrónica por problemas de accesibilidad. La Administración:",opts:["Puede ofrecer solo el canal presencial sin más","Debe garantizar la accesibilidad universal de los servicios electrónicos: el problema es responsabilidad de la Administración","Solo debe ayudarle si lo solicita un familiar","No tiene obligación específica de accesibilidad"],c:1,f:"Accesibilidad universal = obligación legal de la Administración. Si la sede electrónica no es accesible, el problema es de la Administración (no del ciudadano). Debe corregirlo y, mientras, ofrecer alternativas funcionales."},
  {b:"E. Casos — drets lingüístics",q:"Un ciudadano se dirige a la Generalitat en castellano y la Administración le responde en catalán. ¿Es correcto?",opts:["Sí: el catalán es la lengua propia y de uso preferente","No: el ciudadano tiene derecho a recibir la respuesta en la lengua oficial que él eligió","Solo si la Administración indica que también lo hará en castellano","Solo si el funcionario que responde no domina el castellano"],c:1,f:"Derecho de elección de lengua: la Administración debe responder en la lengua que el ciudadano usó o en la que prefiera. Aunque el catalán sea lengua propia y preferente para la Administración, no puede imponerla al ciudadano que eligió castellano."},
  {b:"E. Casos — drets lingüístics",q:"Un formulario solo está disponible en catalán. Un ciudadano pide la versión en castellano. La Administración:",opts:["Puede negarse: la lengua propia es el catalán","Debe facilitar la versión en castellano: las dos lenguas oficiales tienen el mismo valor para el ciudadano","Solo lo facilitará si el ciudadano demuestra que no entiende catalán","Solo en formularios sancionadores"],c:1,f:"Igualdad lingüística para el ciudadano: catalán y castellano son igualmente oficiales. Los formularios deben estar disponibles en ambas lenguas. La preferencia del catalán afecta al uso interno de la Administración, no al derecho del ciudadano."},
  {b:"E. Casos — drets lingüístics",q:"Un escrito presentado en aranés en una oficina de Barcelona. La Administración debe:",opts:["Devolver el escrito por estar en lengua no oficial","Tramitarlo: el aranés es lengua oficial en toda Cataluña según el EAC","Solo tramitarlo si se acompaña de traducción al catalán","Solo si la oficina está en el Valle de Arán"],c:1,f:"El aranés es lengua oficial en toda Cataluña según el EAC. Por tanto, un escrito en aranés debe ser tramitado por cualquier oficina catalana, no solo en el Valle de Arán. Es un derecho lingüístico ampliado por la reforma estatutaria."},
  {b:"F. Síntesis y trampas finales",q:"¿Cuál es la diferencia entre la Llei 19/2014 y la Llei 26/2010?",opts:["Son dos versiones de la misma ley","Llei 19/2014 = transparencia + acceso + bon govern. Llei 26/2010 = régimen jurídico + procedimiento + derechos del ciudadano ante la Administración catalana","Llei 19/2014 es estatal, Llei 26/2010 es catalana","Llei 26/2010 deroga a la Llei 19/2014"],c:1,f:"Distinción material: 19/2014 cubre transparencia y bon govern. 26/2010 cubre régimen jurídico, procedimiento y derechos ciudadanos. Las dos son catalanas pero cubren materias distintas — son complementarias, no equivalentes."},
  {b:"F. Síntesis y trampas finales",q:"¿Cuál de estas afirmaciones sobre la GAIP es CORRECTA?",opts:["Es un órgano del Govern dependiente de un Conseller","Es un órgano específico de garantía del derecho de acceso a la información pública en Cataluña, con independencia funcional","Es equivalente al Tribunal Constitucional en Cataluña","Es solo un órgano consultivo sin poder de decisión"],c:1,f:"GAIP: órgano específico con independencia funcional para garantizar el derecho de acceso. Sus resoluciones son vinculantes en su ámbito. No es órgano del Govern ni equivalente al TC, pero tampoco es solo consultivo."},
  {b:"F. Síntesis y trampas finales",q:"¿Cuál de estas combinaciones es CORRECTA?",opts:["GAIP — política lingüística","Síndic de Greuges — derecho de acceso a la información pública","GAIP — derecho de acceso a la información pública","Sindicatura de Comptes — defensa del ciudadano frente a la Administración"],c:2,f:"Combinación correcta: GAIP = derecho de acceso. Las otras instituciones son distintas: Síndic de Greuges = defensor del pueblo catalán (derechos en general). Sindicatura de Comptes = control económico. Cada órgano tiene su función específica."},
  {b:"F. Síntesis y trampas finales",q:"La transparencia y el bon govern se relacionan porque:",opts:["Son sinónimos","La transparencia es uno de los pilares del bon govern, junto con la ética, la buena gestión y la rendición de cuentas","El bon govern es una parte de la transparencia","No tienen relación funcional directa"],c:1,f:"Relación T3: la transparencia es una de las cuatro patas del bon govern. Pero el T3 las trata como bloques separados por su entidad propia y por la Llei 19/2014 que las regula juntas con identidad distinta cada una."},
  {b:"G. Detalle bon govern — concepto",q:"El bon govern como concepto:",opts:["Es solo una declaración programática sin efectos jurídicos","Tiene contenido normativo concreto: principios, obligaciones y reglas exigibles","Solo aplica a cargos electos","Solo aplica si hay denuncia previa"],c:1,f:"El bon govern tiene contenido normativo concreto y exigible: principios + obligaciones + reglas. No es solo una declaración programática — tiene consecuencias jurídicas reales (responsabilidad, sanciones, conflictos de interés)."},
  {b:"G. Detalle bon govern — concepto",q:"El bon govern persigue como efectos:",opts:["Solo mejorar la imagen pública de la Generalitat","Más control ciudadano, mejor fiscalización, más eficiencia y confianza pública","Solo evitar denuncias por corrupción","Solo cumplir con la normativa europea"],c:1,f:"Efectos del bon govern: control ciudadano + fiscalización + eficiencia + confianza pública. Cuatro efectos concretos vinculados a su finalidad. No es estética institucional — es política pública con resultados medibles."},
  {b:"G. Detalle bon govern — concepto",q:"La rendición de cuentas (retiment de comptes) implica:",opts:["Solo presentar la memoria anual","Asumir responsabilidad por la gestión y explicar las decisiones tomadas a la ciudadanía y a los órganos de control","Solo respetar las auditorías financieras","Solo el control judicial de los actos administrativos"],c:1,f:"Rendición de cuentas = asumir responsabilidad + explicar decisiones a ciudadanía y órganos de control. No es solo presentar documentos — incluye la dimensión política y comunicativa de la gestión pública."},
  {b:"G. Detalle bon govern — concepto",q:"Si una pregunta del examen menciona 'corrupción, conflictos de interés o uso del cargo':",opts:["Es del bloque de transparencia","Es del bloque de bon govern","Es del bloque de derechos lingüísticos","No pertenece al T3"],c:1,f:"Regla del resumen: cuando aparezcan corrupción, conflictos de interés o uso del cargo, la pregunta es de bon govern. Son los temas centrales del bloque ético del T3."},
  {b:"H. Detalle transparencia — atributos",q:"La información pública debe ser difundida de forma:",opts:["Solo veraz","Solo accesible","Veraz, objetiva, clara, accesible y actualizada","Solo objetiva y clara"],c:2,f:"Cinco atributos de la transparencia: veraz + objetiva + clara + accesible + actualizada. Memorízalos todos — el examen suele eliminar uno o cambiar 'actualizada' por 'completa' como trampa."},
  {b:"H. Detalle transparencia — atributos",q:"La 'reutilización' de la información pública implica que:",opts:["Solo la Administración puede usarla varias veces","La información debe poder ser usada por terceros (ciudadanos, empresas, investigadores) en formatos comprensibles","Solo se puede reutilizar previo pago de tasas","Solo aplica a información estadística"],c:1,f:"Reutilización = los datos públicos deben poder ser usados por terceros (concepto de open data). Es un derecho moderno vinculado a la digitalización y la transparencia 2.0. Conecta con la economía del dato."},
  {b:"H. Detalle transparencia — atributos",q:"¿Qué exigencia añade el T3 a la información publicada en los portales?",opts:["Solo formato PDF","Formatos comprensibles que permitan la reutilización","Solo formato Excel","Solo formato impreso para garantizar autenticidad"],c:1,f:"Formatos comprensibles = la información no solo debe estar publicada, sino en formatos que permitan su análisis y reutilización (datos abiertos). El PDF puro a veces no cumple esta exigencia si bloquea el contenido."},
  {b:"I. Casos — supuestos prácticos",q:"Un Conseller hace un viaje oficial al extranjero. ¿Qué información debe publicarse?",opts:["Nada: los viajes son de naturaleza institucional reservada","La información sobre el viaje, costes, agenda y resultados, dentro del bloque de transparencia","Solo si el viaje supera los 10.000€","Solo si se solicita por el Parlament"],c:1,f:"Viajes oficiales = información sujeta a publicidad activa (bloque de gestión administrativa y servicios + bloque económico). Coste, agenda y resultados deben publicarse de oficio. Es información obligatoria para garantizar el control ciudadano."},
  {b:"I. Casos — supuestos prácticos",q:"Una empresa pública adjudica un contrato de 200.000€. ¿Qué información debe publicarse?",opts:["Solo el nombre del adjudicatario","El contrato, importe, adjudicatario, procedimiento de adjudicación y otros datos relevantes según la normativa","Nada: las empresas públicas no están sujetas a publicidad","Solo si el contrato es de obra pública"],c:1,f:"Contratos públicos = información obligatoria de publicidad activa con datos completos: contrato + importe + adjudicatario + procedimiento + modificaciones. Las empresas públicas están sujetas como sector público vinculado o dependiente."},
  {b:"I. Casos — supuestos prácticos",q:"Un ciudadano solicita información sobre un procedimiento sancionador en curso contra un alto cargo. La Administración:",opts:["Debe entregar siempre toda la información","Puede aplicar el límite de procedimiento en curso si la entrega afecta a su tramitación, pero debe motivarlo","No puede entregar información hasta que finalice el procedimiento","Solo si lo autoriza el alto cargo afectado"],c:1,f:"Procedimientos en curso: pueden ser un límite legal al derecho de acceso si la entrega afecta a su tramitación. La aplicación del límite debe ser motivada caso por caso — no es automática ni indefinida."},
  {b:"I. Casos — supuestos prácticos",q:"Un ciudadano solicita un informe técnico que incluye datos sobre proveedores. La Administración:",opts:["Debe denegar por afectar a datos comerciales","Debe valorar el equilibrio entre derecho de acceso e intereses comerciales legítimos, motivando la decisión","Debe entregar siempre todo","Solo si los proveedores dan su consentimiento"],c:1,f:"Tensión entre derecho de acceso y secretos comerciales: la Administración debe ponderar caso por caso. Puede aplicar el límite de intereses económicos legítimos pero motivándolo. La protección de datos comerciales no es absoluta."},
  {b:"J. Detalle drets davant l'Administració",q:"El derecho a una resolución motivada significa que:",opts:["Solo las resoluciones desfavorables deben motivarse","La Administración debe justificar las decisiones que afecten a derechos del ciudadano","Solo en procedimientos sancionadores","Solo si lo solicita el interesado expresamente"],c:1,f:"Motivación = obligación de justificar las decisiones que afectan a derechos. No solo desfavorables — también las que se separan del precedente, las restrictivas, las complejas. Conecta con el T5 (motivación de actos administrativos)."},
  {b:"J. Detalle drets davant l'Administració",q:"El derecho de petición ante la Administración permite:",opts:["Solo a los ciudadanos españoles dirigirse a la Administración","A cualquier persona dirigirse por escrito a los poderes públicos sobre cualquier asunto de interés general o particular","Solo en procedimientos abiertos","Solo a través del registro electrónico"],c:1,f:"Derecho de petición (art. 29 CE): cualquier persona puede dirigirse por escrito a los poderes públicos. Es un derecho universal con base constitucional. La Administración debe acusar recibo y, si procede, dar respuesta."},
  {b:"J. Detalle drets davant l'Administració",q:"El derecho a no aportar documentos puede limitarse cuando:",opts:["La Administración tiene capricho de pedirlos","El ciudadano se opone expresamente a la consulta interadministrativa","Siempre se puede limitar","Solo en procedimientos sancionadores"],c:1,f:"Límite al derecho a no repetir: si el ciudadano se opone expresamente a la consulta interadministrativa, debe aportar él los documentos. Es una excepción que respeta su autonomía decisoria."},
  {b:"K. Detalle mitjans electrònics",q:"La sede electrónica de la Generalitat tiene como característica:",opts:["Funciona solo en horario de oficina","Es un punto único de acceso digital con plenos efectos jurídicos","Solo para personas jurídicas","Solo para procedimientos sancionadores"],c:1,f:"Sede electrónica = punto único + acceso digital + plenos efectos jurídicos. Funciona 24/7 y los actos realizados en ella tienen el mismo valor que los presenciales. Conecta con el T10 (administración digital)."},
  {b:"K. Detalle mitjans electrònics",q:"La identificación electrónica del ciudadano para tramitar puede hacerse mediante:",opts:["Solo certificado digital","DNI electrónico, Cl@ve, certificado digital y otros sistemas admitidos por la Administración","Solo huella dactilar","Solo presencial en oficinas físicas"],c:1,f:"Sistemas de identificación electrónica admitidos: DNI electrónico + Cl@ve + certificados digitales + otros sistemas reconocidos. La diversidad busca facilitar el acceso. La huella dactilar no es un sistema general — es específico de algunos ámbitos."},
  {b:"K. Detalle mitjans electrònics",q:"Las notificaciones electrónicas:",opts:["Solo pueden hacerse a personas jurídicas","Pueden hacerse a personas físicas y jurídicas, siendo obligatorias para algunos sujetos","Son siempre voluntarias","Requieren consentimiento expreso para cada notificación"],c:1,f:"Notificaciones electrónicas: voluntarias para personas físicas en general, OBLIGATORIAS para personas jurídicas y otros sujetos (entidades sin personalidad, profesionales colegiados, representantes de obligados). Conecta con el T5."},
  {b:"L. Detalle drets lingüístics — uso interno",q:"El catalán como lengua de uso normal y preferente de la Administración catalana significa:",opts:["Que solo se puede usar el catalán","Que la Administración usa el catalán como lengua de trabajo interna y en comunicaciones por defecto, sin perjuicio de los derechos del ciudadano","Que el castellano está prohibido en la Administración","Que solo aplica en el Govern, no en los departaments"],c:1,f:"Catalán = lengua de uso normal y preferente PARA LA ADMINISTRACIÓN. Es lengua de trabajo interna y comunicación por defecto. NO afecta al derecho del ciudadano de elegir lengua — son dos planos distintos: uso interno vs derecho del ciudadano."},
  {b:"L. Detalle drets lingüístics — uso interno",q:"Los documentos públicos emitidos por la Generalitat:",opts:["Solo en catalán","En catalán, con derecho del ciudadano a obtener traducción al castellano si lo solicita","Solo en castellano","Solo en aranés en el Valle de Arán"],c:1,f:"Documentos públicos: redactados en catalán como regla general, con derecho del ciudadano a obtener traducción al castellano. La preferencia interna del catalán convive con el derecho ciudadano a la versión en castellano."},
  {b:"L. Detalle drets lingüístics — uso interno",q:"En las relaciones entre administraciones públicas catalanas:",opts:["Solo se usa el catalán","Solo se usa el castellano","Se usa principalmente el catalán como lengua propia común","Cada administración elige su lengua preferente"],c:2,f:"Relaciones interadministrativas catalanas: catalán como lengua común. Es coherente con su carácter de lengua propia. En relaciones con administraciones de otras comunidades o del Estado, se aplican las reglas del Estado (castellano)."},
  {b:"M. Trampas mixtas T3",q:"¿Cuál de estas afirmaciones del T3 es FALSA?",opts:["La Llei 19/2014 regula transparencia y bon govern en Cataluña","La Llei 1/1998 regula la política lingüística","La Llei 26/2010 deroga a la Llei 39/2015","La Llei 19/2013 es la ley estatal de transparencia"],c:2,f:"La afirmación falsa es la C. La Llei 26/2010 NO deroga a la Llei 39/2015 — la complementa. La Llei 39/2015 es la ley estatal de procedimiento (aplicable a todas las AAPP) y la Llei 26/2010 añade especialidades catalanas dentro de ese marco."},
  {b:"M. Trampas mixtas T3",q:"¿Cuál de estos órganos NO está mencionado expresamente en el T3?",opts:["GAIP","Síndic de Greuges","Sindicatura de Comptes","Tribunal Constitucional"],c:3,f:"El TC no es un órgano del T3 — pertenece al T1 (CE). El T3 se centra en órganos administrativos y de control específicos: GAIP, Síndic de Greuges, Sindicatura de Comptes. El TC es un órgano de control constitucional, ámbito distinto."},
  {b:"M. Trampas mixtas T3",q:"Si una pregunta menciona 'silencio positivo en derecho de acceso', debes pensar en:",opts:["Llei 39/2015 (procedimiento estatal)","Llei 19/2014 (transparencia catalana)","Llei 1/1998 (política lingüística)","Llei 19/2013 (transparencia estatal)"],c:1,f:"Silencio positivo en derecho de acceso = especialidad de la Llei 19/2014 catalana. La Llei 19/2013 estatal tiene un régimen menos favorable. La Llei 39/2015 regula el procedimiento general, no el derecho de acceso específicamente."},
  {b:"M. Trampas mixtas T3",q:"¿Cuál de estas combinaciones de bloques del T3 es coherente?",opts:["Bon govern + lengua propia del Arán","Transparencia + publicidad activa + derecho de acceso","Política lingüística + GAIP","Mitjans electrònics + Síndic de Greuges"],c:1,f:"Combinación coherente: transparencia engloba publicidad activa + derecho de acceso. Las otras combinaciones mezclan bloques distintos del T3 sin coherencia funcional."},
  {b:"N. Detalle final — repaso",q:"¿Qué órgano cataloga la Llei 19/2014 como obligado por publicidad activa?",opts:["Solo el Govern","La Generalitat, los entes locales y el sector público vinculado o dependiente","Solo el Parlament","Solo el Síndic de Greuges"],c:1,f:"Sujetos obligados base de la Llei 19/2014: Generalitat (Govern + departaments + organismos autónomos) + entes locales (ayuntamientos, diputaciones, consejos comarcales) + sector público vinculado o dependiente (empresas y entidades). Es la lista completa del bloque base."},
  {b:"N. Detalle final — repaso",q:"La condición de información pública según la Llei 19/2014 alcanza a:",opts:["Solo a documentos firmados electrónicamente","Cualquier información elaborada o adquirida por los sujetos obligados en el ejercicio de sus funciones","Solo a información publicada en el BOE","Solo a expedientes administrativos cerrados"],c:1,f:"Información pública (concepto amplio): todo lo elaborado o adquirido por los sujetos obligados en el ejercicio de sus funciones. No solo documentos firmados ni solo expedientes cerrados — incluye correos, informes internos, datos, etc., con los límites legales correspondientes."},
  {b:"N. Detalle final — repaso",q:"Si la información solicitada está afectada por algún límite legal, la Administración:",opts:["Debe denegar siempre el acceso","Debe valorar si procede acceso parcial (anonimizando o eliminando partes afectadas) y, si lo niega, motivarlo","No tiene que motivar la denegación","Solo puede denegar tras sentencia judicial"],c:1,f:"Acceso parcial: cuando un límite afecta solo a parte de la información, la Administración debe dar acceso a la parte no afectada (anonimizando o eliminando lo limitado). La denegación total solo procede cuando el límite afecta al núcleo de la información solicitada."},
  {b:"O. Detalle final — bon govern",q:"El bon govern y el régimen disciplinario:",opts:["Son lo mismo","Son distintos pero conectados: el bon govern establece principios y obligaciones; el régimen disciplinario sanciona los incumplimientos","El régimen disciplinario deroga al bon govern","No tienen relación"],c:1,f:"Conexión bon govern — régimen disciplinario: el bon govern establece estándares de conducta; el régimen disciplinario (T15) sanciona los incumplimientos. Son figuras complementarias — una preventiva, otra reactiva. Conecta T3 con T15."},
  {b:"O. Detalle final — bon govern",q:"El catálogo de obligaciones de los altos cargos en bon govern incluye:",opts:["Solo declaración de bienes","Respeto al ordenamiento, abstención por conflictos, rechazo de regalos, secreto, publicidad de bienes e intereses, e incompatibilidades","Solo asistencia a sesiones del Parlament","Solo control patrimonial al cese"],c:1,f:"Catálogo completo de obligaciones de altos cargos: respeto al ordenamiento + abstención + rechazo de regalos + secreto + publicidad de bienes/intereses + incompatibilidades. Seis obligaciones sustantivas que forman su estatuto público específico."},
  {b:"P. Repaso final integrado",q:"¿Cuál es el punto de conexión más fuerte entre el T3 y el T4?",opts:["No tienen conexión","La protección de datos personales (T4) es uno de los límites al derecho de acceso a la información pública (T3)","El T3 deroga al T4","El T4 sustituye al T3 en datos sensibles"],c:1,f:"Conexión T3-T4: la protección de datos personales (T4 = RGPD + LOPDGDD) es uno de los límites tasados al derecho de acceso del T3. Cuando una solicitud de acceso afecta a datos personales, la Administración debe ponderar ambos derechos."},
  {b:"P. Repaso final integrado",q:"¿Cuál es la relación entre el T3 y el T9 (atención ciudadana)?",opts:["Son temas idénticos","El T3 regula los derechos del ciudadano y el T9 los servicios concretos de atención que materializan esos derechos","El T9 deroga al T3","No tienen relación funcional"],c:1,f:"Conexión T3-T9: el T3 establece los derechos sustantivos del ciudadano; el T9 desarrolla los canales y servicios concretos de atención que materializan esos derechos (presencial, telefónico, electrónico). Son complementarios."},
  {b:"P. Repaso final integrado",q:"Si tuvieras que resumir la relación entre los bloques del T3, dirías:",opts:["Son cuatro bloques independientes sin conexión","Los cuatro bloques (bon govern, transparencia, drets davant l'Administració, drets lingüístics) responden a aspectos distintos de la misma cuestión: cómo debe actuar el poder público y qué puede pedir el ciudadano","Solo hay un bloque real, los demás son secundarios","Los bloques no tienen una lógica común"],c:1,f:"Lógica integradora del T3: cuatro bloques que responden a la misma cuestión global (relación poder público — ciudadano) desde ángulos distintos. Bon govern (cómo) + transparencia (qué se publica) + drets (qué se pide) + lengua (en qué). Visión holística del tema."},
  {b:"Q. Tres preguntas finales de cierre",q:"¿Cuál es la idea más importante para retener del T3?",opts:["Las cinco leyes y su materia: 19/2014 catalana (transp+bon govern), 19/2013 estatal (transp), 26/2010 catalana (procedimiento), 39/2015 estatal (procedimiento), 1/1998 (lengua)","Solo las leyes catalanas son relevantes","Solo el bon govern es importante","Solo los drets lingüístics caen en examen"],c:0,f:"La idea principal del T3 son las cinco leyes asociadas a su materia. Si dominas eso, identificas inmediatamente el bloque al que pertenece cada pregunta y orientas la respuesta."},
  {b:"Q. Tres preguntas finales de cierre",q:"¿Cuál es la trampa más explotada del T3?",opts:["Confundir 19/2014 con 19/2013","Confundir publicidad activa con derecho de acceso","Confundir bon govern con cortesía","Las tres son trampas frecuentes"],c:3,f:"Las tres trampas son frecuentes y conviven en exámenes: 19/2014 vs 19/2013 (numérica) + publicidad activa vs acceso (conceptual) + bon govern vs cortesía (definicional). Memorizar las tres distinciones es la mejor defensa."},
  {b:"Q. Tres preguntas finales de cierre",q:"¿Cuál es el orden recomendado para estudiar el T3 según el resumen?",opts:["Plazos primero, luego leyes","Listas largas primero, luego conceptos","Leyes primero, luego bloques materiales, después listas, y al final plazos, límites y excepciones","Casos prácticos primero, luego teoría"],c:2,f:"Orden TDAH del T3: leyes (mapa) → bloques (concepto) → listas (principios) → plazos/límites/excepciones (detalle). De general a específico, de simple a complejo. Es la estrategia óptima para retener un tema con 5 leyes y 4 bloques."}
];

let pool=[...Q],idx=0,nOk=0,nEr=0,fl=[],ans=false;
function render(){
  if(idx>=pool.length){showRes();return;}
  const q=pool[idx],tot=pool.length;
  document.getElementById('fill').style.width=Math.round(idx/tot*100)+'%';
  document.getElementById('pn').textContent=(idx+1)+' / '+tot;
  document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;
  document.getElementById('vpe').textContent=tot-idx;
  document.getElementById('pill').textContent=q.b;
  document.getElementById('qnl').textContent='Pregunta '+(idx+1);
  document.getElementById('qbl').textContent=q.b;
  document.getElementById('qt').textContent=q.q;
  const o=document.getElementById('opts');o.innerHTML='';
  ['A','B','C','D'].forEach((l,i)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML='<span class="lt">'+l+'</span><span>'+q.opts[i]+'</span>';
    b.onclick=()=>sel(i,b);o.appendChild(b);
  });
  const f=document.getElementById('fb');f.className='';f.innerHTML='';
  document.getElementById('bn').style.display='none';ans=false;
}
function sel(i,btn){
  if(ans)return;ans=true;
  const q=pool[idx];
  document.querySelectorAll('.opt').forEach(b=>b.classList.add('dis'));
  const f=document.getElementById('fb');
  if(i===q.c){btn.classList.add('ok');nOk++;f.className='show ok';f.innerHTML='<div class="fh">Correcto</div><div class="fd">'+q.f+'</div>';}
  else{btn.classList.add('er');document.querySelectorAll('.opt')[q.c].classList.add('ok');nEr++;fl.push({q:q.q,co:q.opts[q.c],tu:q.opts[i],f:q.f});f.className='show er';f.innerHTML='<div class="fh">Incorrecto — correcta: '+['A','B','C','D'][q.c]+'</div><div class="fd">'+q.f+'</div>';}
  document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;
  document.getElementById('bn').style.display='inline-block';
}
function nxt(){idx++;render();}
function showRes(){
  ['hdr','pw','stats','qc','opts','fb','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  const tot=pool.length,pct=Math.round(nOk/tot*100);
  document.getElementById('rp').textContent=pct+'%';
  document.getElementById('rt').textContent=pct>=80?'T3 dominado — a por el T2':pct>=60?'Nivel sólido — repasa los fallos':'Refuerza casos prácticos y leyes';
  document.getElementById('rs2').textContent=nOk+' correctas de '+tot+'.'+(fl.length>0?' '+fl.length+' para repasar.':' Sin errores.');
  if(!fl.length)document.getElementById('bfl').style.display='none';
  if(fl.length){document.getElementById('fs').style.display='block';document.getElementById('fst').textContent='Preguntas falladas ('+fl.length+')';const fll=document.getElementById('fl');fll.innerHTML='';fl.forEach(f=>{const d=document.createElement('div');d.className='fi';d.innerHTML='<div class="fq">'+f.q+'</div><div class="fb2"><span class="bg er">Tu respuesta: '+f.tu+'</span><span class="bg ok">Correcta: '+f.co+'</span></div><div class="fe">'+f.f+'</div>';fll.appendChild(d);});}
  document.getElementById('res').style.display='block';
}
function rst(){pool=[...Q];idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
function sfl(){if(!fl.length)return;pool=fl.map(f=>Q.find(q=>q.q===f.q)).filter(Boolean);idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
render();
</script>
