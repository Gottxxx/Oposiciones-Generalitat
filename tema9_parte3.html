<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tema 9 Parte 3/3 · Oposición Generalitat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f4; --surface: #ffffff; --surface2: #f1f0ed;
    --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.2);
    --text: #1a1a18; --text2: #5a5a56; --text3: #9a9a94;
    --ok: #1a7a4a; --ok-bg: #eaf5ee; --ok-border: rgba(26,122,74,0.25);
    --err: #c0392b; --err-bg: #fdf0ee; --err-border: rgba(192,57,43,0.25);
    --accent: #1a1a18; --radius: 10px; --radius-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18181a; --surface: #222224; --surface2: #2a2a2c;
      --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.2);
      --text: #f0efec; --text2: #a0a09a; --text3: #606060;
      --ok: #4caf7a; --ok-bg: rgba(76,175,122,0.12); --ok-border: rgba(76,175,122,0.3);
      --err: #e57373; --err-bg: rgba(229,115,115,0.12); --err-border: rgba(229,115,115,0.3);
      --accent: #f0efec;
    }
  }
  html { font-size: 16px; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem 4rem; }
  #app { width: 100%; max-width: 680px; }
  #header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 2rem; }
  #header h1 { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 3px; letter-spacing: -0.01em; }
  #header p { font-size: 13px; color: var(--text3); }
  #pill { font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border-strong); color: var(--text2); background: var(--surface2); white-space: nowrap; flex-shrink: 0; }
  #progress-wrap { margin-bottom: 1.25rem; }
  #progress-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); margin-bottom: 7px; }
  #progress-row span:last-child { font-weight: 500; color: var(--text2); }
  #track { height: 3px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  #fill { height: 3px; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; width: 0%; }
  #stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
  .stat .lbl { font-size: 11px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .stat .val { font-size: 24px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
  #sc-ok .val { color: var(--ok); }
  #sc-err .val { color: var(--err); }
  #q-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
  #q-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text3); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
  #q-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border-strong); display: inline-block; }
  #q-text { font-size: 16px; color: var(--text); line-height: 1.65; }
  #options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
  .opt { display: flex; align-items: flex-start; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px 16px; font-size: 14px; color: var(--text); cursor: pointer; text-align: left; line-height: 1.55; transition: border-color 0.15s, background 0.15s, transform 0.1s; width: 100%; }
  .opt:hover:not(.disabled) { border-color: var(--border-strong); background: var(--surface2); transform: translateY(-1px); }
  .opt:active:not(.disabled) { transform: translateY(0); }
  .letter { min-width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--border-strong); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--text2); flex-shrink: 0; margin-top: 1px; transition: background 0.15s, color 0.15s, border-color 0.15s; }
  .opt.correct { border-color: var(--ok-border); background: var(--ok-bg); }
  .opt.correct .letter { background: var(--ok); border-color: var(--ok); color: #fff; }
  .opt.wrong { border-color: var(--err-border); background: var(--err-bg); }
  .opt.wrong .letter { background: var(--err); border-color: var(--err); color: #fff; }
  .opt.disabled { cursor: default; pointer-events: none; }
  #feedback { display: none; border-radius: var(--radius-sm); padding: 13px 16px; margin-bottom: 1rem; border: 1px solid; font-size: 13px; line-height: 1.65; }
  #feedback.show { display: block; }
  #feedback.ok { background: var(--ok-bg); border-color: var(--ok-border); }
  #feedback.err { background: var(--err-bg); border-color: var(--err-border); }
  #feedback .fb-head { font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 5px; }
  #feedback.ok .fb-head { color: var(--ok); }
  #feedback.err .fb-head { color: var(--err); }
  #feedback .fb-body { color: var(--text2); }
  #btn-row { display: flex; justify-content: flex-end; }
  #btn-next { display: none; font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: var(--radius-sm); background: var(--accent); color: var(--bg); border: none; cursor: pointer; transition: opacity 0.15s; }
  #btn-next:hover { opacity: 0.85; }
  #results { display: none; padding: 1rem 0; }
  #res-hero { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 2rem; }
  #res-pct { font-size: 64px; font-weight: 700; color: var(--text); letter-spacing: -0.04em; line-height: 1; flex-shrink: 0; }
  #res-info h2 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  #res-info p { font-size: 13px; color: var(--text2); line-height: 1.6; }
  #res-btns { display: flex; gap: 8px; margin-bottom: 2rem; flex-wrap: wrap; }
  .btn-sec { font-size: 13px; font-weight: 500; padding: 10px 18px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--surface); color: var(--text); cursor: pointer; transition: background 0.15s; }
  .btn-sec:hover { background: var(--surface2); }
  .btn-prim { background: var(--accent); color: var(--bg); border-color: transparent; }
  .btn-prim:hover { opacity: 0.85; background: var(--accent); }
  #fallos-section { border-top: 1px solid var(--border); padding-top: 1.5rem; }
  #fallos-section h3 { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.04em; }
  .fallo { padding: 1rem 0; border-bottom: 1px solid var(--border); }
  .fallo:last-child { border-bottom: none; }
  .fallo-q { font-size: 14px; color: var(--text); margin-bottom: 8px; line-height: 1.5; font-weight: 500; }
  .fallo-badges { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; border: 1px solid; }
  .badge.err { background: var(--err-bg); border-color: var(--err-border); color: var(--err); }
  .badge.ok { background: var(--ok-bg); border-color: var(--ok-border); color: var(--ok); }
  .fallo-exp { font-size: 12px; color: var(--text3); line-height: 1.6; }
  @media (max-width: 500px) { body { padding: 1rem 0.75rem 3rem; } #res-hero { flex-direction: column; gap: 1rem; align-items: flex-start; } #res-pct { font-size: 48px; } #header { flex-direction: column; gap: 0.75rem; } }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <h1>Tema 9 Parte 3/3 · Oposición Generalitat</h1>
      <p>54 preguntas · Colectivos especiales y oficinas de atención</p>
    </div>
    <div id="pill"></div>
  </div>
  <div id="progress-wrap">
    <div id="progress-row"><span>Progreso</span><span id="prog-num">1 / 54</span></div>
    <div id="track"><div id="fill"></div></div>
  </div>
  <div id="stats-row">
    <div class="stat" id="sc-ok"><div class="lbl">Correctas</div><div class="val" id="v-ok">0</div></div>
    <div class="stat" id="sc-err"><div class="lbl">Errores</div><div class="val" id="v-err">0</div></div>
    <div class="stat"><div class="lbl">Pendientes</div><div class="val" id="v-pend">54</div></div>
  </div>
  <div id="q-card">
    <div id="q-meta"><span id="q-num-lbl"></span><span class="dot"></span><span id="q-bloque-lbl"></span></div>
    <div id="q-text"></div>
  </div>
  <div id="options"></div>
  <div id="feedback"></div>
  <div id="btn-row"><button id="btn-next" onclick="nextQ()">Siguiente →</button></div>
  <div id="results">
    <div id="res-hero">
      <div id="res-pct"></div>
      <div id="res-info"><h2 id="res-title"></h2><p id="res-sub"></p></div>
    </div>
    <div id="res-btns">
      <button class="btn-sec btn-prim" onclick="restart()">Repetir completo</button>
      <button class="btn-sec" id="btn-fallos" onclick="soloFallos()">Solo preguntas falladas →</button>
    </div>
    <div id="fallos-section" style="display:none">
      <h3 id="fallos-title"></h3>
      <div id="fallos-list"></div>
    </div>
  </div>
</div>

<script>
// NOTA: Este archivo contiene preguntas 111-164 del Tema 9
// Para obtener el contenido completo, descarga el cuestionario original del Google Drive
const ALL_Q = [
  {b:"Empatía vs asertividad",q:"Empatía y asertividad se relacionan en que:",opts:["La empatía comprende; la asertividad fija límites con firmeza educada","La empatía es dar la razón y la asertividad es imponer","La asertividad elimina la necesidad de empatía","Son conceptos opuestos"],c:0,f:"Empatía comprende; asertividad fija límites correctamente."},
  {b:"Cliente interno vs externo",q:"¿Cuál de las siguientes afirmaciones es correcta sobre cliente interno y cliente externo?",opts:["El cliente interno es personal de la Administración; el externo es la ciudadanía","Ambos son ciudadanos particulares","El externo es empleado público","Son categorías solo de atención telefónica"],c:0,f:"Interno es personal; externo es ciudadanía."},
  {b:"Percepción vs expectativa",q:"¿Cuál de las siguientes afirmaciones es INCORRECTA sobre percepción y expectativa?",opts:["La expectativa es la valoración final y la percepción lo esperado","La percepción puede verse influida por el trato","La expectativa puede formarse por experiencias previas","No son sinónimos"],c:0,f:"La afirmación A invierte los conceptos."},
  {b:"Ciudadano pasivo",q:"Cuando un ciudadano dice poco y duda al explicar su problema, lo más adecuado es:",opts:["Ayudarle con preguntas abiertas y concreción progresiva","Rellenar el formulario sin preguntarle","Presuponer lo que necesita","Exigirle lenguaje técnico"],c:0,f:"Con pasivo: ayudar con preguntas abiertas."},
  {b:"Comunicación",q:"¿Qué elemento de la comunicación se corresponde con el medio por el que circula el mensaje?",opts:["Canal","Código","Ruido","Feedback"],c:0,f:"Canal es el medio de circulación."},
  {b:"Ruido",q:"La alteración del proceso comunicativo por interrupciones o perturbaciones se denomina:",opts:["Ruido","Código","Persuasión","Negociación"],c:0,f:"Ruido es la perturbación que altera."},
  {b:"Escucha activa vs pasiva",q:"¿Cuál de estas opciones describe mejor la escucha activa y no la pasiva?",opts:["Pregunta, resume y demuestra comprensión","Se apoya solo en asentir y mirar","Evita intervenir para no condicionar","Se limita a presencia no verbal"],c:0,f:"Activa pregunta, resume y demuestra comprensión."},
  {b:"Fallos comunicación",q:"Si el personal de atención responde antes de comprender, el fallo es principalmente:",opts:["Psicológico","Orgánico","Presupuestario","Registral"],c:0,f:"Responder antes de comprender es fallo psicológico."},
  {b:"Fallos comunicación",q:"Si el problema es una mala vocalización o un mensaje ambiguo, el fallo es:",opts:["Mecánico o técnico","De expectativa","De percepción intangible","De empatía"],c:0,f:"Mala vocalización o mensaje ambiguo es fallo mecánico."},
  {b:"Asertividad",q:"Decir 'no' a una petición de forma clara, respetuosa y explicando alternativas sería un ejemplo de:",opts:["Atención asertiva","Agresividad","Sumisión","Pasividad"],c:0,f:"Decir 'no' claramente y con respeto es asertividad."},
  {b:"Empatía profesional",q:"Comprender la frustración del ciudadano sin asumirla como propia describe mejor:",opts:["La empatía profesional","La sumisión","La negociación cerrada","La escucha pasiva"],c:0,f:"Empatía profesional comprende sin asumir como propia."},
  {b:"Señales negativas",q:"En atención presencial, mirar el reloj durante la explicación del ciudadano transmite sobre todo:",opts:["Prisa y señal negativa","Escucha activa","Empatía","Neutralidad"],c:0,f:"Mirar el reloj transmite prisa y es negativo."},
  {b:"Atención telefónica",q:"En atención telefónica, saludar e identificarse al inicio sirve principalmente para:",opts:["Ofrecer una recepción correcta y situar al interlocutor","Reducir la necesidad de escuchar","Evitar tomar notas","Sustituir la fase de cierre"],c:0,f:"Saludar e identificarse ofrece recepción correcta."},
  {b:"Error telefónico",q:"Pasar la llamada a otra unidad sin explicar el motivo es un error porque:",opts:["Desorienta al ciudadano y transmite mala organización","Supone siempre infracción disciplinaria","Impide toda derivación posterior","Convierte en reclamación formal"],c:0,f:"Pasar llamada sin explicar desorienta y transmite desorganización."},
  {b:"Discapacidad visual",q:"Ante una persona con discapacidad visual, dirigirse exclusivamente al acompañante es:",opts:["Incorrecto, porque debe hablarse directamente a la persona","Correcto, porque facilita el trámite","Obligatorio por protocolo","La pauta general si hay documentación"],c:0,f:"Con discapacidad visual hablar directamente a la persona."},
  {b:"Discapacidad auditiva",q:"En atención a discapacidad auditiva, vocalizar claro sin exagerar busca:",opts:["Mejorar la comprensión sin deformar la comunicación","Sustituir toda ayuda escrita","Evitar la atención visual","Acelerar el cierre del trámite"],c:0,f:"Vocalizar claro mejora comprensión sin deformar."},
  {b:"Reclamaciones",q:"Una reclamación debe convertirse, en la medida de lo posible, en:",opts:["Hechos concretos sobre los que pueda actuarse","Una discusión sobre quién tiene peor actitud","Una valoración personal del carácter","Una negativa inmediata"],c:0,f:"Reclamación debe convertirse en hechos concretos."},
  {b:"Oficinas atención",q:"Entre las funciones de las oficinas de atención está registrar:",opts:["Quejas, sugerencias y otros escritos","Solo recursos administrativos","Únicamente documentos en papel","Exclusivamente solicitudes iniciales"],c:0,f:"Oficinas registran quejas, sugerencias y otros escritos."},
  {b:"Servicios oficinas",q:"Los quioscos de autoservicio y los ordenadores de apoyo forman parte de:",opts:["Los servicios habituales de las oficinas de atención","Los fallos mecánicos de la comunicación","Las causas de insatisfacción","Las fases de la atención telefónica"],c:0,f:"Quioscos y ordenadores son servicios habituales."},
  {b:"Caso práctico",q:"Una ciudadana llega muy enfadada. La primera respuesta más adecuada sería:",opts:["Escuchar con calma, bajar tensión y concretar qué ocurrió","Recordarle que debe comportarse mejor","Interrumpir para explicar la normativa completa","Derivarla de nuevo sin entrar en detalles"],c:0,f:"Con persona enfadada: escuchar, bajar tensión, concretar."},
  {b:"Personas mayores",q:"Un ciudadano mayor pide información compleja. ¿Qué encaja mejor con el tema?",opts:["Hablar despacio, resumir y dejar indicaciones claras por escrito","Usar todos los tecnicismos para ser exacto","Dar por supuesto que no entenderá","Remitirlo a Internet sin más"],c:0,f:"Con mayores: hablar despacio, resumir, dar indicaciones escritas."},
  {b:"Ciudadano pasivo",q:"Una persona dice: 'No sé muy bien qué tengo que pedir'. La mejor pauta inicial es:",opts:["Ayudar a concretar con preguntas abiertas y ordenar la necesidad","Responder con una negativa por falta de concreción","Esperar en silencio","Darle un formulario cualquiera"],c:0,f:"Con duda: ayudar a concretar con preguntas abiertas."},
  {b:"Reformulación",q:"Si el empleado reformula: 'Entonces, lo que le preocupa es...', está usando:",opts:["Reformulación","Ruido","Sugestión","Escucha pasiva"],c:0,f:"'Entonces, lo que le preocupa es...' es reformulación."},
  {b:"Fórmula útil",q:"Un ciudadano pide hablar con 'alguien que mande'. El empleado escucha, delimita, explica opciones y propone paso. Esa secuencia responde a:",opts:["La fórmula útil de atención profesional del tema","Una técnica de silencio administrativo","Una fase de control interno","Una regla de atención exclusiva a cliente interno"],c:0,f:"Secuencia escuchar-delimitar-explicar-proponer es fórmula útil."},
  {b:"Trato profesional",q:"Cuando el trabajador evita juicios de valor sobre la persona y se centra en hechos, está aplicando:",opts:["Reglas de trato profesional y gestión adecuada del conflicto","Escucha pasiva únicamente","Una técnica de sugestión","Un servicio de autoservicio"],c:0,f:"Evitar juicios y centrarse en hechos es trato profesional."},
  {b:"Expectativa y percepción",q:"Si el ciudadano esperaba solución inmediata pero valora negativamente por el trato, hablamos de:",opts:["Expectativa frustrada y percepción negativa","Ruido exclusivamente","Asertividad del ciudadano","Cliente interno mal atendido"],c:0,f:"Expectativa frustrada y percepción negativa."},
  {b:"Adaptar mensaje",q:"Explicar un trámite con vocabulario comprensible busca principalmente:",opts:["Adaptar el mensaje al receptor y hacerlo útil","Eliminar el código de la comunicación","Sustituir el feedback","Evitar cualquier posibilidad de pregunta"],c:0,f:"Adaptar mensaje al receptor y hacerlo útil."},
  {b:"Atención telefónica",q:"En una llamada, tomar notas si hace falta sirve para:",opts:["Comprender mejor, no hacer repetir y canalizar con precisión","Mostrar autoridad técnica","Sustituir la escucha","Acortar automáticamente la conversación"],c:0,f:"Tomar notas ayuda a comprender y canalizar."},
  {b:"Calidad atención",q:"Un empleado conoce la norma pero contesta con sarcasmo. Según el tema, eso implica que:",opts:["Puede haber mala atención aunque el contenido jurídico sea correcto","La calidad del servicio sigue siendo alta","La percepción del ciudadano no se ve afectada","Se trata de escucha activa"],c:0,f:"Sarcasmo implica mala atención aunque la respuesta sea correcta."},
  {b:"Funciones oficinas",q:"¿Cuál de estas opciones recoge mejor las funciones de un punto de registro?",opts:["Registrar documentación, digitalizarla y asistir","Resolver recursos de alzada","Ejercer control político","Dictar instrucciones generales"],c:0,f:"Punto de registro: registrar, digitalizar, asistir."},
  {b:"Administración electrónica",q:"¿Qué función conecta más directamente con la administración electrónica en oficinas?",opts:["Ayudar en la identificación y firma electrónica","Emitir normas interpretativas","Aprobar convocatorias selectivas","Controlar la legalidad de contratos"],c:0,f:"Ayudar en identificación y firma electrónica es admin electrónica."},
  {b:"Cierre administrativo",q:"Registrar sugerencias y otros escritos muestra que la atención ciudadana:",opts:["También tiene cierre administrativo y documental, no solo comunicativo","Se limita a escuchar sin formalizar","Es incompatible con la asistencia registral","Solo trabaja con reclamaciones verbales"],c:0,f:"Atención tiene cierre administrativo y documental."},
  {b:"Primera impresión telefónica",q:"La primera impresión en atención telefónica depende especialmente de:",opts:["La voz: timbre, volumen, tono, ritmo e inflexión","La señalización física","El contacto visual","La postura corporal"],c:0,f:"En teléfono primera impresión depende de la voz."},
  {b:"Empatía y objetivación",q:"Decir 'entiendo que esto le haya molestado; vamos a ver qué ha pasado' combina sobre todo:",opts:["Empatía y objetivación del problema","Sumisión y pasividad","Agresividad defensiva","Sugestión y persuasión"],c:0,f:"Combina empatía y objetivación."},
  {b:"Derivación útil",q:"Una derivación útil debe ser:",opts:["Clara, explicada y orientada al siguiente paso real","Inmediata y sin contexto","Múltiple para cubrir todas las opciones","Automática ante cualquier duda"],c:0,f:"Derivación útil: clara, explicada, orientada."},
  {b:"Ciudadano asertivo",q:"El ciudadano asertivo es, para el personal de atención, un modelo ideal porque:",opts:["Expresa con claridad y respeto su necesidad","Siempre conoce el procedimiento mejor","Nunca necesita orientación","No plantea reclamaciones"],c:0,f:"Ciudadano asertivo expresa con claridad y respeto."},
  {b:"Percepción",q:"En la percepción del servicio, la sensación de control del ciudadano se considera:",opts:["Un elemento intangible","Un elemento tangible","Un tipo de canal","Una forma de feedback"],c:0,f:"Sensación de control es elemento intangible."},
  {b:"Expectativa",q:"La expectativa del ciudadano puede formarse por:",opts:["Experiencias previas, referencias externas, rumores, comparaciones y promesas","Solo por la ley aplicable","Exclusivamente por el resultado final","Únicamente por el tiempo de espera"],c:0,f:"Expectativa se forma por experiencias, referencias, rumores."},
  {b:"Pasivo-agresivo",q:"¿Cuál sería una respuesta poco adecuada a una conducta pasivo-agresiva?",opts:["Ignorar la hostilidad encubierta sin intentar que verbalice","Favorecer que verbalice lo que le molesta","Escuchar sin choque frontal","Buscar el problema concreto"],c:0,f:"Con pasivo-agresivo no ignorar, favorecer que verbalice."},
  {b:"Atención ciudadana",q:"En la atención, informar y orientar son verbos importantes porque:",opts:["La función no se reduce a dar datos; debe encauzar derechos y trámites","Sustituyen siempre a la resolución","Eliminan la necesidad de escuchar","Convierten la atención en acto discrecional"],c:0,f:"Informar y orientar deben encauzar derechos y trámites."},
  {b:"Calidad atención",q:"La calidad de la atención influye en la imagen de la Administración porque:",opts:["La ciudadanía espera eficacia, respeto, claridad, amabilidad y solvencia","La legalidad formal anula cualquier efecto del trato","La imagen depende solo del resultado económico","La percepción no afecta a la confianza pública"],c:0,f:"Calidad influye porque ciudadanía espera eficacia y respeto."},
  {b:"Comunicación verbal y no verbal",q:"¿Qué afirmación es correcta sobre comunicación verbal y no verbal?",opts:["La verbal aporta contenido; la no verbal expresa emociones y puede matizar o contradecir","La no verbal sustituye siempre a la verbal","La verbal solo importa en el teléfono","La no verbal no influye en la percepción"],c:0,f:"Verbal aporta contenido; no verbal expresa emociones."},
  {b:"Percepción del servicio",q:"Si el empleado transmite prisa, rigidez y superioridad, probablemente deteriora:",opts:["La percepción global del servicio","La competencia territorial","La validez del expediente","La existencia del canal"],c:0,f:"Prisa, rigidez y superioridad deterioran percepción."},
  {b:"Servicios atención",q:"Una oficina que ofrece cita previa, videoconferencia y autoservicio está prestando:",opts:["Servicios habituales de atención ciudadana","Control externo del gasto","Asistencia exclusiva a cliente interno","Funciones reservadas a los tribunales"],c:0,f:"Cita previa, videoconferencia y autoservicio son servicios habituales."},
  {b:"Visión atención",q:"Cuando el tema dice que 'atender no es solo dar datos', está rechazando una visión:",opts:["Meramente informativa y pobre de la atención","Empática y asertiva","Integral y administrativa","Orientada al ciudadano"],c:0,f:"Rechaza visión meramente informativa."},
  {b:"Escucha activa",q:"¿Cuál de las siguientes afirmaciones sobre la escucha activa es INCORRECTA?",opts:["Consiste básicamente en asentir y mirar sin intervenir","Incluye preguntar para aclarar","Incluye resumir ideas esenciales","Pretende demostrar comprensión"],c:0,f:"A describe escucha pasiva, no activa."},
  {b:"Atención telefónica",q:"¿Cuál de estas afirmaciones sobre la atención telefónica es correcta?",opts:["La voz proyecta imagen del servicio mediante timbre, tono, volumen, ritmo e inflexión","La fase de cierre no existe si se ha informado","Lo normal es pasar la llamada sin explicar","La rapidez siempre es más importante"],c:0,f:"En teléfono la voz proyecta imagen del servicio."},
  {b:"Acogida",q:"¿Cuál de las siguientes opciones NO encaja con una acogida correcta?",opts:["Parafrasear con reproches o juicios","Saludar y presentarse","Ponerse a disposición","Escuchar antes de responder"],c:0,f:"Parafrasear con reproches NO es acogida correcta."},
  {b:"Reclamaciones",q:"¿Cuál de las siguientes afirmaciones sobre las reclamaciones es correcta?",opts:["No deben tomarse como algo personal y conviene objetivarlas en hechos","Lo adecuado es discutir hasta demostrar la razón","Una reclamación bien gestionada no cambia la imagen","Siempre revelan mala fe del ciudadano"],c:0,f:"Reclamaciones no tomar como personal, objetivar en hechos."},
  {b:"Empatía",q:"¿Qué opción describe mejor el papel de la empatía en atención ciudadana?",opts:["Comprender emociones y expectativas sin confundirse ni perder el rol","Dar siempre la razón para que baje la tensión","Convertirse en parte del conflicto","Evitar aplicar límites"],c:0,f:"Empatía: comprender sin confundirse ni perder rol."},
  {b:"Oficinas",q:"¿Cuál de estas afirmaciones sobre oficinas y puntos de registro es INCORRECTA?",opts:["Los puntos de registro sustituyen a todas las funciones de atención","Las oficinas pueden asumir asistencia registral","Los puntos se centran en registrar y digitalizar","Ambos espacios se relacionan con el cierre administrativo"],c:0,f:"Puntos de registro NO sustituyen todas las funciones."},
  {b:"Relaciones",q:"¿Cuál de los siguientes pares está correctamente relacionado?",opts:["Asertividad - firmeza educada","Empatía - dar la razón siempre","Feedback - paráfrasis obligatoria","Ruido - emisor principal"],c:0,f:"Asertividad es firmeza educada."},
  {b:"Núcleo duro",q:"¿Qué combinación refleja mejor el núcleo duro del tema en comunicación interpersonal?",opts:["Escucha activa, feedback y reformulación","Archivo, registro y publicación","Competencia, jerarquía y validez","Ejecución, control y fiscalización"],c:0,f:"Núcleo: escucha activa, feedback, reformulación."},
  {b:"Primera impresión",q:"¿Qué afirmación es correcta sobre la primera impresión?",opts:["Pesa tanto en atención presencial como telefónica","Solo importa en atención presencial","Solo influye en ciudadanos pasivos","No afecta a la percepción del servicio"],c:0,f:"Primera impresión pesa en presencial y telefónica."}
];

let pool=[...ALL_Q],idx=0,nOk=0,nErr=0,fallos=[],answered=false;

function render(){
  if(idx>=pool.length){showResults();return;}
  const q=pool[idx];
  document.getElementById('q-num-lbl').textContent=`Pregunta ${idx+1}`;
  document.getElementById('q-bloque-lbl').textContent=q.b;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('pill').textContent=q.b;
  document.getElementById('prog-num').textContent=`${idx+1} / ${pool.length}`;
  document.getElementById('fill').style.width=`${((idx)/pool.length)*100}%`;
  document.getElementById('v-pend').textContent=pool.length-(idx);
  const opts=document.getElementById('options');
  opts.innerHTML='';
  ['A','B','C','D'].forEach((letter,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<span class="letter">${letter}</span><span>${q.opts[i]}</span>`;
    btn.onclick=()=>answer(i);
    opts.appendChild(btn);
  });
  document.getElementById('feedback').className='';
  document.getElementById('feedback').style.display='none';
  document.getElementById('btn-next').style.display='none';
  answered=false;
}

function answer(sel){
  if(answered)return;
  answered=true;
  const q=pool[idx];
  const btns=document.querySelectorAll('.opt');
  btns.forEach((b,i)=>{
    b.classList.add('disabled');
    if(i===q.c)b.classList.add('correct');
    else if(i===sel)b.classList.add('wrong');
  });
  const fb=document.getElementById('feedback');
  fb.className='show '+(sel===q.c?'ok':'err');
  fb.innerHTML=`<div class="fb-head">${sel===q.c?'Correcto':'Incorrecto'}</div><div class="fb-body">${q.f}</div>`;
  document.getElementById('btn-next').style.display='block';
  if(sel===q.c){nOk++;document.getElementById('v-ok').textContent=nOk;}
  else{nErr++;document.getElementById('v-err').textContent=nErr;fallos.push({...q,userAns:sel});}
}

function nextQ(){idx++;render();}

function showResults(){
  document.getElementById('q-card').style.display='none';
  document.getElementById('options').style.display='none';
  document.getElementById('feedback').style.display='none';
  document.getElementById('btn-row').style.display='none';
  document.getElementById('progress-wrap').style.display='none';
  document.getElementById('stats-row').style.display='none';
  const pct=Math.round((nOk/pool.length)*100);
  document.getElementById('res-pct').textContent=pct+'%';
  let msg='',sub='';
  if(pct>=90){msg='Excelente dominio';sub='Estás listo para este bloque del tema.';}
  else if(pct>=75){msg='Buen nivel';sub='Repasa los fallos y estarás a punto.';}
  else if(pct>=60){msg='Nivel aceptable';sub='Refuerza los puntos débiles.';}
  else{msg='Necesitas más estudio';sub='Revisa el tema y vuelve a intentarlo.';}
  document.getElementById('res-title').textContent=msg;
  document.getElementById('res-sub').textContent=sub;
  if(fallos.length>0){
    document.getElementById('fallos-section').style.display='block';
    document.getElementById('fallos-title').textContent=`Resumen de errores (${fallos.length})`;
    document.getElementById('btn-fallos').style.display='inline-block';
    const list=document.getElementById('fallos-list');
    list.innerHTML='';
    fallos.forEach(f=>{
      const div=document.createElement('div');
      div.className='fallo';
      const letters=['A','B','C','D'];
      div.innerHTML=`<div class="fallo-q">${f.q}</div><div class="fallo-badges"><span class="badge err">Tu respuesta: ${letters[f.userAns]}</span><span class="badge ok">Correcta: ${letters[f.c]}</span></div><div class="fallo-exp">${f.f}</div>`;
      list.appendChild(div);
    });
  }else{
    document.getElementById('btn-fallos').style.display='none';
  }
  document.getElementById('results').style.display='block';
}

function restart(){
  pool=[...ALL_Q];
  idx=0;nOk=0;nErr=0;fallos=[];answered=false;
  document.getElementById('v-ok').textContent='0';
  document.getElementById('v-err').textContent='0';
  document.getElementById('results').style.display='none';
  document.getElementById('q-card').style.display='block';
  document.getElementById('options').style.display='flex';
  document.getElementById('btn-row').style.display='flex';
  document.getElementById('progress-wrap').style.display='block';
  document.getElementById('stats-row').style.display='grid';
  document.getElementById('fallos-section').style.display='none';
  render();
}

function soloFallos(){
  if(fallos.length===0)return;
  pool=fallos.map(f=>{const{userAns,...rest}=f;return rest;});
  idx=0;nOk=0;nErr=0;fallos=[];answered=false;
  document.getElementById('v-ok').textContent='0';
  document.getElementById('v-err').textContent='0';
  document.getElementById('pill').textContent=`Solo fallos (${pool.length})`;
  document.getElementById('results').style.display='none';
  document.getElementById('q-card').style.display='block';
  document.getElementById('options').style.display='flex';
  document.getElementById('btn-row').style.display='flex';
  document.getElementById('progress-wrap').style.display='block';
  document.getElementById('stats-row').style.display='grid';
  document.getElementById('fallos-section').style.display='none';
  render();
}

window.onload=()=>render();
</script>
</body>
