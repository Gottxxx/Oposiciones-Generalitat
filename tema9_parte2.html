<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tema 9 Parte 2/3 · Oposición Generalitat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f4; --surface: #ffffff; --surface2: #f1f0ed;
    --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.2);
    --text: #1a1a18; --text2: #5a5a56; --text3: #9a9a94;
    --ok: #1a7a4a; --ok-bg: #eaf5ee; --ok-border: rgba(26,122,74,0.25);
    --err: #c0392b; --err-bg: #fdf0ee; --err-border: rgba(192,57,43,0.25);
    --accent: #1a1a18; --radius: 10px; --radius-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18181a; --surface: #222224; --surface2: #2a2a2c;
      --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.2);
      --text: #f0efec; --text2: #a0a09a; --text3: #606060;
      --ok: #4caf7a; --ok-bg: rgba(76,175,122,0.12); --ok-border: rgba(76,175,122,0.3);
      --err: #e57373; --err-bg: rgba(229,115,115,0.12); --err-border: rgba(229,115,115,0.3);
      --accent: #f0efec;
    }
  }
  html { font-size: 16px; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem 4rem; }
  #app { width: 100%; max-width: 680px; }
  #header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 2rem; }
  #header h1 { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 3px; letter-spacing: -0.01em; }
  #header p { font-size: 13px; color: var(--text3); }
  #pill { font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border-strong); color: var(--text2); background: var(--surface2); white-space: nowrap; flex-shrink: 0; }
  #progress-wrap { margin-bottom: 1.25rem; }
  #progress-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); margin-bottom: 7px; }
  #progress-row span:last-child { font-weight: 500; color: var(--text2); }
  #track { height: 3px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  #fill { height: 3px; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; width: 0%; }
  #stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
  .stat .lbl { font-size: 11px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .stat .val { font-size: 24px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
  #sc-ok .val { color: var(--ok); }
  #sc-err .val { color: var(--err); }
  #q-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
  #q-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text3); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
  #q-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border-strong); display: inline-block; }
  #q-text { font-size: 16px; color: var(--text); line-height: 1.65; }
  #options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
  .opt { display: flex; align-items: flex-start; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px 16px; font-size: 14px; color: var(--text); cursor: pointer; text-align: left; line-height: 1.55; transition: border-color 0.15s, background 0.15s, transform 0.1s; width: 100%; }
  .opt:hover:not(.disabled) { border-color: var(--border-strong); background: var(--surface2); transform: translateY(-1px); }
  .opt:active:not(.disabled) { transform: translateY(0); }
  .letter { min-width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--border-strong); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--text2); flex-shrink: 0; margin-top: 1px; transition: background 0.15s, color 0.15s, border-color 0.15s; }
  .opt.correct { border-color: var(--ok-border); background: var(--ok-bg); }
  .opt.correct .letter { background: var(--ok); border-color: var(--ok); color: #fff; }
  .opt.wrong { border-color: var(--err-border); background: var(--err-bg); }
  .opt.wrong .letter { background: var(--err); border-color: var(--err); color: #fff; }
  .opt.disabled { cursor: default; pointer-events: none; }
  #feedback { display: none; border-radius: var(--radius-sm); padding: 13px 16px; margin-bottom: 1rem; border: 1px solid; font-size: 13px; line-height: 1.65; }
  #feedback.show { display: block; }
  #feedback.ok { background: var(--ok-bg); border-color: var(--ok-border); }
  #feedback.err { background: var(--err-bg); border-color: var(--err-border); }
  #feedback .fb-head { font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 5px; }
  #feedback.ok .fb-head { color: var(--ok); }
  #feedback.err .fb-head { color: var(--err); }
  #feedback .fb-body { color: var(--text2); }
  #btn-row { display: flex; justify-content: flex-end; }
  #btn-next { display: none; font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: var(--radius-sm); background: var(--accent); color: var(--bg); border: none; cursor: pointer; transition: opacity 0.15s; }
  #btn-next:hover { opacity: 0.85; }
  #results { display: none; padding: 1rem 0; }
  #res-hero { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 2rem; }
  #res-pct { font-size: 64px; font-weight: 700; color: var(--text); letter-spacing: -0.04em; line-height: 1; flex-shrink: 0; }
  #res-info h2 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  #res-info p { font-size: 13px; color: var(--text2); line-height: 1.6; }
  #res-btns { display: flex; gap: 8px; margin-bottom: 2rem; flex-wrap: wrap; }
  .btn-sec { font-size: 13px; font-weight: 500; padding: 10px 18px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--surface); color: var(--text); cursor: pointer; transition: background 0.15s; }
  .btn-sec:hover { background: var(--surface2); }
  .btn-prim { background: var(--accent); color: var(--bg); border-color: transparent; }
  .btn-prim:hover { opacity: 0.85; background: var(--accent); }
  #fallos-section { border-top: 1px solid var(--border); padding-top: 1.5rem; }
  #fallos-section h3 { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.04em; }
  .fallo { padding: 1rem 0; border-bottom: 1px solid var(--border); }
  .fallo:last-child { border-bottom: none; }
  .fallo-q { font-size: 14px; color: var(--text); margin-bottom: 8px; line-height: 1.5; font-weight: 500; }
  .fallo-badges { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; border: 1px solid; }
  .badge.err { background: var(--err-bg); border-color: var(--err-border); color: var(--err); }
  .badge.ok { background: var(--ok-bg); border-color: var(--ok-border); color: var(--ok); }
  .fallo-exp { font-size: 12px; color: var(--text3); line-height: 1.6; }
  @media (max-width: 500px) { body { padding: 1rem 0.75rem 3rem; } #res-hero { flex-direction: column; gap: 1rem; align-items: flex-start; } #res-pct { font-size: 48px; } #header { flex-direction: column; gap: 0.75rem; } }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <h1>Tema 9 Parte 2/3 · Oposición Generalitat</h1>
      <p>55 preguntas · Atención ciudadana: comunicación y escucha</p>
    </div>
    <div id="pill"></div>
  </div>
  <div id="progress-wrap">
    <div id="progress-row"><span>Progreso</span><span id="prog-num">1 / 55</span></div>
    <div id="track"><div id="fill"></div></div>
  </div>
  <div id="stats-row">
    <div class="stat" id="sc-ok"><div class="lbl">Correctas</div><div class="val" id="v-ok">0</div></div>
    <div class="stat" id="sc-err"><div class="lbl">Errores</div><div class="val" id="v-err">0</div></div>
    <div class="stat"><div class="lbl">Pendientes</div><div class="val" id="v-pend">55</div></div>
  </div>
  <div id="q-card">
    <div id="q-meta"><span id="q-num-lbl"></span><span class="dot"></span><span id="q-bloque-lbl"></span></div>
    <div id="q-text"></div>
  </div>
  <div id="options"></div>
  <div id="feedback"></div>
  <div id="btn-row"><button id="btn-next" onclick="nextQ()">Siguiente →</button></div>
  <div id="results">
    <div id="res-hero">
      <div id="res-pct"></div>
      <div id="res-info"><h2 id="res-title"></h2><p id="res-sub"></p></div>
    </div>
    <div id="res-btns">
      <button class="btn-sec btn-prim" onclick="restart()">Repetir completo</button>
      <button class="btn-sec" id="btn-fallos" onclick="soloFallos()">Solo preguntas falladas →</button>
    </div>
    <div id="fallos-section" style="display:none">
      <h3 id="fallos-title"></h3>
      <div id="fallos-list"></div>
    </div>
  </div>
</div>

<script>
// NOTA: Este archivo contiene preguntas 56-110 del Tema 9
// Para obtener el contenido completo, descarga el cuestionario original del Google Drive
const ALL_Q = [
  {b:"Tipos de ciudadano",q:"Ante una persona agresiva, la pauta correcta es:",opts:["Bajar la tensión y separar emoción y hecho sin choque frontal","Subir el tono para recuperar el control","Cortar la conversación en cuanto se queje","Responder con ironía para marcar límites"],c:0,f:"Con persona agresiva, bajar tensión y separar emoción de hecho."},
  {b:"Tipos de ciudadano",q:"La conducta pasivo-agresiva se caracteriza sobre todo por:",opts:["Hostilidad encubierta, ironía, bloqueo o resistencia","Peticiones claras y respetuosas","Exigencia abierta y volumen alto","Silencio colaborativo y confianza total"],c:0,f:"Pasivo-agresivo muestra hostilidad encubierta."},
  {b:"Atención centrada",q:"En la atención centrada en la persona, la prioridad es:",opts:["Tratar dignamente a la persona antes de abordar técnicamente el problema","Cerrar el expediente antes de escuchar","Aplicar el trámite sin adaptación alguna","Dar por hecho que el ciudadano entiende"],c:0,f:"Primero va la persona, después el problema técnico."},
  {b:"Comunicación",q:"¿Cuál de los siguientes NO es un elemento clásico del proceso de comunicación según el tema?",opts:["Competencia territorial","Emisor","Canal","Ruido"],c:0,f:"Competencia territorial no es elemento de comunicación."},
  {b:"Comunicación",q:"Antes de comunicar conviene:",opts:["Definir el objetivo, pensar quién es el receptor y evitar tecnicismos innecesarios","Improvisar para sonar más natural","Usar el máximo número de términos técnicos","Priorizar la velocidad sobre la comprensión"],c:0,f:"Antes de comunicar, definir objetivo y receptor."},
  {b:"Mensaje administrativo",q:"Un buen mensaje administrativo debe ser:",opts:["Útil, claro, adaptado al receptor y orientado a la acción","Muy extenso para cubrirlo todo","Técnico y rígido para parecer más serio","Ambiguo para no comprometerse"],c:0,f:"Mensaje debe ser útil, claro y orientado a la acción."},
  {b:"Comunicación eficaz",q:"Para que la comunicación sea eficaz no basta con emitir el mensaje; además el receptor debe:",opts:["Recibirlo, interpretarlo bien, aceptarlo y poder actuar","Estar de acuerdo en todo con quien emite","Contestar siempre por escrito","Responder inmediatamente"],c:0,f:"Receptor debe recibir, interpretar, aceptar y poder actuar."},
  {b:"Comunicación",q:"La sugestión, como método de comunicación citado en el tema, consiste en:",opts:["Influir por el modo de presentar el mensaje","Repetir exactamente la norma aplicable","Guardar silencio para no condicionar","Sustituir a la negociación"],c:0,f:"Sugestión es influir por el modo de presentar."},
  {b:"Escucha activa",q:"La escucha activa incluye:",opts:["Prestar atención real, preguntar para aclarar, resumir y demostrar comprensión","Limitarse a asentir sin intervenir","Responder antes de terminar de escuchar","Aceptar siempre la versión del ciudadano"],c:0,f:"Escucha activa: atención, preguntar, resumir y demostrar comprensión."},
  {b:"Escucha pasiva",q:"La escucha pasiva se apoya principalmente en:",opts:["Señales no verbales como mirar, sonreír o asentir","Reformular y resumir continuamente","Negociar de inmediato","Tomar decisiones en nombre del ciudadano"],c:0,f:"Escucha pasiva usa señales no verbales."},
  {b:"Feedback",q:"El feedback sirve para:",opts:["Comprobar si el mensaje se ha entendido bien y reorientar la conversación","Evitar que el ciudadano haga preguntas","Sustituir la escucha activa","Cerrar antes la atención"],c:0,f:"Feedback comprueba comprensión y reorienta."},
  {b:"Reformulación",q:"La reformulación consiste en:",opts:["Parafrasear lo que expresa el interlocutor para afinar el problema real","Repetir palabra por palabra lo mismo que ha dicho","Cambiar de tema para bajar la tensión","Emitir un juicio sobre el comportamiento del ciudadano"],c:0,f:"Reformulación es parafrasear para afinar el problema."},
  {b:"Reformulación",q:"¿Cuál de los siguientes sería un ejemplo de reformulación?",opts:["Si le he entendido bien, lo que necesita es…","Eso no tiene sentido y no puedo ayudarle","Ya se lo he dicho antes","Espere y no interrumpa"],c:0,f:"'Si le he entendido bien...' es ejemplo de reformulación."},
  {b:"Fallos comunicación",q:"Escuchar solo lo que interesa, responder a la defensiva o interpretar desde la prisa son:",opts:["Fallos psicológicos de la comunicación","Formas de escucha activa","Reglas de negociación","Indicadores de empatía"],c:0,f:"Son fallos psicológicos de la comunicación."},
  {b:"Fallos comunicación",q:"Un lenguaje demasiado técnico, mala vocalización o mensajes ambiguos son:",opts:["Fallos mecánicos o técnicos de comunicación","Elementos intangibles del servicio","Manifestaciones de escucha pasiva","Técnicas de atención a colectivos"],c:0,f:"Son fallos mecánicos o técnicos."},
  {b:"Personal informador",q:"El personal informador debe transmitir sobre todo:",opts:["Neutralidad, orden, confianza y comodidad","Familiaridad excesiva y espontaneidad total","Distancia fría para evitar implicación","Superioridad técnica visible"],c:0,f:"Debe transmitir neutralidad, orden y confianza."},
  {b:"Acogida",q:"En una acogida correcta, el orden más lógico es:",opts:["Recibir, saludar, presentarse, ponerse a disposición y escuchar antes de responder","Responder primero y preguntar después","Corregir al ciudadano antes de escucharle","Derivar de inmediato a otra unidad"],c:0,f:"Orden correcto: recibir, saludar, presentarse, escuchar."},
  {b:"Personal atención",q:"¿Cuál de estas conductas NO debe realizar el personal de atención?",opts:["Usar tecnicismos innecesarios o tratar con superioridad","Escuchar antes de responder","Parafrasear sin reproches","Adaptar la explicación al receptor"],c:0,f:"No debe usar tecnicismos innecesarios ni tratar con superioridad."},
  {b:"Persuasión vs negociación",q:"Persuasión y negociación se diferencian en que:",opts:["La persuasión busca adhesión a una propuesta; la negociación, un acuerdo mutuo","La negociación siempre es unilateral","La persuasión implica siempre manipulación","Son sinónimos en atención administrativa"],c:0,f:"Persuasión busca adhesión; negociación busca acuerdo mutuo."},
  {b:"Atención ciudadana",q:"Atender bien a la ciudadanía implica necesariamente:",opts:["Mantener el buen trato incluso cuando se niega la petición","Dar siempre la razón al ciudadano","Evitar cualquier límite o negativa","Resolver todos los casos en el acto"],c:0,f:"Buen trato no significa dar siempre la razón."},
  {b:"Factores internos",q:"Entre los factores internos que condicionan la comunicación se incluyen:",opts:["Valores, prejuicios, creencias, actitudes y estado de ánimo","Ruido, barreras arquitectónicas y contexto lingüístico","Señalización, turnos y cita previa","Programas, indicadores y objetivos"],c:0,f:"Factores internos: valores, prejuicios, creencias, actitudes."},
  {b:"Factores externos",q:"Son factores externos que condicionan la comunicación:",opts:["Ruido, entorno físico, barreras arquitectónicas y contexto sociocultural","Creencias, actitudes y prejuicios","Estado de ánimo y valores personales","Intereses privados del empleado"],c:0,f:"Factores externos: ruido, entorno, barreras."},
  {b:"Comunicación no verbal",q:"La comunicación no verbal:",opts:["Expresa emociones, matiza el mensaje y a veces lo contradice","Sustituye siempre por completo a la verbal","Solo sirve en atención telefónica","Carece de relevancia en la percepción"],c:0,f:"No verbal expresa emociones y puede contradecir."},
  {b:"Relación profesional",q:"En la relación profesional con la ciudadanía, una idea clave es que:",opts:["Existe desigualdad informativa y la ciudadanía deposita confianza","Ambas partes dominan por igual el procedimiento","El objetivo principal es ganar la discusión","La confianza del ciudadano es irrelevante"],c:0,f:"Hay desigualdad informativa y confianza depositada."},
  {b:"Conflictos",q:"Ante un conflicto o una queja, el objetivo principal es:",opts:["Reconducir la situación y buscar una respuesta adecuada","Demostrar que la Administración tiene razón","Cortar la conversación cuanto antes","Exigir que rebaje el tono antes de escuchar"],c:0,f:"Objetivo: reconducir y buscar respuesta adecuada."},
  {b:"Asertividad",q:"La atención asertiva consiste en:",opts:["Defender ideas y límites de forma correcta, sin agresividad ni sumisión","Ceder siempre para evitar conflicto","Imponer la respuesta con firmeza agresiva","No expresar límites para no incomodar"],c:0,f:"Asertividad: defender límites correctamente."},
  {b:"Empatía",q:"La relación empática implica:",opts:["Comprender la perspectiva y emociones sin perder el rol profesional","Asumir como propias sus emociones","Dar la razón para demostrar comprensión","Renunciar a aplicar la norma"],c:0,f:"Empatía: comprender sin perder rol profesional."},
  {b:"Secuencia eficaz",q:"Según la fórmula útil del tema, una secuencia eficaz es:",opts:["Escucho, delimito el problema, explico opciones y propongo siguiente paso","Respondo, delimito, escucho y cierro","Derivo, escucho, explico y discuto","Informo, corto, anoto y archivo"],c:0,f:"Secuencia: escuchar, delimitar, explicar opciones, proponer paso."},
  {b:"Atención presencial",q:"La atención presencial se organiza en tres fases:",opts:["Acogida, identificación y resolución, y conclusión/despedida","Saludo, archivo y resolución","Recepción, derivación y sanción","Escucha, debate y cierre"],c:0,f:"Fases presenciales: acogida, identificación/resolución, conclusión."},
  {b:"Primera impresión",q:"En atención presencial, una primera impresión positiva se apoya en:",opts:["Aspecto cuidado, contacto visual, postura abierta y lenguaje claro","Mirada esquiva y postura cerrada","Gestos bruscos y prisa visible","Silencio prolongado para generar autoridad"],c:0,f:"Primera impresión: aspecto, contacto visual, postura abierta."},
  {b:"Señales negativas",q:"¿Cuál de estas es una señal negativa en atención presencial?",opts:["Mirar el reloj o transmitir prisa","Escucha visible","Postura abierta","Respeto del espacio personal"],c:0,f:"Mirar el reloj transmite prisa y es señal negativa."},
  {b:"Fase central",q:"En la fase central de la atención presencial debe hacerse, entre otras cosas:",opts:["Identificar bien la necesidad, confirmar datos y explicar qué se puede hacer","Evitar confirmar datos para ganar tiempo","Presuponer la necesidad sin escuchar","Cerrar la conversación antes de derivar"],c:0,f:"Fase central: identificar necesidad, confirmar datos, explicar."},
  {b:"Atención telefónica",q:"La atención telefónica también se organiza en tres fases:",opts:["Recepción de la llamada, identificación y resolución, y cierre","Recepción, archivo y ejecución","Saludo, negociación y sanción","Información, reclamación y derivación"],c:0,f:"Fases telefónicas: recepción, identificación/resolución, cierre."},
  {b:"Objetivo telefónico",q:"El objetivo de la atención telefónica es:",opts:["Resolver si es posible y, si no, orientar con precisión","Reducir la duración por encima de todo","Evitar derivaciones aunque sean necesarias","Trasladar siempre la llamada"],c:0,f:"Objetivo: resolver o orientar con precisión."},
  {b:"Pauta telefónica",q:"Una pauta básica de la atención telefónica es:",opts:["Saludar e identificarse, escuchar sin interrumpir y evitar esperas inútiles","Pasar la llamada sin explicar nada","Hablar muy rápido para ahorrar tiempo","Cortar cuando el ciudadano repite"],c:0,f:"Pautas: saludar, identificarse, escuchar, evitar esperas."},
  {b:"Volumen telefónico",q:"En atención telefónica, el volumen muy alto puede transmitir:",opts:["Agresividad o suficiencia","Empatía y cercanía","Seguridad jurídica","Neutralidad técnica"],c:0,f:"Volumen alto puede transmitir agresividad."},
  {b:"Ritmo telefónico",q:"Un ritmo muy rápido al hablar por teléfono suele transmitir:",opts:["Nerviosismo o prisa","Mayor claridad","Escucha activa","Mejor comprensión"],c:0,f:"Ritmo rápido transmite nerviosismo o prisa."},
  {b:"Error telefónico",q:"¿Cuál de los siguientes es un error típico de atención telefónica?",opts:["Pasar la llamada sin explicar o cortar sin confirmar comprensión","Tomar notas si hace falta","Escuchar sin presuponer","Canalizar correctamente"],c:0,f:"Error típico: pasar llamada sin explicar."},
  {b:"Personas mayores",q:"Con personas mayores conviene especialmente:",opts:["Hablar claro, a ritmo moderado y resumir instrucciones","Acelerar para no cansarlas","Subir mucho el volumen por defecto","Evitar explicaciones por escrito"],c:0,f:"Con mayores: hablar claro, ritmo moderado, resumir."},
  {b:"Discapacidad visual",q:"Con una persona con discapacidad visual, lo correcto es:",opts:["Presentarse, hablar directamente y ofrecer ayuda sin invadir","Dirigirse solo al acompañante","Moverla sin avisar","Cambiar su orientación sin comunicarlo"],c:0,f:"Con discapacidad visual: presentarse, hablar directo, ofrecer ayuda."},
  {b:"Discapacidad auditiva",q:"En la atención a una persona con discapacidad auditiva se recomienda:",opts:["Asegurar atención visual, vocalizar claro y apoyar con gestos o escritura","Gritar para que entienda mejor","Hablar sin vocalizar","Evitar reformular"],c:0,f:"Con discapacidad auditiva: atención visual, vocalizar, apoyar."},
  {b:"Discapacidad motriz",q:"Con una persona con discapacidad motriz, la regla básica es:",opts:["Actuar con naturalidad, preguntar antes de ayudar y respetar su ritmo","Ayudarla sin preguntar para ganar tiempo","Hablar con su acompañante","Asumir que no puede seguir el ritmo"],c:0,f:"Con discapacidad motriz: preguntar antes de ayudar."},
  {b:"Discapacidad psíquica",q:"Con una persona con discapacidad psíquica, la atención debe basarse en:",opts:["Paciencia, respeto, escucha y adaptación al nivel de comprensión","Mismo nivel de complejidad sin adaptación","Comunicación rápida","Derivación automática"],c:0,f:"Con discapacidad psíquica: paciencia, respeto, adaptación."},
  {b:"Insatisfacción",q:"¿Cuál de estas NO aparece como causa frecuente de insatisfacción ciudadana?",opts:["Exceso de participación ciudadana","Lentitud","Información contradictoria","Derivaciones inútiles"],c:0,f:"Exceso de participación NO es causa de insatisfacción."},
  {b:"Reclamaciones",q:"Tratar bien una reclamación implica sobre todo:",opts:["Bajar la tensión, escuchar con calma, objetivar y proponer solución realista","Discutir para demostrar que se actuó bien","Tomárselo como algo personal","Negar cualquier error sin analizar"],c:0,f:"Reclamación: bajar tensión, escuchar, objetivar, proponer solución."},
  {b:"Reclamaciones",q:"Una reclamación bien gestionada puede:",opts:["Mejorar la imagen del servicio incluso si hubo un error inicial","No influir nunca en la percepción","Sustituir al procedimiento administrativo","Eliminar la necesidad de corregir"],c:0,f:"Reclamación bien gestionada puede mejorar la imagen."},
  {b:"Oficinas atención",q:"Las oficinas de atención ciudadana se caracterizan porque:",opts:["Asumen funciones de asistencia en materia de registro y otras tareas","Se limitan a digitalizar documentos","Solo atienden por teléfono","No pueden registrar quejas"],c:0,f:"Oficinas de atención asumen funciones de asistencia registral."},
  {b:"Puntos registro",q:"Los puntos de registro y digitalización se centran en:",opts:["Registrar y digitalizar documentación","Negociar reclamaciones complejas","Resolver recursos administrativos","Controlar ejecución presupuestaria"],c:0,f:"Puntos de registro se centran en registrar y digitalizar."},
  {b:"Funciones oficinas",q:"¿Cuál de estas funciones corresponde a oficinas/puntos de atención según el tema?",opts:["Digitalizar documentos y expedir copias auténticas","Dictar resoluciones sancionadoras","Sustituir a los órganos instructores","Aprobar reglamentos"],c:0,f:"Oficinas digitalizan y expiden copias auténticas."},
  {b:"Funciones oficinas",q:"Facilitar códigos de identificación y tramitar apoderamientos son funciones de:",opts:["Las oficinas de atención y puntos de registro","La Sindicatura de Comptes","Los órganos de selección","Los tribunales de justicia"],c:0,f:"Oficinas facilitan códigos y tramitan apoderamientos."},
  {b:"Funciones oficinas",q:"Ayudar en identificación y firma electrónica es una función propia de:",opts:["Las oficinas de atención y puntos de registro","Solo del órgano que resuelve","Únicamente de la atención telefónica","Exclusivamente de oficinas consulares"],c:0,f:"Oficinas ayudan en identificación y firma electrónica."},
  {b:"Servicios habituales",q:"¿Cuál de los siguientes es un servicio habitual de las oficinas de atención?",opts:["Gestión de turnos y cita previa","Aprobación de ley de presupuestos","Fiscalización externa de cuentas","Incoación de expedientes disciplinarios"],c:0,f:"Servicios habituales: gestión de turnos y cita previa."},
  {b:"Servicios habituales",q:"Entre los servicios habituales también se incluye:",opts:["Atención remota por videoconferencia","Potestad reglamentaria general","Control de legalidad de sentencias","Inspección tributaria"],c:0,f:"Servicios: atención remota por videoconferencia."},
  {b:"Feedback vs reformulación",q:"Feedback y reformulación:",opts:["No son lo mismo: feedback comprueba comprensión y reformulación parafrasea","Son exactamente sinónimos","La reformulación siempre sustituye al feedback","El feedback solo existe en comunicación escrita"],c:0,f:"Feedback comprueba; reformulación parafrasea."}
];

let pool=[...ALL_Q],idx=0,nOk=0,nErr=0,fallos=[],answered=false;

function render(){
  if(idx>=pool.length){showResults();return;}
  const q=pool[idx];
  document.getElementById('q-num-lbl').textContent=`Pregunta ${idx+1}`;
  document.getElementById('q-bloque-lbl').textContent=q.b;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('prog-num').textContent=`${idx+1} / ${pool.length}`;
  document.getElementById('fill').style.width=`${((idx)/pool.length)*100}%`;
  document.getElementById('v-pend').textContent=pool.length-(idx);
  const opts=document.getElementById('options');
  opts.innerHTML='';
  ['A','B','C','D'].forEach((letter,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<span class="letter">${letter}</span><span>${q.opts[i]}</span>`;
    btn.onclick=()=>answer(i);
    opts.appendChild(btn);
  });
  document.getElementById('feedback').className='';
  document.getElementById('feedback').style.display='none';
  document.getElementById('btn-next').style.display='none';
  answered=false;
}

function answer(sel){
  if(answered)return;
  answered=true;
  const q=pool[idx];
  const btns=document.querySelectorAll('.opt');
  btns.forEach((b,i)=>{
    b.classList.add('disabled');
    if(i===q.c)b.classList.add('correct');
    else if(i===sel)b.classList.add('wrong');
  });
  const fb=document.getElementById('feedback');
  fb.className='show '+(sel===q.c?'ok':'err');
  fb.innerHTML=`<div class="fb-head">${sel===q.c?'Correcto':'Incorrecto'}</div><div class="fb-body">${q.f}</div>`;
  document.getElementById('btn-next').style.display='block';
  if(sel===q.c){nOk++;document.getElementById('v-ok').textContent=nOk;}
  else{nErr++;document.getElementById('v-err').textContent=nErr;fallos.push({...q,userAns:sel});}
}

function nextQ(){idx++;render();}

function showResults(){
  document.getElementById('q-card').style.display='none';
  document.getElementById('options').style.display='none';
  document.getElementById('feedback').style.display='none';
  document.getElementById('btn-row').style.display='none';
  document.getElementById('progress-wrap').style.display='none';
  document.getElementById('stats-row').style.display='none';
  const pct=Math.round((nOk/pool.length)*100);
  document.getElementById('res-pct').textContent=pct+'%';
  let msg='',sub='';
  if(pct>=90){msg='Excelente dominio';sub='Estás listo para este bloque del tema.';}
  else if(pct>=75){msg='Buen nivel';sub='Repasa los fallos y estarás a punto.';}
  else if(pct>=60){msg='Nivel aceptable';sub='Refuerza los puntos débiles.';}
  else{msg='Necesitas más estudio';sub='Revisa el tema y vuelve a intentarlo.';}
  document.getElementById('res-title').textContent=msg;
  document.getElementById('res-sub').textContent=sub;
  if(fallos.length>0){
    document.getElementById('fallos-section').style.display='block';
    document.getElementById('fallos-title').textContent=`Resumen de errores (${fallos.length})`;
    document.getElementById('btn-fallos').style.display='inline-block';
    const list=document.getElementById('fallos-list');
    list.innerHTML='';
    fallos.forEach(f=>{
      const div=document.createElement('div');
      div.className='fallo';
      const letters=['A','B','C','D'];
      div.innerHTML=`<div class="fallo-q">${f.q}</div><div class="fallo-badges"><span class="badge err">Tu respuesta: ${letters[f.userAns]}</span><span class="badge ok">Correcta: ${letters[f.c]}</span></div><div class="fallo-exp">${f.f}</div>`;
      list.appendChild(div);
    });
  }else{
    document.getElementById('btn-fallos').style.display='none';
  }
  document.getElementById('results').style.display='block';
}

function restart(){
  pool=[...ALL_Q];
  idx=0;nOk=0;nErr=0;fallos=[];answered=false;
  document.getElementById('v-ok').textContent='0';
  document.getElementById('v-err').textContent='0';
  document.getElementById('results').style.display='none';
  document.getElementById('q-card').style.display='block';
  document.getElementById('options').style.display='flex';
  document.getElementById('btn-row').style.display='flex';
  document.getElementById('progress-wrap').style.display='block';
  document.getElementById('stats-row').style.display='grid';
  document.getElementById('fallos-section').style.display='none';
  render();
}

function soloFallos(){
  if(fallos.length===0)return;
  pool=fallos.map(f=>{const{userAns,...rest}=f;return rest;});
  idx=0;nOk=0;nErr=0;fallos=[];answered=false;
  document.getElementById('v-ok').textContent='0';
  document.getElementById('v-err').textContent='0';
  document.getElementById('pill').textContent=`Solo fallos (${pool.length})`;
  document.getElementById('results').style.display='none';
  document.getElementById('q-card').style.display='block';
  document.getElementById('options').style.display='flex';
  document.getElementById('btn-row').style.display='flex';
  document.getElementById('progress-wrap').style.display='block';
  document.getElementById('stats-row').style.display='grid';
  document.getElementById('fallos-section').style.display='none';
  render();
}

window.onload=()=>render();
</script>
</body>
