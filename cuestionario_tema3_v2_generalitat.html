<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tema 3 · Test 2 · Oposición Generalitat</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f7f4;--surface:#fff;--surface2:#f1f0ed;--border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.2);--text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;--ok:#1a7a4a;--ok-bg:#eaf5ee;--ok-border:rgba(26,122,74,.25);--err:#c0392b;--err-bg:#fdf0ee;--err-border:rgba(192,57,43,.25);--accent:#1a1a18;--r:10px;--rs:6px}
@media(prefers-color-scheme:dark){:root{--bg:#18181a;--surface:#222224;--surface2:#2a2a2c;--border:rgba(255,255,255,.1);--border-strong:rgba(255,255,255,.2);--text:#f0efec;--text2:#a0a09a;--text3:#606060;--ok:#4caf7a;--ok-bg:rgba(76,175,122,.12);--ok-border:rgba(76,175,122,.3);--err:#e57373;--err-bg:rgba(229,115,115,.12);--err-border:rgba(229,115,115,.3);--accent:#f0efec}}
html{font-size:16px}body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem}
#app{width:100%;max-width:680px}
#hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:2rem}
#hdr h1{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px;letter-spacing:-.01em}#hdr p{font-size:13px;color:var(--text3)}
#pill{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid var(--border-strong);color:var(--text2);background:var(--surface2);white-space:nowrap;flex-shrink:0}
#pw{margin-bottom:1.25rem}#pr{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:7px}#pr span:last-child{font-weight:500;color:var(--text2)}
#track{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden}#fill{height:3px;background:var(--accent);border-radius:3px;transition:width .4s ease;width:0%}
#stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.st{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px}
.st .lb{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.st .vl{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-.02em}
#sc-ok .vl{color:var(--ok)}#sc-er .vl{color:var(--err)}
#qc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem}
#qm{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em}
#qm .d{width:3px;height:3px;border-radius:50%;background:var(--border-strong);display:inline-block}
#qt{font-size:16px;color:var(--text);line-height:1.65}
#opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.opt{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:13px 16px;font-size:14px;color:var(--text);cursor:pointer;text-align:left;line-height:1.55;transition:border-color .15s,background .15s,transform .1s;width:100%}
.opt:hover:not(.dis){border-color:var(--border-strong);background:var(--surface2);transform:translateY(-1px)}
.lt{min-width:24px;height:24px;border-radius:50%;border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0;margin-top:1px;transition:background .15s,color .15s,border-color .15s}
.opt.ok{border-color:var(--ok-border);background:var(--ok-bg)}.opt.ok .lt{background:var(--ok);border-color:var(--ok);color:#fff}
.opt.er{border-color:var(--err-border);background:var(--err-bg)}.opt.er .lt{background:var(--err);border-color:var(--err);color:#fff}
.opt.dis{cursor:default;pointer-events:none}
#fb{display:none;border-radius:var(--rs);padding:13px 16px;margin-bottom:1rem;border:1px solid;font-size:13px;line-height:1.65}
#fb.show{display:block}#fb.ok{background:var(--ok-bg);border-color:var(--ok-border)}#fb.er{background:var(--err-bg);border-color:var(--err-border)}
#fb .fh{font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
#fb.ok .fh{color:var(--ok)}#fb.er .fh{color:var(--err)}#fb .fd{color:var(--text2)}
#br{display:flex;justify-content:flex-end}
#bn{display:none;font-size:13px;font-weight:500;padding:10px 20px;border-radius:var(--rs);background:var(--accent);color:var(--bg);border:none;cursor:pointer;transition:opacity .15s}#bn:hover{opacity:.85}
#res{display:none;padding:1rem 0}
#rh{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:2rem}
#rp{font-size:64px;font-weight:700;color:var(--text);letter-spacing:-.04em;line-height:1;flex-shrink:0}
#ri h2{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}#ri p{font-size:13px;color:var(--text2);line-height:1.6}
#rbt{display:flex;gap:8px;margin-bottom:2rem;flex-wrap:wrap}
.bs{font-size:13px;font-weight:500;padding:10px 18px;border-radius:var(--rs);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);cursor:pointer;transition:background .15s}.bs:hover{background:var(--surface2)}
.bp{background:var(--accent);color:var(--bg);border-color:transparent}.bp:hover{opacity:.85;background:var(--accent)}
#fs{border-top:1px solid var(--border);padding-top:1.5rem}
#fs h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.04em}
.fi{padding:1rem 0;border-bottom:1px solid var(--border)}.fi:last-child{border-bottom:none}
.fq{font-size:14px;color:var(--text);margin-bottom:8px;line-height:1.5;font-weight:500}
.fb2{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.bg{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid}
.bg.er{background:var(--err-bg);border-color:var(--err-border);color:var(--err)}.bg.ok{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok)}
.fe{font-size:12px;color:var(--text3);line-height:1.6}
@media(max-width:500px){body{padding:1rem .75rem 3rem}#rh{flex-direction:column;gap:1rem;align-items:flex-start}#rp{font-size:48px}#hdr{flex-direction:column;gap:.75rem}}
</style>
</head>
<body>
<div id="app">
  <div id="hdr"><div><h1>Tema 3 · Test 2 · Oposición Generalitat</h1><p>50 preguntas · Drets davant l'Administració, mitjans electrònics y drets lingüístics</p></div><div id="pill"></div></div>
  <div id="pw"><div id="pr"><span>Progreso</span><span id="pn">1 / 50</span></div><div id="track"><div id="fill"></div></div></div>
  <div id="stats">
    <div class="st" id="sc-ok"><div class="lb">Correctas</div><div class="vl" id="vok">0</div></div>
    <div class="st" id="sc-er"><div class="lb">Errores</div><div class="vl" id="ver">0</div></div>
    <div class="st"><div class="lb">Pendientes</div><div class="vl" id="vpe">50</div></div>
  </div>
  <div id="qc"><div id="qm"><span id="qnl"></span><span class="d"></span><span id="qbl"></span></div><div id="qt"></div></div>
  <div id="opts"></div><div id="fb"></div>
  <div id="br"><button id="bn" onclick="nxt()">Siguiente →</button></div>
  <div id="res">
    <div id="rh"><div id="rp"></div><div id="ri"><h2 id="rt"></h2><p id="rs2"></p></div></div>
    <div id="rbt"><button class="bs bp" onclick="rst()">Repetir completo</button><button class="bs" id="bfl" onclick="sfl()">Solo falladas →</button></div>
    <div id="fs" style="display:none"><h3 id="fst"></h3><div id="fl"></div></div>
  </div>
</div>
<script>
const Q=[
  {b:"A. Drets davant l'Administració",q:"El derecho a una buena administración implica:",opts:["Solo recibir un trato cortés del personal funcionario","Recibir actuaciones administrativas proporcionales, motivadas y dentro de plazos razonables","Solo poder recurrir las resoluciones desfavorables","Acceder al expediente solo en el trámite de audiencia"],c:1,f:"Buena administración = actuaciones proporcionales + motivadas + dentro de plazos razonables. No es solo cortesía: es un estándar de actuación pública con consecuencias jurídicas."},
  {b:"A. Drets davant l'Administració",q:"¿Qué derecho tiene el ciudadano a la hora de identificarse ante la Administración?",opts:["Solo aportar siempre el DNI físico","Conocer en cualquier momento la identidad del personal responsable de la tramitación de sus asuntos","Identificar a los demás interesados del procedimiento","No identificarse en ningún caso"],c:1,f:"Derecho a saber: el ciudadano puede conocer la identidad del personal responsable de su asunto. Es un derecho activo que la Administración debe facilitar, especialmente con identificación visible."},
  {b:"A. Drets davant l'Administració",q:"El derecho a no aportar documentos significa que:",opts:["No hay que aportar nunca documentación","No es necesario aportar documentos que ya estén en poder de cualquier Administración Pública","Solo no se aportan documentos personales","Solo se aportan documentos electrónicos"],c:1,f:"Derecho a no repetir: no aportar documentos que ya tenga la Administración (no solo la receptora — cualquiera). El interesado puede oponerse a esa interconexión, pero la regla por defecto es no repetir."},
  {b:"A. Drets davant l'Administració",q:"¿Cuál de estos derechos NO pertenece al bloque 'drets davant l'Administració'?",opts:["Derecho a una buena administración","Derecho a presentar quejas y sugerencias","Derecho de acceso a la información pública","Derecho a la inmunidad parlamentaria"],c:3,f:"La inmunidad parlamentaria pertenece a diputados y senadores (T1), no a los ciudadanos frente a la Administración. Es trampa común: introducir un derecho que existe pero pertenece a otro bloque."},
  {b:"A. Drets davant l'Administració",q:"El derecho a presentar quejas y sugerencias permite:",opts:["Solo a interesados de procedimientos en curso","A cualquier ciudadano comunicar disfunciones o propuestas de mejora del servicio público","Solo en procedimientos sancionadores","Solo a través de redes sociales oficiales"],c:1,f:"Quejas y sugerencias = derecho universal del ciudadano para comunicar disfunciones o proponer mejoras. No requiere ser interesado de un procedimiento ni motivar la queja. La Administración debe analizarlas y dar respuesta."},
  {b:"A. Drets davant l'Administració",q:"El derecho a la protección de datos personales en la relación con la Administración implica:",opts:["Que la Administración no puede recoger datos personales nunca","Que la Administración debe tratar los datos según la normativa de protección de datos (RGPD + LOPDGDD)","Que solo los datos médicos están protegidos","Que los datos solo se protegen si el ciudadano lo pide expresamente"],c:1,f:"Protección de datos = aplicación íntegra del RGPD + LOPDGDD. La Administración trata datos pero debe hacerlo conforme a la normativa: legitimación, finalidad, minimización, derechos del interesado. Conecta con el T4."},
  {b:"B. Mitjans electrònics",q:"La Administración debe garantizar a la ciudadanía:",opts:["Solo atención presencial en oficinas físicas","La posibilidad de relacionarse con la Administración por medios electrónicos como derecho","Solo atención telefónica","Solo atención por correo postal"],c:1,f:"Derecho a relacionarse electrónicamente con la Administración. Es un derecho del ciudadano (con excepciones de obligación para personas jurídicas y otros sujetos). La Administración debe garantizar los medios electrónicos."},
  {b:"B. Mitjans electrònics",q:"¿Qué obligación tiene la Administración respecto a los servicios electrónicos?",opts:["Solo ponerlos en marcha si tiene presupuesto","Garantizar su funcionamiento, calidad y accesibilidad","Solo ofrecerlos a empresas, no a ciudadanos","Solo disponibles 8 horas al día en días hábiles"],c:1,f:"La Administración debe garantizar el funcionamiento, calidad y accesibilidad de los servicios electrónicos. No es opcional ni dependiente de presupuesto — es una obligación legal continuada."},
  {b:"B. Mitjans electrònics",q:"La calidad de los servicios públicos exige:",opts:["Solo cumplir con la legalidad formal","Estándares de calidad medibles, evaluación y mejora continua","Solo atender quejas cuando se reciben","Solo realizar encuestas de satisfacción anuales"],c:1,f:"Calidad de servicios públicos = estándares medibles + evaluación + mejora continua. No es solo cumplir formalmente — incluye autoexigencia, evaluación periódica y planes de mejora."},
  {b:"B. Mitjans electrònics",q:"¿Qué incluye expresamente el bloque de 'servicios de calidad y relación electrónica' del T3?",opts:["Solo regulación de la sede electrónica","Medios electrónicos, calidad del servicio y garantías de funcionamiento","Solo el régimen sancionador del personal","Solo el portal de transparencia"],c:1,f:"Bloque del T3: medios electrónicos + calidad del servicio + garantías de funcionamiento. Tres elementos que van juntos en la página correspondiente del resumen."},
  {b:"B. Mitjans electrònics",q:"La sede electrónica de la Generalitat permite a la ciudadanía:",opts:["Solo consultar el BOE","Realizar trámites, presentar documentación y recibir notificaciones","Solo descargar formularios en PDF","Solo consultar normativa autonómica"],c:1,f:"Sede electrónica = punto único para tramitar, presentar documentación y recibir notificaciones. Es el equivalente digital a una oficina física, con plenos efectos jurídicos."},
  {b:"B. Mitjans electrònics",q:"¿Qué obligación específica tiene la Administración respecto a la accesibilidad de los servicios electrónicos?",opts:["Solo facilitar el acceso a usuarios avanzados","Garantizar accesibilidad universal incluyendo a personas con discapacidad","Solo atender en castellano y catalán","Solo ofrecer servicios en horario de oficina"],c:1,f:"Accesibilidad universal = los servicios electrónicos deben ser usables por todas las personas, incluidas las que tengan algún tipo de discapacidad. Es una exigencia legal con base en normativa específica de accesibilidad."},
  {b:"C. Drets lingüístics — base",q:"En Cataluña, las lenguas oficiales son:",opts:["Solo el catalán","Solo el castellano","Catalán y castellano (y aranés en el Valle de Arán)","Solo el catalán según el EAC"],c:2,f:"Lenguas oficiales en Cataluña: catalán + castellano + aranés (en Arán y, según el EAC, también oficial en toda Cataluña). El catalán es la lengua propia y de uso normal y preferente de las administraciones catalanas."},
  {b:"C. Drets lingüístics — base",q:"El ciudadano tiene derecho a:",opts:["Usar solo el catalán en todas las gestiones","Elegir cualquiera de las lenguas oficiales en sus relaciones con la Administración catalana","Solo usar el castellano si demuestra conocimiento del catalán","Usar siempre la lengua que decida el funcionario"],c:1,f:"Derecho de elección de lengua: el ciudadano puede usar cualquiera de las lenguas oficiales (catalán o castellano) en sus relaciones con la Administración catalana. La Administración debe respetar esa elección."},
  {b:"C. Drets lingüístics — base",q:"¿Qué ley regula la política lingüística en Cataluña?",opts:["Llei 19/2014","Llei 1/1998","Llei 39/2015","Llei 26/2010"],c:1,f:"Llei 1/1998 = política lingüística. Es la ley específica del bloque de drets lingüístics en el T3. Memorízala bien — es la única ley del T3 con un único dígito en su número."},
  {b:"C. Drets lingüístics — base",q:"La Administración catalana debe atender al ciudadano en:",opts:["Solo en catalán siempre","En la lengua oficial que el ciudadano elija (catalán o castellano)","Solo en la lengua del registro de entrada del documento","En la lengua que el funcionario considere apropiada"],c:1,f:"Atención en la lengua elegida: la Administración debe responder al ciudadano en la lengua oficial que este haya elegido. No puede imponerle una lengua ni cambiar la que el ciudadano usó."},
  {b:"C. Drets lingüístics — base",q:"El catalán en Cataluña tiene la condición de:",opts:["Lengua extranjera","Lengua propia y oficial","Lengua minoritaria sin reconocimiento oficial","Lengua de uso restringido"],c:1,f:"Catalán en Cataluña: lengua propia + lengua oficial. Las dos condiciones simultáneamente. La 'lengua propia' implica preferencia de uso por las instituciones catalanas; la 'oficial' implica derecho del ciudadano a usarla."},
  {b:"C. Drets lingüístics — base",q:"El aranés es:",opts:["Una variante del catalán sin oficialidad","Lengua propia del Arán y oficial en Arán y en toda Cataluña según el EAC","Una lengua extranjera de uso minoritario","Una lengua oficial solo del Estado español"],c:1,f:"Aranés (variedad de la lengua occitana hablada en el Valle de Arán) = lengua propia del Arán + oficial en el Arán y, según el EAC reformado, también oficial en toda Cataluña. Conecta con el T1 (EAC)."},
  {b:"D. Información pública — recordatorio",q:"El derecho de acceso a la información pública lo puede ejercer:",opts:["Solo periodistas","Solo interesados de procedimientos en curso","Cualquier persona, sin necesidad de motivar ni acreditar interés","Solo ciudadanos españoles con DNI"],c:2,f:"Derecho universal: cualquier persona puede ejercer el derecho de acceso. No requiere ser español, ni interesado, ni periodista, ni motivar. Recordatorio del bloque del T3 — repaso esencial."},
  {b:"D. Información pública — recordatorio",q:"Si la Administración no resuelve en plazo una solicitud de acceso a información pública:",opts:["Se entiende denegada (silencio negativo)","Se entiende estimada (silencio positivo) en este caso","La Administración no está obligada a resolver","El procedimiento caduca automáticamente"],c:1,f:"En el ámbito catalán (Llei 19/2014) la regla es el silencio positivo en el derecho de acceso. Si la Administración no resuelve en el plazo, se entiende estimada la solicitud, salvo en los supuestos en que la información esté afectada por límites tasados por ley."},
  {b:"D. Información pública — recordatorio",q:"¿Qué órgano resuelve las reclamaciones contra la denegación del derecho de acceso en Cataluña?",opts:["El Tribunal Constitucional directamente","La Comissió de Garantia del Dret d'Accés a la Informació Pública (GAIP)","El Defensor del Pueblo estatal","El Tribunal Superior de Justicia de Cataluña en primera instancia"],c:1,f:"GAIP = Comissió de Garantia del Dret d'Accés a la Informació Pública. Órgano específico catalán que resuelve las reclamaciones contra denegaciones del derecho de acceso. Es el mecanismo de control especializado del T3."},
  {b:"D. Información pública — recordatorio",q:"Los límites al derecho de acceso a la información pública son:",opts:["Discrecionales por parte de la Administración","Tasados por ley y deben aplicarse de forma restrictiva y motivada","Ilimitados si se considera que perjudican a la Administración","Aplicables solo a periodistas"],c:1,f:"Los límites son tasados por ley (no discrecionales) y deben aplicarse de forma restrictiva y motivada. La regla es el acceso; los límites son la excepción y deben justificarse caso por caso."},
  {b:"D. Información pública — recordatorio",q:"¿Cuál de estos NO es un límite legal al derecho de acceso?",opts:["La protección de datos personales","La seguridad nacional","La preferencia política del solicitante","Los secretos comerciales y la propiedad intelectual"],c:2,f:"La preferencia política del solicitante NO es un límite legal — el derecho es universal y no depende de quién solicite. Los límites tasados son: seguridad, datos personales, secretos comerciales, propiedad intelectual, prevención del delito, etc."},
  {b:"E. Trampas leyes T3",q:"La Llei 19/2014 catalana cubre:",opts:["Solo procedimiento administrativo","Transparencia, acceso a la información pública y bon govern","Solo política lingüística","Solo régimen jurídico interno de la Generalitat"],c:1,f:"Llei 19/2014 = transparencia + acceso + bon govern. Tres materias en una sola ley. Es la norma central del T3 y cubre los tres primeros bloques del tema."},
  {b:"E. Trampas leyes T3",q:"La Llei 26/2010 catalana cubre:",opts:["Transparencia y bon govern","Régimen jurídico, procedimiento y derechos y deberes ante la Administración catalana","Política lingüística","Solo la organización de la Generalitat"],c:1,f:"Llei 26/2010 = régimen jurídico + procedimiento + derechos y deberes de los ciudadanos ante la Administración catalana. Es complementaria de la Llei 39/2015 estatal y añade especialidades catalanas."},
  {b:"E. Trampas leyes T3",q:"La Llei 19/2013 estatal:",opts:["Es la versión catalana de la transparencia","Es el marco estatal de transparencia, acceso y buen gobierno","Es solo de aplicación en el ámbito local","Es una ley orgánica de derechos fundamentales"],c:1,f:"Llei 19/2013 = ESTATAL. Marco estatal de transparencia, acceso y buen gobierno. La 19/2014 es la catalana. El examen invierte los números (13 vs 14) — la trampa numérica más recurrente del T3."},
  {b:"E. Trampas leyes T3",q:"La Llei 39/2015 NO cubre:",opts:["El procedimiento administrativo común","Los derechos del interesado en el procedimiento","La política lingüística","Los actos administrativos"],c:2,f:"La Llei 39/2015 NO cubre la política lingüística — eso es la Llei 1/1998. La 39/2015 cubre procedimiento, derechos del interesado, actos, recursos. No mezclar competencias entre leyes."},
  {b:"F. Síntesis bloques T3",q:"¿Cuál de estas afirmaciones del T3 es CORRECTA?",opts:["La transparencia y el bon govern son sinónimos","La transparencia es publicidad activa + derecho de acceso; el bon govern es ética + control + responsabilidad","El bon govern incluye la política lingüística","La Llei 19/2014 regula el procedimiento administrativo"],c:1,f:"La afirmación correcta es la B: transparencia (qué se publica + qué se puede pedir) vs bon govern (cómo debe actuar el poder). Son bloques distintos pero complementarios dentro del T3."},
  {b:"F. Síntesis bloques T3",q:"¿Qué bloque del T3 incluye los derechos del ciudadano frente a la Administración?",opts:["Solo bon govern","Drets davant l'Administració, que incluye buena administración, medios electrónicos, lengua e información pública","Solo transparència","Solo drets lingüístics"],c:1,f:"Bloque amplio: drets davant l'Administració incluye varios subbloques: buena administración + medios electrónicos + lengua + información pública. Es el bloque del T3 que cubre los derechos activos del ciudadano."},
  {b:"F. Síntesis bloques T3",q:"¿Qué relación existe entre transparencia y bon govern?",opts:["Son figuras opuestas","La transparencia es uno de los pilares del bon govern, junto con la ética, la buena gestión y la rendición de cuentas","El bon govern es una parte de la transparencia","No tienen relación funcional"],c:1,f:"La transparencia es UNA de las cuatro patas del bon govern: ética + transparencia + buena gestión + rendición de cuentas. Pero el T3 las trata en bloques separados por su entidad propia."},
  {b:"G. Trampas concretas T3",q:"¿Cuál de estas afirmaciones sobre publicidad activa es INCORRECTA?",opts:["Es difusión de información de oficio","Requiere solicitud previa del ciudadano","Comprende información institucional, organizativa y económica","Es una manifestación de la transparencia"],c:1,f:"La afirmación incorrecta es la B. La publicidad ACTIVA es de oficio (sin solicitud). La que requiere solicitud es el derecho de acceso (publicidad pasiva). Trampa clásica: confundir activa con pasiva."},
  {b:"G. Trampas concretas T3",q:"¿Cuál de estas afirmaciones sobre el bon govern es INCORRECTA?",opts:["Combina ética pública, transparencia, calidad y rendición de cuentas","Aplica a altos cargos, directivos y personal","Solo aplica a cargos electos del Parlament","Incluye principios como imparcialidad, dedicación y responsabilidad"],c:2,f:"La afirmación incorrecta es la C. El bon govern aplica a altos cargos + cargos directivos + personal al servicio de la Administración. No solo a cargos electos. Es un régimen amplio que cubre toda la cadena de actuación pública."},
  {b:"G. Trampas concretas T3",q:"¿Cuál de estas afirmaciones sobre los drets lingüístics es CORRECTA?",opts:["El ciudadano debe usar siempre el catalán en Cataluña","La Administración catalana puede imponer la lengua que prefiera","El ciudadano puede elegir libremente entre catalán y castellano en sus relaciones con la Administración","El aranés no tiene reconocimiento oficial"],c:2,f:"La afirmación correcta es la C. Derecho de elección: el ciudadano elige libremente entre catalán y castellano. La Administración debe respetar esa elección y atenderle en la lengua escogida."},
  {b:"G. Trampas concretas T3",q:"¿Cuál de estas afirmaciones sobre el derecho de acceso es INCORRECTA?",opts:["No requiere motivación","No requiere acreditación de interés legítimo","Es universal: lo puede ejercer cualquier persona","Solo lo pueden ejercer interesados formales del procedimiento"],c:3,f:"La afirmación incorrecta es la D. El derecho de acceso es universal — lo puede ejercer cualquier persona, no solo interesados. Confundirlo con el derecho del interesado a ver el expediente (que sí requiere ser parte) es trampa frecuente."},
  {b:"H. Detalle ético — bon govern",q:"Los altos cargos deben respetar el régimen de:",opts:["Solo declaración de IRPF","Incompatibilidades, publicidad de actividades, bienes e intereses","Solo control disciplinario interno","Solo régimen económico de viajes oficiales"],c:1,f:"Régimen completo de altos cargos: incompatibilidades + publicidad de actividades + publicidad de bienes + publicidad de intereses. Las cuatro obligaciones forman parte del estatuto público de los altos cargos."},
  {b:"H. Detalle ético — bon govern",q:"El conflicto de interés en bon govern se resuelve mediante:",opts:["Decisión unilateral del cargo afectado","Abstención del alto cargo en el asunto que genera el conflicto","Consulta al órgano superior solo si afecta a familiares","No tiene mecanismo específico de resolución"],c:1,f:"Resolución del conflicto: abstención del alto cargo en el asunto. La abstención debe ser inmediata cuando se aprecie el conflicto. No basta con declararlo — hay que abstenerse efectivamente de la decisión."},
  {b:"H. Detalle ético — bon govern",q:"El secreto y confidencialidad de los altos cargos:",opts:["Es un derecho del cargo a no revelar información que considere conveniente","Es una obligación de no revelar hechos conocidos por razón del cargo","Solo aplica durante el ejercicio del cargo, no después","Aplica solo a información clasificada por el TC"],c:1,f:"Secreto y confidencialidad = OBLIGACIÓN del cargo respecto de los hechos conocidos por razón del cargo. No es un derecho de discrecionalidad y persiste también tras el cese del cargo."},
  {b:"I. Estructura T3 — síntesis final",q:"¿Cuántas leyes principales se manejan en el T3?",opts:["Solo 2 (catalanas)","5 leyes (3 catalanas + 2 estatales)","10 leyes y reglamentos","Solo la Llei 19/2014"],c:1,f:"5 leyes del T3: 3 catalanas (19/2014, 26/2010, 1/1998) + 2 estatales (19/2013, 39/2015). Memorízalas todas y a qué materia se refiere cada una."},
  {b:"I. Estructura T3 — síntesis final",q:"Si tuvieras que resumir el T3 en una sola frase, sería:",opts:["Solo trata de transparencia","Trata de cómo debe actuar la Administración (bon govern), qué debe enseñar (transparència), qué puede pedir el ciudadano (drets) y en qué lengua puede hacerlo (drets lingüístics)","Solo trata de los derechos del interesado en el procedimiento","Solo trata de la organización interna de la Generalitat"],c:1,f:"Síntesis del T3: bon govern (cómo actuar) + transparencia (qué enseñar) + drets davant l'Administració (qué pedir) + drets lingüístics (en qué lengua). Cuatro grandes bloques para entender el tema completo."},
  {b:"I. Estructura T3 — síntesis final",q:"¿Cuál es el principal vínculo entre el T3 y el T5?",opts:["No hay relación entre ambos temas","El T3 regula derechos genéricos del ciudadano y el T5 los aplica al procedimiento concreto","El T5 deroga al T3","El T3 es solo una introducción al T5"],c:1,f:"Vínculo T3-T5: el T3 establece derechos genéricos del ciudadano frente a la Administración (acceso, lengua, buena administración). El T5 los aplica al procedimiento concreto (derechos del interesado en cada fase). Son complementarios."},
  {b:"J. Trampas finales T3",q:"¿Cuál de estas combinaciones ley-materia es INCORRECTA?",opts:["Llei 19/2014 — transparencia y bon govern catalán","Llei 1/1998 — política lingüística","Llei 39/2015 — procedimiento administrativo común","Llei 26/2010 — política lingüística"],c:3,f:"La combinación incorrecta es la D. Llei 26/2010 es de régimen jurídico y procedimiento catalán, NO de política lingüística (esa es la 1/1998). Confundir 26/2010 con 1/1998 es trampa frecuente."},
  {b:"J. Trampas finales T3",q:"¿Cuál de estas afirmaciones sobre los portales de transparencia es CORRECTA?",opts:["Transparència gencat y Transparència Catalunya son el mismo portal con distinto nombre","Transparència gencat = datos de la Administración de la Generalitat; Transparència Catalunya = sector público catalán y otros sujetos obligados","Transparència Catalunya es solo para municipios","Solo existe Transparència gencat como portal oficial"],c:1,f:"Distinción entre portales: Transparència gencat = datos de la Administración de la Generalitat. Transparència Catalunya = portal más amplio con sector público catalán + otros sujetos obligados. No son intercambiables."},
  {b:"J. Trampas finales T3",q:"¿Cuál es la diferencia clave entre publicidad activa y derecho de acceso?",opts:["Son lo mismo con distinto nombre","Publicidad activa = de oficio sin solicitud; derecho de acceso = a solicitud del ciudadano","La publicidad activa requiere autorización judicial","El derecho de acceso solo aplica a periodistas"],c:1,f:"La diferencia clave del T3: ACTIVA = de oficio (la Administración publica sin que nadie pida). ACCESO = a petición (el ciudadano solicita información concreta). Ambas son manifestaciones de la transparencia pero funcionan distinto."},
  {b:"K. Aplicaciones prácticas T3",q:"Un ciudadano solicita información sobre los sueldos de los altos cargos de la Generalitat. ¿Tiene derecho?",opts:["No: los sueldos son privados","Sí: forman parte de la información económica de publicidad activa, debe estar publicada de oficio","Solo si el ciudadano demuestra interés periodístico","Solo si se solicita por escrito al Conseller competente"],c:1,f:"Sueldos de altos cargos = información de publicidad activa obligatoria (bloque económico, presupuestario y patrimonial). Debe estar publicada de oficio en los portales de transparencia. No requiere solicitud específica."},
  {b:"K. Aplicaciones prácticas T3",q:"Un ciudadano se dirige a la Administración catalana por escrito en castellano. La Administración debe:",opts:["Responder solo en catalán por ser la lengua propia","Responder en la lengua que el ciudadano usó (castellano) o en la que él prefiera","Devolver el escrito por no estar en catalán","Pedir traducción al catalán antes de tramitar"],c:1,f:"Derecho de elección de lengua: la Administración debe responder en la lengua que el ciudadano usó o en la que prefiera (catalán o castellano). No puede imponer una lengua ni cambiar la que el ciudadano usó."},
  {b:"K. Aplicaciones prácticas T3",q:"Un alto cargo recibe una invitación a un viaje pagado por una empresa privada que tiene contratos con la Generalitat. Debe:",opts:["Aceptar si el viaje no supera los 1000€","Rechazar el viaje por incompatibilidad con el principio de no usar el cargo para obtener ventajas","Aceptar pero declararlo después al Tribunal de Cuentas","Aceptar solo si el viaje es de menos de 3 días"],c:1,f:"Caso típico de bon govern: rechazo de favores fuera de los usos sociales + no usar el cargo para obtener ventajas. Una invitación de un contratista no entra en los usos sociales y crea conflicto de interés evidente."},
  {b:"K. Aplicaciones prácticas T3",q:"Un ciudadano presenta una queja sobre un servicio público. La Administración debe:",opts:["Ignorarla si no afecta a un procedimiento abierto","Analizarla, valorar las disfunciones señaladas y dar respuesta motivada","Reenviarla al Defensor del Pueblo automáticamente","Solo registrarla sin más actuación"],c:1,f:"Quejas y sugerencias: la Administración debe analizarlas, valorar las disfunciones y dar respuesta motivada. No es un trámite de archivo automático — es un mecanismo de mejora del servicio que conecta con bon govern."},
  {b:"L. Repaso final integrado",q:"¿Cuál es la jerarquía mental para resolver una pregunta del T3?",opts:["Empezar siempre por la Llei 19/2014","Identificar primero el bloque (transparencia, procedimiento, lengua, bon govern), luego asociarlo a la ley correspondiente","Aplicar siempre la ley estatal","Buscar la respuesta más larga"],c:1,f:"Jerarquía mental T3: bloque → ley → contenido. Identificar primero a qué bloque material pertenece la pregunta (transparencia, procedimiento, lengua, bon govern) y desde ahí buscar la ley específica que regula ese bloque."},
  {b:"L. Repaso final integrado",q:"Si una pregunta menciona 'GAIP' debes asociarla a:",opts:["Bon govern","Derecho de acceso a la información pública en Cataluña","Política lingüística","Sanciones disciplinarias del personal"],c:1,f:"GAIP (Comissió de Garantia del Dret d'Accés a la Informació Pública) = órgano que resuelve reclamaciones del derecho de acceso en Cataluña. Si aparece GAIP, la pregunta es de derecho de acceso (bloque transparencia)."},
  {b:"L. Repaso final integrado",q:"La conexión entre el T1 (CE+EAC) y el T3 está en:",opts:["No hay conexión entre ambos temas","El EAC reconoce derechos lingüísticos y de buena administración que el T3 desarrolla","El T1 deroga al T3","El T3 es solo aplicación del T1"],c:1,f:"Conexión T1-T3: el EAC (T1) reconoce derechos lingüísticos (catalán, castellano, aranés) y de buena administración. El T3 desarrolla estos derechos con su normativa específica (Llei 1/1998, Llei 19/2014). Son complementarios."}
];

let pool=[...Q],idx=0,nOk=0,nEr=0,fl=[],ans=false;
function render(){
  if(idx>=pool.length){showRes();return;}
  const q=pool[idx],tot=pool.length;
  document.getElementById('fill').style.width=Math.round(idx/tot*100)+'%';
  document.getElementById('pn').textContent=(idx+1)+' / '+tot;
  document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;
  document.getElementById('vpe').textContent=tot-idx;
  document.getElementById('pill').textContent=q.b;
  document.getElementById('qnl').textContent='Pregunta '+(idx+1);
  document.getElementById('qbl').textContent=q.b;
  document.getElementById('qt').textContent=q.q;
  const o=document.getElementById('opts');o.innerHTML='';
  ['A','B','C','D'].forEach((l,i)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML='<span class="lt">'+l+'</span><span>'+q.opts[i]+'</span>';
    b.onclick=()=>sel(i,b);o.appendChild(b);
  });
  const f=document.getElementById('fb');f.className='';f.innerHTML='';
  document.getElementById('bn').style.display='none';ans=false;
}
function sel(i,btn){
  if(ans)return;ans=true;
  const q=pool[idx];
  document.querySelectorAll('.opt').forEach(b=>b.classList.add('dis'));
  const f=document.getElementById('fb');
  if(i===q.c){btn.classList.add('ok');nOk++;f.className='show ok';f.innerHTML='<div class="fh">Correcto</div><div class="fd">'+q.f+'</div>';}
  else{btn.classList.add('er');document.querySelectorAll('.opt')[q.c].classList.add('ok');nEr++;fl.push({q:q.q,co:q.opts[q.c],tu:q.opts[i],f:q.f});f.className='show er';f.innerHTML='<div class="fh">Incorrecto — correcta: '+['A','B','C','D'][q.c]+'</div><div class="fd">'+q.f+'</div>';}
  document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;
  document.getElementById('bn').style.display='inline-block';
}
function nxt(){idx++;render();}
function showRes(){
  ['hdr','pw','stats','qc','opts','fb','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  const tot=pool.length,pct=Math.round(nOk/tot*100);
  document.getElementById('rp').textContent=pct+'%';
  document.getElementById('rt').textContent=pct>=80?'T3 dominado':pct>=60?'Nivel medio — repasa los fallos':'Refuerza derechos y leyes';
  document.getElementById('rs2').textContent=nOk+' correctas de '+tot+'.'+(fl.length>0?' '+fl.length+' para repasar.':' Sin errores.');
  if(!fl.length)document.getElementById('bfl').style.display='none';
  if(fl.length){document.getElementById('fs').style.display='block';document.getElementById('fst').textContent='Preguntas falladas ('+fl.length+')';const fll=document.getElementById('fl');fll.innerHTML='';fl.forEach(f=>{const d=document.createElement('div');d.className='fi';d.innerHTML='<div class="fq">'+f.q+'</div><div class="fb2"><span class="bg er">Tu respuesta: '+f.tu+'</span><span class="bg ok">Correcta: '+f.co+'</span></div><div class="fe">'+f.f+'</div>';fll.appendChild(d);});}
  document.getElementById('res').style.display='block';
}
function rst(){pool=[...Q];idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
function sfl(){if(!fl.length)return;pool=fl.map(f=>Q.find(q=>q.q===f.q)).filter(Boolean);idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
render();
</script>
