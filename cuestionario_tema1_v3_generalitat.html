<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tema 1 · CE, EAC, competencias, Govern</title>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f7f4;--surface:#fff;--surface2:#f1f0ed;--border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.2);--text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;--ok:#1a7a4a;--ok-bg:#eaf5ee;--ok-border:rgba(26,122,74,.25);--err:#c0392b;--err-bg:#fdf0ee;--err-border:rgba(192,57,43,.25);--accent:#1a1a18;--r:10px;--rs:6px}
@media(prefers-color-scheme:dark){:root{--bg:#18181a;--surface:#222224;--surface2:#2a2a2c;--border:rgba(255,255,255,.1);--border-strong:rgba(255,255,255,.2);--text:#f0efec;--text2:#a0a09a;--text3:#606060;--ok:#4caf7a;--ok-bg:rgba(76,175,122,.12);--ok-border:rgba(76,175,122,.3);--err:#e57373;--err-bg:rgba(229,115,115,.12);--err-border:rgba(229,115,115,.3);--accent:#f0efec}}
html{font-size:16px}body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem}
#app{width:100%;max-width:680px}#hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:2rem}#hdr h1{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px;letter-spacing:-.01em}#hdr p{font-size:13px;color:var(--text3)}#pill{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid var(--border-strong);color:var(--text2);background:var(--surface2);white-space:nowrap;flex-shrink:0}
#pw{margin-bottom:1.25rem}#pr{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:7px}#pr span:last-child{font-weight:500;color:var(--text2)}#track{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden}#fill{height:3px;background:var(--accent);border-radius:3px;width:0%;transition:width .4s}
#stats{display:flex;gap:1.5rem;margin-bottom:2rem;font-size:13px;color:var(--text2)}#stats span{display:flex;align-items:center;gap:5px}.dot{width:7px;height:7px;border-radius:50%;display:inline-block}.dot-ok{background:var(--ok)}.dot-er{background:var(--err)}
#qc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.75rem;margin-bottom:1.5rem}#qm{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.04em}#qt{font-size:15px;line-height:1.55;font-weight:500;margin-bottom:1.5rem}
#opts{display:flex;flex-direction:column;gap:8px}.opt{width:100%;text-align:left;padding:12px 16px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface);font-size:14px;line-height:1.45;cursor:pointer;color:var(--text);font-family:inherit;transition:border-color .15s,background .15s}.opt:hover:not(.dis){border-color:var(--border-strong);background:var(--surface2)}.opt.ok{border-color:var(--ok-border);background:var(--ok-bg);color:var(--ok)}.opt.er{border-color:var(--err-border);background:var(--err-bg);color:var(--err)}.opt.dis{cursor:default;opacity:.5}
#fb{margin-top:1rem;padding:14px 16px;border-radius:var(--rs);font-size:13px;line-height:1.55;display:none}#fb.ok{background:var(--ok-bg);border:1px solid var(--ok-border);color:var(--ok)}#fb.er{background:var(--err-bg);border:1px solid var(--err-border);color:var(--err)}
#br{display:flex;gap:.75rem;margin-top:1.25rem}#bn{flex:1;padding:11px;border-radius:var(--rs);border:1px solid var(--border-strong);background:var(--surface2);font-size:13px;font-weight:500;cursor:pointer;color:var(--text);font-family:inherit;display:none}#bn:hover{background:var(--border)}
#res{display:none}#rh{font-size:22px;font-weight:700;text-align:center;margin-bottom:.25rem}#rp{font-size:48px;font-weight:800;text-align:center;margin-bottom:.5rem}#ri{font-size:14px;text-align:center;color:var(--text2);margin-bottom:2rem}#rt{font-size:15px;font-weight:600;margin-bottom:1rem}#rs2{display:flex;gap:1rem;margin-bottom:2rem;justify-content:center}
#rbt{display:flex;gap:.75rem;margin-bottom:2rem;justify-content:center;flex-wrap:wrap}#rbt button{padding:10px 24px;border-radius:var(--rs);border:1px solid var(--border-strong);background:var(--surface);font-size:13px;font-weight:500;cursor:pointer;color:var(--text);font-family:inherit}#rbt button:hover{background:var(--surface2)}
#bfl{margin-top:.5rem}.fs{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:.75rem}.fst{font-size:13px;font-weight:500;margin-bottom:.5rem}.fst .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;margin-left:6px;font-weight:500}.fst .badge-err{background:var(--err-bg);color:var(--err);border:1px solid var(--err-border)}.fst .badge-ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-border)}.fl{font-size:13px;color:var(--text2);line-height:1.5}
@media(max-width:500px){body{padding:1.25rem .75rem 3rem}#qc{padding:1.25rem}#hdr{flex-direction:column;gap:.5rem}#pill{align-self:flex-start}}</style>
</head>
<body>
<div id="app">
<div id="hdr"><div><h1>Tema 1 · CE, EAC, competencias, Govern</h1><p>Test 3 — EAC, competencias, Presidència y Govern</p></div><span id="pill">0 / 43</span></div>
<div id="pw"><div id="pr"><span>Progreso</span><span id="pn">0%</span></div><div id="track"><div id="fill"></div></div></div>
<div id="stats"><span><i class="dot dot-ok"></i> Correctas: <b id="sc-ok">0</b></span><span><i class="dot dot-er"></i> Incorrectas: <b id="sc-er">0</b></span></div>
<div id="qc"><div id="qm"></div><div id="qt"></div><div id="opts"></div><div id="fb"></div><div id="br"><button id="bn" onclick="next()">Siguiente \u2192</button></div></div>
<div id="res"><div id="rh">Resultado</div><div id="rp"></div><div id="ri"></div><div id="rs2"></div><div id="rbt"><button onclick="restart()">Repetir completo</button><button onclick="retryFailed()">Solo falladas</button></div><div id="rt">Preguntas falladas</div><div id="bfl"></div></div>
</div>
<script>
const Q=[{"b": "Participación, garantías judiciales, derechos sociales y deberes", "q": "¿Cuál de los siguientes derechos aparece en el tema como fundamental o muy protegido?", "opts": ["Propiedad privada", "Libertad de empresa", "Educación", "Fundación"], "c": 2, "f": "El art. 27 CE se destaca en ese grupo."}, {"b": "Participación, garantías judiciales, derechos sociales y deberes", "q": "Según el tema, suelen aparecer en preguntas de clasificación como NO fundamentales de protección menor:", "opts": ["educación, sindicación y huelga", "propiedad privada, fundación, trabajo, negociación colectiva y libertad de empresa", "reunión, asociación y tutela judicial efectiva", "vida, libertad y honor"], "c": 1, "f": "El cuadro comparativo lo señala así."}, {"b": "Participación, garantías judiciales, derechos sociales y deberes", "q": "El derecho de petición individual y colectiva por escrito se regula en el art.:", "opts": ["23 CE", "24 CE", "27 CE", "29 CE"], "c": 3, "f": "Art. 29 CE."}, {"b": "Participación, garantías judiciales, derechos sociales y deberes", "q": "El derecho y deber de defender España se encuentra en el art.:", "opts": ["29 CE", "30 CE", "31 CE", "32 CE"], "c": 1, "f": "Art. 30 CE."}, {"b": "Participación, garantías judiciales, derechos sociales y deberes", "q": "El deber de contribuir al sostenimiento de los gastos públicos según capacidad económica corresponde al art.:", "opts": ["30 CE", "31 CE", "32 CE", "33 CE"], "c": 1, "f": "Art. 31 CE."}, {"b": "Participación, garantías judiciales, derechos sociales y deberes", "q": "El sistema tributario, según el art. 31 CE recogido en el tema, debe ser:", "opts": ["unitario y centralizado", "justo, igual y progresivo", "discrecional y flexible", "proporcional y excepcional"], "c": 1, "f": "Así se resume en el material."}, {"b": "Participación, garantías judiciales, derechos sociales y deberes", "q": "El derecho a contraer matrimonio en plena igualdad jurídica se recoge en el art.:", "opts": ["30 CE", "31 CE", "32 CE", "38 CE"], "c": 2, "f": "Art. 32 CE."}, {"b": "Participación, garantías judiciales, derechos sociales y deberes", "q": "Meter en el mismo saco “derechos fundamentales”, “derechos del Título I” y “principios rectores” es:", "opts": ["correcto si se cita el art. 10", "un error típico de examen", "obligatorio en tests de oposición", "una equivalencia doctrinal"], "c": 1, "f": "El tema advierte expresamente de esta confusión."}, {"b": "Estatut d'Autonomia de Catalunya: identidad, derechos y estructura", "q": "El Título Preliminar del EAC regula principalmente:", "opts": ["la reforma constitucional del Estado", "los elementos definidores de Cataluña", "la jurisdicción militar", "la política monetaria"], "c": 1, "f": "Es la idea de apertura del bloque del EAC."}, {"b": "Estatut d'Autonomia de Catalunya: identidad, derechos y estructura", "q": "Según el tema, Cataluña aparece en el EAC como:", "opts": ["Estado federado soberano", "provincia histórica", "nacionalidad constituida en comunidad autónoma", "región administrativa sin identidad propia"], "c": 2, "f": "Así lo define el resumen."}, {"b": "Estatut d'Autonomia de Catalunya: identidad, derechos y estructura", "q": "¿Cuál de los siguientes órganos integra la Generalitat según el tema?", "opts": ["Tribunal Supremo", "Parlament de Catalunya", "Defensor del Pueblo estatal", "Consejo de Estado"], "c": 1, "f": "Forma parte nuclear de la Generalitat."}, {"b": "Estatut d'Autonomia de Catalunya: identidad, derechos y estructura", "q": "Además del Parlament, la Presidència y el Govern, el tema incluye dentro de la Generalitat al:", "opts": ["Tribunal Constitucional", "Consell de Garanties Estatutàries", "Consejo General del Poder Judicial", "Congreso de los Diputados"], "c": 1, "f": "Se enumera expresamente."}, {"b": "Estatut d'Autonomia de Catalunya: identidad, derechos y estructura", "q": "El Síndic de Greuges, según el tema, integra:", "opts": ["la Corona", "la Generalitat", "las Cortes Generales", "el Gobierno del Estado"], "c": 1, "f": "Se incluye en la definición amplia de Generalitat."}, {"b": "Estatut d'Autonomia de Catalunya: identidad, derechos y estructura", "q": "El aranés es, según el tema:", "opts": ["lengua cooficial solo estatal", "lengua propia de Aran y también oficial en Catalunya", "dialecto sin reconocimiento oficial", "lengua exclusiva del Parlament"], "c": 1, "f": "Dato destacado del cuadro de elementos."}, {"b": "Estatut d'Autonomia de Catalunya: identidad, derechos y estructura", "q": "La condición política de catalanes la tienen, según el tema:", "opts": ["todos los residentes extranjeros en Cataluña", "los ciudadanos españoles con vecindad administrativa en Catalunya", "solo los nacidos en Cataluña", "solo quienes voten en elecciones autonómicas"], "c": 1, "f": "Así se recoge literalmente."}, {"b": "Estatut d'Autonomia de Catalunya: identidad, derechos y estructura", "q": "¿Cuál de los siguientes es un símbolo de Cataluña según el tema?", "opts": ["La rojigualda como símbolo exclusivo", "La Diada del 11 de septiembre", "El escudo del Senado", "La Constitución de Cádiz"], "c": 1, "f": "El cuadro cita senyera, Diada y Els Segadors."}, {"b": "Estatut d'Autonomia de Catalunya: identidad, derechos y estructura", "q": "La capital de Cataluña, sede permanente del Parlament, la Presidència y el Govern, es:", "opts": ["Girona", "Lleida", "Tarragona", "Barcelona"], "c": 3, "f": "Barcelona."}, {"b": "Estatut d'Autonomia de Catalunya: identidad, derechos y estructura", "q": "El EAC, según el tema, incorpora:", "opts": ["solo una remisión a la Constitución, sin catálogo propio", "un catálogo propio amplio de derechos, deberes y principios rectores", "solo competencias tributarias", "solo regulación lingüística"], "c": 1, "f": "El resumen lo subraya."}, {"b": "Estatut d'Autonomia de Catalunya: identidad, derechos y estructura", "q": "Los poderes públicos de Catalunya deben promover el ejercicio pleno de los derechos reconocidos por el EAC, la CE, la UE, la DUDH, el CEDH y:", "opts": ["los tratados suscritos por cualquier comunidad autónoma", "otros tratados suscritos por España", "las ordenanzas municipales", "las instrucciones internas del Govern"], "c": 1, "f": "Así lo formula el material."}, {"b": "Estatut d'Autonomia de Catalunya: identidad, derechos y estructura", "q": "Conforme al tema, no debe confundirse:", "opts": ["Constitución con leyes orgánicas", "Constitución como marco general del Estado y EAC como norma institucional básica de autogobierno de Catalunya", "Parlament con Govern", "Presidència con Tribunal Constitucional"], "c": 1, "f": "Es la advertencia final del bloque."}, {"b": "Tipología de competencias de la Generalitat", "q": "Las competencias exclusivas de la Generalitat implican, según el tema:", "opts": ["solo función ejecutiva", "potestad legislativa, reglamentaria y función ejecutiva íntegramente", "ejecución de normativa estatal sin desarrollo propio", "actuación solo en materias compartidas"], "c": 1, "f": "Exclusiva = todo."}, {"b": "Tipología de competencias de la Generalitat", "q": "Las competencias compartidas significan que la Generalitat:", "opts": ["carece de potestad legislativa", "solo puede dictar reglamentos internos", "actúa dentro del marco de las bases que fije el Estado", "puede desplazar siempre la normativa estatal"], "c": 2, "f": "Compartida = bases del Estado + desarrollo catalán."}, {"b": "Tipología de competencias de la Generalitat", "q": "Las competencias ejecutivas suponen que la Generalitat:", "opts": ["aprueba leyes orgánicas estatales", "ejecuta la normativa estatal y organiza su propia Administración para aplicarla", "solo tiene iniciativa política", "puede revisar sentencias firmes"], "c": 1, "f": "Es la definición del art. 112 EAC según el tema."}, {"b": "Tipología de competencias de la Generalitat", "q": "La regla mnemotécnica correcta es:", "opts": ["exclusiva = ejecutar; compartida = todo; ejecutiva = bases", "exclusiva = todo; compartida = bases del Estado + desarrollo catalán; ejecutiva = ejecutar y organizar la Administración", "exclusiva = bases; compartida = ejecución; ejecutiva = legislación plena", "todas son equivalentes"], "c": 1, "f": "Es la síntesis exacta del resumen."}, {"b": "Tipología de competencias de la Generalitat", "q": "El art. 110 EAC se refiere a las competencias:", "opts": ["compartidas", "ejecutivas", "exclusivas", "fiscales"], "c": 2, "f": "Art. 110 = exclusivas."}, {"b": "Tipología de competencias de la Generalitat", "q": "El art. 111 EAC se refiere a las competencias:", "opts": ["compartidas", "ejecutivas", "exclusivas", "institucionales"], "c": 0, "f": "Art. 111 = compartidas."}, {"b": "Tipología de competencias de la Generalitat", "q": "El art. 112 EAC se refiere a las competencias:", "opts": ["compartidas", "ejecutivas", "exclusivas", "territoriales"], "c": 1, "f": "Art. 112 = ejecutivas."}, {"b": "Tipología de competencias de la Generalitat", "q": "Según el tema, la STC 31/2010 afectó al art. 111 EAC recordando que las bases estatales:", "opts": ["solo pueden fijarse por reforma constitucional", "quedan reducidas exclusivamente a normas con rango de ley", "también pueden incluir normas reglamentarias básicas", "desaparecen en las competencias compartidas"], "c": 2, "f": "Ese es el matiz importante del material."}, {"b": "Tipología de competencias de la Generalitat", "q": "Pensar que una competencia compartida significa “mitad y mitad” es:", "opts": ["correcto", "una simplificación errónea", "exacto si interviene el Parlament", "obligatorio en doctrina catalana"], "c": 1, "f": "El tema lo identifica como trampa típica."}, {"b": "Tipología de competencias de la Generalitat", "q": "Si una pregunta habla de “bases estatales”, según la regla visual del tema te está llevando casi seguro a competencias:", "opts": ["exclusivas", "compartidas", "ejecutivas", "residuales"], "c": 1, "f": "Regla visual final del bloque."}, {"b": "Presidència y Govern de la Generalitat", "q": "La Presidència de la Generalitat está regulada en el EAC, según el tema, en el art.:", "opts": ["65", "66", "67", "68"], "c": 2, "f": "Art. 67 EAC."}, {"b": "Presidència y Govern de la Generalitat", "q": "El desarrollo legal de la Presidència se contiene, según el tema, en la:", "opts": ["Llei 1/2006", "Llei 13/2008", "Llei 4/2010", "Llei 31/2010"], "c": 1, "f": "Llei 13/2008."}, {"b": "Presidència y Govern de la Generalitat", "q": "El presidente o presidenta de la Generalitat es elegido por:", "opts": ["el Rey entre los diputados autonómicos", "el Govern entre sus consellers", "el Parlament entre sus miembros", "sufragio universal directo en primera vuelta"], "c": 2, "f": "Así lo resume el material."}, {"b": "Presidència y Govern de la Generalitat", "q": "Tras la elección por el Parlament, el presidente o presidenta es nombrado por:", "opts": ["el presidente del Gobierno", "el Rey", "el presidente del Parlament", "el Tribunal Constitucional"], "c": 1, "f": "Nombrado por el Rey."}, {"b": "Presidència y Govern de la Generalitat", "q": "El presidente o presidenta de la Generalitat es, a la vez:", "opts": ["solo jefe del Govern", "solo máxima representación de la Generalitat", "jefe del Govern, máxima representación de la Generalitat y representante ordinario del Estado en Catalunya", "jefe del Parlament y del Govern"], "c": 2, "f": "Triple condición señalada en el resumen."}, {"b": "Presidència y Govern de la Generalitat", "q": "Si transcurren dos meses desde la primera votación de investidura sin elección, según el tema:", "opts": ["se nombra automáticamente al candidato más votado", "el Parlament se disuelve automáticamente y se convocan elecciones", "interviene el Senado", "se prorroga el Govern indefinidamente"], "c": 1, "f": "Dato clásico de investidura."}, {"b": "Presidència y Govern de la Generalitat", "q": "El presidente o presidenta responde políticamente ante:", "opts": ["el Rey", "el Congreso de los Diputados", "el Parlament", "el Tribunal Superior de Justicia de Catalunya"], "c": 2, "f": "Ojo de examen del tema."}, {"b": "Presidència y Govern de la Generalitat", "q": "El Govern es el órgano superior colegiado que dirige:", "opts": ["solo la Administración local", "la acción política y la Administración de la Generalitat", "las Cortes Generales", "la justicia ordinaria del Estado"], "c": 1, "f": "Definición del bloque final."}, {"b": "Presidència y Govern de la Generalitat", "q": "Entre las funciones del Govern se encuentran:", "opts": ["aprobar proyectos de ley, elaborar presupuestos y ejercer potestad reglamentaria", "nombrar al Rey y reformar la Constitución", "dictar sentencias firmes", "convocar referéndums estatales por sí solo"], "c": 0, "f": "Lista central del tema."}, {"b": "Presidència y Govern de la Generalitat", "q": "El Govern puede dictar, según el tema:", "opts": ["solo reglamentos internos", "decretos legislativos y decretos ley", "únicamente leyes orgánicas", "sentencias con fuerza de ley"], "c": 1, "f": "Atribución expresamente mencionada."}, {"b": "Presidència y Govern de la Generalitat", "q": "Cuando está en funciones, el Govern no puede:", "opts": ["realizar ningún acto administrativo", "aprobar el proyecto de ley de presupuestos, presentar proyectos de ley al Parlament ni dictar decretos legislativos", "reunirse", "ejercer potestad reglamentaria alguna"], "c": 1, "f": "Límites fuertes, pero no parálisis total."}, {"b": "Presidència y Govern de la Generalitat", "q": "Decir que un Govern en funciones está “paralizado al 100 %” sería:", "opts": ["correcto", "incorrecto, porque mantiene actividad aunque con límites fuertes", "obligatorio en test", "válido solo si hay investidura fallida"], "c": 1, "f": "Trampa típica del resumen."}, {"b": "Presidència y Govern de la Generalitat", "q": "En el repaso exprés final del tema, si preguntan quién manda políticamente en Catalunya debes pensar en:", "opts": ["Tribunal Constitucional y Senado", "Presidència + Govern + control del Parlament", "Parlament y Rey sin más", "solo en el president o presidenta"], "c": 1, "f": "Síntesis del cierre del tema."}];
let idx=0,ok=0,er=0,fails=[],cur=Q.slice(),full=Q.slice();
function render(){if(idx>=cur.length){showRes();return}let q=cur[idx],t=cur.length;document.getElementById('pill').textContent=idx+'/'+t;document.getElementById('pn').textContent=Math.round(idx/t*100)+'%';document.getElementById('fill').style.width=Math.round(idx/t*100)+'%';document.getElementById('sc-ok').textContent=ok;document.getElementById('sc-er').textContent=er;document.getElementById('qm').textContent=q.b;document.getElementById('qt').textContent=q.q;let h='';q.opts.forEach((o,i)=>{h+='<button class="opt" onclick="pick('+i+')">'+o+'</button>'});document.getElementById('opts').innerHTML=h;document.getElementById('fb').style.display='none';document.getElementById('fb').className='';document.getElementById('bn').style.display='none'}
function pick(i){let q=cur[idx],bs=document.querySelectorAll('.opt');bs.forEach((b,j)=>{b.classList.add('dis');b.onclick=null;if(j===q.c)b.classList.add('ok');if(j===i&&i!==q.c)b.classList.add('er')});let fb=document.getElementById('fb');if(i===q.c){ok++;fb.className='ok';fb.textContent='\u2713 '+q.f}else{er++;fb.className='er';fb.textContent='\u2717 '+q.f;fails.push({...q,pick:i})}fb.style.display='block';document.getElementById('bn').style.display='block';document.getElementById('sc-ok').textContent=ok;document.getElementById('sc-er').textContent=er}
function next(){idx++;render()}
function showRes(){document.getElementById('qc').style.display='none';document.getElementById('pw').style.display='none';document.getElementById('stats').style.display='none';let r=document.getElementById('res');r.style.display='block';let pct=Math.round(ok/(ok+er)*100)||0;document.getElementById('rp').textContent=pct+'%';document.getElementById('rp').style.color=pct>=70?'var(--ok)':'var(--err)';document.getElementById('ri').textContent=ok+' correctas \u00b7 '+er+' incorrectas \u00b7 '+cur.length+' preguntas';document.getElementById('pill').textContent=cur.length+'/'+cur.length;document.getElementById('fill').style.width='100%';let fl=document.getElementById('bfl');fl.innerHTML='';if(fails.length===0){document.getElementById('rt').textContent='\u00a1Sin fallos!';return}fails.forEach(f=>{let d=document.createElement('div');d.className='fs';let opts='ABCD';d.innerHTML='<div class="fst">'+f.q+' <span class="badge badge-err">Tu: '+opts[f.pick]+'</span><span class="badge badge-ok">OK: '+opts[f.c]+'</span></div><div class="fl">'+f.f+'</div>';fl.appendChild(d)})}
function restart(){idx=0;ok=0;er=0;fails=[];cur=full.slice();document.getElementById('qc').style.display='';document.getElementById('pw').style.display='';document.getElementById('stats').style.display='';document.getElementById('res').style.display='none';render()}
function retryFailed(){if(fails.length===0)return;cur=fails.slice();idx=0;ok=0;er=0;fails=[];document.getElementById('qc').style.display='';document.getElementById('pw').style.display='';document.getElementById('stats').style.display='';document.getElementById('res').style.display='none';render()}
render();
</script>
</body>
</html>
