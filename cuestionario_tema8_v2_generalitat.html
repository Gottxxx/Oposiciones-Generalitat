-text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}.st .vl{font-size:24px;font-weight:600;color:var(--text)}#sc-ok .vl{color:var(--ok)}#sc-er .vl{color:var(--err)}#qc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem}#qm{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em}#qm .d{width:3px;height:3px;border-radius:50%;background:var(--border-strong);display:inline-block}#qt{font-size:16px;color:var(--text);line-height:1.65}#opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}.opt{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:13px 16px;font-size:14px;color:var(--text);cursor:pointer;text-align:left;line-height:1.55;transition:border-color .15s,background .15s,transform .1s;width:100%}.opt:hover:not(.dis){border-color:var(--border-strong);background:var(--surface2);transform:translateY(-1px)}.lt{min-width:24px;height:24px;border-radius:50%;border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0;margin-top:1px}.opt.ok{border-color:var(--ok-border);background:var(--ok-bg)}.opt.ok .lt{background:var(--ok);border-color:var(--ok);color:#fff}.opt.er{border-color:var(--err-border);background:var(--err-bg)}.opt.er .lt{background:var(--err);border-color:var(--err);color:#fff}.opt.dis{cursor:default;pointer-events:none}#fb{display:none;border-radius:var(--rs);padding:13px 16px;margin-bottom:1rem;border:1px solid;font-size:13px;line-height:1.65}#fb.show{display:block}#fb.ok{background:var(--ok-bg);border-color:var(--ok-border)}#fb.er{background:var(--err-bg);border-color:var(--err-border)}#fb .fh{font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}#fb.ok .fh{color:var(--ok)}#fb.er .fh{color:var(--err)}#fb .fd{color:var(--text2)}#br{display:flex;justify-content:flex-end}#bn{display:none;font-size:13px;font-weight:500;padding:10px 20px;border-radius:var(--rs);background:var(--accent);color:var(--bg);border:none;cursor:pointer}#bn:hover{opacity:.85}#res{display:none;padding:1rem 0}#rh{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:2rem}#rp{font-size:64px;font-weight:700;color:var(--text);letter-spacing:-.04em;line-height:1;flex-shrink:0}#ri h2{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}#ri p{font-size:13px;color:var(--text2);line-height:1.6}#rbt{display:flex;gap:8px;margin-bottom:2rem;flex-wrap:wrap}.bs{font-size:13px;font-weight:500;padding:10px 18px;border-radius:var(--rs);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);cursor:pointer}.bs:hover{background:var(--surface2)}.bp{background:var(--accent);color:var(--bg);border-color:transparent}.bp:hover{opacity:.85;background:var(--accent)}#fs{border-top:1px solid var(--border);padding-top:1.5rem}#fs h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.04em}.fi{padding:1rem 0;border-bottom:1px solid var(--border)}.fi:last-child{border-bottom:none}.fq{font-size:14px;color:var(--text);margin-bottom:8px;line-height:1.5;font-weight:500}.fb2{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}.bg{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid}.bg.er{background:var(--err-bg);border-color:var(--err-border);color:var(--err)}.bg.ok{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok)}.fe{font-size:12px;color:var(--text3);line-height:1.6}@media(max-width:500px){body{padding:1rem .75rem 3rem}#rh{flex-direction:column;gap:1rem;align-items:flex-start}#rp{font-size:48px}#hdr{flex-direction:column;gap:.75rem}}

<body>
<div id="app">
  <div id="hdr"><div><h1>Tema 8 · Test 2 · Oposición Generalitat</h1><p>56 preguntas · Situaciones, provisión, incompatibilidades y comparativas</p></div><div id="pill"></div></div>
  <div id="pw"><div id="pr"><span>Progreso</span><span id="pn">1 / 56</span></div><div id="track"><div id="fill"></div></div></div>
  <div id="stats"><div class="st" id="sc-ok"><div class="lb">Correctas</div><div class="vl" id="vok">0</div></div><div class="st" id="sc-er"><div class="lb">Errores</div><div class="vl" id="ver">0</div></div><div class="st"><div class="lb">Pendientes</div><div class="vl" id="vpe">56</div></div></div>
  <div id="qc"><div id="qm"><span id="qnl"></span><span class="d"></span><span id="qbl"></span></div><div id="qt"></div></div>
  <div id="opts"></div><div id="fb"></div>
  <div id="br"><button id="bn" onclick="nxt()">Siguiente →</button></div>

<script>
const Q=[
  {b:"1. Situaciones — detalle",q:"El servicio en otras Administraciones Públicas aplica cuando:",opts:["El funcionario es sancionado","El funcionario obtiene destino en otra Administración mediante transferencia o proceso de movilidad","El funcionario se jubila","El funcionario pasa a la empresa privada"],c:1,f:"Servicio en otras AAPP = el funcionario pasa a servir en una Administración distinta de la de origen. Conserva derechos en la de origen como si estuviera en servicio activo. No confundir con excedencia."},
  {b:"1. Situaciones — detalle",q:"La excedencia voluntaria por agrupación familiar se concede cuando:",opts:["El cónyuge obtiene destino en otra localidad","Solo por razón de estudios del funcionario","Solo cuando hay hijos menores de 3 años","Solo en caso de violencia de género"],c:0,f:"Excedencia voluntaria por agrupación familiar: cuando el cónyuge u otra persona legalmente asimilada obtiene destino en otra localidad. Facilita la unidad familiar cuando hay movilidad geográfica del otro miembro."},
  {b:"1. Situaciones — detalle",q:"La excedencia por cuidado de hijos se puede solicitar:",opts:["Solo para hijos biológicos","Para cada hijo, tanto biológico como adoptado o acogido, durante un máximo de 3 años desde el nacimiento o resolución","Solo durante el primer año de vida del hijo","Solo si ambos progenitores son funcionarios"],c:1,f:"Excedencia por cuidado de hijos: hasta 3 años desde nacimiento o resolución judicial de adopción/acogimiento. Aplica a hijos biológicos, adoptados y acogidos. Computa antigüedad y reserva de puesto durante un período."},
  {b:"1. Situaciones — detalle",q:"La diferencia entre suspensión provisional y firme es:",opts:["Son lo mismo con distinto nombre","La provisional es cautelar durante procedimiento; la firme es consecuencia de sanción o sentencia definitiva","La firme es cautelar y la provisional definitiva","Solo la provisional tiene límite temporal"],c:1,f:"Provisional = cautelar, durante procedimiento (disciplinario o penal), temporal, no es sanción. Firme = consecuencia de resolución definitiva (sanción o sentencia). La provisional tiene límite de 6 meses; la firme depende de la gravedad."},
  {b:"1. Situaciones — detalle",q:"Durante la suspensión provisional, el funcionario:",opts:["Cobra el 100% de retribuciones","Pierde definitivamente la condición de funcionario","Percibe retribuciones básicas pero no las complementarias, salvo excepciones","No tiene ningún derecho económico"],c:2,f:"Suspensión provisional: percibe retribuciones BÁSICAS (no complementarias). Si la suspensión se levanta sin sanción, se le abonan las retribuciones dejadas de percibir. Es una garantía para que no se condene económicamente sin sentencia."},
  {b:"1. Situaciones — detalle",q:"La reincorporación al servicio activo desde excedencia voluntaria por interés particular:",opts:["Es automática e inmediata","Está condicionada a la existencia de puesto vacante dotado presupuestariamente","Se produce siempre en el mismo puesto que tenía","No es posible: la excedencia es definitiva"],c:1,f:"Reincorporación desde excedencia voluntaria por interés particular: NO es automática. Está condicionada a que exista puesto vacante dotado presupuestariamente. Es la excedencia menos protegida — el funcionario asume el riesgo."},
  {b:"1. Situaciones — detalle",q:"La reincorporación desde servicios especiales:",opts:["Está condicionada a vacante","Es obligatoria y en el mismo puesto o uno de igual nivel que el que tenía reservado","Requiere nuevo proceso selectivo","Solo procede si no ha pasado más de 1 año"],c:1,f:"Servicios especiales: reincorporación OBLIGATORIA al puesto reservado o uno de igual nivel. Es la situación más protegida — no hay riesgo de perder plaza. Se computa antigüedad y se mantienen todos los derechos."},
  {b:"1. Situaciones — detalle",q:"¿Cuál de estas excedencias tiene reserva de puesto durante todo su período?",opts:["Excedencia voluntaria por interés particular","Excedencia por razón de violencia de género","Excedencia voluntaria por agrupación familiar","Ninguna tiene reserva de puesto"],c:1,f:"Excedencia por violencia de género = reserva de puesto durante TODO el período. Es la más protegida. La de cuidado de hijos tiene reserva durante un período más limitado. La voluntaria por interés particular no tiene reserva."},
  {b:"2. Situaciones — comparativas",q:"Ordena de mayor a menor protección las excedencias:",opts:["Voluntaria por interés particular > cuidado de hijos > violencia de género","Violencia de género > cuidado de familiares/hijos > voluntaria por interés particular","Todas tienen la misma protección","Agrupación familiar > violencia de género > interés particular"],c:1,f:"Orden de protección: violencia de género (máxima: reserva total + antigüedad) > cuidado de familiares/hijos (reserva parcial + antigüedad) > voluntaria por interés particular (sin reserva, sin antigüedad). Memoriza este ranking."},
  {b:"2. Situaciones — comparativas",q:"¿Qué tienen en común servicios especiales y excedencia por violencia de género?",opts:["Ambas pierden la plaza definitivamente","Ambas conservan la plaza y computan antigüedad","Ambas requieren 5 años mínimos de servicio","Ninguna tiene protección especial"],c:1,f:"Ambas conservan plaza + computan antigüedad. Son las dos situaciones más protegidas del TREBEP. La diferencia: servicios especiales es por cargo político/institucional; violencia de género es por protección de la víctima."},
  {b:"2. Situaciones — comparativas",q:"¿Qué diferencia hay entre excedencia por cuidado de hijos y excedencia por cuidado de familiares?",opts:["Son exactamente iguales","La de hijos puede durar hasta 3 años; la de familiares hasta 3 años también, pero las condiciones de reserva pueden variar","La de hijos no computa antigüedad","La de familiares solo aplica a padres"],c:1,f:"Ambas duran hasta 3 años pero tienen condiciones que pueden diferir en la reserva de puesto. La de hijos tiene un régimen ligeramente más protegido en la práctica. Ambas computan antigüedad durante el período de reserva."},
  {b:"3. Provisión — detalle",q:"El concurso de méritos como sistema de provisión valora:",opts:["Solo la antigüedad","Méritos y capacidades según baremo público: antigüedad, grado, formación, destinos anteriores y otros","Solo la entrevista personal","Solo el resultado de un examen"],c:1,f:"Concurso de méritos (provisión): baremo público que valora antigüedad + grado personal + formación + destinos anteriores + otros méritos. Es objetivo y predecible — el funcionario puede calcular sus posibilidades."},
  {b:"3. Provisión — detalle",q:"La libre designación requiere:",opts:["Convocatoria pública con requisitos del puesto","Solo la decisión unilateral del superior sin ningún requisito","Concurso-oposición previo","Solo informe favorable del Síndic de Greuges"],c:0,f:"Libre designación: requiere convocatoria PÚBLICA con indicación de los requisitos del puesto. No es designación a dedo sin filtro — tiene publicidad y requisitos, aunque la decisión final es discrecional."},
  {b:"3. Provisión — detalle",q:"El funcionario que obtiene puesto por libre designación puede ser cesado:",opts:["Solo por expediente disciplinario","Libremente, con destino al puesto de origen o uno de nivel similar","Solo por jubilación","No puede ser cesado una vez nombrado"],c:1,f:"Libre designación: el cese es libre (discrecional). El funcionario cesado tiene derecho a volver a su puesto de origen o a obtener uno de nivel similar. La discrecionalidad del nombramiento se extiende al cese."},
  {b:"3. Provisión — detalle",q:"La comisión de servicios tiene como límite temporal:",opts:["Indefinido","Máximo 2 años, prorrogables excepcionalmente","Solo 1 mes","Máximo 6 meses sin prórroga"],c:1,f:"Comisión de servicios: máximo 2 años como regla general, prorrogable excepcionalmente. Es provisional — durante su vigencia debe convocarse el puesto para provisión definitiva (concurso o libre designación)."},
  {b:"3. Provisión — detalle",q:"La movilidad por razón de violencia de género:",opts:["No existe en la función pública","Permite la funcionaria víctima obtener traslado preferente a otro puesto, con reserva del anterior","Solo aplica si hay sentencia firme","Requiere autorización del Govern"],c:1,f:"Movilidad por violencia de género: traslado preferente + reserva del puesto anterior. Es una medida de protección reforzada. No requiere sentencia firme — basta la acreditación de la situación de violencia."},
  {b:"3. Provisión — detalle",q:"El traslado forzoso del funcionario:",opts:["Es la regla general de provisión","Solo puede acordarse por necesidades del servicio debidamente motivadas y con indemnización cuando proceda","Es una sanción disciplinaria grave","No existe en derecho administrativo"],c:1,f:"Traslado forzoso: excepcional + necesidades del servicio + motivación + indemnización cuando proceda. No es sanción (aunque puede serlo en el régimen disciplinario como medida complementaria). Son figuras distintas."},
  {b:"3. Provisión — detalle",q:"La permuta entre funcionarios:",opts:["Está prohibida en todos los casos","Es posible si los dos funcionarios cumplen los requisitos de los respectivos puestos y la Administración lo autoriza","Es automática si ambos lo solicitan","Solo procede entre funcionarios del mismo departament"],c:1,f:"Permuta: posible si ambos cumplen requisitos de los puestos + autorización administrativa. No es automática — la Administración puede denegarla si hay razones de servicio. Es una forma de movilidad voluntaria bilateral."},
  {b:"4. Incompatibilidades — detalle",q:"La regla general del régimen de incompatibilidades es:",opts:["Compatibilidad total","Incompatibilidad general: un puesto, una retribución","Dos puestos públicos siempre compatibles","Compatibilidad automática con actividad privada"],c:1,f:"Regla general: UN puesto + UNA retribución. Todo lo demás es excepción que necesita autorización. El régimen de incompatibilidades es preventivo — busca evitar conflictos de interés y dedicación dividida."},
  {b:"4. Incompatibilidades — detalle",q:"¿Puede un funcionario ejercer actividad privada sin autorización?",opts:["Sí, siempre que no coincida en horario","No: necesita autorización expresa de compatibilidad","Sí, si la actividad es de voluntariado","Sí, si el puesto es de nivel C2"],c:1,f:"Actividad privada: siempre requiere AUTORIZACIÓN EXPRESA de compatibilidad. Sin autorización, la actividad privada es incompatible aunque no coincida en horario. La autorización es previa, no posterior."},
  {b:"4. Incompatibilidades — detalle",q:"¿Cuáles son las actividades privadas que son siempre incompatibles?",opts:["Solo las de asesoramiento jurídico","Las que estén relacionadas directamente con las funciones del puesto público o comprometan la imparcialidad","Solo las actividades comerciales","Solo las actividades con jornada completa"],c:1,f:"Incompatibilidad absoluta: actividades directamente relacionadas con las funciones públicas del puesto + las que comprometan la imparcialidad. Son restricciones por conflicto de interés directo — no admiten autorización."},
  {b:"4. Incompatibilidades — detalle",q:"La compatibilidad con un segundo puesto público es:",opts:["Siempre posible entre administraciones distintas","Excepcionalmente posible para actividades docentes, sanitarias u otras previstas por la ley, con autorización","Siempre posible si los horarios no coinciden","Automática para personal laboral"],c:1,f:"Segundo puesto público: solo compatible excepcionalmente (docencia, sanidad, investigación y otros supuestos previstos). Siempre con autorización. La regla es la incompatibilidad — la compatibilidad es la excepción."},
  {b:"4. Incompatibilidades — detalle",q:"Las actividades artísticas, literarias o intelectuales del funcionario:",opts:["Son siempre incompatibles","Son generalmente compatibles si no comprometen la imparcialidad ni usan información reservada del puesto","Requieren siempre autorización del Govern","Son incompatibles si generan ingresos"],c:1,f:"Actividades artísticas, literarias, intelectuales: generalmente compatibles sin necesidad de autorización especial, siempre que no comprometan la imparcialidad ni se use información reservada del puesto. Es la excepción más amplia del régimen."},
  {b:"4. Incompatibilidades — detalle",q:"El incumplimiento del régimen de incompatibilidades puede dar lugar a:",opts:["Solo una advertencia verbal","Responsabilidad disciplinaria y, en su caso, nulidad del nombramiento o contrato incompatible","Solo una multa económica menor","No tiene consecuencias"],c:1,f:"Incumplimiento de incompatibilidades: responsabilidad disciplinaria (puede llegar a separación del servicio si es grave) + posible nulidad del segundo nombramiento o contrato incompatible. Consecuencias graves."},
  {b:"5. Acceso — variantes nuevas",q:"Los órganos de selección deben garantizar:",opts:["Solo la rapidez del proceso","Imparcialidad, profesionalidad y dedicación exclusiva a la selección","Solo la valoración de méritos","Solo la publicidad de las convocatorias"],c:1,f:"Órganos de selección: imparcialidad + profesionalidad + dedicación exclusiva durante el proceso. Los miembros deben ser funcionarios de carrera con titulación igual o superior a la exigida. No pueden incluir representantes sindicales como tales."},
  {b:"5. Acceso — variantes nuevas",q:"Los miembros de los órganos de selección deben ser:",opts:["Personal eventual designado por el Govern","Funcionarios de carrera con titulación igual o superior a la exigida","Cualquier persona designada por el Conseller","Solo catedráticos universitarios"],c:1,f:"Miembros de órganos de selección = funcionarios de CARRERA + titulación igual o superior a la exigida. No pueden ser eventuales ni interinos. Es una garantía de profesionalidad e independencia."},
  {b:"5. Acceso — variantes nuevas",q:"¿Pueden los representantes sindicales formar parte de los órganos de selección?",opts:["Sí, siempre","No: no pueden participar como representantes sindicales en tanto que tales","Sí, si hay convenio que lo prevea","Solo en procesos de personal laboral"],c:1,f:"Los representantes sindicales NO pueden formar parte de los órganos de selección en su calidad de tales. Pueden ser miembros si cumplen los requisitos generales (funcionarios de carrera con titulación), pero no como representantes sindicales."},
  {b:"5. Acceso — variantes nuevas",q:"Las personas con discapacidad en el acceso a la función pública:",opts:["No tienen medidas especiales","Tienen derecho a adaptaciones y reserva de plazas (cupo) según la normativa vigente","Solo pueden acceder por concurso puro","Quedan excluidas de los procesos selectivos"],c:1,f:"Personas con discapacidad: adaptaciones razonables en el proceso selectivo + reserva de plazas (cupo mínimo del 7% en la mayoría de convocatorias). Es una medida de acción positiva con base constitucional (igualdad real)."},
  {b:"5. Acceso — variantes nuevas",q:"El conocimiento de las lenguas oficiales en los procesos selectivos de la Generalitat:",opts:["No tiene relevancia","El catalán puede exigirse como requisito o mérito según el puesto y la normativa catalana","Solo el castellano es evaluable","Solo aplica al personal eventual"],c:1,f:"Catalán en procesos selectivos de la Generalitat: puede ser requisito o mérito según el puesto. La normativa catalana establece que el conocimiento del catalán es exigible en función de las características del puesto a cubrir. Conecta con T3 (drets lingüístics)."},
  {b:"6. Clases — variantes nuevas",q:"Un funcionario interino es nombrado para sustituir a un funcionario de carrera en excedencia por cuidado de hijos. Cuando el titular se reincorpora:",opts:["El interino consolida la plaza","El interino cesa automáticamente","El interino pasa a excedencia voluntaria","El interino se convierte en laboral fijo"],c:1,f:"Interino sustituto: cuando el titular se reincorpora, el interino CESA. No consolida plaza, no tiene derecho a continuar. Es la consecuencia directa de su temporalidad — cubre la ausencia y nada más."},
  {b:"6. Clases — variantes nuevas",q:"El personal laboral indefinido no fijo se diferencia del laboral fijo en que:",opts:["Son idénticos","El indefinido no fijo ocupa plaza sin haber superado proceso selectivo regular, y su puesto debe convocarse","El indefinido no fijo tiene más derechos que el fijo","Solo cambia el nombre"],c:1,f:"Laboral indefinido no fijo: ocupa plaza por irregularidad en la contratación temporal (fraude de ley). No ha superado proceso selectivo regular. Su puesto debe convocarse y, si no lo supera, cesa. Es una figura jurisprudencial, no del TREBEP."},
  {b:"6. Clases — variantes nuevas",q:"¿Puede un funcionario interino desempeñar funciones reservadas a funcionarios de carrera?",opts:["Nunca en ningún caso","Sí, temporalmente, en las mismas condiciones que el titular al que sustituye o cuya vacante cubre","Solo funciones administrativas básicas","Solo con autorización del TC"],c:1,f:"El interino desempeña las MISMAS funciones que el titular al que sustituye o cuya vacante cubre. No tiene funciones reducidas — asume plenamente el puesto mientras dura su nombramiento temporal."},
  {b:"6. Clases — variantes nuevas",q:"El personal eventual NO puede:",opts:["Asesorar al Conseller","Desempeñar funciones reservadas a funcionarios de carrera como si fuera uno de ellos","Cesar libremente","Realizar tareas de confianza"],c:1,f:"El eventual NO puede desempeñar funciones reservadas a funcionarios de carrera (que requieren estabilidad, imparcialidad y proceso selectivo). Sus funciones son de confianza y asesoramiento — no cubre puestos estructurales."},
  {b:"7. Grupos — variantes nuevas",q:"Un puesto clasificado como A1/A2 puede ser cubierto por:",opts:["Solo funcionarios del subgrupo A1","Funcionarios del subgrupo A1 o A2 según lo prevea la convocatoria","Solo funcionarios del grupo C","Cualquier funcionario sin distinción de grupo"],c:1,f:"Puesto A1/A2: puede cubrirse por funcionarios de cualquiera de los dos subgrupos del grupo A, según establezca la RPT y la convocatoria. La doble clasificación amplía la base de candidatos posibles."},
  {b:"7. Grupos — variantes nuevas",q:"¿Puede un funcionario del subgrupo C2 promocionar al C1?",opts:["No: los grupos son estancos","Sí, mediante promoción interna si cumple los requisitos de titulación y proceso selectivo","Solo por libre designación","Solo por antigüedad superior a 10 años"],c:1,f:"Promoción interna C2 → C1: posible si cumple requisitos de titulación (bachiller) + supera proceso selectivo de promoción interna. No es automática por antigüedad — requiere proceso selectivo, aunque con condiciones más favorables."},
  {b:"7. Grupos — variantes nuevas",q:"La promoción interna es:",opts:["Un sistema de acceso externo","El ascenso de un funcionario a un cuerpo o escala de grupo o subgrupo superior al que pertenece, mediante proceso selectivo","Solo cambio de puesto dentro del mismo grupo","Solo para personal laboral"],c:1,f:"Promoción interna = ascenso a grupo/subgrupo SUPERIOR + proceso selectivo. Es movilidad vertical ascendente dentro de la función pública. Requiere titulación y superar pruebas, pero con condiciones más favorables que el acceso libre."},
  {b:"8. Incompatibilidades — casos",q:"Un funcionario de la Generalitat quiere dar clases en una universidad pública. ¿Es compatible?",opts:["Nunca: todo segundo puesto público es incompatible","Puede ser compatible si está prevista la compatibilidad para la docencia y se obtiene autorización","Solo si renuncia a su puesto principal","Solo si las clases son gratuitas"],c:1,f:"Docencia universitaria: es uno de los supuestos clásicos de compatibilidad con segundo puesto público. Requiere autorización expresa pero es de los más favorablemente tratados por la normativa. Es la excepción más frecuente."},
  {b:"8. Incompatibilidades — casos",q:"Un funcionario del Departament de Salut quiere abrir una consulta privada de medicina. ¿Es compatible?",opts:["Sí siempre, porque es actividad profesional libre","No: la actividad privada está directamente relacionada con sus funciones públicas, lo que la hace incompatible","Sí si la consulta está en otra provincia","Solo si reduce su jornada pública al 50%"],c:1,f:"Funcionario sanitario + consulta privada médica = actividad directamente relacionada con sus funciones públicas. Es incompatibilidad ABSOLUTA — no admite autorización porque hay conflicto de interés directo."},
  {b:"8. Incompatibilidades — casos",q:"Un funcionario escribe una novela y la publica. ¿Necesita autorización?",opts:["Sí, toda actividad remunerada requiere autorización","No: las actividades literarias son generalmente compatibles sin autorización especial","Solo si la novela trata sobre la Administración","Solo si los ingresos superan los 10.000€"],c:1,f:"Actividad literaria: generalmente compatible sin autorización especial, siempre que no use información reservada del puesto ni comprometa la imparcialidad. Es la excepción más amplia del régimen de incompatibilidades."},
  {b:"9. Trampas cruzadas",q:"¿Cuál de estas parejas está INCORRECTAMENTE diferenciada?",opts:["Interino = necesidad temporal; Eventual = confianza","Concurso de méritos = provisión; Oposición = acceso","Suspensión provisional = cautelar; Suspensión firme = sanción","Libre designación = sistema ordinario de provisión; Concurso = excepcional"],c:3,f:"La pareja incorrecta es la D: libre designación es EXCEPCIONAL y concurso de méritos es el ORDINARIO. El examen invierte los roles para ver si los confundes. Las otras tres parejas son correctas."},
  {b:"9. Trampas cruzadas",q:"Confundir 'acceso' con 'provisión' es un error porque:",opts:["Son lo mismo","El acceso es para ENTRAR en la función pública; la provisión es para MOVERSE dentro ya siendo funcionario","Solo cambia la denominación según la Administración","No existe diferencia práctica"],c:1,f:"Acceso = entrar (de fuera a dentro). Provisión = moverse (ya estando dentro). Confundirlos es uno de los errores más frecuentes del T8 — el examen presenta opciones donde mezcla sistemas de acceso con formas de provisión."},
  {b:"9. Trampas cruzadas",q:"¿Cuál de estas afirmaciones sobre la comisión de servicios es CORRECTA?",opts:["Es un sistema de acceso a la función pública","Es una forma de provisión temporal que no consolida derecho al puesto","Es equivalente a la libre designación","Dura indefinidamente sin límite temporal"],c:1,f:"Comisión de servicios = provisión TEMPORAL + no consolida derecho al puesto + máximo 2 años prorrogable. No es acceso, no es libre designación, no es indefinida. Es solución puente mientras se convoca el puesto."},
  {b:"9. Trampas cruzadas",q:"¿Cuál de estas afirmaciones sobre el funcionario interino es INCORRECTA?",opts:["Es temporal y cubre una necesidad administrativa","No consolida la plaza por el mero paso del tiempo","Tiene los mismos derechos que el funcionario de carrera en todo caso sin excepción","Desempeña las mismas funciones que el titular al que sustituye"],c:2,f:"La afirmación incorrecta es la C. El interino NO tiene exactamente los mismos derechos que el de carrera en todo caso — hay diferencias en carrera profesional, indemnización por cese, estabilidad. Tiene derechos comparables pero no idénticos."},
  {b:"10. Detalle normativo",q:"El TREBEP se aprobó mediante:",opts:["Ley orgánica","Real Decreto Legislativo 5/2015","Decreto del Govern","Ley 39/2015"],c:1,f:"TREBEP = Real Decreto Legislativo 5/2015 (texto refundido). No es ley orgánica ni decreto autonómico. Es normativa estatal básica que las CCAA desarrollan. Dato literal que cae en test."},
  {b:"10. Detalle normativo",q:"La normativa catalana de función pública desarrolla el TREBEP en:",opts:["Solo en materia de acceso","En todos los aspectos de la función pública propia de la Generalitat: acceso, provisión, situaciones, retribuciones, régimen disciplinario","Solo en materia de incompatibilidades","Solo en materia de grupos de clasificación"],c:1,f:"La normativa catalana desarrolla el TREBEP en TODOS los aspectos de la función pública de la Generalitat. Es un desarrollo integral, no parcial. El Estado pone las bases; Cataluña desarrolla su función pública propia."},
  {b:"10. Detalle normativo",q:"¿Cuál de estas normas NO regula empleo público?",opts:["TREBEP","Normativa catalana de función pública","Ley 19/2014 de transparencia","EBEP refundido en RDLeg 5/2015"],c:2,f:"La Ley 19/2014 es de transparencia y bon govern (T3), no de empleo público (T8). Es trampa cruzada entre temas: introducir una ley del T3 como si fuera del T8."},
  {b:"11. Comparativas globales",q:"¿Qué tienen en común oposición (acceso) y concurso de méritos (provisión)?",opts:["Nada: son figuras completamente independientes","Ambos valoran capacidades de forma objetiva con baremo o pruebas, aunque uno es para entrar y el otro para moverse","Ambos son excepcionales","Ambos son solo para personal eventual"],c:1,f:"Oposición y concurso de méritos comparten la objetividad como principio rector. Pero uno es para ACCEDER (de fuera) y el otro para PROVISIÓN (de dentro). Son paralelos en su lógica pero distintos en su función."},
  {b:"11. Comparativas globales",q:"¿Qué tienen en común libre designación (provisión) y personal eventual (clase)?",opts:["Nada","Ambos tienen un componente de confianza y discrecionalidad en el nombramiento y el cese","Ambos son funcionarios de carrera","Ambos acceden por oposición"],c:1,f:"Libre designación y eventual comparten el COMPONENTE DE CONFIANZA: el nombramiento y el cese son discrecionales. Pero son figuras distintas: la libre designación es provisión de puestos; el eventual es una clase de personal."},
  {b:"11. Comparativas globales",q:"¿Qué relación existe entre acceso y situaciones administrativas?",opts:["No hay relación","El acceso determina quién entra; las situaciones determinan qué le puede pasar una vez dentro","Las situaciones determinan quién entra","El acceso incluye las situaciones"],c:1,f:"Acceso = quién entra (puerta de entrada). Situaciones = qué le pasa una vez dentro (activo, especial, excedente, suspendido). Son fases sucesivas de la carrera funcionarial — conectadas pero distintas."},
  {b:"12. Preguntas de 'cuál es INCORRECTA'",q:"¿Cuál de estas afirmaciones sobre las situaciones administrativas es INCORRECTA?",opts:["El servicio activo es la situación normal","Los servicios especiales conservan la plaza","La excedencia voluntaria por interés particular conserva la plaza y computa antigüedad","La suspensión provisional tiene límite temporal de 6 meses"],c:2,f:"INCORRECTA: la excedencia voluntaria por interés particular NO conserva la plaza NI computa antigüedad. Es la excedencia menos protegida. Las otras tres afirmaciones son correctas."},
  {b:"12. Preguntas de 'cuál es INCORRECTA'",q:"¿Cuál de estas afirmaciones sobre la provisión es INCORRECTA?",opts:["El concurso de méritos es el sistema ordinario","La libre designación es excepcional","La comisión de servicios es un sistema de acceso","La permuta requiere autorización administrativa"],c:2,f:"INCORRECTA: la comisión de servicios NO es un sistema de acceso — es una forma de provisión temporal. Confundir acceso con provisión es la trampa más explotada del T8."},
  {b:"12. Preguntas de 'cuál es INCORRECTA'",q:"¿Cuál de estas afirmaciones sobre las incompatibilidades es INCORRECTA?",opts:["La regla general es un puesto, una retribución","Las actividades literarias son generalmente compatibles","Toda actividad privada es automáticamente compatible sin autorización","La docencia universitaria puede ser compatible con autorización"],c:2,f:"INCORRECTA: toda actividad privada necesita AUTORIZACIÓN EXPRESA de compatibilidad. No es automáticamente compatible. La regla es la incompatibilidad — la compatibilidad es la excepción autorizada."},
  {b:"13. Síntesis final",q:"La cadena completa del T8 es:",opts:["Solo clases → acceso","CLASES → GRUPOS → ACCESO → ADQUISICIÓN → PÉRDIDA → SITUACIONES → PROVISIÓN → INCOMPATIBILIDADES","Solo provisión → jubilación","Solo acceso → situaciones"],c:1,f:"Cadena completa del T8: CLASES (quién) → GRUPOS (qué nivel) → ACCESO (cómo entra) → ADQUISICIÓN (cómo se consolida) → PÉRDIDA (cómo se pierde) → SITUACIONES (qué le pasa) → PROVISIÓN (cómo se mueve) → INCOMPATIBILIDADES (qué límites tiene)."},
  {b:"13. Síntesis final",q:"Si tuvieras que memorizar solo 5 datos del T8, serían:",opts:["Solo los grupos de clasificación","Interino ≠ eventual / concurso puro = excepcional / acceso ≠ provisión / un puesto una retribución / cadena CLASES→ACCESO→SITUACIONES→PROVISIÓN→LÍMITES","Solo las causas de pérdida","Solo las excedencias"],c:1,f:"Los 5 datos críticos del T8: 1) interino ≠ eventual, 2) concurso puro = excepcional, 3) acceso ≠ provisión, 4) un puesto una retribución, 5) cadena completa del tema. Con estos cinco datos resuelves la mayoría de preguntas."},
  {b:"13. Síntesis final",q:"El T8 conecta especialmente con:",opts:["Solo el T1","El T2 (organización donde trabajan), el T15 (régimen disciplinario) y el T14 (derechos y deberes)","Solo el T9","Solo el T3"],c:1,f:"Conexiones del T8: T2 (la organización donde trabajan los empleados públicos) + T15 (régimen disciplinario que sanciona incumplimientos) + T14 (derechos y deberes del personal). Los tres forman el bloque de función pública."}
];

let pool=[...Q],idx=0,nOk=0,nEr=0,fl=[],ans=false;
function render(){if(idx>=pool.length){showRes();return;}const q=pool[idx],tot=pool.length;document.getElementById('fill').style.width=Math.round(idx/tot*100)+'%';document.getElementById('pn').textContent=(idx+1)+' / '+tot;document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;document.getElementById('vpe').textContent=tot-idx;document.getElementById('pill').textContent=q.b;document.getElementById('qnl').textContent='Pregunta '+(idx+1);document.getElementById('qbl').textContent=q.b;document.getElementById('qt').textContent=q.q;const o=document.getElementById('opts');o.innerHTML='';['A','B','C','D'].forEach((l,i)=>{const b=document.createElement('button');b.className='opt';b.innerHTML='<span class="lt">'+l+'</span><span>'+q.opts[i]+'</span>';b.onclick=()=>sel(i,b);o.appendChild(b);});const f=document.getElementById('fb');f.className='';f.innerHTML='';document.getElementById('bn').style.display='none';ans=false;}
function sel(i,btn){if(ans)return;ans=true;const q=pool[idx];document.querySelectorAll('.opt').forEach(b=>b.classList.add('dis'));const f=document.getElementById('fb');if(i===q.c){btn.classList.add('ok');nOk++;f.className='show ok';f.innerHTML='<div class="fh">Correcto</div><div class="fd">'+q.f+'</div>';}else{btn.classList.add('er');document.querySelectorAll('.opt')[q.c].classList.add('ok');nEr++;fl.push({q:q.q,co:q.opts[q.c],tu:q.opts[i],f:q.f});f.className='show er';f.innerHTML='<div class="fh">Incorrecto — correcta: '+['A','B','C','D'][q.c]+'</div><div class="fd">'+q.f+'</div>';}document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;document.getElementById('bn').style.display='inline-block';}
function nxt(){idx++;render();}
function showRes(){['hdr','pw','stats','qc','opts','fb','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});const tot=pool.length,pct=Math.round(nOk/tot*100);document.getElementById('rp').textContent=pct+'%';document.getElementById('rt').textContent=pct>=80?'T8 bien consolidado':pct>=60?'Nivel medio — repasa los fallos':'Refuerza situaciones e incompatibilidades';document.getElementById('rs2').textContent=nOk+' correctas de '+tot+'.'+(fl.length>0?' '+fl.length+' para repasar.':' Sin errores.');if(!fl.length)document.getElementById('bfl').style.display='none';if(fl.length){document.getElementById('fs').style.display='block';document.getElementById('fst').textContent='Preguntas falladas ('+fl.length+')';const fll=document.getElementById('fl');fll.innerHTML='';fl.forEach(f=>{const d=document.createElement('div');d.className='fi';d.innerHTML='<div class="fq">'+f.q+'</div><div class="fb2"><span class="bg er">Tu respuesta: '+f.tu+'</span><span class="bg ok">Correcta: '+f.co+'</span></div><div class="fe">'+f.f+'</div>';fll.appendChild(d);});}document.getElementById('res').style.display='block';}
function rst(){pool=[...Q];idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
function sfl(){if(!fl.length)return;pool=fl.map(f=>Q.find(q=>q.q===f.q)).filter(Boolean);idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
render();
</script>
