<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tema 10 Parte 1/3 · Oposición Generalitat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f4; --surface: #ffffff; --surface2: #f1f0ed;
    --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.2);
    --text: #1a1a18; --text2: #5a5a56; --text3: #9a9a94;
    --ok: #1a7a4a; --ok-bg: #eaf5ee; --ok-border: rgba(26,122,74,0.25);
    --err: #c0392b; --err-bg: #fdf0ee; --err-border: rgba(192,57,43,0.25);
    --accent: #1a1a18; --radius: 10px; --radius-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18181a; --surface: #222224; --surface2: #2a2a2c;
      --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.2);
      --text: #f0efec; --text2: #a0a09a; --text3: #606060;
      --ok: #4caf7a; --ok-bg: rgba(76,175,122,0.12); --ok-border: rgba(76,175,122,0.3);
      --err: #e57373; --err-bg: rgba(229,115,115,0.12); --err-border: rgba(229,115,115,0.3);
      --accent: #f0efec;
    }
  }
  html { font-size: 16px; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem 4rem; }
  #app { width: 100%; max-width: 680px; }
  #header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 2rem; }
  #header h1 { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 3px; letter-spacing: -0.01em; }
  #header p { font-size: 13px; color: var(--text3); }
  #pill { font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border-strong); color: var(--text2); background: var(--surface2); white-space: nowrap; flex-shrink: 0; }
  #progress-wrap { margin-bottom: 1.25rem; }
  #progress-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); margin-bottom: 7px; }
  #progress-row span:last-child { font-weight: 500; color: var(--text2); }
  #track { height: 3px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  #fill { height: 3px; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; width: 0%; }
  #stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
  .stat .lbl { font-size: 11px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .stat .val { font-size: 24px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
  #sc-ok .val { color: var(--ok); }
  #sc-err .val { color: var(--err); }
  #q-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
  #q-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text3); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
  #q-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border-strong); display: inline-block; }
  #q-text { font-size: 16px; color: var(--text); line-height: 1.65; }
  #options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
  .opt { display: flex; align-items: flex-start; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px 16px; font-size: 14px; color: var(--text); cursor: pointer; text-align: left; line-height: 1.55; transition: border-color 0.15s, background 0.15s, transform 0.1s; width: 100%; }
  .opt:hover:not(.disabled) { border-color: var(--border-strong); background: var(--surface2); transform: translateY(-1px); }
  .opt:active:not(.disabled) { transform: translateY(0); }
  .letter { min-width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--border-strong); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--text2); flex-shrink: 0; margin-top: 1px; transition: background 0.15s, color 0.15s, border-color 0.15s; }
  .opt.correct { border-color: var(--ok-border); background: var(--ok-bg); }
  .opt.correct .letter { background: var(--ok); border-color: var(--ok); color: #fff; }
  .opt.wrong { border-color: var(--err-border); background: var(--err-bg); }
  .opt.wrong .letter { background: var(--err); border-color: var(--err); color: #fff; }
  .opt.disabled { cursor: default; pointer-events: none; }
  #feedback { display: none; border-radius: var(--radius-sm); padding: 13px 16px; margin-bottom: 1rem; border: 1px solid; font-size: 13px; line-height: 1.65; }
  #feedback.show { display: block; }
  #feedback.ok { background: var(--ok-bg); border-color: var(--ok-border); }
  #feedback.err { background: var(--err-bg); border-color: var(--err-border); }
  #feedback .fb-head { font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 5px; }
  #feedback.ok .fb-head { color: var(--ok); }
  #feedback.err .fb-head { color: var(--err); }
  #feedback .fb-body { color: var(--text2); }
  #btn-row { display: flex; justify-content: flex-end; }
  #btn-next { display: none; font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: var(--radius-sm); background: var(--accent); color: var(--bg); border: none; cursor: pointer; transition: opacity 0.15s; }
  #btn-next:hover { opacity: 0.85; }
  #results { display: none; padding: 1rem 0; }
  #res-hero { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 2rem; }
  #res-pct { font-size: 64px; font-weight: 700; color: var(--text); letter-spacing: -0.04em; line-height: 1; flex-shrink: 0; }
  #res-info h2 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  #res-info p { font-size: 13px; color: var(--text2); line-height: 1.6; }
  #res-btns { display: flex; gap: 8px; margin-bottom: 2rem; flex-wrap: wrap; }
  .btn-sec { font-size: 13px; font-weight: 500; padding: 10px 18px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--surface); color: var(--text); cursor: pointer; transition: background 0.15s; }
  .btn-sec:hover { background: var(--surface2); }
  .btn-prim { background: var(--accent); color: var(--bg); border-color: transparent; }
  .btn-prim:hover { opacity: 0.85; background: var(--accent); }
  #fallos-section { border-top: 1px solid var(--border); padding-top: 1.5rem; }
  #fallos-section h3 { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.04em; }
  .fallo { padding: 1rem 0; border-bottom: 1px solid var(--border); }
  .fallo:last-child { border-bottom: none; }
  .fallo-q { font-size: 14px; color: var(--text); margin-bottom: 8px; line-height: 1.5; font-weight: 500; }
  .fallo-badges { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; border: 1px solid; }
  .badge.err { background: var(--err-bg); border-color: var(--err-border); color: var(--err); }
  .badge.ok { background: var(--ok-bg); border-color: var(--ok-border); color: var(--ok); }
  .fallo-exp { font-size: 12px; color: var(--text3); line-height: 1.6; }
  @media (max-width: 500px) { body { padding: 1rem 0.75rem 3rem; } #res-hero { flex-direction: column; gap: 1rem; align-items: flex-start; } #res-pct { font-size: 48px; } #header { flex-direction: column; gap: 0.75rem; } }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <h1>Tema 10 Parte 1/3 · Oposición Generalitat</h1>
      <p>63 preguntas · Admin. digital · ENS y ENI · Archivo, sede y PACe</p>
    </div>
    <div id="pill"></div>
  </div>
  <div id="progress-wrap">
    <div id="progress-row"><span>Progreso</span><span id="prog-num">1 / 63</span></div>
    <div id="track"><div id="fill"></div></div>
  </div>
  <div id="stats-row">
    <div class="stat" id="sc-ok"><div class="lbl">Correctas</div><div class="val" id="v-ok">0</div></div>
    <div class="stat" id="sc-err"><div class="lbl">Errores</div><div class="val" id="v-err">0</div></div>
    <div class="stat"><div class="lbl">Pendientes</div><div class="val" id="v-pend">63</div></div>
  </div>
  <div id="q-card">
    <div id="q-meta"><span id="q-num-lbl"></span><span class="dot"></span><span id="q-bloque-lbl"></span></div>
    <div id="q-text"></div>
  </div>
  <div id="options"></div>
  <div id="feedback"></div>
  <div id="btn-row"><button id="btn-next" onclick="nextQ()">Siguiente →</button></div>
  <div id="results">
    <div id="res-hero">
      <div id="res-pct"></div>
      <div id="res-info"><h2 id="res-title"></h2><p id="res-sub"></p></div>
    </div>
    <div id="res-btns">
      <button class="btn-sec btn-prim" onclick="restart()">Repetir completo</button>
      <button class="btn-sec" id="btn-fallos" onclick="soloFallos()">Solo preguntas falladas →</button>
    </div>
    <div id="fallos-section" style="display:none">
      <h3 id="fallos-title"></h3>
      <div id="fallos-list"></div>
    </div>
  </div>
</div>

<script>
const ALL_Q = [
  {b:"Admin. digital",q:"¿Qué define mejor la Administración digital según el tema?",opts:["La mera conversión de documentos en papel a formato PDF","La incorporación de medios electrónicos a la actividad pública para mejorar accesibilidad, transparencia, eficacia, eficiencia y calidad","Un sistema de teletrabajo interno sin efectos sobre la ciudadanía","La sustitución completa del personal por herramientas automáticas"],c:1,f:"El tema la define como incorporación de medios electrónicos a la actividad pública con fines de mejora del servicio y del funcionamiento."},
  {b:"Admin. digital",q:"Según el resumen, la Administración digital debe entenderse ante todo como:",opts:["Un proyecto exclusivamente tecnológico","Un cambio organizativo y jurídico, no solo tecnológico","Una política opcional sin impacto procedimental","Un sistema limitado a la atención presencial"],c:1,f:"La idea-base del tema es que la Administración digital supone rediseño organizativo y jurídico, no solo pasar papeles a PDF."},
  {b:"Admin. digital",q:"La ley catalana presenta la Administración digital como:",opts:["Un modelo común de país basado en coordinación, reutilización y colaboración","Una herramienta reservada al sector privado","Un sistema aplicable solo a empresas y no a la ciudadanía","Un conjunto de plataformas sin conexión entre sí"],c:0,f:"El resumen destaca un modelo común de país apoyado en coordinación, reutilización y colaboración interadministrativa."},
  {b:"Admin. digital",q:"¿Cuál de los siguientes principios pertenece al bloque de orientación al usuario?",opts:["Neutralidad e interoperabilidad","Innovación y continuidad digital","Proactividad y personalización","Economía del gasto"],c:2,f:"Proactividad y personalización aparecen en el bloque de orientación al usuario."},
  {b:"Admin. digital",q:"¿Cuál de los siguientes principios pertenece al bloque de funcionamiento del sistema?",opts:["Accesibilidad","Proximidad","Transparencia y participación","Seguridad y confianza"],c:3,f:"Seguridad y confianza se incluyen en el bloque de funcionamiento del sistema."},
  {b:"Admin. digital",q:"Señala la opción correcta sobre los principios de la Administración digital:",opts:["La accesibilidad se ubica en el bloque de funcionamiento del sistema","La simplificación se ubica en el bloque de orientación al usuario","La calidad se ubica en el bloque de orientación al usuario","La neutralidad e interoperabilidad se ubican en el bloque de orientación al usuario"],c:2,f:"Calidad figura entre los principios de orientación al usuario."},
  {b:"Admin. digital",q:"La actuación administrativa automatizada es:",opts:["Toda actuación electrónica realizada por una persona empleada pública","Un acto realizado íntegramente por medios electrónicos sin intervención directa de una persona empleada pública en cada acto concreto","Un acto que no puede ser impugnado por carecer de autor humano","Una comunicación interna entre administraciones"],c:1,f:"El resumen da esa definición exacta de actuación administrativa automatizada."},
  {b:"Admin. digital",q:"Para que exista actuación administrativa automatizada, la norma del tema exige:",opts:["Una resolución previa con especificaciones, órgano responsable, supervisión, control y régimen de impugnación","Únicamente la disponibilidad de una aplicación informática","La firma manuscrita posterior de todo el personal interviniente","La autorización judicial previa en todos los casos"],c:0,f:"La automatización requiere resolución previa y responsables claros."},
  {b:"Admin. digital",q:"La principal trampa de examen sobre la actuación automatizada es pensar que:",opts:["Puede coexistir con controles previos y responsables definidos","Siempre requiere resolución previa","Significa actuar sin control","Debe poder ser impugnada"],c:2,f:"El resumen insiste en que automatizada no significa sin control."},
  {b:"Admin. digital",q:"Las administraciones pueden identificarse mediante:",opts:["Sello electrónico basado en certificado reconocido o cualificado","Solo firma manuscrita digitalizada del titular del órgano","Un correo electrónico ordinario","Cualquier logotipo institucional"],c:0,f:"El tema prevé la identificación mediante sello electrónico basado en certificado reconocido o cualificado."},
  {b:"Admin. digital",q:"La firma del personal al servicio de la Administración se realiza:",opts:["Solo con certificado personal expedido por la AEPD","Con los sistemas que determine cada Administración","Siempre mediante sello electrónico del órgano","Exclusivamente con idCAT-SMS"],c:1,f:"El resumen indica que los sistemas de firma del personal los determina cada Administración."},
  {b:"Admin. digital",q:"Los sistemas cerrados de comunicación entre administraciones son válidos si garantizan:",opts:["Autenticidad, identificación, seguridad e integridad","Únicamente rapidez en la transmisión","Que la información no pueda ser reutilizada","Exclusivamente la identidad del emisor"],c:0,f:"Esa es la lista de garantías exigida por el tema."},
  {b:"Admin. digital",q:"Según el resumen, los documentos del procedimiento deben conservarse:",opts:["Solo en papel por razones de seguridad","Por medios electrónicos salvo imposibilidad material","En cualquier soporte, sin preferencia legal","Únicamente mientras dure la tramitación"],c:1,f:"La conservación electrónica es la regla, salvo imposibilidad material."},
  {b:"Admin. digital",q:"¿Cuál de las siguientes parejas está correctamente relacionada?",opts:["Personalización e innovación: funcionamiento del sistema","Seguridad y confianza: orientación al usuario","Proximidad y accesibilidad: orientación al usuario","Neutralidad e interoperabilidad: orientación al usuario"],c:2,f:"Proximidad y accesibilidad pertenecen al bloque orientado al usuario."},
  {b:"Admin. digital",q:"La incorporación de medios electrónicos busca, entre otras cosas, mejorar:",opts:["Solo la imagen externa de la Administración","Accesibilidad, transparencia, eficacia, eficiencia y calidad","Únicamente la rapidez en las compras públicas","Solo la comunicación entre empleados"],c:1,f:"La definición del tema enumera esas finalidades."},
  {b:"Admin. digital",q:"Señala la afirmación incorrecta:",opts:["La Administración digital incluye proactividad y personalización","La Administración digital se reduce a desmaterializar documentos","La Administración digital incorpora simplificación","La Administración digital incorpora seguridad y confianza"],c:1,f:"La reducción a desmaterializar documentos es precisamente una de las confusiones que el tema corrige."},
  {b:"Admin. digital",q:"¿Cuál de los siguientes principios no figura en el bloque de funcionamiento del sistema?",opts:["Innovación y continuidad digital","Simplificación","Calidad","Seguridad y confianza"],c:2,f:"Calidad se ubica en el bloque de orientación al usuario."},
  {b:"Admin. digital",q:"En el resumen, la continuidad digital se asocia a:",opts:["La orientación al usuario","El funcionamiento del sistema","La regulación de la representación","Las copias auténticas"],c:1,f:"Continuidad digital aparece en el bloque de funcionamiento del sistema."},
  {b:"Admin. digital",q:"La colaboración interadministrativa, en el marco de la ley catalana, se conecta con:",opts:["El modelo común de país de la Administración digital","La prohibición de reutilización de soluciones","La eliminación del archivo electrónico","La desaparición del registro general"],c:0,f:"La ley catalana la integra en el modelo común de país."},
  {b:"Admin. digital",q:"Cuando el tema habla de enfoque de servicio a ciudadanía, empresas y organizaciones, se refiere a:",opts:["La definición de archivo electrónico","El modelo de Administración digital que impulsa la normativa catalana","La clasificación de sistemas del ENS","La validez máxima de la representación"],c:1,f:"Ese enfoque se menciona dentro de la ley catalana sobre Administración digital."},
  {b:"Admin. digital",q:"¿Cuál es la mejor síntesis de la actuación automatizada?",opts:["Actuación informática sin necesidad de norma previa ni responsables","Acto íntegramente electrónico, con resolución previa y control definido","Comunicación entre registros interoperables","Sistema de firma manual escaneada"],c:1,f:"Resume la definición y la exigencia de resolución previa del tema."},
  {b:"Admin. digital",q:"Señala la opción correcta sobre la conservación electrónica:",opts:["Es una posibilidad secundaria y excepcional","Es obligatoria para todos los documentos, sin excepción alguna","Es la regla general salvo imposibilidad material","Solo se aplica a documentos archivados definitivamente"],c:2,f:"La regla general es conservar electrónicamente, salvo imposibilidad material."},
  {b:"Admin. digital",q:"La neutralidad e interoperabilidad se citan en el tema como principios de:",opts:["Relación con el usuario","Funcionamiento del sistema","Representación digital","Atención presencial"],c:1,f:"Figuran expresamente en el bloque de funcionamiento del sistema."},
  {b:"Admin. digital",q:"¿Qué enunciado es más fiel al tema?",opts:["La Administración digital sustituye toda actividad presencial","La Administración digital mejora calidad y acceso, pero también reorganiza jurídicamente la actividad pública","La Administración digital es solo una cuestión de seguridad informática","La Administración digital se limita a la sede electrónica"],c:1,f:"El tema la presenta como un cambio amplio organizativo, jurídico y tecnológico."},
  {b:"ENS y ENI",q:"¿Qué bloque se asocia al ENS?",opts:["Interoperabilidad entre administraciones","Seguridad de la información y de los servicios","Representación y apoderamientos","Atención presencial"],c:1,f:"ENS se asocia a seguridad de la información y de los servicios."},
  {b:"ENS y ENI",q:"¿Qué bloque se asocia al ENI?",opts:["Seguridad física de edificios administrativos","Archivo de expedientes judiciales","Interoperabilidad entre administraciones, datos, formatos y aplicaciones","Régimen sancionador del personal"],c:2,f:"ENI se ocupa de la interoperabilidad."},
  {b:"ENS y ENI",q:"Una formulación correcta sobre ENS y ENI sería:",opts:["ENS protege; ENI conecta y hace entendible/reutilizable","ENS conecta; ENI protege","Ambos regulan exactamente lo mismo con distinto nombre","ENS y ENI solo operan en la Generalitat"],c:0,f:"La frase-resumen del tema distingue claramente ambas funciones."},
  {b:"ENS y ENI",q:"El ENS protege especialmente:",opts:["Disponibilidad, autenticidad, integridad, confidencialidad y trazabilidad","Solo la rapidez de respuesta","Exclusivamente la interoperabilidad semántica","La libre designación del personal técnico"],c:0,f:"Esas son las dimensiones/valores que el tema vincula a la seguridad."},
  {b:"ENS y ENI",q:"El ENI pretende permitir:",opts:["El intercambio, comprensión y reutilización de información y servicios","La clasificación de sistemas de seguridad en básica, media o alta","La sustitución de toda resolución administrativa por actos automatizados","La eliminación de los registros electrónicos"],c:0,f:"Esa es la finalidad que el resumen asigna al ENI."},
  {b:"ENS y ENI",q:"Señala qué opción describe la organización del ENS:",opts:["Criterios, recomendaciones, infraestructuras comunes, estándares y reutilización","Principios, requisitos mínimos y medidas de seguridad","Apoderamientos, representación y firma","Dimensiones organizativa, semántica, técnica y temporal"],c:1,f:"El ENS se organiza en principios, requisitos mínimos y medidas de seguridad."},
  {b:"ENS y ENI",q:"Señala qué opción describe la organización del ENI:",opts:["Principios, requisitos mínimos y medidas de seguridad","Categorías básica, media o alta","Criterios, recomendaciones, infraestructuras comunes, estándares y reutilización","Disponibilidad, autenticidad, integridad, confidencialidad y trazabilidad"],c:2,f:"El ENI se organiza mediante esos elementos."},
  {b:"ENS y ENI",q:"Las categorías del sistema en el ENS son:",opts:["Inicial, avanzada y superior","Básica, media o alta","Baja, media o máxima","Organizativa, semántica y técnica"],c:1,f:"El tema recoge las categorías básica, media y alta."},
  {b:"ENS y ENI",q:"Según el resumen, cada dimensión de seguridad en el ENS puede estar en nivel:",opts:["Bajo, medio o alto","Mínimo, normal o reforzado","Básico, medio o cualificado","Técnico, organizativo o temporal"],c:0,f:"Cada dimensión puede situarse en bajo, medio o alto."},
  {b:"ENS y ENI",q:"Regla de examen sobre la categoría del sistema en el ENS:",opts:["La marca el promedio de todas las dimensiones","La fija el órgano gestor libremente","La determina el nivel más alto alcanzado en alguna dimensión","La decide el ENI"],c:2,f:"El resumen subraya esta regla de examen."},
  {b:"ENS y ENI",q:"¿Cuál de los siguientes es un requisito mínimo típico del ENS?",opts:["La gestión de riesgos","La interoperabilidad semántica","La compatibilidad con registros de representación","La existencia de sedes asociadas"],c:0,f:"Gestión de riesgos es uno de los requisitos mínimos citados."},
  {b:"ENS y ENI",q:"Entre los requisitos mínimos típicos del ENS figura:",opts:["La negociación colectiva","El control de accesos","La libre designación","La publicación de ofertas de empleo"],c:1,f:"Control de accesos forma parte de los requisitos mínimos que se enumeran."},
  {b:"ENS y ENI",q:"La continuidad, el registro de actividad y la gestión de incidentes aparecen en el tema como:",opts:["Partes del contenido mínimo de la sede electrónica","Requisitos mínimos típicos del ENS","Tipos de apoderamiento","Funciones del PACe"],c:1,f:"Son ejemplos de requisitos mínimos del ENS."},
  {b:"ENS y ENI",q:"¿Cuál de las siguientes NO es una dimensión de la interoperabilidad según el ENI?",opts:["Organizativa","Semántica","Temporal","Jurisdiccional"],c:3,f:"Las dimensiones del ENI son organizativa, semántica, técnica y en el tiempo."},
  {b:"ENS y ENI",q:"La interoperabilidad organizativa implica:",opts:["Que los documentos se archiven durante cinco años","Que los procesos y entidades puedan colaborar","Que la firma se base siempre en certificado cualificado","Que la categoría del sistema sea alta"],c:1,f:"El tema define así la interoperabilidad organizativa."},

  {b:"ENS y ENI",q:"Antes de crear o comprar una aplicación, el tema recuerda que:",opts:["Debe pedirse autorización judicial","Hay que consultar si existe una solución reutilizable y preferirla si sirve, salvo justificación","Siempre debe adquirirse una nueva por seguridad","Debe descartarse la reutilización por riesgo de incompatibilidad"],c:1,f:"El ENI fomenta la reutilización de soluciones existentes."},
  {b:"ENS y ENI",q:"Señala la afirmación correcta:",opts:["ENS y ENI son equivalentes","ENS y ENI regulan materias distintas pero complementarias","ENS solo se aplica a expedientes sancionadores","ENI excluye la interoperabilidad semántica"],c:1,f:"El tema los presenta como bloques distintos y complementarios."},
  {b:"ENS y ENI",q:"La idea 'ENS protege; ENI conecta y hace entendible/reutilizable' es:",opts:["Incorrecta porque ambos bloques solo tratan de seguridad","Correcta como regla de examen","Incorrecta porque el ENI no afecta a la reutilización","Correcta solo para entidades privadas"],c:1,f:"Es una de las frases-resumen del tema."},
  {b:"ENS y ENI",q:"¿Qué opción mezcla correctamente concepto y bloque?",opts:["Disponibilidad: ENI","Interoperabilidad técnica: ENS","Gestión de riesgos: ENS","Comprensión semántica: ENS"],c:2,f:"Gestión de riesgos pertenece al ENS."},
  {b:"ENS y ENI",q:"¿Qué opción mezcla correctamente concepto y bloque?",opts:["Intercambio y reutilización de información: ENI","Control de accesos: ENI","Trazabilidad: ENI","Categoría básica/media/alta: ENI"],c:0,f:"El intercambio y reutilización de información son finalidades del ENI."},
  {b:"ENS y ENI",q:"¿Cuál sería una respuesta correcta en test sobre la interoperabilidad?",opts:["Solo es técnica","Puede ser organizativa, semántica, técnica y en el tiempo","Solo depende del software adquirido","Se limita a la Administración del Estado"],c:1,f:"El resumen insiste en que no es solo técnica."},
  {b:"ENS y ENI",q:"La trampa clásica sobre ENS y ENI consiste en:",opts:["Confundir seguridad con interoperabilidad","Pensar que la sede electrónica tiene contenido mínimo","Creer que los certificados caducan","Pensar que la copia auténtica requiere órgano competente"],c:0,f:"El propio resumen marca esta confusión como muy frecuente."},
  {b:"ENS y ENI",q:"¿Qué par está bien asociado?",opts:["Categoría del sistema: ENI","Dimensión semántica: ENS","Registro de actividad: ENS","Reutilización obligatoria de soluciones: PACe"],c:2,f:"Registro de actividad se cita como requisito mínimo típico del ENS."},
  {b:"Archivo / Sede / PACe",q:"Según el tema, el archivo electrónico no consiste simplemente en:",opts:["Ordenar metadatos","Guardar un PDF","Conservar documentos con control de acceso","Asegurar la recuperación a largo plazo"],c:1,f:"La trampa del tema es pensar que archivo electrónico equivale a guardar un PDF."},
  {b:"Archivo / Sede / PACe",q:"¿Qué debe asegurar el archivo electrónico?",opts:["Identidad, integridad, autenticidad, confidencialidad, conservación, recuperación y control de acceso a largo plazo","Solo la legibilidad visual del documento","Exclusivamente la emisión de recibos","Únicamente la firma del ciudadano"],c:0,f:"El resumen enumera todas esas garantías."},

  {b:"Archivo / Sede / PACe",q:"La sede electrónica es:",opts:["El asiento registral de entrada y salida","La dirección electrónica oficial de una Administración u organismo, disponible a través de redes de telecomunicaciones","El certificado del empleado público","El archivo histórico de la Administración"],c:1,f:"El tema la define así."},
  {b:"Archivo / Sede / PACe",q:"En la sede electrónica se realizan actuaciones, procedimientos y trámites que requieren:",opts:["La presencia física de la persona interesada","La identificación de la Administración y, en su caso, de la persona interesada","La intervención judicial en todo caso","Exclusivamente la firma del órgano"],c:1,f:"Ese es el uso funcional que describe el resumen."},
  {b:"Archivo / Sede / PACe",q:"La titularidad de la sede implica responsabilidad sobre:",opts:["La integridad, veracidad y actualización de la información y de los servicios publicados","Solo el diseño gráfico del portal","Exclusivamente la atención telefónica","La regulación del ENS"],c:0,f:"La persona u órgano titular responde de esos extremos."},

  {b:"Archivo / Sede / PACe",q:"Señala la trampa correcta:",opts:["Sede y registro son lo mismo","La sede es la puerta oficial de acceso y tramitación; el registro es el asiento de entrada y salida","El registro sustituye siempre a la sede","La sede solo sirve para información, nunca para trámites"],c:1,f:"Esa es una de las confusiones nucleares del tema."}
];

let pool=[...ALL_Q],idx=0,nOk=0,nErr=0,fallos=[],answered=false;

function render(){
  if(idx>=pool.length){showResults();return;}
  const q=pool[idx];
  document.getElementById('q-num-lbl').textContent=`Pregunta ${idx+1}`;
  document.getElementById('q-bloque-lbl').textContent=q.b;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('prog-num').textContent=`${idx+1} / ${pool.length}`;
  document.getElementById('fill').style.width=`${((idx)/pool.length)*100}%`;
  document.getElementById('v-pend').textContent=pool.length-(idx);
  const opts=document.getElementById('options');
  opts.innerHTML='';
  ['A','B','C','D'].forEach((letter,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<span class="letter">${letter}</span><span>${q.opts[i]}</span>`;
    btn.onclick=()=>answer(i);
    opts.appendChild(btn);
  });
  document.getElementById('feedback').className='';
  document.getElementById('feedback').style.display='none';
  document.getElementById('btn-next').style.display='none';
  answered=false;
}

function answer(sel){
  if(answered)return;
  answered=true;
  const q=pool[idx];
  const btns=document.querySelectorAll('.opt');
  btns.forEach((b,i)=>{
    b.classList.add('disabled');
    if(i===q.c)b.classList.add('correct');
    else if(i===sel)b.classList.add('wrong');
  });
  const fb=document.getElementById('feedback');
  fb.className='show '+(sel===q.c?'ok':'err');
  fb.innerHTML=`<div class="fb-head">${sel===q.c?'Correcto':'Incorrecto'}</div><div class="fb-body">${q.f}</div>`;
  document.getElementById('btn-next').style.display='block';
  if(sel===q.c){nOk++;document.getElementById('v-ok').textContent=nOk;}
  else{nErr++;document.getElementById('v-err').textContent=nErr;fallos.push({...q,userAns:sel});}
}

function nextQ(){idx++;render();}

function showResults(){
  document.getElementById('q-card').style.display='none';
  document.getElementById('options').style.display='none';
  document.getElementById('feedback').style.display='none';
  document.getElementById('btn-row').style.display='none';
  document.getElementById('progress-wrap').style.display='none';
  document.getElementById('stats-row').style.display='none';
  const pct=Math.round((nOk/pool.length)*100);
  document.getElementById('res-pct').textContent=pct+'%';
  let msg='',sub='';
  if(pct>=90){msg='Excelente dominio';sub='Estás listo para este bloque del tema.';}
  else if(pct>=75){msg='Buen nivel';sub='Repasa los fallos y estarás a punto.';}
  else if(pct>=60){msg='Nivel aceptable';sub='Refuerza los puntos débiles.';}
  else{msg='Necesitas más estudio';sub='Revisa el tema y vuelve a intentarlo.';}
  document.getElementById('res-title').textContent=msg;
  document.getElementById('res-sub').textContent=sub;
  if(fallos.length>0){
    document.getElementById('fallos-section').style.display='block';
    document.getElementById('fallos-title').textContent=`Resumen de errores (${fallos.length})`;
    document.getElementById('btn-fallos').style.display='inline-block';
    const list=document.getElementById('fallos-list');
    list.innerHTML='';
    fallos.forEach(f=>{
      const div=document.createElement('div');
      div.className='fallo';
      const letters=['A','B','C','D'];
      div.innerHTML=`<div class="fallo-q">${f.q}</div><div class="fallo-badges"><span class="badge err">Tu respuesta: ${letters[f.userAns]}</span><span class="badge ok">Correcta: ${letters[f.c]}</span></div><div class="fallo-exp">${f.f}</div>`;
      list.appendChild(div);
    });
  }else{
    document.getElementById('btn-fallos').style.display='none';
  }
  document.getElementById('results').style.display='block';
}

function restart(){
  pool=[...ALL_Q];
  idx=0;nOk=0;nErr=0;fallos=[];answered=false;
  document.getElementById('v-ok').textContent='0';
  document.getElementById('v-err').textContent='0';
  document.getElementById('results').style.display='none';
  document.getElementById('q-card').style.display='block';
  document.getElementById('options').style.display='flex';
  document.getElementById('btn-row').style.display='flex';
  document.getElementById('progress-wrap').style.display='block';
  document.getElementById('stats-row').style.display='grid';
  document.getElementById('fallos-section').style.display='none';
  render();
}

function soloFallos(){
  if(fallos.length===0)return;
  pool=fallos.map(f=>{const{userAns,...rest}=f;return rest;});
  idx=0;nOk=0;nErr=0;fallos=[];answered=false;
  document.getElementById('v-ok').textContent='0';
  document.getElementById('v-err').textContent='0';
  document.getElementById('pill').textContent=`Solo fallos (${pool.length})`;
  document.getElementById('results').style.display='none';
  document.getElementById('q-card').style.display='block';
  document.getElementById('options').style.display='flex';
  document.getElementById('btn-row').style.display='flex';
  document.getElementById('progress-wrap').style.display='block';
  document.getElementById('stats-row').style.display='grid';
  document.getElementById('fallos-section').style.display='none';
  render();
}

window.onload=()=>render();
</script>
