<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f7f4;--surface:#fff;--surface2:#f1f0ed;--border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.2);--text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;--ok:#1a7a4a;--ok-bg:#eaf5ee;--ok-border:rgba(26,122,74,.25);--err:#c0392b;--err-bg:#fdf0ee;--err-border:rgba(192,57,43,.25);--accent:#1a1a18;--r:10px;--rs:6px}
@media(prefers-color-scheme:dark){:root{--bg:#18181a;--surface:#222224;--surface2:#2a2a2c;--border:rgba(255,255,255,.1);--border-strong:rgba(255,255,255,.2);--text:#f0efec;--text2:#a0a09a;--text3:#606060;--ok:#4caf7a;--ok-bg:rgba(76,175,122,.12);--ok-border:rgba(76,175,122,.3);--err:#e57373;--err-bg:rgba(229,115,115,.12);--err-border:rgba(229,115,115,.3);--accent:#f0efec}}
html{font-size:16px}body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem}
#app{width:100%;max-width:680px}
#hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:2rem}
#hdr h1{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px;letter-spacing:-.01em}#hdr p{font-size:13px;color:var(--text3)}
#pill{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid var(--border-strong);color:var(--text2);background:var(--surface2);white-space:nowrap;flex-shrink:0}
#pw{margin-bottom:1.25rem}#pr{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:7px}#pr span:last-child{font-weight:500;color:var(--text2)}
#track{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden}#fill{height:3px;background:var(--accent);border-radius:3px;transition:width .4s ease;width:0%}
#stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.st{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px}
.st .lb{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.st .vl{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-.02em}
#sc-ok .vl{color:var(--ok)}#sc-er .vl{color:var(--err)}
#qc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem}
#qm{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em}
#qm .d{width:3px;height:3px;border-radius:50%;background:var(--border-strong);display:inline-block}
#qt{font-size:16px;color:var(--text);line-height:1.65}
#opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.opt{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:13px 16px;font-size:14px;color:var(--text);cursor:pointer;text-align:left;line-height:1.55;transition:border-color .15s,background .15s,transform .1s;width:100%}
.opt:hover:not(.dis){border-color:var(--border-strong);background:var(--surface2);transform:translateY(-1px)}
.lt{min-width:24px;height:24px;border-radius:50%;border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0;margin-top:1px;transition:background .15s,color .15s,border-color .15s}
.opt.ok{border-color:var(--ok-border);background:var(--ok-bg)}.opt.ok .lt{background:var(--ok);border-color:var(--ok);color:#fff}
.opt.er{border-color:var(--err-border);background:var(--err-bg)}.opt.er .lt{background:var(--err);border-color:var(--err);color:#fff}
.opt.dis{cursor:default;pointer-events:none}
#fb{display:none;border-radius:var(--rs);padding:13px 16px;margin-bottom:1rem;border:1px solid;font-size:13px;line-height:1.65}
#fb.show{display:block}#fb.ok{background:var(--ok-bg);border-color:var(--ok-border)}#fb.er{background:var(--err-bg);border-color:var(--err-border)}
#fb .fh{font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
#fb.ok .fh{color:var(--ok)}#fb.er .fh{color:var(--err)}#fb .fd{color:var(--text2)}
#br{display:flex;justify-content:flex-end}
#bn{display:none;font-size:13px;font-weight:500;padding:10px 20px;border-radius:var(--rs);background:var(--accent);color:var(--bg);border:none;cursor:pointer;transition:opacity .15s}#bn:hover{opacity:.85}
#res{display:none;padding:1rem 0}
#rh{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:2rem}
#rp{font-size:64px;font-weight:700;color:var(--text);letter-spacing:-.04em;line-height:1;flex-shrink:0}
#ri h2{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}#ri p{font-size:13px;color:var(--text2);line-height:1.6}
#rbt{display:flex;gap:8px;margin-bottom:2rem;flex-wrap:wrap}
.bs{font-size:13px;font-weight:500;padding:10px 18px;border-radius:var(--rs);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);cursor:pointer;transition:background .15s}.bs:hover{background:var(--surface2)}
.bp{background:var(--accent);color:var(--bg);border-color:transparent}.bp:hover{opacity:.85;background:var(--accent)}
#fs{border-top:1px solid var(--border);padding-top:1.5rem}
#fs h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.04em}
.fi{padding:1rem 0;border-bottom:1px solid var(--border)}.fi:last-child{border-bottom:none}
.fq{font-size:14px;color:var(--text);margin-bottom:8px;line-height:1.5;font-weight:500}
.fb2{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.bg{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid}
.bg.er{background:var(--err-bg);border-color:var(--err-border);color:var(--err)}.bg.ok{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok)}
.fe{font-size:12px;color:var(--text3);line-height:1.6}
@media(max-width:500px){body{padding:1rem .75rem 3rem}#rh{flex-direction:column;gap:1rem;align-items:flex-start}#rp{font-size:48px}#hdr{flex-direction:column;gap:.75rem}}
</style>

<body>
<div id="app">
  <div id="hdr"><div><h1>Tema 2 · Test 2 · Oposición Generalitat</h1><p>55 preguntas · Descentralización, organización y órganos de la Generalitat</p></div><div id="pill"></div></div>
  <div id="pw"><div id="pr"><span>Progreso</span><span id="pn">1 / 55</span></div><div id="track"><div id="fill"></div></div></div>
  <div id="stats">
    <div class="st" id="sc-ok"><div class="lb">Correctas</div><div class="vl" id="vok">0</div></div>
    <div class="st" id="sc-er"><div class="lb">Errores</div><div class="vl" id="ver">0</div></div>
    <div class="st"><div class="lb">Pendientes</div><div class="vl" id="vpe">55</div></div>
  </div>
  <div id="qc"><div id="qm"><span id="qnl"></span><span class="d"></span><span id="qbl"></span></div><div id="qt"></div></div>
  <div id="opts"></div><div id="fb"></div>
  <div id="br"><button id="bn" onclick="nxt()">Siguiente →</button></div>
  <div id="res">
    <div id="rh"><div id="rp"></div><div id="ri"><h2 id="rt"></h2><p id="rs2"></p></div></div>
    <div id="rbt"><button class="bs bp" onclick="rst()">Repetir completo</button><button class="bs" id="bfl" onclick="sfl()">Solo falladas →</button></div>
    <div id="fs" style="display:none"><h3 id="fst"></h3><div id="fl"></div></div>
  </div>
</div>
<script>
const Q=[
  {b:"A. Descentralización vs desconcentración",q:"La descentralización implica:",opts:["Trasladar competencias dentro de la misma Administración a órganos inferiores","Atribuir competencias a una Administración distinta, con personalidad jurídica propia","Concentrar poderes en el órgano superior","Suspender temporalmente competencias"],c:1,f:"DESCENTRALIZACIÓN = transferir competencias a OTRA Administración (con personalidad jurídica propia y autonomía). Es traspasar fuera, no dentro. Diferencia clave con la desconcentración."},
  {b:"A. Descentralización vs desconcentración",q:"La desconcentración implica:",opts:["Trasladar competencias a una Administración distinta","Trasladar competencias dentro de la misma Administración a órganos inferiores o periféricos","Suprimir definitivamente las competencias","Conceder competencias por delegación judicial"],c:1,f:"DESCONCENTRACIÓN = traslado interno dentro de la MISMA Administración, hacia órganos inferiores o periféricos. No cambia la titularidad ni se crea otra entidad — se acerca la decisión al territorio o al ámbito específico."},
  {b:"A. Descentralización vs desconcentración",q:"El primer truco para distinguir descentralización y desconcentración es:",opts:["Que ambas son lo mismo","Descentralización = otra Administración (fuera); desconcentración = misma Administración (dentro)","La desconcentración va hacia arriba, la descentralización hacia abajo","Solo cambia el nombre, no la sustancia"],c:1,f:"Truco mnemotécnico: DESCENTRALIZACIÓN = FUERA (otra Administración con personalidad propia). DESCONCENTRACIÓN = DENTRO (misma Administración, órgano inferior o periférico). Memorízalo así."},
  {b:"A. Descentralización vs desconcentración",q:"La descentralización implica autonomía y:",opts:["Solo dependencia jerárquica","Personalidad jurídica propia de la entidad descentralizada","Subordinación absoluta al Govern","Solo dependencia funcional"],c:1,f:"La descentralización lleva consigo personalidad jurídica propia y autonomía decisoria. La entidad descentralizada decide por sí misma dentro de su ámbito competencial. La desconcentración no implica autonomía — sigue habiendo jerarquía."},
  {b:"A. Descentralización vs desconcentración",q:"¿Qué es la delegación de competencias?",opts:["Lo mismo que la descentralización","Atribución temporal del ejercicio de competencias a otro órgano dentro del marco legal","Pérdida definitiva de competencias del órgano titular","Transferencia a otra Administración con personalidad propia"],c:1,f:"DELEGACIÓN = atribución TEMPORAL del ejercicio de competencias. El órgano titular no pierde la titularidad — solo cede el ejercicio. Distinta de la descentralización (transferencia definitiva con autonomía) y de la desconcentración (interna y también temporal o estructural)."},
  {b:"A. Descentralización vs desconcentración",q:"La avocación es:",opts:["Una forma de delegación","La asunción por el superior jerárquico de competencias del inferior","La pérdida definitiva de competencias","La descentralización inversa"],c:1,f:"AVOCACIÓN = el superior jerárquico asume las competencias del inferior para resolver un asunto concreto. Es la operación inversa a la delegación: en lugar de bajar competencias, las sube. Es excepcional y debe motivarse."},
  {b:"B. Relaciones interadministrativas",q:"Las tres nociones básicas de relación interadministrativa son:",opts:["Solo coordinación","Colaboración, cooperación y coordinación","Solo cooperación","Solo control mutuo"],c:1,f:"Tres nociones del T2: COLABORACIÓN + COOPERACIÓN + COORDINACIÓN. Tres conceptos distintos que el examen confunde sistemáticamente. Cada uno tiene su definición y función propias."},
  {b:"B. Relaciones interadministrativas",q:"La colaboración entre administraciones se define como:",opts:["Imposición unilateral de una administración sobre otra","Asistencia mutua y deber genérico de auxilio entre administraciones","Subordinación jerárquica","Solo intercambio de información"],c:1,f:"COLABORACIÓN = asistencia mutua + deber de auxilio. Es el nivel más bajo de relación: las administraciones se ayudan mutuamente (información, recursos, datos) sin someterse unas a otras."},
  {b:"B. Relaciones interadministrativas",q:"La cooperación entre administraciones se caracteriza por:",opts:["Solo asistencia técnica puntual","Acuerdo voluntario para actuar conjuntamente sobre fines comunes, en pie de igualdad","Imposición de objetivos por una administración","Control jerárquico sobre otra administración"],c:1,f:"COOPERACIÓN = acuerdo voluntario + actuar conjuntamente + fines comunes + en pie de igualdad. Implica más compromiso que la colaboración pero sin jerarquía. Convenios y acuerdos de cooperación son sus instrumentos típicos."},
  {b:"B. Relaciones interadministrativas",q:"La coordinación entre administraciones se caracteriza por:",opts:["Imposición de un criterio común para evitar disfunciones, generalmente desde una administración con competencia para coordinar","Solo intercambio voluntario de información","Subordinación jerárquica absoluta","Asistencia técnica puntual"],c:0,f:"COORDINACIÓN = imposición de un criterio común para evitar disfunciones. Tiene un plus de jerarquía técnica: una administración (la coordinadora) impone el criterio común a las demás en su ámbito de coordinación."},
  {b:"B. Relaciones interadministrativas",q:"La diferencia clave entre cooperación y coordinación es:",opts:["Son sinónimos","La cooperación es voluntaria entre iguales; la coordinación implica imposición de un criterio común","La coordinación es voluntaria, la cooperación es forzosa","No hay diferencia jurídica relevante"],c:1,f:"Diferencia clave: COOPERACIÓN = voluntaria entre iguales. COORDINACIÓN = impositiva con criterio común. El examen las confunde porque suenan parecido, pero su contenido jurídico es muy distinto."},
  {b:"B. Relaciones interadministrativas",q:"La mnemotecnia del T2 para distinguir colaboración, cooperación y coordinación es:",opts:["Las tres son lo mismo","Colaborar = ayudar; cooperar = pactar; coordinar = imponer criterio común","Son tres nombres del mismo concepto","Solo aplican entre estado y CCAA"],c:1,f:"Mnemotecnia clásica: COLABORAR = ayudar (auxilio mutuo). COOPERAR = pactar (acuerdo voluntario). COORDINAR = imponer (criterio común vinculante). Tres verbos para tres niveles de relación."},
  {b:"C. Organización de la Generalitat — Govern",q:"El Govern de la Generalitat es el órgano:",opts:["Legislativo","Superior colegiado de la Generalitat, que dirige la acción política y la Administración","Judicial","Solo ejecutivo simbólico sin competencias reales"],c:1,f:"Govern = órgano superior COLEGIADO + dirige la acción política + dirige la Administración. Es la cabeza ejecutiva. La Presidència dirige el Govern; el Govern es el órgano colegiado en su conjunto. Conecta con el T1."},
  {b:"C. Organización de la Generalitat — Govern",q:"El Govern está integrado por:",opts:["Solo el president/a","Solo los consellers","El president/a, eventualmente vicepresidents/es y los consellers","El president/a y los diputados del Parlament"],c:2,f:"Composición del Govern: president/a + vicepresidents/es (eventuales) + consellers. Los diputados son del Parlament, no del Govern. La estructura puede variar pero el núcleo es president + consellers."},
  {b:"C. Organización de la Generalitat — Govern",q:"¿Quién dirige al Govern?",opts:["El Parlament","El president/a de la Generalitat","Cada Conseller en su departamento","El Síndic de Greuges"],c:1,f:"Dirección del Govern: president/a de la Generalitat. Triple función: jefe del Govern + máxima representación de la Generalitat + representante ordinario del Estado en Cataluña. Conecta con el T1 (EAC)."},
  {b:"D. Departaments",q:"Los departaments de la Generalitat son:",opts:["Órganos del Parlament","Las grandes divisiones funcionales y administrativas dirigidas por consellers","Solo unidades técnicas sin función política","Equivalentes a los ministerios estatales pero con menor rango"],c:1,f:"DEPARTAMENTS = grandes divisiones funcionales y administrativas, dirigidas por un Conseller. Son los 'ministerios' a nivel autonómico catalán. Su número y denominación pueden variar por decreto, pero la estructura es estable."},
  {b:"D. Departaments",q:"¿Quién está al frente de un departament?",opts:["Un director general","El conseller/a","Un secretari/ària","El president del Parlament"],c:1,f:"Al frente del departament: el conseller/a (titular político). Por debajo: secretari/a general, secretaris sectorials, directors/es generals, etc. El conseller representa políticamente al departament en el Govern."},
  {b:"D. Departaments",q:"El número de departaments de la Generalitat:",opts:["Es fijo según la Constitución","Es variable y se establece por decreto","Es siempre 12","Solo puede modificarse por ley orgánica"],c:1,f:"El número de departaments es VARIABLE — se establece y modifica por decreto del Govern. Puede aumentar o reducirse según las prioridades políticas. Aprenderse una lista concreta como definitiva es error — el resumen lo advierte."},
  {b:"D. Departaments",q:"Una trampa típica del T2 es:",opts:["No memorizar ningún departament","Aprender una lista de departaments como si fuera eterna","Pensar que los departaments son del Parlament","Confundir Conseller con president"],c:1,f:"Trampa marcada en el resumen: aprender la lista de departaments como si fuera fija. Pueden cambiar por decreto. El examen rara vez pregunta por la lista exacta — pregunta por la estructura y las funciones generales."},
  {b:"E. Órganos de los departaments",q:"La estructura típica de un departament incluye, de mayor a menor:",opts:["Director general → Conseller → Secretari general","Conseller → Secretari general → Direccions generals → Subdireccions generals","Subdirector → Director → Conseller","Conseller → Secretari general → Subdireccions → Direccions"],c:1,f:"Estructura jerárquica de un departament: Conseller (cabeza política) → Secretari/a general (cabeza administrativa) → Direccions generals (sectoriales) → Subdireccions generals → Servicis y Seccions. Estructura piramidal típica."},
  {b:"E. Órganos de los departaments",q:"El secretari/a general de un departament:",opts:["Es un cargo político equivalente al conseller","Es la máxima autoridad administrativa del departament, bajo la dirección política del conseller","Es el portavoz del departament","Es un cargo del Parlament"],c:1,f:"Secretari/a general = máxima autoridad ADMINISTRATIVA del departament. Bajo la dirección política del conseller. Es la pieza clave que conecta lo político (conseller) con lo administrativo (resto de la estructura)."},
  {b:"E. Órganos de los departaments",q:"Las direccions generals de un departament:",opts:["Tienen carácter político equivalente al conseller","Son órganos directivos sectoriales que dirigen ámbitos materiales concretos","Son solo unidades de apoyo administrativo","Son órganos del Parlament"],c:1,f:"Direccions generals = órganos DIRECTIVOS sectoriales. Dirigen ámbitos materiales concretos dentro del departament (ej: Direcció General d'Habitatge dentro del Departament de Territori). Son la pieza directiva principal."},
  {b:"E. Órganos de los departaments",q:"Las subdireccions generals tienen rango:",opts:["Superior a las direccions generals","Inmediatamente inferior a las direccions generals","Equivalente al conseller","Equivalente al secretari general"],c:1,f:"Subdireccions generals = rango inmediatamente inferior a direccions generals. Son órganos directivos pero con menor amplitud competencial. Por debajo: servicis y seccions, ya nivel administrativo no directivo."},
  {b:"E. Órganos de los departaments",q:"Los servicis y seccions son:",opts:["Órganos políticos","Unidades administrativas no directivas, niveles inferiores de la estructura","Equivalentes a una dirección general","Órganos consultivos del Govern"],c:1,f:"Servicis y seccions = unidades ADMINISTRATIVAS, no directivas. Son los niveles inferiores de la estructura: por debajo de direccions y subdireccions. Realizan funciones técnicas y administrativas concretas."},
  {b:"F. Órganos territoriales",q:"La Administración periférica de la Generalitat incluye:",opts:["Solo oficinas en Barcelona","Delegaciones territoriales del Govern y servicios territoriales en las distintas zonas de Cataluña","Solo embajadas en el extranjero","Solo el Parlament"],c:1,f:"Administración periférica = delegacions territorials del Govern + serveis territorials. Llevan la presencia de la Generalitat al territorio (provincias, vegueries, comarcas). Conecta con el principio de descentralización del 103.1 CE."},
  {b:"F. Órganos territoriales",q:"Las delegacions territorials del Govern representan:",opts:["Al Parlament en el territorio","Al Govern de la Generalitat en cada ámbito territorial","Al Estado en Cataluña","A los ayuntamientos"],c:1,f:"Delegacions territorials del Govern = representación del Govern (no del Parlament ni del Estado) en cada ámbito territorial. Coordinan los serveis territorials de los distintos departaments en su zona. Función territorial integradora."},
  {b:"F. Órganos territoriales",q:"Los serveis territorials de un departament:",opts:["Son órganos centrales en Barcelona","Son los órganos territoriales del departament en cada zona, que dependen de la respectiva direcció general central","Son ayuntamientos","No existen en la organización de la Generalitat"],c:1,f:"Serveis territorials = órganos territoriales DE CADA DEPARTAMENT en las distintas zonas. Dependen jerárquicamente de la direcció general central correspondiente. Es desconcentración territorial pura."},
  {b:"F. Órganos territoriales",q:"La organización territorial básica de Cataluña incluye:",opts:["Solo provincias","Comarques, vegueries, municipis y, transitoriamente, províncies","Solo municipis","Solo Barcelona, Tarragona, Lleida y Girona"],c:1,f:"Estructura territorial catalana: comarques + vegueries + municipis + (transitoriamente) províncies. La vegueria como ente territorial sustituye conceptualmente a la província según el EAC, pero su implantación efectiva es gradual."},
  {b:"G. Órganos consultivos",q:"El Consell de Garanties Estatutàries es:",opts:["Un órgano del Govern dependiente de la Presidència","Un órgano consultivo independiente que dictamina sobre la adecuación al EAC y a la CE","Un órgano judicial equivalente al TC","Un órgano del Parlament"],c:1,f:"Consell de Garanties Estatutàries = órgano CONSULTIVO INDEPENDIENTE. Dictamina sobre la adecuación al EAC y a la CE de proyectos y proposiciones de ley. Conecta con el T1 — institución de la Generalitat."},
  {b:"G. Órganos consultivos",q:"La Comissió Jurídica Assessora es:",opts:["Un órgano sancionador","El órgano consultivo superior del Govern y de la Administración de la Generalitat en derecho","Un órgano del Parlament","Equivalente al Tribunal de Cuentas"],c:1,f:"Comissió Jurídica Assessora = órgano consultivo superior del Govern en derecho. Dictamina sobre asuntos jurídicos relevantes (revisión de oficio, responsabilidad patrimonial, contratos, recursos extraordinarios). Equivalente catalán del Consejo de Estado."},
  {b:"G. Órganos consultivos",q:"El Síndic de Greuges es:",opts:["El órgano de control económico de la Generalitat","El defensor del pueblo catalán","Un órgano del Govern","El órgano judicial superior de Cataluña"],c:1,f:"Síndic de Greuges = defensor del pueblo CATALÁN. Defiende los derechos de los ciudadanos frente a la Administración. Recibe quejas, investiga y emite recomendaciones. No anula actos — recomienda. Conecta con el T1 y T3."},
  {b:"G. Órganos consultivos",q:"La Sindicatura de Comptes es:",opts:["El defensor del pueblo catalán","El órgano de control externo de la actividad económica y presupuestaria de la Generalitat","Un órgano consultivo en derecho","Un órgano del Govern"],c:1,f:"Sindicatura de Comptes = control externo económico y presupuestario. Fiscaliza las cuentas de la Generalitat y del sector público catalán. No es órgano del Govern (es independiente). Conecta con el T1."},
  {b:"G. Órganos consultivos",q:"El Consell de Treball, Econòmic i Social de Catalunya (CTESC) es:",opts:["Un órgano del Parlament","Un órgano consultivo de participación social en materia económica y social","Un órgano sancionador","Equivalente al Tribunal Constitucional"],c:1,f:"CTESC = órgano consultivo de PARTICIPACIÓN SOCIAL. Reúne a sindicatos, patronal, sociedad civil. Dicta dictámenes sobre normativa económica, laboral y social de la Generalitat. Es democracia participativa institucional."},
  {b:"H. Síntesis órganos consultivos",q:"¿Qué órgano dictamina sobre la constitucionalidad de proyectos de ley antes de su aprobación?",opts:["Sindicatura de Comptes","Consell de Garanties Estatutàries","Síndic de Greuges","CTESC"],c:1,f:"Consell de Garanties Estatutàries = control de constitucionalidad y estatutariedad PREVIO de proyectos de ley en Cataluña. Dictamina ANTES de aprobarse. No declara inconstitucionalidad (eso es el TC) — emite dictamen previo."},
  {b:"H. Síntesis órganos consultivos",q:"¿Qué órgano fiscaliza el gasto público de la Generalitat?",opts:["Síndic de Greuges","Sindicatura de Comptes","Comissió Jurídica Assessora","Consell de Garanties Estatutàries"],c:1,f:"Sindicatura de Comptes = fiscalización del gasto público. Es el control económico externo de la Generalitat y del sector público catalán. Equivalente catalán del Tribunal de Cuentas."},
  {b:"H. Síntesis órganos consultivos",q:"¿Qué órgano protege los derechos de los ciudadanos frente a actuaciones administrativas?",opts:["Síndic de Greuges","Sindicatura de Comptes","Consell de Garanties Estatutàries","CTESC"],c:0,f:"Síndic de Greuges = defensor del pueblo catalán = defensa de derechos ciudadanos frente a la Administración. Recibe quejas y emite recomendaciones. Las recomendaciones no anulan actos — solo orientan."},
  {b:"H. Síntesis órganos consultivos",q:"¿Cuál de estas instituciones NO es de la Generalitat?",opts:["Síndic de Greuges","Sindicatura de Comptes","Tribunal Constitucional","Comissió Jurídica Assessora"],c:2,f:"El TC NO es institución de la Generalitat — es el órgano jurisdiccional supremo del Estado en materia constitucional. Las otras tres son instituciones catalanas específicas. Confundirlo es trampa frecuente."},
  {b:"I. Sector público instrumental",q:"El sector público instrumental de la Generalitat incluye:",opts:["Solo entidades 100% públicas","Organismos autónomos, entidades públicas empresariales, sociedades mercantiles públicas, fundaciones del sector público y consorcios","Solo empresas mixtas","Solo fundaciones culturales"],c:1,f:"Sector público instrumental: organismos autónomos + entidades públicas empresariales + sociedades mercantiles públicas + fundaciones del sector público + consorcios. Cinco tipos de entidades instrumentales que ejecutan políticas concretas."},
  {b:"I. Sector público instrumental",q:"Un organismo autónomo es:",opts:["Una sociedad mercantil","Una entidad pública con personalidad jurídica propia, dedicada a fines administrativos concretos","Una fundación privada","Un órgano consultivo"],c:1,f:"Organismo autónomo = entidad pública + personalidad jurídica propia + fines administrativos concretos. Funciona como instrumento de la Generalitat para ámbitos específicos. Está sometido a derecho público."},
  {b:"I. Sector público instrumental",q:"Una sociedad mercantil pública se rige por:",opts:["Solo derecho administrativo","Derecho privado mercantil principalmente, con algunas especialidades de derecho público","Solo derecho civil","Derecho judicial"],c:1,f:"Sociedad mercantil pública = derecho privado mercantil principalmente, con especialidades de derecho público (control financiero, contratación, transparencia). Es Administración instrumental con régimen mixto público-privado."},
  {b:"I. Sector público instrumental",q:"Una fundación del sector público es:",opts:["Una entidad privada sin relación con la Administración","Una fundación creada o dotada por la Administración con finalidad de interés general, sometida a derecho privado con especialidades públicas","Solo una empresa pública","Un órgano del Govern"],c:1,f:"Fundación del sector público = creada o dotada por la Administración + finalidad de interés general + derecho privado con especialidades públicas. Patrón típico para gestionar actividades culturales, sanitarias o sociales con flexibilidad privada."},
  {b:"J. Trampas y síntesis bloque 2",q:"¿Cuál de estas afirmaciones sobre la organización de la Generalitat es CORRECTA?",opts:["Los departaments son órganos del Parlament","Los departaments son las grandes divisiones funcionales del Govern, dirigidas por consellers, con estructura interna jerárquica","Cada conseller dirige varios departaments","Los departaments son órganos consultivos"],c:1,f:"Afirmación correcta: departaments = grandes divisiones funcionales del Govern + dirigidas por consellers + estructura jerárquica interna. Las otras opciones son errores conceptuales típicos del T2."},
  {b:"J. Trampas y síntesis bloque 2",q:"¿Qué relación existe entre el Govern y los departaments?",opts:["Son órganos independientes sin relación","Los departaments son las divisiones del Govern; los consellers que los dirigen forman parte del Govern","Los departaments son superiores al Govern","Solo el Parlament conecta ambos"],c:1,f:"Relación Govern-departaments: los departaments son las DIVISIONES del Govern. Los consellers que los dirigen forman parte del Govern como órgano colegiado. Es estructura piramidal — Govern arriba, departaments abajo."},
  {b:"J. Trampas y síntesis bloque 2",q:"¿Cuál de estas afirmaciones sobre el Síndic de Greuges es CORRECTA?",opts:["Puede anular actos administrativos","Recibe quejas y emite recomendaciones, sin poder de anular actos","Es equivalente al Tribunal Constitucional","Es un órgano del Govern"],c:1,f:"Síndic de Greuges: recibe quejas + investiga + emite recomendaciones. NO puede anular actos administrativos. Su poder es de recomendación e influencia, no de decisión vinculante."},
  {b:"K. Trampas finales T2",q:"¿Cuál es la trampa más explotada del T2 sobre la división de poderes?",opts:["Confundir Parlament con tribunales","Pensar que el ejecutivo es solo el Govern olvidando la Administración pública","Pensar que solo hay dos poderes","Que el Govern es legislativo"],c:1,f:"Trampa más explotada del T2: identificar el ejecutivo solo con el Govern. El ejecutivo incluye Govern + Administración pública. La Administración no es solo herramienta del Govern — es parte del propio poder ejecutivo."},
  {b:"K. Trampas finales T2",q:"¿Cuál de estas combinaciones de leyes es CORRECTA?",opts:["Llei 39/2015 = régimen jurídico; Llei 40/2015 = procedimiento","Llei 39/2015 = procedimiento; Llei 40/2015 = régimen jurídico del sector público","Ambas regulan la misma materia","Solo aplican en el ámbito catalán"],c:1,f:"Combinación correcta: Llei 39/2015 = procedimiento administrativo común. Llei 40/2015 = régimen jurídico del sector público. El examen las invierte — es la trampa numérica más recurrente del T2."},
  {b:"K. Trampas finales T2",q:"¿Qué afirmación sobre descentralización y desconcentración es CORRECTA?",opts:["Son sinónimos","Descentralización = otra Administración con personalidad propia; desconcentración = órgano inferior dentro de la misma Administración","Descentralización es interna; desconcentración es externa","Solo cambian de nombre, no de contenido"],c:1,f:"Afirmación correcta: descentralización va FUERA (otra Administración con personalidad propia y autonomía). Desconcentración va DENTRO (órgano inferior de la misma Administración). Trampa más fina del bloque organizativo."},
  {b:"L. Aplicaciones T2",q:"Un ayuntamiento es respecto al Estado:",opts:["Una administración descentralizada","Una administración desconcentrada","Una entidad sin personalidad jurídica","Solo un órgano administrativo"],c:0,f:"Ayuntamiento = administración DESCENTRALIZADA respecto al Estado. Tiene personalidad jurídica propia, autonomía constitucionalmente garantizada y competencias propias. No es órgano interno del Estado — es Administración distinta."},
  {b:"L. Aplicaciones T2",q:"Una delegación territorial del Govern es respecto a la Generalitat:",opts:["Una administración descentralizada","Una desconcentración territorial dentro de la misma Administración","Un ayuntamiento","Una entidad privada"],c:1,f:"Delegación territorial del Govern = DESCONCENTRACIÓN territorial. Dentro de la misma Administración (Generalitat) pero acercando la decisión al territorio. No es ayuntamiento ni administración separada."},
  {b:"L. Aplicaciones T2",q:"Un convenio entre dos consellerias es:",opts:["Cooperación interadministrativa","Coordinación interna","Cooperación intra-administrativa o entre órganos de la misma Administración","Descentralización"],c:2,f:"Convenio entre dos consellerias = relación INTRA-administrativa (dentro de la misma Administración: la Generalitat). No es cooperación interadministrativa porque no hay varias administraciones — solo varios departaments de la misma."},
  {b:"L. Aplicaciones T2",q:"Cuando el Estado fija las bases que las CCAA deben respetar en una materia, estamos ante:",opts:["Coordinación","Cooperación","Colaboración","Centralización"],c:0,f:"Estado fija las bases para CCAA = COORDINACIÓN. Hay imposición de un criterio común (las bases) por parte del Estado. Las CCAA deben respetarlas. Es uno de los modelos típicos de coordinación constitucional."},
  {b:"M. Conexiones T1-T2",q:"El T1 y el T2 se conectan especialmente en:",opts:["Solo en la división de poderes","La organización de la Generalitat: el T1 da los principios constitucionales y estatutarios, el T2 desarrolla la estructura concreta","No hay conexión","Solo en la regulación del Síndic de Greuges"],c:1,f:"Conexión T1-T2: el T1 establece los principios constitucionales y estatutarios (CE 103.1, EAC). El T2 desarrolla la estructura concreta de la Administración pública catalana (Govern, departaments, órganos territoriales, consultivos). Son complementarios."},
  {b:"M. Conexiones T1-T2",q:"El art. 103.1 CE conecta el T2 con:",opts:["Solo el T1 (CE)","El T1 (principio general) y el T6 (organización del procedimiento) y el T8 (función pública)","Solo el T8","Solo el T6"],c:1,f:"Art. 103.1 CE = principio general que conecta múltiples temas: T1 (lo recoge la CE), T2 (organización administrativa), T6 (organización del procedimiento), T8 (función pública con eficacia y jerarquía). Es transversal."},
  {b:"M. Conexiones T1-T2",q:"Las leyes 39/2015 y 40/2015 conectan el T2 con:",opts:["Solo el T1","El T5 (procedimiento administrativo común — Llei 39/2015) y el T2 (régimen jurídico del sector público — Llei 40/2015)","Solo el T15","Solo el T9"],c:1,f:"Conexiones leyes: Llei 39/2015 → T5 (procedimiento) y T6 (fases). Llei 40/2015 → T2 (régimen jurídico, organización, sector público). Es la dualidad estatal que conecta el T2 con todo el bloque procedimental."},
  {b:"M. Conexiones T1-T2",q:"Si una pregunta del T2 menciona 'el régimen jurídico del sector público', debes pensar en:",opts:["Llei 39/2015","Llei 40/2015","Llei 19/2014","Llei 26/2010"],c:1,f:"Régimen jurídico del sector público = Llei 40/2015. Es la asociación más directa del T2. Si aparece esa expresión en el examen, la respuesta es 40/2015 sin dudar."},
  {b:"N. Síntesis final T2",q:"¿Cuál es la idea más importante para retener del T2?",opts:["Solo la lista de departaments actuales","La definición de Administración pública + estructura básica de la Generalitat (Govern, departaments, órganos territoriales y consultivos) + leyes 39/2015 y 40/2015 + relaciones interadministrativas","Solo el art. 103.1 CE","Solo los órganos consultivos"],c:1,f:"Idea principal del T2: cinco bloques integrados. Concepto + estructura + leyes + relaciones. Si dominas esos cinco ejes, dominas el T2 completo. La lista de departaments cambia pero la estructura no."}
];

let pool=[...Q],idx=0,nOk=0,nEr=0,fl=[],ans=false;
function render(){
  if(idx>=pool.length){showRes();return;}
  const q=pool[idx],tot=pool.length;
  document.getElementById('fill').style.width=Math.round(idx/tot*100)+'%';
  document.getElementById('pn').textContent=(idx+1)+' / '+tot;
  document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;
  document.getElementById('vpe').textContent=tot-idx;
  document.getElementById('pill').textContent=q.b;
  document.getElementById('qnl').textContent='Pregunta '+(idx+1);
  document.getElementById('qbl').textContent=q.b;
  document.getElementById('qt').textContent=q.q;
  const o=document.getElementById('opts');o.innerHTML='';
  ['A','B','C','D'].forEach((l,i)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML='<span class="lt">'+l+'</span><span>'+q.opts[i]+'</span>';
    b.onclick=()=>sel(i,b);o.appendChild(b);
  });
  const f=document.getElementById('fb');f.className='';f.innerHTML='';
  document.getElementById('bn').style.display='none';ans=false;
}
function sel(i,btn){
  if(ans)return;ans=true;
  const q=pool[idx];
  document.querySelectorAll('.opt').forEach(b=>b.classList.add('dis'));
  const f=document.getElementById('fb');
  if(i===q.c){btn.classList.add('ok');nOk++;f.className='show ok';f.innerHTML='<div class="fh">Correcto</div><div class="fd">'+q.f+'</div>';}
  else{btn.classList.add('er');document.querySelectorAll('.opt')[q.c].classList.add('ok');nEr++;fl.push({q:q.q,co:q.opts[q.c],tu:q.opts[i],f:q.f});f.className='show er';f.innerHTML='<div class="fh">Incorrecto — correcta: '+['A','B','C','D'][q.c]+'</div><div class="fd">'+q.f+'</div>';}
  document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;
  document.getElementById('bn').style.display='inline-block';
}
function nxt(){idx++;render();}
function showRes(){
  ['hdr','pw','stats','qc','opts','fb','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  const tot=pool.length,pct=Math.round(nOk/tot*100);
  document.getElementById('rp').textContent=pct+'%';
  document.getElementById('rt').textContent=pct>=80?'T2 bien consolidado':pct>=60?'Nivel medio — repasa los fallos':'Refuerza organización y órganos';
  document.getElementById('rs2').textContent=nOk+' correctas de '+tot+'.'+(fl.length>0?' '+fl.length+' para repasar.':' Sin errores.');
  if(!fl.length)document.getElementById('bfl').style.display='none';
  if(fl.length){document.getElementById('fs').style.display='block';document.getElementById('fst').textContent='Preguntas falladas ('+fl.length+')';const fll=document.getElementById('fl');fll.innerHTML='';fl.forEach(f=>{const d=document.createElement('div');d.className='fi';d.innerHTML='<div class="fq">'+f.q+'</div><div class="fb2"><span class="bg er">Tu respuesta: '+f.tu+'</span><span class="bg ok">Correcta: '+f.co+'</span></div><div class="fe">'+f.f+'</div>';fll.appendChild(d);});}
  document.getElementById('res').style.display='block';
}
function rst(){pool=[...Q];idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
function sfl(){if(!fl.length)return;pool=fl.map(f=>Q.find(q=>q.q===f.q)).filter(Boolean);idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
render();
</script>
