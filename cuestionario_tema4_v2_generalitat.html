<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f7f4;--surface:#fff;--surface2:#f1f0ed;--border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.2);--text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;--ok:#1a7a4a;--ok-bg:#eaf5ee;--ok-border:rgba(26,122,74,.25);--err:#c0392b;--err-bg:#fdf0ee;--err-border:rgba(192,57,43,.25);--accent:#1a1a18;--r:10px;--rs:6px}
@media(prefers-color-scheme:dark){:root{--bg:#18181a;--surface:#222224;--surface2:#2a2a2c;--border:rgba(255,255,255,.1);--border-strong:rgba(255,255,255,.2);--text:#f0efec;--text2:#a0a09a;--text3:#606060;--ok:#4caf7a;--ok-bg:rgba(76,175,122,.12);--ok-border:rgba(76,175,122,.3);--err:#e57373;--err-bg:rgba(229,115,115,.12);--err-border:rgba(229,115,115,.3);--accent:#f0efec}}
html{font-size:16px}body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem}
#app{width:100%;max-width:680px}
#hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:2rem}
#hdr h1{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px;letter-spacing:-.01em}#hdr p{font-size:13px;color:var(--text3)}
#pill{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid var(--border-strong);color:var(--text2);background:var(--surface2);white-space:nowrap;flex-shrink:0}
#pw{margin-bottom:1.25rem}#pr{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:7px}#pr span:last-child{font-weight:500;color:var(--text2)}
#track{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden}#fill{height:3px;background:var(--accent);border-radius:3px;width:0%;transition:width .4s}
#stats{display:flex;gap:1.5rem;margin-bottom:2rem;font-size:13px;color:var(--text2)}#stats span{display:flex;align-items:center;gap:5px}.dot{width:7px;height:7px;border-radius:50%;display:inline-block}.dot-ok{background:var(--ok)}.dot-er{background:var(--err)}
#qc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.75rem;margin-bottom:1.5rem}
#qm{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.04em}
#qt{font-size:15px;line-height:1.55;font-weight:500;margin-bottom:1.5rem}
#opts{display:flex;flex-direction:column;gap:8px}
.opt{width:100%;text-align:left;padding:12px 16px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface);font-size:14px;line-height:1.45;cursor:pointer;color:var(--text);font-family:inherit;transition:border-color .15s,background .15s}
.opt:hover:not(.dis){border-color:var(--border-strong);background:var(--surface2)}
.opt.ok{border-color:var(--ok-border);background:var(--ok-bg);color:var(--ok)}.opt.er{border-color:var(--err-border);background:var(--err-bg);color:var(--err)}.opt.dis{cursor:default;opacity:.5}
#fb{margin-top:1rem;padding:14px 16px;border-radius:var(--rs);font-size:13px;line-height:1.55;display:none}
#fb.ok{background:var(--ok-bg);border:1px solid var(--ok-border);color:var(--ok)}#fb.er{background:var(--err-bg);border:1px solid var(--err-border);color:var(--err)}
#br{display:flex;gap:.75rem;margin-top:1.25rem}
#bn{flex:1;padding:11px;border-radius:var(--rs);border:1px solid var(--border-strong);background:var(--surface2);font-size:13px;font-weight:500;cursor:pointer;color:var(--text);font-family:inherit;display:none}#bn:hover{background:var(--border)}
#res{display:none}#rh{font-size:22px;font-weight:700;text-align:center;margin-bottom:.25rem}
#rp{font-size:48px;font-weight:800;text-align:center;margin-bottom:.5rem}
#ri{font-size:14px;text-align:center;color:var(--text2);margin-bottom:2rem}
#rt{font-size:15px;font-weight:600;margin-bottom:1rem}
#rs2{display:flex;gap:1rem;margin-bottom:2rem;justify-content:center}
#rbt{display:flex;gap:.75rem;margin-bottom:2rem;justify-content:center;flex-wrap:wrap}
#rbt button{padding:10px 24px;border-radius:var(--rs);border:1px solid var(--border-strong);background:var(--surface);font-size:13px;font-weight:500;cursor:pointer;color:var(--text);font-family:inherit}#rbt button:hover{background:var(--surface2)}
#bfl{margin-top:.5rem}
.fs{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:.75rem}
.fst{font-size:13px;font-weight:500;margin-bottom:.5rem}
.fst .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;margin-left:6px;font-weight:500}
.fst .badge-err{background:var(--err-bg);color:var(--err);border:1px solid var(--err-border)}.fst .badge-ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-border)}
.fl{font-size:13px;color:var(--text2);line-height:1.5}
@media(max-width:500px){body{padding:1.25rem .75rem 3rem}#qc{padding:1.25rem}#hdr{flex-direction:column;gap:.5rem}#pill{align-self:flex-start}}
</style>

<div id="app">

<div id="pw"><div id="pr"><span>Progreso</span><span id="pn">0%</span></div><div id="track"><div id="fill"></div></div></div>
<div id="stats"><span><i class="dot dot-ok"></i> Correctas: <b id="sc-ok">0</b></span><span><i class="dot dot-er"></i> Incorrectas: <b id="sc-er">0</b></span></div>

<script>
const Q=[
{b:"Bases jurídicas",q:"¿Cuál de las siguientes es una base jurídica del tratamiento?",opts:["Interoperabilidad","Consentimiento del interesado","Jerarquía normativa","Silencio administrativo"],c:1,f:"El consentimiento es una de las seis bases jurídicas del art. 6 RGPD."},
{b:"Bases jurídicas",q:"¿Qué base jurídica permite tratar datos para cumplir una norma obligatoria?",opts:["Cumplimiento de una obligación legal","Minimización","Portabilidad","Exactitud"],c:0,f:"La obligación legal es una base jurídica autónoma del tratamiento."},
{b:"Bases jurídicas",q:"¿Cuál es la base adecuada cuando el tratamiento es necesario para ejecutar un contrato?",opts:["Protección de intereses vitales","Ejecución de un contrato o medidas precontractuales","Publicidad activa","Coherencia europea"],c:1,f:"El contrato y las medidas precontractuales constituyen base jurídica propia."},
{b:"Bases jurídicas",q:"¿Qué base suele ser relevante en la Administración, según la trampa típica del tema?",opts:["Consentimiento siempre","Ley o interés público / ejercicio de poderes públicos","Solo interés legítimo","Solo contrato civil"],c:1,f:"En la Administración muchas veces la base no es el consentimiento, sino la ley o el interés público."},
{b:"Bases jurídicas",q:"¿Cuál de estas opciones NO es una base jurídica del tratamiento?",opts:["Interés legítimo","Intereses vitales","Calidad del servicio","Misión en interés público o ejercicio de poderes públicos"],c:2,f:"La calidad del servicio no figura como base jurídica del tratamiento."},
{b:"Consentimiento",q:"Para ser válido, el consentimiento debe ser:",opts:["Libre, específico, informado e inequívoco","Tácito, presunto y genérico","Solo verbal y urgente","Siempre irrevocable"],c:0,f:"Art. 7 RGPD: consentimiento = libre, específico, informado e inequívoco."},
{b:"Consentimiento",q:"¿Qué debe poder demostrar el responsable respecto del consentimiento?",opts:["Que lo pidió una vez aunque no se entienda","Que lo obtuvo válidamente","Que lo impuso por defecto","Que lo delegó al encargado"],c:1,f:"El responsable debe poder probar que obtuvo el consentimiento válidamente."},
{b:"Consentimiento",q:"Si el consentimiento aparece mezclado con otros textos, debe:",opts:["Ir oculto al final del documento","Distinguirse claramente y con lenguaje claro","Sustituirse siempre por silencio positivo","Ser solo verbal"],c:1,f:"El consentimiento debe presentarse distinguido claramente del resto del texto."},
{b:"Consentimiento",q:"¿Qué ocurre con la retirada del consentimiento?",opts:["No cabe retirarlo","Solo puede retirarlo un juez","Puede retirarse en cualquier momento y debe ser tan fácil retirarlo como darlo","Solo cabe si los datos son sensibles"],c:2,f:"Art. 7.3 RGPD: retirada en cualquier momento, tan fácil como darlo."},
{b:"Consentimiento",q:"¿Cuándo puede exigirse consentimiento explícito?",opts:["Nunca","En algunas situaciones, como ciertas categorías especiales","Solo en contratos laborales","Solo para datos de contacto"],c:1,f:"Para categorías especiales se requiere consentimiento explícito (art. 9.2.a RGPD)."},
{b:"Consentimiento",q:"En servicios de la sociedad de la información, el RGPD toma como referencia para menores:",opts:["12 años","13 años exactos e invariables","16 años, salvo rebaja nacional nunca por debajo de 13","18 años sin excepción"],c:2,f:"Art. 8 RGPD: 16 años como referencia general, con posible rebaja nacional hasta mínimo 13."},
{b:"Consentimiento",q:"En España, según la LO 3/2018, el consentimiento digital del menor es válido desde:",opts:["12 años","13 años","14 años","16 años"],c:2,f:"La LO 3/2018 fija en 14 años la edad del consentimiento digital en España."},
{b:"Deber de información",q:"¿Qué debe saber el interesado cuando se tratan sus datos?",opts:["Solo el nombre del responsable","Quién trata, para qué, con qué base y qué derechos puede ejercer","Únicamente el plazo de conservación","Solo si habrá sanciones"],c:1,f:"El núcleo del deber de información incluye identidad, finalidad, base y derechos."},
{b:"Deber de información",q:"La información al interesado debe ser:",opts:["Larga y técnica aunque no se entienda","Concisa, transparente, inteligible y de fácil acceso","Reservada a expertos jurídicos","Siempre verbal"],c:1,f:"Art. 12 RGPD: concisa, transparente, inteligible y de fácil acceso."},
{b:"Deber de información",q:"Si los datos los aporta el interesado, ¿qué elementos debe informarse?",opts:["Identidad del responsable","Finalidad y base jurídica","Derechos y reclamación","Todas las anteriores"],c:3,f:"La tabla del tema incluye identidad, finalidad, base, derechos, reclamación y otros extremos."},
{b:"Deber de información",q:"Si la base del tratamiento es el consentimiento, también debe informarse sobre:",opts:["El derecho a retirar el consentimiento","La composición del Comité Europeo","La tramitación presupuestaria","La responsabilidad penal del encargado"],c:0,f:"Cuando la base es el consentimiento, debe informarse del derecho a retirarlo."},
{b:"Deber de información",q:"Si los datos no proceden del interesado, además debe informarse sobre:",opts:["Categorías de datos tratadas y fuente de procedencia","Solo la IP del sistema","Únicamente si hubo contrato","Nada adicional"],c:0,f:"Cuando los datos no vienen del interesado, se añaden categorías de datos y fuente."},
{b:"Deber de información",q:"¿Cuál es la regla temporal cuando los datos no vienen del interesado?",opts:["No hace falta informar nunca","Informar en plazo razonable y, como tarde, antes de la primera comunicación o cesión","Informar solo al final del tratamiento","Informar únicamente si lo pide la autoridad de control"],c:1,f:"Art. 14.3 RGPD: plazo razonable, antes de primera comunicación o cesión a terceros."},
{b:"Deber de información",q:"¿Cuál de estos elementos figura entre la información al interesado?",opts:["Posibles transferencias fuera de la UE","Plazo de conservación o criterios","Derecho a reclamar ante autoridad de control","Todas las anteriores"],c:3,f:"Todos esos extremos forman parte del deber de información."},
{b:"Deber de información",q:"La trampa típica del deber de información consiste en creer que:",opts:["Informar exige claridad real","Basta esconder una cláusula infinita","Deben indicarse derechos y responsable","Debe usarse lenguaje sencillo"],c:1,f:"Informar no es esconder una cláusula interminable; debe ser clara y accesible."},
{b:"Bases jurídicas",q:"¿Cuál de estas es base jurídica autónoma?",opts:["Exactitud del dato","Interés legítimo del responsable o de un tercero","Conservación limitada","Seguridad de la información"],c:1,f:"El interés legítimo aparece en la lista de bases jurídicas del tratamiento."},
{b:"Bases jurídicas",q:"La protección de intereses vitales es base jurídica cuando:",opts:["Solo hay contrato","Se protegen intereses esenciales de una persona","Lo pide el DPD","Lo permite cualquier circular interna"],c:1,f:"Los intereses vitales figuran expresamente en el listado de bases jurídicas."},
{b:"Bases jurídicas",q:"Si una administración trata datos porque ejerce potestades públicas, la base encaja en:",opts:["Misión realizada en interés público o ejercicio de poderes públicos","Portabilidad","Rectificación","Limitación"],c:0,f:"El interés público o ejercicio de poderes públicos es la base típica de las AAPP."},
{b:"Bases jurídicas",q:"¿Cuál de las siguientes parejas es correcta sobre menores?",opts:["RGPD 14 / España 16","RGPD 16 con posible rebaja, España 14","RGPD 18 / España 16","RGPD 13 fijo / España 12"],c:1,f:"RGPD: 16 como referencia (rebajable hasta 13); España: 14 años."},
{b:"Derechos: acceso, rectificación, supresión",q:"¿Qué permite el derecho de acceso?",opts:["Solo preguntar si existen datos","Saber si se tratan datos y obtener copia e información asociada","Borrar automáticamente todo dato","Cambiar la base jurídica"],c:1,f:"El acceso incluye confirmar tratamiento y recibir copia más información complementaria."},
{b:"Derechos: acceso, rectificación, supresión",q:"¿Qué derecho procede ante datos inexactos o incompletos?",opts:["Rectificación","Portabilidad","Oposición","Limitación territorial"],c:0,f:"La rectificación corrige datos inexactos o incompletos."},
{b:"Derechos: acceso, rectificación, supresión",q:"¿Cuál es la idea básica de la supresión o derecho al olvido?",opts:["Trasladar los datos a otro responsable","Borrar datos cuando concurre alguna causa habilitante","Acceder a perfiles automatizados","Conservar datos por bloqueo indefinido siempre"],c:1,f:"La supresión procede cuando se da alguna de las causas listadas (datos innecesarios, retirada consentimiento, tratamiento ilícito...)."},
{b:"Derechos: acceso, rectificación, supresión",q:"¿Cuál de estas causas puede justificar la supresión?",opts:["Que los datos ya no sean necesarios","Que se retire el consentimiento","Que el tratamiento sea ilícito","Todas las anteriores"],c:3,f:"Todas son causas de supresión recogidas en el art. 17 RGPD."},
{b:"Derechos: acceso, rectificación, supresión",q:"En servicios de la sociedad de la información a menores, la supresión puede proceder cuando:",opts:["Nunca","Los datos se obtuvieron en ese contexto y concurre la causa prevista","Solo si hay contrato","Solo si hay sanción previa"],c:1,f:"La supresión se menciona expresamente para datos obtenidos en servicios digitales dirigidos a menores."},
{b:"Derechos: acceso, rectificación, supresión",q:"¿Cuál es la trampa al pensar en el derecho de acceso?",opts:["Creer que incluye finalidades y destinatarios","Creer que es solo 'ver' el dato","Pensar que puede dar copia","Pensar que incluye origen de los datos"],c:1,f:"El acceso no es solo visualizar: incluye copia, finalidades, destinatarios, plazos, origen, etc."},
{b:"Derechos: acceso, rectificación, supresión",q:"En rectificación, el responsable puede requerir:",opts:["Que el interesado no pruebe nada jamás","Documentación para acreditar el error o completar la información","Una autorización del Comité Europeo","La renuncia a reclamar ante la autoridad"],c:1,f:"Puede pedirse documentación para acreditar el error."},
{b:"Derechos: acceso, rectificación, supresión",q:"¿Qué matiz hace el resumen sobre la supresión?",opts:["Siempre implica borrado absoluto e inmediato","Nunca procede en la Administración","Puede coexistir con obligación de conservación o bloqueo","Sustituye automáticamente a la rectificación"],c:2,f:"La supresión no siempre equivale a eliminación material inmediata e irreversible."},
{b:"Derechos: acceso, rectificación, supresión",q:"¿Cuál es el plazo general para responder a una solicitud de derechos?",opts:["15 días","1 mes","3 meses","6 meses"],c:1,f:"La regla general es un mes desde la solicitud."},
{b:"Derechos: acceso, rectificación, supresión",q:"¿Puede ampliarse el plazo general de respuesta?",opts:["No, nunca","Sí, hasta dos meses más si el caso es complejo, informando de la prórroga","Sí, un año sin avisar","Solo por orden judicial"],c:1,f:"Ampliación de hasta dos meses adicionales en supuestos complejos, informando al interesado."},
{b:"Derechos: acceso, rectificación, supresión",q:"Las solicitudes de ejercicio de derechos son, en principio:",opts:["Siempre de pago","Gratuitas, salvo manifiestamente infundadas o excesivas","Gratuitas solo para menores","Gratuitas solo si interviene el DPD"],c:1,f:"La gratuidad es la regla general."},
{b:"Derechos: acceso, rectificación, supresión",q:"Antes de responder, el responsable puede:",opts:["Negarse sin más","Pedir información adicional para verificar la identidad","Exigir sentencia judicial","Cobrar una tasa siempre"],c:1,f:"La verificación de identidad es una facultad del responsable."},
{b:"Derechos: acceso, rectificación, supresión",q:"¿Qué derecho se conecta con conocer destinatarios, plazo y origen?",opts:["Acceso","Oposición","No decisión automatizada","Portabilidad"],c:0,f:"Esos contenidos forman parte del derecho de acceso."},
{b:"Derechos: acceso, rectificación, supresión",q:"Si una persona retira el consentimiento y ya no existe otra base, ¿qué derecho cobra protagonismo?",opts:["Supresión","Jerarquía","Descentralización","Caducidad"],c:0,f:"La retirada del consentimiento es una de las causas de supresión."},
{b:"Derechos: acceso, rectificación, supresión",q:"¿Qué opción recoge mejor la lógica de la rectificación?",opts:["Corregir o completar datos inexactos o incompletos","Trasladar expedientes entre autoridades","Bloquear automáticamente todo tratamiento","Exigir una evaluación de impacto"],c:0,f:"La rectificación sirve para corregir o completar información errónea."},
{b:"Derechos: acceso, rectificación, supresión",q:"Cuando existe obligación legal de conservar datos, la supresión:",opts:["Siempre obliga a borrarlos de inmediato","Puede verse limitada y dar paso a conservación o bloqueo","Desaparece para siempre","Se transforma en portabilidad"],c:1,f:"La obligación legal de conservación opera como límite a la supresión."},
{b:"Derechos: acceso, rectificación, supresión",q:"¿Qué derecho sirve mejor si el dato es erróneo pero todavía necesario?",opts:["Rectificación","Supresión","Portabilidad","Oposición al marketing"],c:0,f:"Si el dato sigue siendo necesario pero incorrecto, lo propio es rectificarlo."},
{b:"Derechos: acceso, rectificación, supresión",q:"¿Cuál de estas NO es una causa típica de supresión?",opts:["Tratamiento ilícito","Retirada del consentimiento","Obligación legal de conservar como motivo para borrar siempre","Datos ya no necesarios"],c:2,f:"La obligación legal de conservación opera como límite, no como causa automática de borrado."},
{b:"Derechos: acceso, rectificación, supresión",q:"¿Qué derecho se ve favorecido por el principio de exactitud?",opts:["Rectificación","Supresión inmediata","Portabilidad universal","Secreto profesional"],c:0,f:"La rectificación corrige exactamente las inexactitudes del dato."},
{b:"Derechos: acceso, rectificación, supresión",q:"¿Qué derecho puede solicitar copia de los datos tratados?",opts:["Acceso","Limitación","Interés vital","Delegación del tratamiento"],c:0,f:"El acceso permite obtener copia e información asociada."},
{b:"Derechos: limitación, portabilidad, oposición",q:"¿Qué supone la limitación del tratamiento?",opts:["Borrado automático","Congelar el uso de los datos en determinados supuestos","Publicar los datos en abierto","Transferirlos a otro responsable"],c:1,f:"La limitación congela el tratamiento en determinados supuestos."},
{b:"Derechos: limitación, portabilidad, oposición",q:"¿En qué supuestos se piensa especialmente para la limitación?",opts:["Exactitud discutida, licitud o necesidad de conservación","Solo marketing directo","Solo contratos internacionales","Solo datos penales"],c:0,f:"La limitación se vincula a exactitud discutida, licitud o necesidad de conservación."},
{b:"Derechos: limitación, portabilidad, oposición",q:"¿Qué permite la portabilidad?",opts:["Suprimir datos innecesarios","Recibir los datos en formato estructurado y transmitirlos a otro responsable","Impedir cualquier tratamiento futuro","Evitar siempre la elaboración de perfiles"],c:1,f:"La portabilidad permite obtener y trasladar los datos entre responsables."},
{b:"Derechos: limitación, portabilidad, oposición",q:"La portabilidad exige:",opts:["Cualquier base jurídica y cualquier soporte","Consentimiento o contrato y tratamiento automatizado","Solo interés público","Solo datos penales"],c:1,f:"La portabilidad se limita a consentimiento/contrato y medios automatizados."},
{b:"Derechos: limitación, portabilidad, oposición",q:"¿Qué derecho es especialmente fuerte frente al marketing directo?",opts:["Rectificación","Oposición","Acceso","Limitación de conservación"],c:1,f:"La oposición tiene fuerza específica frente al marketing directo."},
{b:"Derechos: limitación, portabilidad, oposición",q:"La oposición permite:",opts:["Impedir el tratamiento por motivos relacionados con la situación particular","Obligar siempre a borrar el dato","Transferir datos a otro responsable","Convalidar el tratamiento ilícito"],c:0,f:"La oposición actúa frente a tratamientos por la situación particular del afectado."},
{b:"Decisiones automatizadas",q:"Una persona tiene derecho a no quedar sujeta a una decisión basada únicamente en tratamiento automatizado cuando:",opts:["Sea una decisión trivial sin efectos","Produzca efectos jurídicos o similares significativos","La adopte un empleado público","Exista cualquier algoritmo sin más"],c:1,f:"Art. 22 RGPD: decisión exclusivamente automatizada con efectos jurídicos o similares significativos."},
{b:"Decisiones automatizadas",q:"¿Qué entra dentro de este bloque junto a la decisión automatizada?",opts:["La elaboración de perfiles","La aprobación de presupuestos","La potestad reglamentaria","La publicidad activa"],c:0,f:"El art. 22 RGPD menciona expresamente la elaboración de perfiles."},
{b:"Decisiones automatizadas",q:"¿Cuál de estas es una excepción al derecho a no quedar sujeto a una decisión automatizada?",opts:["Contrato, autorización legal o consentimiento explícito","Cualquier circular interna","Silencio administrativo","Solo la costumbre del sector"],c:0,f:"Art. 22.2 RGPD: contrato, autorización legal o consentimiento explícito."},
{b:"Decisiones automatizadas",q:"¿Qué garantía mínima debe existir en decisiones automatizadas permitidas?",opts:["Intervención humana","Posibilidad de expresar el punto de vista","Explicación e impugnación","Todas las anteriores"],c:3,f:"Art. 22.3 RGPD enumera esas garantías mínimas reforzadas."},
{b:"Decisiones automatizadas",q:"¿Cuál es la trampa típica sobre la portabilidad?",opts:["Pensar que vale para cualquier tratamiento","Pensar que requiere formato estructurado","Pensar que permite transmitir a otro responsable","Pensar que depende de medios automatizados"],c:0,f:"La portabilidad no vale para cualquier supuesto: requiere consentimiento/contrato + medio automatizado."},
{b:"Decisiones automatizadas",q:"¿Cuál de estas combinaciones activa correctamente la portabilidad?",opts:["Interés público + papel","Consentimiento/contrato + tratamiento automatizado","Obligación legal + soporte físico","Datos penales + interés legítimo"],c:1,f:"Portabilidad = consentimiento o contrato + tratamiento automatizado."},
{b:"Decisiones automatizadas",q:"Si una persona discute la exactitud de sus datos y no quiere su borrado inmediato, puede interesarle:",opts:["Limitación del tratamiento","Marketing directo","Portabilidad","Desconexión digital"],c:0,f:"La limitación congela usos mientras se resuelve la controversia sobre exactitud."},
{b:"Decisiones automatizadas",q:"¿Cuál de las siguientes afirmaciones es correcta sobre oposición?",opts:["Solo sirve frente a datos sensibles","Impide el tratamiento por motivos vinculados a la situación particular o frente a marketing directo","Solo opera con consentimiento escrito","Nunca procede frente a intereses legítimos"],c:1,f:"La oposición se formula por la situación particular del interesado o frente a marketing directo."},
{b:"Decisiones automatizadas",q:"¿Cuándo algunos derechos pueden verse limitados por ley?",opts:["En ningún caso","Por seguridad, investigación, independencia judicial, supervisión pública o protección de terceros","Solo por decisión del DPD","Solo por falta de presupuesto"],c:1,f:"El RGPD y la LOPDGDD recogen esos límites legales posibles a determinados derechos."},
{b:"Decisiones automatizadas",q:"¿Cuál de estas opciones refleja la trampa de la decisión automatizada?",opts:["Toda decisión con ordenador está prohibida","Solo cuenta si es exclusivamente automatizada y con efectos jurídicos o similares significativos","Solo importa si se usan datos biométricos","Solo cabe en empresas privadas"],c:1,f:"Se requieren dos requisitos acumulativos: decisión solo automatizada + efectos significativos."},
{b:"Decisiones automatizadas",q:"¿Qué derecho no equivale a borrar, sino a frenar temporalmente ciertos usos?",opts:["Limitación del tratamiento","Supresión","Rectificación","Acceso"],c:0,f:"La limitación congela el uso, no elimina el dato."},
{b:"Decisiones automatizadas",q:"Si se hace marketing directo, la oposición:",opts:["Es particularmente intensa","No tiene relevancia especial","Solo opera para menores","Debe pasar por el Comité Europeo"],c:0,f:"La oposición tiene fuerza especial frente al marketing directo."},

{b:"Decisiones automatizadas",q:"¿Qué derecho permite recibir datos en lectura mecánica?",opts:["Portabilidad","Acceso exclusivamente","Supresión","Oposición"],c:0,f:"Formato estructurado, de uso común y lectura mecánica son elementos de la portabilidad."},
{b:"Decisiones automatizadas",q:"¿Qué circunstancia impide que toda decisión perfilada esté prohibida?",opts:["Que el perfilado nunca existe","Que hay excepciones y garantías reforzadas","Que el RGPD no regula esto","Que el DPD puede sancionar"],c:1,f:"Existen excepciones concretas con garantías reforzadas (contrato, ley, consentimiento explícito)."}
];
let idx=0,ok=0,er=0,fails=[],cur=Q.slice(),full=Q.slice();
function render(){if(idx>=cur.length){showRes();return}let q=cur[idx],t=cur.length;document.getElementById('pill').textContent=idx+'/'+t;document.getElementById('pn').textContent=Math.round(idx/t*100)+'%';document.getElementById('fill').style.width=Math.round(idx/t*100)+'%';document.getElementById('sc-ok').textContent=ok;document.getElementById('sc-er').textContent=er;document.getElementById('qm').textContent=q.b;document.getElementById('qt').textContent=q.q;let h='';q.opts.forEach((o,i)=>{h+='<button class="opt" onclick="pick('+i+')">'+o+'</button>'});document.getElementById('opts').innerHTML=h;document.getElementById('fb').style.display='none';document.getElementById('fb').className='';document.getElementById('bn').style.display='none'}
function pick(i){let q=cur[idx],bs=document.querySelectorAll('.opt');bs.forEach((b,j)=>{b.classList.add('dis');b.onclick=null;if(j===q.c)b.classList.add('ok');if(j===i&&i!==q.c)b.classList.add('er')});let fb=document.getElementById('fb');if(i===q.c){ok++;fb.className='ok';fb.textContent='✓ '+q.f}else{er++;fb.className='er';fb.textContent='✗ '+q.f;fails.push({...q,pick:i})}fb.style.display='block';document.getElementById('bn').style.display='block';document.getElementById('sc-ok').textContent=ok;document.getElementById('sc-er').textContent=er}
function next(){idx++;render()}
function showRes(){document.getElementById('qc').style.display='none';document.getElementById('pw').style.display='none';document.getElementById('stats').style.display='none';let r=document.getElementById('res');r.style.display='block';let pct=Math.round(ok/(ok+er)*100)||0;document.getElementById('rp').textContent=pct+'%';document.getElementById('rp').style.color=pct>=70?'var(--ok)':'var(--err)';document.getElementById('ri').textContent=ok+' correctas · '+er+' incorrectas · '+cur.length+' preguntas';document.getElementById('pill').textContent=cur.length+'/'+cur.length;document.getElementById('fill').style.width='100%';let fl=document.getElementById('bfl');fl.innerHTML='';if(fails.length===0){document.getElementById('rt').textContent='¡Sin fallos!';return}fails.forEach(f=>{let d=document.createElement('div');d.className='fs';let opts='ABCD';d.innerHTML='<div class="fst">'+f.q+' <span class="badge badge-err">Tu: '+opts[f.pick]+'</span><span class="badge badge-ok">OK: '+opts[f.c]+'</span></div><div class="fl">'+f.f+'</div>';fl.appendChild(d)})}
function restart(){idx=0;ok=0;er=0;fails=[];cur=full.slice();document.getElementById('qc').style.display='';document.getElementById('pw').style.display='';document.getElementById('stats').style.display='';document.getElementById('res').style.display='none';render()}
function retryFailed(){if(fails.length===0)return;cur=fails.slice();idx=0;ok=0;er=0;fails=[];document.getElementById('qc').style.display='';document.getElementById('pw').style.display='';document.getElementById('stats').style.display='';document.getElementById('res').style.display='none';render()}
render();
</script>
