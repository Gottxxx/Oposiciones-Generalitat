<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tema 6 · Test 2 · Oposición Generalitat</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f7f4;--surface:#fff;--surface2:#f1f0ed;--border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.2);--text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;--ok:#1a7a4a;--ok-bg:#eaf5ee;--ok-border:rgba(26,122,74,.25);--err:#c0392b;--err-bg:#fdf0ee;--err-border:rgba(192,57,43,.25);--accent:#1a1a18;--r:10px;--rs:6px}
@media(prefers-color-scheme:dark){:root{--bg:#18181a;--surface:#222224;--surface2:#2a2a2c;--border:rgba(255,255,255,.1);--border-strong:rgba(255,255,255,.2);--text:#f0efec;--text2:#a0a09a;--text3:#606060;--ok:#4caf7a;--ok-bg:rgba(76,175,122,.12);--ok-border:rgba(76,175,122,.3);--err:#e57373;--err-bg:rgba(229,115,115,.12);--err-border:rgba(229,115,115,.3);--accent:#f0efec}}
html{font-size:16px}body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem}
#app{width:100%;max-width:680px}
#hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:2rem}
#hdr h1{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px;letter-spacing:-.01em}#hdr p{font-size:13px;color:var(--text3)}
#pill{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid var(--border-strong);color:var(--text2);background:var(--surface2);white-space:nowrap;flex-shrink:0}
#pw{margin-bottom:1.25rem}#pr{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:7px}#pr span:last-child{font-weight:500;color:var(--text2)}
#track{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden}#fill{height:3px;background:var(--accent);border-radius:3px;transition:width .4s ease;width:0%}
#stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.st{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px}
.st .lb{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.st .vl{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-.02em}
#sc-ok .vl{color:var(--ok)}#sc-er .vl{color:var(--err)}
#qc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem}
#qm{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em}
#qm .d{width:3px;height:3px;border-radius:50%;background:var(--border-strong);display:inline-block}
#qt{font-size:16px;color:var(--text);line-height:1.65}
#opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.opt{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:13px 16px;font-size:14px;color:var(--text);cursor:pointer;text-align:left;line-height:1.55;transition:border-color .15s,background .15s,transform .1s;width:100%}
.opt:hover:not(.dis){border-color:var(--border-strong);background:var(--surface2);transform:translateY(-1px)}
.lt{min-width:24px;height:24px;border-radius:50%;border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0;margin-top:1px;transition:background .15s,color .15s,border-color .15s}
.opt.ok{border-color:var(--ok-border);background:var(--ok-bg)}.opt.ok .lt{background:var(--ok);border-color:var(--ok);color:#fff}
.opt.er{border-color:var(--err-border);background:var(--err-bg)}.opt.er .lt{background:var(--err);border-color:var(--err);color:#fff}
.opt.dis{cursor:default;pointer-events:none}
#fb{display:none;border-radius:var(--rs);padding:13px 16px;margin-bottom:1rem;border:1px solid;font-size:13px;line-height:1.65}
#fb.show{display:block}#fb.ok{background:var(--ok-bg);border-color:var(--ok-border)}#fb.er{background:var(--err-bg);border-color:var(--err-border)}
#fb .fh{font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
#fb.ok .fh{color:var(--ok)}#fb.er .fh{color:var(--err)}#fb .fd{color:var(--text2)}
#br{display:flex;justify-content:flex-end}
#bn{display:none;font-size:13px;font-weight:500;padding:10px 20px;border-radius:var(--rs);background:var(--accent);color:var(--bg);border:none;cursor:pointer;transition:opacity .15s}#bn:hover{opacity:.85}
#res{display:none;padding:1rem 0}
#rh{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:2rem}
#rp{font-size:64px;font-weight:700;color:var(--text);letter-spacing:-.04em;line-height:1;flex-shrink:0}
#ri h2{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}#ri p{font-size:13px;color:var(--text2);line-height:1.6}
#rbt{display:flex;gap:8px;margin-bottom:2rem;flex-wrap:wrap}
.bs{font-size:13px;font-weight:500;padding:10px 18px;border-radius:var(--rs);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);cursor:pointer;transition:background .15s}.bs:hover{background:var(--surface2)}
.bp{background:var(--accent);color:var(--bg);border-color:transparent}.bp:hover{opacity:.85;background:var(--accent)}
#fs{border-top:1px solid var(--border);padding-top:1.5rem}
#fs h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.04em}
.fi{padding:1rem 0;border-bottom:1px solid var(--border)}.fi:last-child{border-bottom:none}
.fq{font-size:14px;color:var(--text);margin-bottom:8px;line-height:1.5;font-weight:500}
.fb2{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.bg{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid}
.bg.er{background:var(--err-bg);border-color:var(--err-border);color:var(--err)}.bg.ok{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok)}
.fe{font-size:12px;color:var(--text3);line-height:1.6}
@media(max-width:500px){body{padding:1rem .75rem 3rem}#rh{flex-direction:column;gap:1rem;align-items:flex-start}#rp{font-size:48px}#hdr{flex-direction:column;gap:.75rem}}
</style>
</head>
<body>
<div id="app">
  <div id="hdr"><div><h1>Tema 6 · Test 2 · Oposición Generalitat</h1><p>55 preguntas · Detalle normativo, plazos y casos prácticos</p></div><div id="pill"></div></div>
  <div id="pw"><div id="pr"><span>Progreso</span><span id="pn">1 / 55</span></div><div id="track"><div id="fill"></div></div></div>
  <div id="stats">
    <div class="st" id="sc-ok"><div class="lb">Correctas</div><div class="vl" id="vok">0</div></div>
    <div class="st" id="sc-er"><div class="lb">Errores</div><div class="vl" id="ver">0</div></div>
    <div class="st"><div class="lb">Pendientes</div><div class="vl" id="vpe">55</div></div>
  </div>
  <div id="qc"><div id="qm"><span id="qnl"></span><span class="d"></span><span id="qbl"></span></div><div id="qt"></div></div>
  <div id="opts"></div><div id="fb"></div>
  <div id="br"><button id="bn" onclick="nxt()">Siguiente →</button></div>
  <div id="res">
    <div id="rh"><div id="rp"></div><div id="ri"><h2 id="rt"></h2><p id="rs2"></p></div></div>
    <div id="rbt"><button class="bs bp" onclick="rst()">Repetir completo</button><button class="bs" id="bfl" onclick="sfl()">Solo falladas →</button></div>
    <div id="fs" style="display:none"><h3 id="fst"></h3><div id="fl"></div></div>
  </div>
</div>
<script>
const Q=[
  {b:"A. Iniciación — repaso con variantes",q:"¿Cuál de las siguientes NO es una vía de inicio de oficio?",opts:["Iniciativa propia del órgano competente","Orden del órgano jerárquicamente superior","Solicitud del interesado con representante","Denuncia de cualquier persona"],c:2,f:"La solicitud del interesado es inicio A SOLICITUD, no de oficio. Las cuatro vías de inicio de oficio son: iniciativa propia, orden superior, petición razonada y denuncia. La solicitud del interesado es la forma opuesta."},
  {b:"A. Iniciación — repaso con variantes",q:"Si el órgano competente recibe una petición razonada y decide que no procede iniciar el procedimiento:",opts:["Puede archivarlo sin más trámite","Debe motivar la decisión y comunicarla al órgano que formuló la petición razonada","Debe iniciar el procedimiento obligatoriamente","Debe consultar al órgano superior antes de decidir"],c:1,f:"Petición razonada no iniciada: obligación de motivar la decisión de no iniciar y de comunicarla al órgano que formuló la petición. No puede ignorar la petición razonada — debe dar respuesta."},
  {b:"A. Iniciación — repaso con variantes",q:"Una denuncia anónima puede servir para:",opts:["Iniciar un procedimiento de oficio directamente sin más","Orientar una investigación previa pero no bastar por sí sola para iniciar formalmente","Otorgar la condición de interesado al denunciante","Suspender un procedimiento ya iniciado"],c:1,f:"La denuncia anónima puede orientar actuaciones previas pero no basta para iniciar formalmente el procedimiento ni para conferir derechos al denunciante. La ley exige que la denuncia exprese la identidad del denunciante."},
  {b:"A. Iniciación — repaso con variantes",q:"Las actuaciones previas pueden realizarse:",opts:["Solo después del inicio formal","Antes del inicio formal del procedimiento","Solo durante la fase de instrucción","Solo a petición del interesado"],c:1,f:"Las actuaciones previas son anteriores al inicio formal — sirven precisamente para decidir si se inicia o no. No son parte del procedimiento en sentido estricto sino una fase preparatoria anterior a él."},
  {b:"B. Solicitud — detalle",q:"La solicitud que no indica el medio de notificación preferido:",opts:["Es nula de pleno derecho","Se notificará por el medio que la Administración considere más adecuado","Obliga a la Administración a notificar solo electrónicamente","Es inadmisible y debe devolverse sin más trámite"],c:1,f:"Si el interesado no indica medio de notificación, la Administración puede usar el que considere más adecuado para garantizar que el interesado recibe la notificación. No es causa de nulidad ni de inadmisión."},
  {b:"B. Solicitud — detalle",q:"Los modelos normalizados de solicitud pueden incluir:",opts:["Solo campos de texto libre sin automatización","Comprobaciones automáticas y campos pre-rellenados","Solo la firma electrónica del interesado","Solo datos personales básicos sin petición concreta"],c:1,f:"Los modelos normalizados pueden incorporar comprobaciones automáticas de los datos introducidos y campos pre-rellenados cuando la Administración ya dispone de esa información. Facilitan la tramitación y reducen errores."},
  {b:"B. Solicitud — detalle",q:"Si la solicitud no indica el órgano destinatario, la Administración que la recibe debe:",opts:["Rechazarla directamente","Tramitarla como si fuera competente aunque no lo sea","Remitirla al órgano competente si lo puede identificar, e informar al interesado","Devolvérsela al interesado sin indicar a quién debe dirigirla"],c:2,f:"Si la solicitud llega a un órgano incompetente, debe remitirla al competente e informar al interesado. El principio de eficacia obliga a la Administración a colaborar y a no dejar al interesado sin respuesta por un defecto de destinatario."},
  {b:"C. Ordenación — detalle",q:"El principio de celeridad en la ordenación del procedimiento implica:",opts:["Reducir a la mitad todos los plazos automáticamente","Acordar en un solo acto todos los trámites que no dependan entre sí","Tramitar los asuntos por riguroso orden de entrada sin excepción","Eliminar el trámite de audiencia para ganar tiempo"],c:1,f:"Celeridad = los actos de instrucción que no dependan entre sí se realizan de forma simultánea, y se acumulan en un solo acto todos los trámites susceptibles de ello. No elimina garantías — las agiliza."},
  {b:"C. Ordenación — detalle",q:"Los documentos que integran el expediente electrónico deben:",opts:["Estar en formato papel con escaneo posterior","Ordenarse por riguroso orden cronológico con índice numerado y firmado electrónicamente","Solo incluir los documentos aportados por el interesado","No incluir metadatos para proteger la privacidad"],c:1,f:"El expediente electrónico debe estar ordenado, con índice numerado de los documentos, firmado electrónicamente, y con los metadatos de cada documento. El índice firmado electrónicamente garantiza la integridad del expediente."},
  {b:"C. Ordenación — detalle",q:"La Administración puede adoptar medidas de ordenación para:",opts:["Solo sancionar a los funcionarios que incumplen plazos","Garantizar el impulso del procedimiento, evitar dilaciones y resolver en plazo","Ampliar unilateralmente sus propios plazos sin límite","Cambiar de órgano competente cuando el asunto sea complejo"],c:1,f:"Las medidas de ordenación sirven para garantizar el impulso del procedimiento, el control de plazos y la eficacia de la tramitación. Incluyen la posibilidad de exigir responsabilidad al órgano que incumple plazos."},
  {b:"D. Instrucción — prueba detalle",q:"¿Quién puede proponer la apertura del período de prueba?",opts:["Solo el órgano instructor de oficio","El órgano instructor de oficio o el interesado a petición","Solo el interesado mediante escrito motivado","Solo el superior jerárquico del órgano instructor"],c:1,f:"El período de prueba puede abrirse de oficio por el órgano instructor o a petición del interesado. No es una facultad exclusiva de ninguno de los dos — puede nacer de cualquiera de las dos iniciativas."},
  {b:"D. Instrucción — prueba detalle",q:"Las pruebas propuestas por el interesado pueden rechazarse cuando:",opts:["El órgano instructor las considere innecesarias, impertinentes o de imposible práctica","El plazo de prueba ya ha comenzado","El expediente tiene más de 50 documentos","El interesado no las pagó previamente"],c:0,f:"El rechazo de pruebas propuestas debe ser motivado y procede cuando sean manifiestamente improcedentes o innecesarias. El rechazo no puede ser arbitrario — debe justificarse en la resolución que lo acuerde."},
  {b:"D. Instrucción — prueba detalle",q:"Los gastos de las pruebas propuestas por el interesado:",opts:["Siempre corren a cargo de la Administración","Corren a cargo del interesado que las propuso, salvo que el órgano las considere imprescindibles para resolver","Son siempre gratuitos por el principio de gratuidad administrativa","Los paga quien gana el procedimiento al final"],c:1,f:"Los gastos de las pruebas propuestas por el interesado corren a su cargo, salvo que el órgano instructor las considere indispensables para resolver, en cuyo caso puede asumir el coste. Es un dato de detalle que cae en tests avanzados."},
  {b:"E. Instrucción — informes detalle",q:"Si el informe es emitido fuera de plazo:",opts:["No puede tenerse en cuenta en ningún caso","Puede no tenerse en cuenta si ya se ha dictado resolución, pero puede incorporarse al expediente si aún no se ha resuelto","Es nulo de pleno derecho","Obliga a reiniciar el procedimiento desde el principio"],c:1,f:"Informe emitido fuera de plazo: puede incorporarse al expediente si el procedimiento no ha concluido. Si ya se ha dictado resolución, puede no tenerse en cuenta. El retraso no anula el informe — lo puede hacer extemporáneo."},
  {b:"E. Instrucción — informes detalle",q:"Los informes preceptivos determinantes que no llegan en plazo:",opts:["Paralizan el procedimiento indefinidamente","Generan responsabilidad para el órgano que debía emitirlos, y el procedimiento puede continuar","Obligan al órgano instructor a resolver sin información suficiente","Producen silencio positivo a favor del interesado"],c:1,f:"Los informes preceptivos no emitidos en plazo no paralizan indefinidamente el procedimiento. El incumplimiento genera responsabilidad disciplinaria para el órgano emisor. El instructor puede continuar, especialmente si el informe no es determinante."},
  {b:"E. Instrucción — informes detalle",q:"Un informe de otro órgano de la misma Administración es, salvo previsión contraria:",opts:["Preceptivo y vinculante","Facultativo y no vinculante","Preceptivo y no vinculante","Facultativo y vinculante"],c:1,f:"Los informes entre órganos de la misma Administración son, salvo que la norma diga otra cosa, facultativos y no vinculantes. La regla es la no vinculación — la vinculación debe estar expresamente prevista."},
  {b:"F. Instrucción — audiencia detalle",q:"El órgano puede prescindir del trámite de audiencia cuando:",opts:["Lo considera conveniente para ganar tiempo","No hay hechos, alegaciones ni pruebas distintos de los aducidos por el propio interesado que se vayan a tener en cuenta en la resolución","El procedimiento es de tramitación simplificada automáticamente","El interesado ha renunciado expresamente a él"],c:1,f:"La audiencia solo puede omitirse cuando no haya nada en el expediente que el interesado no conozca ya: ni hechos, ni alegaciones, ni pruebas distintas de las que él mismo aportó. Si hay algo nuevo que se usará en la resolución, la audiencia es obligatoria."},
  {b:"F. Instrucción — audiencia detalle",q:"Durante el trámite de audiencia, ¿puede el interesado aportar nuevos documentos?",opts:["No: la audiencia es solo para ver el expediente","Sí: puede formular alegaciones y aportar documentos y justificaciones","Solo si el órgano instructor lo autoriza expresamente","Solo documentos que ya estaban en el expediente"],c:1,f:"Durante la audiencia el interesado puede: examinar el expediente, obtener copias, formular alegaciones y aportar documentos y justificaciones que considere pertinentes. La audiencia es una garantía activa, no solo contemplativa."},
  {b:"F. Instrucción — audiencia detalle",q:"Si el interesado no comparece al trámite de audiencia:",opts:["El procedimiento caduca automáticamente","El procedimiento puede continuar y resolverse sin las alegaciones del interesado","El órgano debe posponer la resolución 30 días más","El interesado pierde la condición de interesado"],c:1,f:"Si el interesado no usa el trámite de audiencia, no comparece o no formula alegaciones, el procedimiento continúa su curso. La audiencia es una oportunidad que el interesado puede aprovechar o no, sin que su inactividad paralice el procedimiento."},
  {b:"G. Información pública — detalle",q:"Las alegaciones formuladas en el trámite de información pública:",opts:["Vinculan al órgano a resolverlas positivamente","No otorgan por sí solas la condición de interesado a quienes las formulan, pero el órgano debe tenerlas en cuenta","No tienen valor jurídico alguno","Convierten automáticamente a quien las formula en parte del procedimiento"],c:1,f:"Las alegaciones de la información pública deben ser tenidas en cuenta por el órgano, pero quien las formula no adquiere automáticamente la condición de interesado. Pueden influir en la resolución sin que generen derecho de recurso para quien las formula si no es interesado."},
  {b:"G. Información pública — detalle",q:"La información pública es obligatoria:",opts:["En todos los procedimientos sin excepción","Solo cuando la ley o el reglamento lo prevean expresamente para ese tipo de procedimiento","Solo en procedimientos que afecten a más de 100 personas","Solo cuando el interesado lo solicite"],c:1,f:"La información pública es obligatoria cuando la ley o el reglamento lo establezcan para ese procedimiento concreto. En otros casos, el órgano puede acordarla potestativamente. No es un trámite universal."},
  {b:"H. Tramitación simplificada — detalle",q:"¿Quién puede acordar la tramitación simplificada?",opts:["Solo el interesado mediante solicitud expresa","El órgano instructor de oficio o el interesado a petición","Solo el órgano superior jerárquico","Solo el Ministerio competente mediante orden ministerial"],c:1,f:"La tramitación simplificada puede acordarse de oficio por el órgano instructor o a petición del interesado. El órgano puede rechazar la petición si el asunto no es simple o no concurre interés público que lo justifique."},
  {b:"H. Tramitación simplificada — detalle",q:"En la tramitación simplificada, ¿qué trámites pueden suprimirse?",opts:["Todos los trámites incluyendo la audiencia","Los trámites no esenciales, pero nunca los que garantizan la defensa del interesado cuando sean necesarios","Solo el período de prueba","Solo los informes facultativos"],c:1,f:"La tramitación simplificada puede eliminar trámites no esenciales (ciertos informes, actos de comprobación) pero nunca puede eliminar las garantías esenciales de defensa del interesado cuando sean necesarias para el caso concreto."},
  {b:"H. Tramitación simplificada — detalle",q:"El procedimiento simplificado puede transformarse en ordinario cuando:",opts:["El expediente supera los 100 folios","El órgano aprecia que el asunto no es simple o que concurren circunstancias que lo justifican","El interesado lo solicita siempre","Han pasado más de 15 días desde el inicio del simplificado"],c:1,f:"El procedimiento simplificado puede revertir al ordinario si el órgano aprecia que el asunto tiene mayor complejidad de la prevista o que concurren circunstancias que hacen necesaria la tramitación completa. No es una decisión libre — debe estar justificada."},
  {b:"I. Medidas provisionales — detalle",q:"Las medidas provisionales previas al inicio del procedimiento tienen como límite temporal:",opts:["6 meses","90 días","15 días desde su adopción para que se confirmen, modifiquen o levanten en el acuerdo de inicio","30 días prorrogables otros 30"],c:2,f:"Las medidas provisionales previas al inicio deben ser confirmadas, modificadas o levantadas en el acuerdo de iniciación del procedimiento, que debe adoptarse en los 15 días siguientes. Si no se inicia en ese plazo, las medidas quedan sin efecto automáticamente."},
  {b:"I. Medidas provisionales — detalle",q:"Una medida provisional puede consistir en:",opts:["Solo multas económicas","Suspensión temporal de actividades, prestación de caución, intervención de bienes y otras medidas previstas por la ley","Solo en la suspensión cautelar de un acto previo","Solo en el embargo preventivo de bienes del interesado"],c:1,f:"Las medidas provisionales son variadas: suspensión temporal de actividades o servicios, prestación de caución o garantía, intervención de bienes, y cualquier otra prevista en la ley que sea proporcionada al fin perseguido."},
  {b:"J. Terminación — detalle",q:"La resolución que pone fin al procedimiento debe ser:",opts:["Solo favorable o desfavorable, sin término medio","Congruente con las peticiones formuladas, decidiendo todas las cuestiones planteadas y las derivadas del procedimiento","Solo sobre lo pedido estrictamente, sin pronunciarse sobre cuestiones conexas","Adoptada siempre por el órgano de mayor rango de la Administración"],c:1,f:"La resolución debe ser congruente y completa: decide todas las cuestiones planteadas por los interesados y las conexas que deriven del procedimiento. No puede dejar cuestiones sin resolver ni pronunciarse sobre lo que no fue objeto del procedimiento."},
  {b:"J. Terminación — detalle",q:"La resolución tácita o implícita:",opts:["Es equivalente a la resolución expresa en todos los efectos","No está permitida: siempre debe haber resolución expresa","Solo puede darse en procedimientos a solicitud del interesado cuando se produce silencio positivo","No existe en derecho administrativo español"],c:1,f:"La resolución siempre debe ser expresa en derecho administrativo español. El silencio administrativo es una ficción legal que habilita recursos, pero no sustituye la obligación de dictar resolución expresa. No existe la resolución tácita como figura válida."},
  {b:"J. Terminación — detalle",q:"La terminación convencional requiere que el acuerdo:",opts:["Sea aprobado siempre por el Tribunal Constitucional","No sea contrario al ordenamiento jurídico ni suponga alteración de las competencias atribuidas a los órganos","Sea propuesto por ambas partes sin intervención de terceros","Sea publicado en el BOE en todos los casos"],c:1,f:"La terminación convencional es posible siempre que el acuerdo: no contravenga el ordenamiento jurídico, no suponga alteración de las competencias, y no lesione el interés público ni los derechos de terceros. Son los tres límites materiales."},
  {b:"K. Plazos del T6 — tabla completa",q:"¿Cuál es el plazo correcto para el período de prueba?",opts:["Mínimo 5 días y máximo 15 días","Mínimo 10 días y máximo 30 días","Mínimo 15 días y máximo 20 días","Siempre 20 días naturales"],c:1,f:"Período de prueba: mínimo 10 días, máximo 30 días. El examen usa 5-15, 15-20 o 20 fijo como trampas. El rango 10-30 es el único correcto."},
  {b:"K. Plazos del T6 — tabla completa",q:"¿Cuál es el plazo para emitir informes cuando no hay norma específica?",opts:["5 días hábiles","10 días hábiles","15 días hábiles","20 días naturales"],c:1,f:"Plazo general de informes: 10 días hábiles. El examen combina este dato con el plazo de audiencia (10-15 días) y el de prueba (10-30 días) para crear confusión. Los 10 días de informes son hábiles y son un límite único, no un rango."},
  {b:"K. Plazos del T6 — tabla completa",q:"El plazo mínimo de información pública es de:",opts:["10 días","15 días","20 días","30 días"],c:2,f:"Información pública: mínimo 20 días. Dato que el examen confunde con los 10-15 días de audiencia. El 20 es el mínimo de información pública y no tiene límite superior fijo establecido por la ley general."},
  {b:"K. Plazos del T6 — tabla completa",q:"En tramitación simplificada el plazo de resolución es:",opts:["15 días","30 días","2 meses","3 meses"],c:1,f:"Tramitación simplificada: resolución en 30 días. Tramitación ordinaria: 3 meses. Tramitación de urgencia: plazos a la mitad. Los tres tipos con sus plazos son la tabla más preguntada del T6."},
  {b:"K. Plazos del T6 — tabla completa",q:"En tramitación de urgencia los plazos se reducen a la mitad excepto:",opts:["Los plazos de resolución final","Los de presentación de solicitudes, recursos, audiencia y alegaciones","Los plazos de los informes preceptivos","Los plazos de las medidas provisionales"],c:1,f:"Tramitación de urgencia: todos los plazos a la mitad EXCEPTO los de presentación de solicitudes y recursos y los de audiencia y alegaciones. Las garantías de defensa no se reducen."},
  {b:"L. Trampas finales T6",q:"¿Cuál de estas afirmaciones es INCORRECTA sobre la denuncia?",opts:["Debe expresar la identidad del denunciante","La denuncia confiere automáticamente la condición de interesado al denunciante","Debe incluir relato de los hechos","Si se denuncia daño al patrimonio público y no se inicia, debe motivarse y notificarse al denunciante"],c:1,f:"La afirmación incorrecta es la B. La denuncia NO confiere automáticamente la condición de interesado. Es el dato literal más preguntado del bloque de inicio de oficio en el T6."},
  {b:"L. Trampas finales T6",q:"¿Cuál de estas afirmaciones sobre la audiencia es INCORRECTA?",opts:["Tiene lugar antes de redactar la propuesta de resolución","Su plazo es de mínimo 10 días y máximo 15 días","El interesado puede aportar documentos durante la audiencia","La audiencia es siempre obligatoria en todos los procedimientos sin excepción"],c:3,f:"La afirmación incorrecta es la D. La audiencia puede omitirse cuando no hay hechos, alegaciones ni pruebas distintos de los del propio interesado que se vayan a usar en la resolución. No es universalmente obligatoria."},
  {b:"L. Trampas finales T6",q:"¿Cuál de estas afirmaciones sobre la información pública es CORRECTA?",opts:["Solo pueden participar los interesados formales del procedimiento","Quien participa adquiere automáticamente la condición de interesado","Su plazo mínimo es de 10 días","Puede participar cualquier persona aunque no sea interesada, sin adquirir por ello automáticamente esa condición"],c:3,f:"La única afirmación correcta es la D: la información pública está abierta a cualquier persona y la participación no convierte automáticamente al participante en interesado. Las otras tres son errores clásicos del T6."},
  {b:"L. Trampas finales T6",q:"¿Cuál de estas afirmaciones sobre los informes es INCORRECTA?",opts:["Los informes pueden ser preceptivos o facultativos","Los informes pueden ser vinculantes o no vinculantes","Todo informe preceptivo es automáticamente vinculante","El plazo general para emitir informes es de 10 días hábiles"],c:2,f:"La afirmación incorrecta es la C. Preceptivo y vinculante son categorías independientes. Un informe puede ser preceptivo (obligatorio emitirlo) pero no vinculante (el órgano no está obligado a seguirlo). El examen los confunde sistemáticamente."},
  {b:"L. Trampas finales T6",q:"El registro electrónico funciona 24/7. Si presento un escrito el domingo a las 23:59, se considera presentado:",opts:["El domingo a las 23:59 a todos los efectos","El lunes siguiente a primera hora, a efectos del cómputo de plazos","El sábado anterior","El primer día hábil siguiente a las 00:00"],c:1,f:"El registro electrónico acepta la presentación el domingo, pero a efectos del cómputo de plazos se entiende realizada el primer día hábil siguiente (el lunes). El sello electrónico muestra el domingo, pero el cómputo empieza el lunes."},
  {b:"M. Síntesis del T6",q:"El T6 cubre tres fases principales del procedimiento. ¿Cuáles son?",opts:["Iniciación, resolución y recurso","Iniciación, ordenación e instrucción","Instrucción, resolución y ejecución","Solicitud, alegaciones y audiencia"],c:1,f:"El Tema 6 cubre exactamente: iniciación + ordenación + instrucción. La resolución y la ejecución pertenecen a fases posteriores del procedimiento que no están en este tema. Es la delimitación temática que el examen usa para verificar que conoces el ámbito del T6."},
  {b:"M. Síntesis del T6",q:"¿Cuál de estos trámites NO pertenece a la fase de instrucción?",opts:["Período de prueba","Trámite de audiencia","Información pública","Acuerdo de inicio del procedimiento"],c:3,f:"El acuerdo de inicio pertenece a la fase de iniciación, no de instrucción. Los trámites de instrucción son: alegaciones + prueba + informes + audiencia + información pública. El inicio es siempre la fase anterior."},
  {b:"M. Síntesis del T6",q:"¿Cuál es el orden correcto de las fases de instrucción?",opts:["Audiencia → prueba → informes → alegaciones","Alegaciones y prueba → informes → audiencia (como último trámite antes de la propuesta de resolución)","Informes → audiencia → alegaciones → prueba","Audiencia → alegaciones → prueba → informes"],c:1,f:"Orden lógico de la instrucción: alegaciones y prueba (pueden coincidir en el tiempo) → informes → audiencia (último trámite antes de la propuesta de resolución). La audiencia siempre es la última porque se da al interesado la oportunidad de pronunciarse sobre todo lo instruido."},
  {b:"M. Síntesis del T6",q:"¿Qué tienen en común la tramitación simplificada y la tramitación de urgencia?",opts:["Ambas reducen plazos a la mitad","Ambas aceleran el procedimiento pero mantienen las garantías esenciales de defensa","Ambas eliminan el trámite de audiencia","Ambas requieren autorización del superior jerárquico"],c:1,f:"Las dos modalidades aceleradas (simplificada y urgencia) comparten el principio de mantener las garantías esenciales aunque reduzcan o eliminen trámites no esenciales. La audiencia se mantiene cuando sea necesaria en ambas modalidades."},
  {b:"M. Síntesis del T6",q:"¿Cuál de estos elementos define mejor la fase de ordenación?",opts:["Es cuando se instruyen las pruebas y se oye al interesado","Es la fase de impulso de oficio, gestión del expediente electrónico, actos simultáneos y control de plazos","Es cuando la Administración dicta la resolución final","Es cuando se formulan las alegaciones iniciales"],c:1,f:"La ordenación no es una fase de contenido sustantivo — es la fase de gestión procedimental: impulso de oficio, formación del expediente electrónico, actos simultáneos para ganar tiempo, y control de plazos. Encuadra y da soporte a la instrucción."},
  {b:"N. Preguntas de detalle avanzado",q:"El derecho del interesado a no aportar documentos que ya tenga la Administración se aplica:",opts:["Solo en la fase de alegaciones","En cualquier momento del procedimiento en que se le requieran documentos","Solo si el documento fue presentado en el mismo procedimiento","Solo para documentos presentados en los últimos 5 años"],c:1,f:"El interesado no está obligado a aportar documentos que ya obran en poder de cualquier Administración. Este derecho se puede ejercer en cualquier momento del procedimiento en que se soliciten documentos, no solo en la fase de alegaciones."},
  {b:"N. Preguntas de detalle avanzado",q:"¿Puede la Administración ampliar el plazo de resolución de oficio en tramitación ordinaria?",opts:["Nunca: el plazo de 3 meses es rígido","Sí, en los casos previstos por la ley (suspensión por informes, subsanación, etc.) pero no libremente","Sí, siempre que lo motive y lo notifique al interesado","Sí, hasta un máximo de 6 meses adicionales sin más trámite"],c:1,f:"El plazo de resolución puede suspenderse (no ampliarse libremente) en los casos previstos por la ley: petición de informes a otros órganos, subsanación de deficiencias, etc. La Administración no puede alargar el plazo unilateralmente sin causa legal."},
  {b:"N. Preguntas de detalle avanzado",q:"¿Puede el órgano instructor acordar la práctica de pruebas de oficio?",opts:["No: solo el interesado puede proponer pruebas","Sí: el órgano puede acordar de oficio la práctica de pruebas que considere necesarias para esclarecer los hechos","Solo si el interesado no propone ninguna prueba","Solo en procedimientos sancionadores"],c:1,f:"El órgano instructor puede acordar de oficio la práctica de las pruebas que estime necesarias. La prueba no es un monopolio del interesado — el principio de instrucción de oficio permite al órgano buscar la verdad material."},
  {b:"N. Preguntas de detalle avanzado",q:"La notificación del acuerdo de iniciación del procedimiento de oficio se realiza:",opts:["Solo al órgano superior jerárquico","A los interesados, para que puedan participar en el procedimiento desde su inicio","Solo al denunciante si lo hay","Al Ministerio Fiscal en todo caso"],c:1,f:"El acuerdo de inicio del procedimiento de oficio debe notificarse a los interesados para que puedan participar desde el principio. La notificación del inicio garantiza el derecho de defensa desde el primer momento."},
  {b:"N. Preguntas de detalle avanzado",q:"¿Puede el interesado desistir de su solicitud después de que la Administración haya abierto el trámite de audiencia?",opts:["No: el desistimiento solo es posible antes de la instrucción","Sí, aunque la Administración puede continuar de oficio si hay interés público","Solo si el órgano instructor lo autoriza expresamente","Solo si no hay otros interesados en el procedimiento"],c:1,f:"El desistimiento puede producirse en cualquier momento del procedimiento antes de la resolución. Pero si hay interés público o terceros afectados, la Administración puede continuar de oficio aunque el interesado desista."},
  {b:"N. Preguntas de detalle avanzado",q:"¿Qué ocurre si el órgano competente no dicta resolución expresa en el plazo máximo?",opts:["El interesado puede reclamar responsabilidad penal directamente","Se produce el silencio administrativo (positivo o negativo según el caso) y el órgano sigue obligado a resolver","El procedimiento se anula automáticamente","El interesado pierde su derecho si no reclama en 1 mes"],c:1,f:"La falta de resolución en plazo produce silencio (positivo o negativo según el tipo de procedimiento), pero la Administración mantiene la obligación de resolver expresamente. El silencio no libera al órgano — solo habilita al interesado para recurrir."},
  {b:"O. Conexiones con otros temas",q:"El T6 y el T5 se conectan porque:",opts:["Son temas completamente independientes sin relación","El T5 regula los conceptos base del procedimiento y el T6 desarrolla las fases concretas de iniciación, ordenación e instrucción","El T6 regula el silencio administrativo que el T5 no menciona","El T5 regula las fases y el T6 los principios generales"],c:1,f:"El T5 y el T6 son la misma materia dividida: T5 regula los conceptos base (actos, plazos, silencio, invalidez) y el T6 desarrolla las fases concretas (iniciación, ordenación, instrucción). Son complementarios y el examen los cruza en preguntas mixtas."},
  {b:"O. Conexiones con otros temas",q:"El plazo de subsanación de solicitudes (10 días) aparece en:",opts:["Solo el T6","Solo el T5","Tanto el T5 como el T6, porque ambos regulan aspectos del procedimiento","Solo en la normativa catalana especial"],c:2,f:"El plazo de subsanación de 10 días aparece en el T5 (en el bloque de solicitudes y plazos) y en el T6 (en el bloque de inicio a solicitud). Es un dato que el examen usa como trampa: si te preguntan de qué tema es, la respuesta es que pertenece a los dos."},
  {b:"O. Conexiones con otros temas",q:"¿Dónde encaja la resolución que pone fin al procedimiento respecto a los temas 5 y 6?",opts:["En el T6, porque es la última fase del procedimiento","En el T5, en el bloque de actos administrativos y eficacia","En ninguno de los dos: es materia del T7","Es un tema autónomo no regulado en el temario"],c:1,f:"La resolución es un acto administrativo cuya regulación (eficacia, notificación, recursos) pertenece al T5. El T6 termina en la instrucción — la resolución es la fase siguiente que ya no pertenece al T6 sino a los principios generales del T5."}
];

let pool=[...Q],idx=0,nOk=0,nEr=0,fl=[],ans=false;
function render(){
  if(idx>=pool.length){showRes();return;}
  const q=pool[idx],tot=pool.length;
  document.getElementById('fill').style.width=Math.round(idx/tot*100)+'%';
  document.getElementById('pn').textContent=(idx+1)+' / '+tot;
  document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;
  document.getElementById('vpe').textContent=tot-idx;
  document.getElementById('pill').textContent=q.b;
  document.getElementById('qnl').textContent='Pregunta '+(idx+1);
  document.getElementById('qbl').textContent=q.b;
  document.getElementById('qt').textContent=q.q;
  const o=document.getElementById('opts');o.innerHTML='';
  ['A','B','C','D'].forEach((l,i)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML='<span class="lt">'+l+'</span><span>'+q.opts[i]+'</span>';
    b.onclick=()=>sel(i,b);o.appendChild(b);
  });
  const f=document.getElementById('fb');f.className='';f.innerHTML='';
  document.getElementById('bn').style.display='none';ans=false;
}
function sel(i,btn){
  if(ans)return;ans=true;
  const q=pool[idx];
  document.querySelectorAll('.opt').forEach(b=>b.classList.add('dis'));
  const f=document.getElementById('fb');
  if(i===q.c){btn.classList.add('ok');nOk++;f.className='show ok';f.innerHTML='<div class="fh">Correcto</div><div class="fd">'+q.f+'</div>';}
  else{btn.classList.add('er');document.querySelectorAll('.opt')[q.c].classList.add('ok');nEr++;fl.push({q:q.q,co:q.opts[q.c],tu:q.opts[i],f:q.f});f.className='show er';f.innerHTML='<div class="fh">Incorrecto — correcta: '+['A','B','C','D'][q.c]+'</div><div class="fd">'+q.f+'</div>';}
  document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;
  document.getElementById('bn').style.display='inline-block';
}
function nxt(){idx++;render();}
function showRes(){
  ['hdr','pw','stats','qc','opts','fb','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  const tot=pool.length,pct=Math.round(nOk/tot*100);
  document.getElementById('rp').textContent=pct+'%';
  document.getElementById('rt').textContent=pct>=80?'T6 bien consolidado':pct>=60?'Nivel medio — repasa los fallos':'Refuerza plazos e instrucción';
  document.getElementById('rs2').textContent=nOk+' correctas de '+tot+'.'+(fl.length>0?' '+fl.length+' para repasar.':' Sin errores.');
  if(!fl.length)document.getElementById('bfl').style.display='none';
  if(fl.length){document.getElementById('fs').style.display='block';document.getElementById('fst').textContent='Preguntas falladas ('+fl.length+')';const fll=document.getElementById('fl');fll.innerHTML='';fl.forEach(f=>{const d=document.createElement('div');d.className='fi';d.innerHTML='<div class="fq">'+f.q+'</div><div class="fb2"><span class="bg er">Tu respuesta: '+f.tu+'</span><span class="bg ok">Correcta: '+f.co+'</span></div><div class="fe">'+f.f+'</div>';fll.appendChild(d);});}
  document.getElementById('res').style.display='block';
}
function rst(){pool=[...Q];idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
function sfl(){if(!fl.length)return;pool=fl.map(f=>Q.find(q=>q.q===f.q)).filter(Boolean);idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
render();
</script>
