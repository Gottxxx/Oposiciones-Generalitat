<script>
const Q=[
{b:"DPD",q:"¿Cuál es una función del Delegado de Protección de Datos (DPD/DPO)?",opts:["Sancionar directamente","Informar y asesorar al responsable y al personal","Aprobar leyes orgánicas","Resolver recursos judiciales"],c:1,f:"El DPD informa y asesora, pero no sanciona ni legisla."},
{b:"DPD",q:"El DPD también debe:",opts:["Supervisar el cumplimiento del RGPD y de la normativa interna","Sustituir al responsable del tratamiento","Autorizar todos los tratamientos","Emitir sentencias vinculantes"],c:0,f:"La supervisión del cumplimiento es una de sus funciones nucleares."},
{b:"DPD",q:"¿Sobre qué asesora específicamente el DPD?",opts:["Solo sobre sanciones","Sobre evaluaciones de impacto y control de riesgos","Sobre contratación pública","Sobre organización parlamentaria"],c:1,f:"El DPD asesora sobre evaluaciones de impacto y riesgos."},
{b:"DPD",q:"El DPD coopera con:",opts:["La autoridad de control","Solo el interesado","Solo el encargado","Solo el comité de empresa"],c:0,f:"El DPD coopera con la autoridad de control y actúa como punto de contacto."},
{b:"DPD",q:"¿Cuándo es obligatorio un DPD?",opts:["Siempre en cualquier tratamiento doméstico","En AAPP y organismos públicos, y en ciertos tratamientos a gran escala o de observación sistemática","Solo en empresas con menos de 10 empleados","Solo cuando hay datos de contacto"],c:1,f:"Art. 37 RGPD: obligatorio para AAPP, tratamientos a gran escala de categorías especiales, y observación sistemática a gran escala."},
{b:"DPD",q:"¿Cuál de estas actividades desencadena la obligatoriedad del DPD?",opts:["Observación habitual y sistemática a gran escala","Publicar organigramas","Resolver quejas lingüísticas","Firmar convenios menores"],c:0,f:"La observación habitual y sistemática a gran escala es supuesto expreso de obligatoriedad."},
{b:"DPD",q:"También se exige DPD cuando la actividad principal implique:",opts:["Tratamiento a gran escala de categorías especiales o datos penales","Solo tratamiento de nombres y teléfonos","Solo archivo en papel","Cualquier encuesta interna sin datos personales"],c:0,f:"El tratamiento a gran escala de categorías especiales o datos penales es el tercer supuesto de obligatoriedad."},
{b:"DPD",q:"¿Qué NO es el DPD?",opts:["Punto de contacto","Figura de asesoramiento y supervisión","Órgano que autoriza tratamientos o sustituye al responsable","Interlocutor con la autoridad de control"],c:2,f:"El DPD no autoriza ni sustituye al responsable."},
{b:"DPD",q:"¿Qué puede hacer una persona si no queda satisfecha con la gestión interna del DPD?",opts:["Nada más","Acudir también a la autoridad de control","Solo demandar civilmente","Pedir al DPD que sancione"],c:1,f:"Además del cauce interno, puede acudirse a la autoridad de control."},
{b:"DPD y autoridad de control",q:"¿Qué diferencia central existe entre DPD y autoridad de control?",opts:["No hay ninguna","El DPD asesora y supervisa internamente; la autoridad controla y puede sancionar","La autoridad es un empleado del responsable","El DPD resuelve controversias europeas"],c:1,f:"Trampa típica: confundir DPD con autoridad de control."},
{b:"Comité Europeo",q:"¿Qué es el Comité Europeo de Protección de Datos?",opts:["Una subdirección ministerial española","Un órgano de la UE con personalidad jurídica","Una autoridad autonómica de control","Un órgano judicial penal"],c:1,f:"Es un órgano de la UE con personalidad jurídica."},
{b:"Comité Europeo",q:"La misión principal del Comité Europeo es:",opts:["Resolver solo conflictos laborales","Garantizar la aplicación coherente del RGPD en todos los Estados miembros","Sancionar a cada responsable nacional","Sustituir a la AEPD"],c:1,f:"Su función central es asegurar la coherencia en toda la UE."},
{b:"Comité Europeo",q:"¿Qué puede emitir el Comité Europeo?",opts:["Directrices, recomendaciones y dictámenes","Sentencias penales","Normas con rango de ley orgánica española","Únicamente cartas informales sin efectos"],c:0,f:"Emite directrices, recomendaciones y dictámenes, además de resolver ciertas controversias."},
{b:"Comité Europeo",q:"¿Quién resuelve determinadas controversias entre autoridades?",opts:["El DPD","La unidad de recursos humanos","El Comité Europeo de Protección de Datos","El interesado afectado"],c:2,f:"El papel arbitral/coherente se atribuye al Comité Europeo."},
{b:"Comité Europeo",q:"¿Cuál es la trampa típica más repetida en este bloque?",opts:["Confundir DPD con autoridad de control","Confundir acceso con rectificación","Confundir supresión con portabilidad","Confundir dato común con dato penal"],c:0,f:"El propio tema marca esa confusión como trampa típica de examen."},
{b:"LO 3/2018",q:"¿Cuántos artículos tiene la LO 3/2018?",opts:["87","97","107","127"],c:1,f:"La LO 3/2018 tiene 97 artículos."},
{b:"LO 3/2018",q:"¿Cuántos títulos tiene la LO 3/2018?",opts:["8","9","10","12"],c:2,f:"La ley orgánica se estructura en 10 títulos."},
{b:"LO 3/2018",q:"La LO 3/2018 incluye además:",opts:["22 disposiciones adicionales, 6 transitorias, 1 derogatoria y 16 finales","1 disposición adicional y nada más","10 anexos técnicos","Solo un título preliminar"],c:0,f:"22 adicionales, 6 transitorias, 1 derogatoria y 16 finales."},
{b:"LO 3/2018",q:"¿Qué hace la LO 3/2018 respecto del RGPD?",opts:["Lo deroga en España","Adapta el ordenamiento español y concreta materias abiertas por el reglamento","Se limita a copiarlo literalmente","Solo regula sanciones penales"],c:1,f:"Adapta y complementa el RGPD en el ordenamiento español."},
{b:"LO 3/2018",q:"¿Qué fija en España la LO 3/2018 respecto de menores y entorno digital?",opts:["La edad de 12 años","La edad de 13 años","La edad de 14 años","La edad de 16 años"],c:2,f:"La LO 3/2018 fija en 14 años la edad del consentimiento digital en España."},
{b:"LO 3/2018",q:"¿Qué títulos agrupan disposiciones generales, principios y derechos de las personas?",opts:["Títulos I a III","Solo el Título X","Títulos VI a IX","Títulos IV y V"],c:0,f:"La tabla de estructura asigna esa materia a los tres primeros títulos."},
{b:"LO 3/2018",q:"¿Qué regula el Título IV de la LO 3/2018?",opts:["Transferencias internacionales","Tratamientos concretos","Derechos digitales","Autoridades de control únicamente"],c:1,f:"El Título IV regula tratamientos concretos (videovigilancia, exclusión publicitaria, etc.)."},
{b:"LO 3/2018",q:"¿Qué regula el Título V?",opts:["Responsable, encargado y DPD","Únicamente videovigilancia","Solo régimen sancionador","Solo derechos laborales"],c:0,f:"El Título V trata responsable, encargado y DPD."},
{b:"LO 3/2018",q:"¿Qué abarcan los Títulos VI a IX?",opts:["Principios y derechos","Transferencias, autoridades de protección de datos, procedimientos y régimen sancionador","Solo el consentimiento","Solo el derecho al olvido"],c:1,f:"Transferencias, autoridades, procedimientos y régimen sancionador."},
{b:"LO 3/2018",q:"¿Qué regula el Título X?",opts:["Garantía de los derechos digitales","Autoridades autonómicas","Contratos de encargado","Datos penales"],c:0,f:"El Título X regula los derechos digitales."},
{b:"LO 3/2018",q:"¿Qué deber se impone a quienes intervengan en cualquier fase del tratamiento?",opts:["Deber de confidencialidad","Deber de publicar todo","Deber de usar siempre consentimiento","Deber de transferir datos"],c:0,f:"La LO 3/2018 destaca el deber de confidencialidad en cualquier fase del tratamiento."},
{b:"LO 3/2018",q:"El tratamiento por obligación legal, interés público o poderes públicos requiere base en:",opts:["Cualquier acuerdo privado","Norma de la UE o norma con rango de ley","Solo una circular administrativa","Solo una instrucción interna del responsable"],c:1,f:"La LO perfila que estas bases deben apoyarse en norma UE o con rango de ley."},
{b:"LO 3/2018",q:"Los datos de condenas e infracciones penales tienen:",opts:["El mismo régimen que cualquier dato de contacto","Un régimen especialmente tasado","Un régimen libre si hay interés empresarial","Únicamente protección civil"],c:1,f:"Su tratamiento está especialmente tasado."},
{b:"LO 3/2018",q:"¿Qué idea suele caer sobre la LO 3/2018?",opts:["Que solo adapta el RGPD y nada más","Que perfila procedimientos y criterios sancionadores y prepara los derechos digitales","Que elimina toda autoridad de control","Que no afecta a menores"],c:1,f:"La LO concreta procedimientos, sanciones y derechos digitales."},
{b:"Derechos digitales",q:"¿Cuál de los siguientes es un derecho digital recogido en el tema?",opts:["Desconexión digital","Silencio administrativo positivo","Participación presupuestaria","Habeas data judicial"],c:0,f:"La desconexión digital figura expresamente en la lista de derechos digitales."},
{b:"Derechos digitales",q:"¿Qué pareja de derechos digitales aparece vinculada al ámbito laboral?",opts:["Intimidad y uso de dispositivos digitales en el trabajo; desconexión digital","Acceso y rectificación","Publicidad activa y reutilización","Interoperabilidad y cooperación administrativa"],c:0,f:"Ambos aparecen en la relación final de derechos digitales del tema."},
{b:"Derechos digitales",q:"¿Qué derecho digital se menciona respecto a medios digitales?",opts:["Rectificación y actualización de informaciones en medios digitales","Solo portabilidad bancaria","Derecho a subvención tecnológica","Derecho a anonimato absoluto"],c:0,f:"La rectificación y actualización de informaciones en medios digitales figura expresamente."},
{b:"Derechos digitales",q:"¿Qué derecho digital se menciona frente a videovigilancia y geolocalización en el trabajo?",opts:["Intimidad frente a videovigilancia, grabación de sonidos y geolocalización","Solo libertad de empresa","Solo protección penal del honor","Derecho a plus salarial"],c:0,f:"Ese derecho aparece literalmente en la enumeración del tema."},
{b:"Trampas típicas",q:"¿Qué fórmula resume la trampa sobre consentimiento?",opts:["Es la única base jurídica","No es la única base jurídica","Nunca sirve","Siempre prevalece sobre la ley"],c:1,f:"El primer aviso de trampas: el consentimiento no es la única base jurídica."},
{b:"Trampas típicas",q:"¿Qué otra trampa recuerda el tema sobre supresión?",opts:["Que siempre implica borrado inmediato e irreversible","Que puede no equivaler a borrado inmediato e irreversible","Que nunca procede","Que sustituye a la oposición"],c:1,f:"La supresión puede verse condicionada por conservación o bloqueo."},
{b:"Trampas típicas",q:"¿Qué trampa recuerda el tema sobre la información al interesado?",opts:["Basta con que exista en cualquier forma","Debe ser clara y accesible, no solo 'existir'","Solo importa si hay sanción","No afecta a tratamientos automatizados"],c:1,f:"La información debe ser clara y accesible, no basta con esconder una cláusula."},
{b:"Trampas típicas",q:"¿Cuál de estas parejas sobre menores es correcta según las trampas finales?",opts:["RGPD 16 / España 14","RGPD 14 / España 16","RGPD 18 / España 14","RGPD 13 fijo / España 13"],c:0,f:"RGPD: 16 (rebajable hasta 13); España: 14. Trampa clásica invertir las cifras."},
{b:"Trampas típicas",q:"¿Qué requisitos acumulativos exige la trampa final sobre decisión automatizada?",opts:["Que exista cualquier software y cualquier efecto","Que sea solo automatizada y con efectos jurídicos o similares significativos","Que afecte siempre a menores","Que exista portabilidad"],c:1,f:"Los dos requisitos son acumulativos: decisión solo automatizada + efectos significativos."},
{b:"Repaso mixto",q:"¿Qué secuencia de estudio sugiere el tema para protección de datos?",opts:["Qué dato es, por qué se puede tratar, qué información deben darte y qué puedes exigir","Qué órgano manda, qué presupuesto hay, qué ley sanciona y qué recurso cabe","Qué idioma usar, qué portal abrir, qué subvención pedir y qué registro utilizar","Qué contrato se firma, qué impuesto se paga, qué tribunal decide y qué reglamento aplica"],c:0,f:"Es la secuencia metodológica del tema: dato → base → información → derechos."},
{b:"Repaso mixto",q:"Si una pregunta mezcla huella dactilar identificativa, base jurídica y derecho a oponerse, ¿qué exige primero?",opts:["Separar categoría del dato, base del tratamiento y derecho ejercitable","Ir directamente al régimen disciplinario","Suponer que todo se basa en consentimiento","Confundirlo con transparencia activa"],c:0,f:"La lógica del tema es distinguir dato, base, información y derecho."},
{b:"Repaso mixto",q:"¿Cuál de estos enunciados resume mejor el contenido material del Tema 4?",opts:["Qué dato es, cómo se trata lícitamente, qué información debe darse y qué derechos existen","Cómo se aprueban reglamentos europeos","Cómo se organiza la Generalitat","Cómo funcionan los contratos públicos"],c:0,f:"Ese es el hilo conductor completo del tema."},
{b:"Repaso mixto",q:"Si un examen pregunta por AEPD, autoridades autonómicas y Comité Europeo, el bloque correcto es:",opts:["Control, tutela y coherencia del sistema de protección de datos","Contratación pública","Presupuestos","Derechos lingüísticos"],c:0,f:"Todos esos órganos aparecen en el cierre institucional del tema."},
{b:"Repaso mixto",q:"¿Qué derecho digital laboral podrías citar de memoria si te lo piden?",opts:["Desconexión digital","Silencio administrativo","Publicidad activa","Tutela judicial efectiva"],c:0,f:"La desconexión digital es uno de los derechos digitales laborales más claros."},
{b:"Repaso mixto",q:"Si la pregunta subraya 'tan fácil retirarlo como darlo', se refiere a:",opts:["La portabilidad","El consentimiento","La supresión","La limitación"],c:1,f:"Esa frase está asociada a la retirada del consentimiento."},
{b:"Repaso mixto",q:"Si la pregunta enfatiza 'formato estructurado, de uso común y lectura mecánica', se refiere a:",opts:["Acceso","Rectificación","Portabilidad","Supresión"],c:2,f:"Esa formulación es típica del derecho a la portabilidad."},
{b:"Repaso mixto",q:"Si la pregunta enfatiza 'producir efectos jurídicos o similares significativos', se refiere a:",opts:["Conservación","Decisiones automatizadas y perfilado","Minimización","Información al interesado"],c:1,f:"Ese requisito es propio del art. 22 RGPD: decisiones automatizadas."},
{b:"Repaso mixto",q:"Si te preguntan quién puede sancionar y quién no, la respuesta correcta es:",opts:["El DPD sanciona y la autoridad asesora","La autoridad de control puede sancionar; el DPD no","Ambos sancionan igual","Ninguno tiene funciones de control"],c:1,f:"La autoridad de control sanciona; el DPD asesora y supervisa."},
{b:"Repaso mixto",q:"Si la pregunta afirma que toda información sobre una persona identificable está protegida, la idea correcta es:",opts:["Sí, como dato personal aunque no sea íntima","No, solo si es íntima","Solo si es sanitaria","Solo si es biométrica"],c:0,f:"Dato personal no exige intimidad: basta la identificabilidad."}
];
let idx=0,ok=0,er=0,fails=[],cur=Q.slice(),full=Q.slice();
function render(){if(idx>=cur.length){showRes();return}let q=cur[idx],t=cur.length;document.getElementById('pill').textContent=idx+'/'+t;document.getElementById('pn').textContent=Math.round(idx/t*100)+'%';document.getElementById('fill').style.width=Math.round(idx/t*100)+'%';document.getElementById('sc-ok').textContent=ok;document.getElementById('sc-er').textContent=er;document.getElementById('qm').textContent=q.b;document.getElementById('qt').textContent=q.q;let h='';q.opts.forEach((o,i)=>{h+='<button class="opt" onclick="pick('+i+')">'+o+'</button>'});document.getElementById('opts').innerHTML=h;document.getElementById('fb').style.display='none';document.getElementById('fb').className='';document.getElementById('bn').style.display='none'}
function pick(i){let q=cur[idx],bs=document.querySelectorAll('.opt');bs.forEach((b,j)=>{b.classList.add('dis');b.onclick=null;if(j===q.c)b.classList.add('ok');if(j===i&&i!==q.c)b.classList.add('er')});let fb=document.getElementById('fb');if(i===q.c){ok++;fb.className='ok';fb.textContent='✓ '+q.f}else{er++;fb.className='er';fb.textContent='✗ '+q.f;fails.push({...q,pick:i})}fb.style.display='block';document.getElementById('bn').style.display='block';document.getElementById('sc-ok').textContent=ok;document.getElementById('sc-er').textContent=er}
function next(){idx++;render()}
function showRes(){document.getElementById('qc').style.display='none';document.getElementById('pw').style.display='none';document.getElementById('stats').style.display='none';let r=document.getElementById('res');r.style.display='block';let pct=Math.round(ok/(ok+er)*100)||0;document.getElementById('rp').textContent=pct+'%';document.getElementById('rp').style.color=pct>=70?'var(--ok)':'var(--err)';document.getElementById('ri').textContent=ok+' correctas · '+er+' incorrectas · '+cur.length+' preguntas';document.getElementById('pill').textContent=cur.length+'/'+cur.length;document.getElementById('fill').style.width='100%';let fl=document.getElementById('bfl');fl.innerHTML='';if(fails.length===0){document.getElementById('rt').textContent='¡Sin fallos!';return}fails.forEach(f=>{let d=document.createElement('div');d.className='fs';let opts='ABCD';d.innerHTML='<div class="fst">'+f.q+' <span class="badge badge-err">Tu: '+opts[f.pick]+'</span><span class="badge badge-ok">OK: '+opts[f.c]+'</span></div><div class="fl">'+f.f+'</div>';fl.appendChild(d)})}
function restart(){idx=0;ok=0;er=0;fails=[];cur=full.slice();document.getElementById('qc').style.display='';document.getElementById('pw').style.display='';document.getElementById('stats').style.display='';document.getElementById('res').style.display='none';render()}
function retryFailed(){if(fails.length===0)return;cur=fails.slice();idx=0;ok=0;er=0;fails=[];document.getElementById('qc').style.display='';document.getElementById('pw').style.display='';document.getElementById('stats').style.display='';document.getElementById('res').style.display='none';render()}
render();
</script>
