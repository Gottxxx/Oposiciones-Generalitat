<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tema 2 · Test 3 · Oposición Generalitat</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f7f4;--surface:#fff;--surface2:#f1f0ed;--border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.2);--text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;--ok:#1a7a4a;--ok-bg:#eaf5ee;--ok-border:rgba(26,122,74,.25);--err:#c0392b;--err-bg:#fdf0ee;--err-border:rgba(192,57,43,.25);--accent:#1a1a18;--r:10px;--rs:6px}
@media(prefers-color-scheme:dark){:root{--bg:#18181a;--surface:#222224;--surface2:#2a2a2c;--border:rgba(255,255,255,.1);--border-strong:rgba(255,255,255,.2);--text:#f0efec;--text2:#a0a09a;--text3:#606060;--ok:#4caf7a;--ok-bg:rgba(76,175,122,.12);--ok-border:rgba(76,175,122,.3);--err:#e57373;--err-bg:rgba(229,115,115,.12);--err-border:rgba(229,115,115,.3);--accent:#f0efec}}
html{font-size:16px}body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem}
#app{width:100%;max-width:680px}
#hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:2rem}
#hdr h1{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px;letter-spacing:-.01em}#hdr p{font-size:13px;color:var(--text3)}
#pill{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid var(--border-strong);color:var(--text2);background:var(--surface2);white-space:nowrap;flex-shrink:0}
#pw{margin-bottom:1.25rem}#pr{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:7px}#pr span:last-child{font-weight:500;color:var(--text2)}
#track{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden}#fill{height:3px;background:var(--accent);border-radius:3px;transition:width .4s ease;width:0%}
#stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.st{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px}
.st .lb{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.st .vl{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-.02em}
#sc-ok .vl{color:var(--ok)}#sc-er .vl{color:var(--err)}
#qc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem}
#qm{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em}
#qm .d{width:3px;height:3px;border-radius:50%;background:var(--border-strong);display:inline-block}
#qt{font-size:16px;color:var(--text);line-height:1.65}
#opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.opt{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:13px 16px;font-size:14px;color:var(--text);cursor:pointer;text-align:left;line-height:1.55;transition:border-color .15s,background .15s,transform .1s;width:100%}
.opt:hover:not(.dis){border-color:var(--border-strong);background:var(--surface2);transform:translateY(-1px)}
.lt{min-width:24px;height:24px;border-radius:50%;border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0;margin-top:1px;transition:background .15s,color .15s,border-color .15s}
.opt.ok{border-color:var(--ok-border);background:var(--ok-bg)}.opt.ok .lt{background:var(--ok);border-color:var(--ok);color:#fff}
.opt.er{border-color:var(--err-border);background:var(--err-bg)}.opt.er .lt{background:var(--err);border-color:var(--err);color:#fff}
.opt.dis{cursor:default;pointer-events:none}
#fb{display:none;border-radius:var(--rs);padding:13px 16px;margin-bottom:1rem;border:1px solid;font-size:13px;line-height:1.65}
#fb.show{display:block}#fb.ok{background:var(--ok-bg);border-color:var(--ok-border)}#fb.er{background:var(--err-bg);border-color:var(--err-border)}
#fb .fh{font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
#fb.ok .fh{color:var(--ok)}#fb.er .fh{color:var(--err)}#fb .fd{color:var(--text2)}
#br{display:flex;justify-content:flex-end}
#bn{display:none;font-size:13px;font-weight:500;padding:10px 20px;border-radius:var(--rs);background:var(--accent);color:var(--bg);border:none;cursor:pointer;transition:opacity .15s}#bn:hover{opacity:.85}
#res{display:none;padding:1rem 0}
#rh{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:2rem}
#rp{font-size:64px;font-weight:700;color:var(--text);letter-spacing:-.04em;line-height:1;flex-shrink:0}
#ri h2{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}#ri p{font-size:13px;color:var(--text2);line-height:1.6}
#rbt{display:flex;gap:8px;margin-bottom:2rem;flex-wrap:wrap}
.bs{font-size:13px;font-weight:500;padding:10px 18px;border-radius:var(--rs);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);cursor:pointer;transition:background .15s}.bs:hover{background:var(--surface2)}
.bp{background:var(--accent);color:var(--bg);border-color:transparent}.bp:hover{opacity:.85;background:var(--accent)}
#fs{border-top:1px solid var(--border);padding-top:1.5rem}
#fs h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.04em}
.fi{padding:1rem 0;border-bottom:1px solid var(--border)}.fi:last-child{border-bottom:none}
.fq{font-size:14px;color:var(--text);margin-bottom:8px;line-height:1.5;font-weight:500}
.fb2{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.bg{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid}
.bg.er{background:var(--err-bg);border-color:var(--err-border);color:var(--err)}.bg.ok{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok)}
.fe{font-size:12px;color:var(--text3);line-height:1.6}
@media(max-width:500px){body{padding:1rem .75rem 3rem}#rh{flex-direction:column;gap:1rem;align-items:flex-start}#rp{font-size:48px}#hdr{flex-direction:column;gap:.75rem}}
</style>
</head>
<body>
<div id="app">
  <div id="hdr"><div><h1>Tema 2 · Test 3 · Oposición Generalitat</h1><p>50 preguntas · Simulacro final con casos prácticos</p></div><div id="pill"></div></div>
  <div id="pw"><div id="pr"><span>Progreso</span><span id="pn">1 / 50</span></div><div id="track"><div id="fill"></div></div></div>
  <div id="stats">
    <div class="st" id="sc-ok"><div class="lb">Correctas</div><div class="vl" id="vok">0</div></div>
    <div class="st" id="sc-er"><div class="lb">Errores</div><div class="vl" id="ver">0</div></div>
    <div class="st"><div class="lb">Pendientes</div><div class="vl" id="vpe">50</div></div>
  </div>
  <div id="qc"><div id="qm"><span id="qnl"></span><span class="d"></span><span id="qbl"></span></div><div id="qt"></div></div>
  <div id="opts"></div><div id="fb"></div>
  <div id="br"><button id="bn" onclick="nxt()">Siguiente →</button></div>
  <div id="res">
    <div id="rh"><div id="rp"></div><div id="ri"><h2 id="rt"></h2><p id="rs2"></p></div></div>
    <div id="rbt"><button class="bs bp" onclick="rst()">Repetir completo</button><button class="bs" id="bfl" onclick="sfl()">Solo falladas →</button></div>
    <div id="fs" style="display:none"><h3 id="fst"></h3><div id="fl"></div></div>
  </div>
</div>
<script>
const Q=[
  {b:"A. Casos prácticos — concepto",q:"El Departament de Salut atiende a pacientes en hospitales públicos. Esta actividad es:",opts:["Solo de control privado","Servicio público: prestación pública para satisfacer una necesidad colectiva","Solo intervención reglamentaria","Solo función inspectora"],c:1,f:"Hospital público + atención pacientes = SERVICIO PÚBLICO. Es prestación pública para satisfacer la necesidad colectiva de salud. Una de las formas más visibles de intervención administrativa según el T2."},
  {b:"A. Casos prácticos — concepto",q:"La inspección de trabajo verifica el cumplimiento de la normativa laboral. Esta actividad es:",opts:["Servicio público","Intervención de control e inspección","Solo regulación","Solo sanción"],c:1,f:"Inspección de trabajo = control + inspección. Forma típica de intervención administrativa de comprobación. Si detecta incumplimientos, puede llegar a sanción, pero la actividad inspectora en sí es control."},
  {b:"A. Casos prácticos — concepto",q:"La concesión de una licencia urbanística es:",opts:["Servicio público","Autorización (forma de intervención que permite ejercer un derecho previo)","Solo regulación reglamentaria","Solo sanción administrativa"],c:1,f:"Licencia urbanística = AUTORIZACIÓN. Permite ejercer un derecho previo (construir) verificando que se cumplen los requisitos legales. Es la forma más común de intervención preventiva sobre la actividad privada."},
  {b:"A. Casos prácticos — concepto",q:"Una multa de tráfico es:",opts:["Servicio público","Autorización","Sanción administrativa","Reglamentación"],c:2,f:"Multa de tráfico = SANCIÓN administrativa. Castiga el incumplimiento de la normativa (infracción ya cometida). Distinta de la multa coercitiva (que busca el cumplimiento futuro). Es una de las formas de intervención administrativa."},
  {b:"B. Casos — descentralización vs desconcentración",q:"La Generalitat transfiere la gestión de una materia al Consell Comarcal del Berguedà. Esto es:",opts:["Desconcentración interna","Descentralización (a otra Administración con personalidad propia)","Delegación temporal","Avocación"],
  c:1,f:"Generalitat → Consell Comarcal = DESCENTRALIZACIÓN. Son dos administraciones distintas (Generalitat y entidad local). El Consell Comarcal tiene personalidad jurídica propia y autonomía. Es transferencia entre administraciones."},
  {b:"B. Casos — descentralización vs desconcentración",q:"El Conseller crea una nueva delegación territorial en Lleida y le atribuye competencias para resolver asuntos del territorio. Esto es:",opts:["Descentralización","Desconcentración territorial","Delegación temporal a un ayuntamiento","Avocación"],c:1,f:"Crear delegación territorial dentro de la Generalitat = DESCONCENTRACIÓN territorial. Sigue dentro de la misma Administración (Generalitat) — solo se desplaza la decisión al territorio sin crear otra entidad."},
  {b:"B. Casos — descentralización vs desconcentración",q:"Un Director general delega la firma de un trámite concreto en su Subdirector general. Esto es:",opts:["Descentralización","Desconcentración","Delegación de firma","Avocación"],c:2,f:"Delegación de firma = caso específico dentro del concepto general de delegación. Es temporal y puntual, dentro de la misma Administración. No crea otra Administración (descentralización) ni traslada al territorio (desconcentración) — solo cede la firma."},
  {b:"B. Casos — descentralización vs desconcentración",q:"El Conseller asume directamente un expediente que estaba siendo tramitado por una Direcció general subordinada. Esto es:",opts:["Delegación","Avocación","Descentralización","Cooperación"],c:1,f:"Conseller asume expediente del subordinado = AVOCACIÓN. El superior jerárquico avoca un asunto concreto del inferior. Es excepcional, debe motivarse, y debe haber circunstancias que la justifiquen (técnicas, económicas, jurídicas)."},
  {b:"C. Casos — relaciones interadministrativas",q:"El Estado y la Generalitat firman un convenio voluntario para gestionar conjuntamente un parque nacional. Esto es:",opts:["Coordinación","Cooperación","Colaboración solo","Descentralización"],c:1,f:"Convenio voluntario + Estado y Generalitat + gestión conjunta = COOPERACIÓN. Acuerdo voluntario entre administraciones para fines comunes en pie de igualdad. El convenio es el instrumento típico de cooperación."},
  {b:"C. Casos — relaciones interadministrativas",q:"El Estado dicta una ley básica que las CCAA deben respetar al desarrollar la legislación de medio ambiente. Esto es:",opts:["Cooperación","Coordinación (imposición de criterio común desde competencia con base constitucional)","Solo colaboración","Descentralización"],c:1,f:"Estado fija bases que las CCAA deben respetar = COORDINACIÓN. Imposición de un criterio común con base constitucional. Las bases son el instrumento típico de coordinación entre Estado y CCAA."},
  {b:"C. Casos — relaciones interadministrativas",q:"La Generalitat solicita al Ministerio de Justicia datos del Registro Civil para tramitar un procedimiento. Esto es:",opts:["Coordinación","Cooperación","Colaboración (asistencia mutua entre administraciones)","Avocación"],c:2,f:"Solicitud de datos entre administraciones = COLABORACIÓN. Es asistencia mutua, deber de auxilio entre administraciones. Es el nivel más bajo de relación — sin pacto especial ni imposición de criterios."},
  {b:"C. Casos — relaciones interadministrativas",q:"Tres ayuntamientos crean un consorcio para gestionar conjuntamente un servicio de agua. Esto es:",opts:["Solo colaboración","Cooperación con creación de entidad instrumental conjunta (consorcio)","Coordinación","Solo avocación"],c:1,f:"Consorcio entre ayuntamientos = COOPERACIÓN con entidad instrumental. Cooperación porque es voluntaria entre iguales + crean una entidad nueva (consorcio) para gestión conjunta. Es cooperación con instrumento jurídico estable."},
  {b:"D. Casos — órganos consultivos",q:"El Govern va a aprobar un proyecto de ley sobre función pública. ¿Qué órgano debe dictaminar previamente sobre su adecuación al EAC?",opts:["Síndic de Greuges","Consell de Garanties Estatutàries","Sindicatura de Comptes","CTESC"],c:1,f:"Adecuación al EAC y a la CE de proyectos de ley = Consell de Garanties Estatutàries. Dictamina ANTES de la aprobación. Es control previo, no posterior. No declara inconstitucionalidad — emite dictamen orientativo o vinculante según el caso."},
  {b:"D. Casos — órganos consultivos",q:"Un ciudadano recibe una sanción administrativa que considera injusta. Si quiere que un órgano independiente revise el caso y emita una recomendación a la Generalitat, debe acudir a:",opts:["Síndic de Greuges","Sindicatura de Comptes","Tribunal Constitucional","Comissió Jurídica Assessora"],c:0,f:"Síndic de Greuges = defensor del pueblo catalán. Recibe quejas ciudadanas, investiga y emite recomendaciones a la Administración. Sus recomendaciones no anulan actos pero tienen valor moral y político fuerte."},
  {b:"D. Casos — órganos consultivos",q:"La Sindicatura de Comptes detecta irregularidades en el gasto de un departament. ¿Qué puede hacer?",opts:["Sancionar directamente al Conseller","Emitir un informe de fiscalización con sus conclusiones, que puede tener consecuencias políticas y, en su caso, derivar en otras vías","Anular los actos administrativos","Encarcelar a los responsables"],c:1,f:"Sindicatura de Comptes = fiscalización + informes. No sanciona directamente. Sus informes son la base para acciones políticas (responsabilidad ante el Parlament), penales (Fiscalía si hay delito) o disciplinarias. Es órgano de control técnico, no sancionador."},
  {b:"D. Casos — órganos consultivos",q:"El Govern necesita un dictamen jurídico sobre la procedencia de revisar de oficio un acto nulo. Debe consultar a:",opts:["Sindicatura de Comptes","Comissió Jurídica Assessora","Síndic de Greuges","CTESC"],c:1,f:"Comissió Jurídica Assessora = órgano consultivo superior del Govern en derecho. Dictamina sobre revisión de oficio, responsabilidad patrimonial, contratos, recursos extraordinarios. Es el equivalente catalán del Consejo de Estado."},
  {b:"E. Casos — sector público instrumental",q:"El Institut Català de la Salut (ICS) es:",opts:["Una sociedad mercantil privada","Una entidad pública instrumental que gestiona servicios sanitarios","Una fundación cultural","Un órgano del Govern"],c:1,f:"ICS = entidad pública instrumental. Gestiona los servicios sanitarios públicos catalanes. Tiene personalidad jurídica propia y se rige por sus normas estatutarias. Es ejemplo típico de Administración instrumental."},
  {b:"E. Casos — sector público instrumental",q:"Una sociedad mercantil pública 100% catalana se rige principalmente por:",opts:["Solo derecho administrativo","Derecho privado mercantil con especialidades de derecho público (control, contratación, transparencia)","Solo derecho civil","Solo derecho laboral"],c:1,f:"Sociedad mercantil pública = derecho privado mercantil principalmente + especialidades de derecho público. La forma jurídica es privada (SA, SL) pero la propiedad y el control son públicos, con consecuencias en transparencia y contratación."},
  {b:"E. Casos — sector público instrumental",q:"Una fundación creada por la Generalitat para gestionar el patrimonio cultural público es:",opts:["Una administración territorial","Una fundación del sector público (entidad instrumental con régimen mixto)","Un órgano del Parlament","Una corporación profesional"],c:1,f:"Fundación creada por la Generalitat = fundación del SECTOR PÚBLICO. Régimen mixto: derecho privado de fundaciones + especialidades públicas (control, transparencia, contratación). Patrón típico para gestionar cultura, sanidad o servicios sociales."},
  {b:"F. Casos — territorial",q:"Una delegación territorial del Govern en Tarragona depende:",opts:["Del Síndic de Greuges","Del propio Govern, con función de coordinación de servicios territoriales en su zona","Del ayuntamiento de Tarragona","Del Tribunal Superior de Justicia"],c:1,f:"Delegación territorial del Govern = depende del Govern. Coordina los servicios territoriales de los distintos departaments en su zona (Tarragona en este caso). Es desconcentración integradora — un solo punto que coordina varios departaments."},
  {b:"F. Casos — territorial",q:"Los serveis territorials del Departament d'Educació en Lleida dependen:",opts:["Del Govern central","De la Direcció general d'Educació en Barcelona, jerárquicamente","Del ayuntamiento de Lleida","De la Universidad de Lleida"],c:1,f:"Serveis territorials = dependen jerárquicamente de la direcció general central correspondiente. En este caso, el serveis territorials d'Educació en Lleida depende de la Direcció general d'Educació en Barcelona. Estructura jerárquica vertical."},
  {b:"F. Casos — territorial",q:"La organización territorial intermedia entre municipi y Generalitat es:",opts:["Solo provincia","Comarca y vegueria (sustituyendo conceptualmente a la provincia según el EAC)","Solo barrio","Solo ayuntamiento"],c:1,f:"Estructura intermedia: comarca + vegueria. La vegueria sustituye conceptualmente a la provincia según el EAC reformado, aunque su implantación efectiva es gradual. La comarca es el nivel intermedio inmediato superior al municipio."},
  {b:"G. Trampas leyes",q:"La Llei 39/2015 NO regula:",opts:["Procedimiento administrativo común","Régimen jurídico del sector público (lo regula la Llei 40/2015)","Derechos del interesado en el procedimiento","Plazos del procedimiento"],c:1,f:"Llei 39/2015 NO regula el régimen jurídico del sector público. Eso es la Llei 40/2015. Trampa numérica clásica del T2 — el examen las invierte sistemáticamente. Memoriza: 39 = procedimiento, 40 = régimen jurídico."},
  {b:"G. Trampas leyes",q:"La Llei 40/2015 NO regula:",opts:["Régimen jurídico del sector público","Convenios entre administraciones","Procedimiento administrativo común (lo regula la Llei 39/2015)","Organización del sector público estatal"],c:2,f:"Llei 40/2015 NO regula el procedimiento administrativo común. Eso es la Llei 39/2015. Las dos leyes funcionan como pareja — una regula la 'organización' (40), la otra el 'procedimiento' (39). No mezclar."},
  {b:"G. Trampas leyes",q:"La Llei 26/2010 catalana se aplica:",opts:["A todas las administraciones del Estado","A las administraciones catalanas, con especialidades respecto a la Llei 39/2015 estatal","Solo al Govern, no a los entes locales catalanes","Solo en procedimientos sancionadores"],c:1,f:"Llei 26/2010 = aplica a las administraciones catalanas con especialidades sobre la Llei 39/2015. Complementa el procedimiento estatal. No deroga la 39/2015 ni se limita al Govern — abarca el conjunto de administraciones catalanas."},
  {b:"H. Casos cruzados con T1",q:"El Síndic de Greuges aparece tanto en el T1 como en el T2 porque:",opts:["No hay relación entre ambos temas","El T1 lo presenta como institución de la Generalitat (estructura) y el T2 lo desarrolla como órgano de garantía dentro de la organización administrativa","Es solo un órgano del T1","Solo se menciona en uno de los dos temas"],c:1,f:"Síndic de Greuges = aparece en T1 (institución de la Generalitat según EAC) y en T2 (órgano de garantía dentro de la organización administrativa). Los dos temas se complementan en su tratamiento."},
  {b:"H. Casos cruzados con T1",q:"El Govern aparece en el T1 y en el T2 porque:",opts:["Es solo un órgano constitucional","El T1 lo regula como institución (estructura, elección, funciones políticas) y el T2 lo trata como cabeza de la Administración pública","No hay diferencia en el tratamiento","Son dos órganos distintos con el mismo nombre"],c:1,f:"Govern = doble dimensión. T1: institución de la Generalitat (composición, elección, funciones políticas). T2: cabeza de la Administración pública (dirección de la acción administrativa). Los dos temas son complementarios."},
  {b:"H. Casos cruzados con T1",q:"Las competencias de la Generalitat (art. 110-112 EAC) conectan el T2 con:",opts:["Solo el T1","El T1 (regulación constitucional/estatutaria) y el T2 (organización administrativa que ejerce esas competencias)","Solo el T15","Solo el T6"],c:1,f:"Competencias del EAC: T1 las regula (concepto de exclusivas, compartidas, ejecutivas + arts. 110-112). T2 las ejerce a través de la organización administrativa concreta. Conexión natural — la organización es para ejercer las competencias."},
  {b:"I. Aplicaciones complejas",q:"Una pregunta del examen menciona 'sector público vinculado o dependiente'. Debes asociarla a:",opts:["Solo al Govern","Al sector público instrumental: organismos autónomos, sociedades mercantiles públicas, fundaciones, consorcios, etc., dependientes o vinculados a una administración territorial","Solo a los ayuntamientos","Solo al Parlament"],c:1,f:"Sector público vinculado o dependiente = sector público instrumental. Entidades creadas por una administración territorial (Generalitat, ayuntamientos) para fines específicos. Cinco tipos típicos: organismos autónomos, EPE, sociedades mercantiles, fundaciones, consorcios."},
  {b:"I. Aplicaciones complejas",q:"¿Qué administración es la Universitat de Barcelona (UB)?",opts:["Administración territorial","Administración corporativa (universidad pública con autonomía y régimen específico)","Sociedad mercantil privada","Órgano del Govern"],c:1,f:"Universidades públicas = Administración CORPORATIVA. Tienen base académica (estudiantes + profesores + personal) + autonomía universitaria reconocida + régimen específico (LOMLOU). No son territoriales (no tienen territorio) ni sociedades privadas."},
  {b:"I. Aplicaciones complejas",q:"El Colegio de Abogados de Barcelona es:",opts:["Una administración territorial","Una administración corporativa (corporación de derecho público con base profesional)","Una empresa privada","Un órgano del Govern"],c:1,f:"Colegio de Abogados = Administración CORPORATIVA. Corporación de derecho público con base profesional. Funciones públicas: registro profesional, deontología, formación. Régimen específico de las corporaciones de derecho público."},
  {b:"I. Aplicaciones complejas",q:"Un consorcio creado entre Generalitat y un ayuntamiento para gestionar un puerto es:",opts:["Solo Administración territorial","Una entidad instrumental cooperativa con personalidad jurídica propia, fruto de la cooperación interadministrativa","Solo cooperación sin personalidad propia","Solo administración corporativa"],c:1,f:"Consorcio = entidad INSTRUMENTAL + COOPERATIVA + personalidad jurídica propia. Combina cooperación interadministrativa (varias administraciones) con instrumento jurídico estable (consorcio). Es una de las cinco entidades del sector público instrumental."},
  {b:"J. Tabla de leyes T2 — repaso final",q:"¿Qué ley regula los convenios entre administraciones públicas?",opts:["Llei 39/2015","Llei 40/2015","Llei 19/2014","Llei 1/1998"],c:1,f:"Convenios entre administraciones = Llei 40/2015 (régimen jurídico del sector público). Los convenios son uno de los instrumentos típicos de cooperación interadministrativa. Conecta el T2 con el bloque de relaciones."},
  {b:"J. Tabla de leyes T2 — repaso final",q:"¿Qué ley regula los actos administrativos y el procedimiento?",opts:["Llei 39/2015","Llei 40/2015","Llei 26/2010","Las dos primeras conjuntamente"],c:0,f:"Actos administrativos + procedimiento = Llei 39/2015. Es la ley central del bloque procedimental. La Llei 26/2010 catalana añade especialidades pero no la sustituye."},
  {b:"J. Tabla de leyes T2 — repaso final",q:"¿Qué leyes son las dos pilares del derecho administrativo estatal moderno (2015)?",opts:["Solo la 39/2015","Solo la 40/2015","Llei 39/2015 (procedimiento) y Llei 40/2015 (régimen jurídico)","Llei 19/2013 y Llei 19/2014"],c:2,f:"Las dos pilares estatales de 2015: 39/2015 + 40/2015. Forman el binomio dual: procedimiento y organización. Memoriza esta dualidad — es el esqueleto del derecho administrativo estatal moderno."},
  {b:"K. Trampas finales T2",q:"¿Cuál de estas afirmaciones es CORRECTA sobre la división de poderes?",opts:["El ejecutivo es solo el Govern","El ejecutivo es Govern + Administración pública; ambos forman parte del mismo poder pero con funciones distintas (política vs ejecutiva técnica)","El judicial incluye al Govern","El legislativo incluye a la Administración pública"],c:1,f:"Afirmación correcta: ejecutivo = Govern + Administración pública. Ambos en el mismo poder pero con roles distintos: Govern = función política y de dirección. Administración pública = función ejecutiva técnica. Conexión clave del T2."},
  {b:"K. Trampas finales T2",q:"¿Cuál de estas afirmaciones es INCORRECTA sobre la organización de la Generalitat?",opts:["El president/a dirige el Govern","Los departaments son las divisiones funcionales del Govern","La lista de departaments está fijada por la Constitución","Los consellers dirigen los departaments"],c:2,f:"Afirmación incorrecta: la lista de departaments NO está fijada por la Constitución (ni siquiera por el Estatut). Se establece por decreto del Govern y puede modificarse. Confundirla con dato constitucional es trampa."},
  {b:"K. Trampas finales T2",q:"¿Cuál de estas afirmaciones sobre los principios del 103.1 CE es CORRECTA?",opts:["Solo se aplican a la AGE","Se aplican a todas las administraciones públicas como principios constitucionales generales","Solo se aplican en procedimientos sancionadores","No tienen efecto jurídico real"],c:1,f:"Principios del 103.1 CE = aplicables a TODAS las administraciones (AGE + CCAA + entes locales + sector público). Son principios constitucionales generales, transversales al derecho administrativo español. Conecta con T1, T6 y otros."},
  {b:"K. Trampas finales T2",q:"¿Cuál es la diferencia entre cooperación y coordinación que más cae en examen?",opts:["No hay diferencia: son sinónimos","La cooperación es voluntaria entre iguales; la coordinación implica imposición de criterio común desde una posición con competencia para coordinar","La coordinación es voluntaria, la cooperación es forzosa","La cooperación es solo entre CCAA, la coordinación entre Estado y CCAA"],c:1,f:"Trampa más fina del bloque de relaciones interadministrativas: cooperación (voluntaria + iguales) vs coordinación (impositiva + criterio común). El examen suele invertirlas o presentarlas como equivalentes."},
  {b:"L. Síntesis final integrada",q:"Si tuvieras que resumir el T2 en cinco palabras, serían:",opts:["Govern, Parlament, departaments, consellers, lengua","Administración pública, principios, organización, departaments, relaciones interadministrativas","Constitución, Estatut, Govern, ley, sanción","Solo eficacia y jerarquía"],c:1,f:"Síntesis del T2 en cinco ejes: Administración pública (concepto) + principios (103.1 CE y EAC) + organización (Govern, departaments) + estructura territorial y consultiva + relaciones interadministrativas (colaboración, cooperación, coordinación)."},
  {b:"L. Síntesis final integrada",q:"¿Cuál es la conexión más fuerte entre el T2 y el T8 (función pública)?",opts:["No hay conexión","La organización administrativa del T2 es el marco donde actúan los empleados públicos del T8","El T8 deroga al T2","Son temas idénticos"],c:1,f:"Conexión T2-T8: el T2 establece la organización (estructura, órganos, departaments). El T8 desarrolla quién trabaja en esa estructura (empleados públicos, función pública). Son complementarios — organización + recursos humanos."},
  {b:"L. Síntesis final integrada",q:"¿Qué bloque del T2 es el más extenso y preguntable?",opts:["Solo el concepto","La organización de la Generalitat (Govern, departaments, órganos territoriales y consultivos)","Solo las leyes","Solo los principios"],c:1,f:"Bloque más extenso del T2: organización de la Generalitat. Govern + departaments + órganos territoriales + órganos consultivos + sector público instrumental. Es el bloque 2 del mapa del tema, y el que más preguntas concentra."},
  {b:"M. Casos finales",q:"El Govern aprueba un decreto que crea un nuevo organismo autónomo para gestionar el patrimonio natural. ¿Qué tipo de Administración es?",opts:["Territorial","Institucional/instrumental (entidad creada para fin concreto)","Corporativa","Solo política"],c:1,f:"Organismo autónomo creado para gestionar el patrimonio natural = Administración INSTITUCIONAL/INSTRUMENTAL. Entidad creada para fin concreto, instrumento de la Generalitat (Administración territorial). Es uno de los cinco tipos de sector público instrumental."},
  {b:"M. Casos finales",q:"Dos consellerias firman un convenio interno para compartir bases de datos. Esto es:",opts:["Cooperación interadministrativa","Relación intra-administrativa: dentro de la misma Administración (Generalitat) entre departaments distintos","Coordinación entre administraciones distintas","Descentralización"],c:1,f:"Convenio entre dos consellerias = relación INTRA-administrativa (dentro de la misma Administración). No es cooperación interadministrativa porque solo hay UNA administración (Generalitat) con varios departaments. La cooperación exige varias administraciones."},
  {b:"M. Casos finales",q:"El Conseller delega la firma de un trámite concreto en su Director general. Esta delegación:",opts:["Implica pérdida definitiva de competencias del Conseller","Es temporal y revocable: el Conseller mantiene la titularidad","Equivale a descentralización","Convierte al Director general en cabeza del departament"],c:1,f:"Delegación = TEMPORAL + REVOCABLE. El delegante mantiene la titularidad de la competencia y puede revocar la delegación. Es un mecanismo de gestión, no una transferencia definitiva. Distinto de la descentralización."},
  {b:"N. Cierre del tema",q:"¿Cuál es la idea más importante del bloque 1 del T2 (qué es la Administración pública)?",opts:["Solo memorizar el art. 103.1 CE","La Administración pública es organización pública con personalidad jurídica propia, orientada al interés general y sometida a la ley y al Derecho, formando parte del poder ejecutivo junto con el Govern","Solo distinguir Govern de Parlament","La Administración pública es solo burocracia"],c:1,f:"Mini-respuesta de examen del bloque 1: 'organización pública + personalidad propia + interés general + sometida a ley y Derecho + parte del ejecutivo junto con Govern'. Si tienes esta frase memorizada, dominas el bloque 1."},
  {b:"N. Cierre del tema",q:"¿Cuál es la idea más importante del bloque 2 del T2 (organización de la Generalitat)?",opts:["Solo memorizar la lista de departaments","La Generalitat se organiza en Govern (cabeza) + departaments (divisiones funcionales) + órganos centrales/territoriales/consultivos + sector público instrumental","Solo el Síndic de Greuges","Solo el Parlament"],c:1,f:"Mini-respuesta del bloque 2: estructura piramidal con Govern arriba + departaments como divisiones + órganos centrales y territoriales para ejecución + órganos consultivos para garantía + sector público instrumental para gestión específica."},
  {b:"N. Cierre del tema",q:"¿Cuál es el dato más preguntado del T2?",opts:["Solo el art. 103.1 CE","Las leyes 39/2015 y 40/2015 con sus materias correctamente asociadas","Solo la lista de departaments","Solo la división de poderes"],c:1,f:"El dato más preguntado del T2: el binomio Llei 39/2015 (procedimiento) + Llei 40/2015 (régimen jurídico). Si no las distingues, fallas las preguntas más fáciles del tema. Memorízalas como pareja inseparable."},
  {b:"N. Cierre del tema",q:"¿Cuál es la trampa más explotada del T2?",opts:["Confundir 39/2015 con 40/2015","Pensar que el ejecutivo es solo el Govern","Confundir descentralización con desconcentración","Las tres anteriores son trampas habituales del T2"],c:3,f:"Las tres son trampas habituales y conviven en exámenes: 39/2015 vs 40/2015 + ejecutivo solo Govern + descentralización vs desconcentración. Memorizar las tres distinciones blinda la mayor parte del T2."}
];

let pool=[...Q],idx=0,nOk=0,nEr=0,fl=[],ans=false;
function render(){
  if(idx>=pool.length){showRes();return;}
  const q=pool[idx],tot=pool.length;
  document.getElementById('fill').style.width=Math.round(idx/tot*100)+'%';
  document.getElementById('pn').textContent=(idx+1)+' / '+tot;
  document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;
  document.getElementById('vpe').textContent=tot-idx;
  document.getElementById('pill').textContent=q.b;
  document.getElementById('qnl').textContent='Pregunta '+(idx+1);
  document.getElementById('qbl').textContent=q.b;
  document.getElementById('qt').textContent=q.q;
  const o=document.getElementById('opts');o.innerHTML='';
  ['A','B','C','D'].forEach((l,i)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML='<span class="lt">'+l+'</span><span>'+q.opts[i]+'</span>';
    b.onclick=()=>sel(i,b);o.appendChild(b);
  });
  const f=document.getElementById('fb');f.className='';f.innerHTML='';
  document.getElementById('bn').style.display='none';ans=false;
}
function sel(i,btn){
  if(ans)return;ans=true;
  const q=pool[idx];
  document.querySelectorAll('.opt').forEach(b=>b.classList.add('dis'));
  const f=document.getElementById('fb');
  if(i===q.c){btn.classList.add('ok');nOk++;f.className='show ok';f.innerHTML='<div class="fh">Correcto</div><div class="fd">'+q.f+'</div>';}
  else{btn.classList.add('er');document.querySelectorAll('.opt')[q.c].classList.add('ok');nEr++;fl.push({q:q.q,co:q.opts[q.c],tu:q.opts[i],f:q.f});f.className='show er';f.innerHTML='<div class="fh">Incorrecto — correcta: '+['A','B','C','D'][q.c]+'</div><div class="fd">'+q.f+'</div>';}
  document.getElementById('vok').textContent=nOk;document.getElementById('ver').textContent=nEr;
  document.getElementById('bn').style.display='inline-block';
}
function nxt(){idx++;render();}
function showRes(){
  ['hdr','pw','stats','qc','opts','fb','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  const tot=pool.length,pct=Math.round(nOk/tot*100);
  document.getElementById('rp').textContent=pct+'%';
  document.getElementById('rt').textContent=pct>=80?'T2 dominado — a por el T8':pct>=60?'Nivel sólido — repasa los fallos':'Refuerza casos prácticos';
  document.getElementById('rs2').textContent=nOk+' correctas de '+tot+'.'+(fl.length>0?' '+fl.length+' para repasar.':' Sin errores.');
  if(!fl.length)document.getElementById('bfl').style.display='none';
  if(fl.length){document.getElementById('fs').style.display='block';document.getElementById('fst').textContent='Preguntas falladas ('+fl.length+')';const fll=document.getElementById('fl');fll.innerHTML='';fl.forEach(f=>{const d=document.createElement('div');d.className='fi';d.innerHTML='<div class="fq">'+f.q+'</div><div class="fb2"><span class="bg er">Tu respuesta: '+f.tu+'</span><span class="bg ok">Correcta: '+f.co+'</span></div><div class="fe">'+f.f+'</div>';fll.appendChild(d);});}
  document.getElementById('res').style.display='block';
}
function rst(){pool=[...Q];idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
function sfl(){if(!fl.length)return;pool=fl.map(f=>Q.find(q=>q.q===f.q)).filter(Boolean);idx=0;nOk=0;nEr=0;fl=[];document.getElementById('res').style.display='none';['hdr','pw','stats','qc','opts','br'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='';});document.getElementById('stats').style.display='grid';render();}
render();
</script>
